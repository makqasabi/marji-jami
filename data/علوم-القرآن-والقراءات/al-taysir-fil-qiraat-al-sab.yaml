id: al-taysir-fil-qiraat-al-sab
العنوان: التيسير في القراءات السبع
المؤلف:
  الاسم: أبو عمرو عثمان بن سعيد الداني
  الوفاة_هجري: 444
  الوفاة_ميلادي: 1053
العلم: علوم القرآن والقراءات
التصنيف_الفرعي: كتب القراءات السبع المعتمدة
لماذا_هو_أم_في_بابه: >
  أشهر مختصر مسند في القراءات السبع وأعظمها أثرًا؛ اختار فيه الداني —
  إمام القراءات في المغرب والأندلس — عن كل قارئ راويين وحرّر طرقهما
  بأسانيده العالية، فاجتمع فيه الاختصار والإسناد والتحرير. وعليه نظم
  الشاطبي «حرز الأماني» فانتشر مضمونه في الآفاق، وصار ما في التيسير
  والشاطبية هو المقروء به عمليًّا في عامة العالم الإسلامي للقراءات
  السبع. اعتمده ابن الجزري أصلًا من أصول النشر ووصف مؤلفه بالإمامة في
  هذا الشأن، فهو حلقة الوصل بين كتاب السبعة لابن مجاهد وبين متون
  الإقراء المتأخرة، وأمُّ المختصرات المسندة في بابه.
يغني_عن:
  - المختصرات المسندة المتقدمة في السبع (كالتذكرة لابن غلبون في مقام التلقي)
يُقرأ_قبله:
  - متن الشاطبية (لمن سلك طريق الحفظ)
أفضل_الطبعات:
  - المحقق_أو_المعتني: خلف بن حمود بن سالم الشغدلي (دراسة وتحقيق)
    الدار: مكتبة دار الأندلس للنشر والتوزيع، حائل (السعودية)
    السنة: 1436هـ/2015م (الطبعة الأولى)
    المجلدات: 1
    ملاحظة: التحقيق الجامعي الحديث المعتمد، قُوبل على نسخ خطية وخُرّجت طرقه (تحقق ويب 2026-06-13)
  - المحقق_أو_المعتني: أوتو برتزل (عناية ونشر)
    الدار: المطبعة الحكومية، استانبول (ضمن منشورات جمعية المستشرقين الألمانية)، ومصورات عنها بدار الكتب العلمية، بيروت
    السنة: 1930م
    المجلدات: 1
    ملاحظة: النشرة النقدية الأولى التي ظلت قرنًا عمدةَ الإحالات، وعليها بنى المحققون المتأخرون
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: []
الشروح_والمختصرات_والذيول:
  - حرز الأماني ووجه التهاني (الشاطبية) — نظمه مع زيادات
مستوى_القارئ: متخصص
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  نشرة برتزل على فضل سبقها وقع فيها تصحيف يسير استدركته التحقيقات
  الجامعية الحديثة (الشغدلي والضامن وابن عزوز)؛ والكتاب متن صناعة
  يُقرأ على الشيوخ لا من الورق وحده.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - طبعة دار الأندلس بتحقيق الشغدلي 1436هـ (تحقق ويب 2026-06-13)
  - نشرة برتزل، استانبول 1930
  - النشر لابن الجزري (اعتماده أصلًا)
آخر_تحديث: 2026-06-13
