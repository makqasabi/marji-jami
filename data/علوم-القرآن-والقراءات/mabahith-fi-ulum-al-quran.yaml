id: mabahith-fi-ulum-al-quran
العنوان: مباحث في علوم القرآن
المؤلف:
  الاسم: مَنّاع بن خليل القطّان
  الوفاة_هجري: 1420
  الوفاة_ميلادي: 1999
العلم: علوم القرآن والقراءات
التصنيف_الفرعي: المداخل والمقررات الحديثة
لماذا_هو_أم_في_بابه: >
  المدخل المعتمد عالميًّا إلى علوم القرآن في التعليم الجامعي؛ لخّص فيه
  القطان مباحث الفن كلها — الوحي والنزول والجمع والترتيب والقراءات
  والمحكم والمتشابه والناسخ والمنسوخ والإعجاز وأصول التفسير — بعبارة
  سهلة محررة وعقيدة سلفية سالمة من الاعتزالات الكلامية، فاعتمدته
  الجامعات والكليات الشرعية في العالم الإسلامي مقررًا أساسيًّا منذ عقود.
  ليس كتاب تحقيقات توسعية كالبرهان والإتقان، لكنه أمّ المداخل في بابه:
  به يبدأ الطالب قبل الموسوعات، وهو الذي يبني التصور الكلي الصحيح للفن،
  ولذا جُعل في هذا المستودع بوابة القراءة لهذا العلم.
يغني_عن:
  - عامة المداخل المدرسية الحديثة لعلوم القرآن
يُقرأ_قبله: []
أفضل_الطبعات:
  - المحقق_أو_المعتني: (كتاب مؤلف معاصر)
    الدار: مكتبة وهبة، القاهرة (وطبعات مؤسسة الرسالة ومكتبة المعارف بالرياض)
    السنة: طبعات متكررة كثيرة (الطبعة السابعة لمكتبة وهبة وما بعدها متداولة)
    المجلدات: 1
    ملاحظة: لا توجد طبعة محققة مميزة؛ كل الطبعات الكاملة المعتمدة من هذه الدور متقاربة
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: [طريق الإسلام, إسلام هاوس]
الشروح_والمختصرات_والذيول: []
مستوى_القارئ: مبتدئ
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  كتاب تعليمي تلخيصي لا يغني المتخصص عن الأمهات، وبعض مباحثه (كالقراءات)
  موجز جدًّا؛ وأخذ عليه بعضهم قلة العزو التفصيلي لمصادره.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - طبعات مكتبة وهبة ومؤسسة الرسالة المتداولة
  - اعتماده مقررًا جامعيًّا واسع الانتشار
آخر_تحديث: 2026-06-12
