id: al-burhan-fi-ulum-al-quran
العنوان: البرهان في علوم القرآن
المؤلف:
  الاسم: بدر الدين محمد بن عبد الله الزركشي
  الوفاة_هجري: 794
  الوفاة_ميلادي: 1392
العلم: علوم القرآن والقراءات
التصنيف_الفرعي: الموسوعات الجامعة لعلوم القرآن
لماذا_هو_أم_في_بابه: >
  أول موسوعة جامعة محرَّرة لعلوم القرآن وصلت إلينا؛ رتّبه الزركشي على
  سبعة وأربعين نوعًا من أنواع علوم القرآن، من معرفة أسباب النزول والمكي
  والمدني إلى المحكم والمتشابه والناسخ والمنسوخ وأساليب البيان القرآني،
  وجمع فيه ما تفرّق في كتب من قبله مع نفَس بلاغي تحليلي يميّزه. هو الأصل
  الذي بنى عليه السيوطي «الإتقان» وصرّح بأنه وقف عليه واستفاد منه، فصار
  الكتابان معًا عمدة هذا الفن إلى اليوم، ولا يستغني باحث في علوم القرآن
  عن الرجوع إليهما جميعًا، وما من مصنَّف حديث في هذا العلم إلا وهو عيال
  عليهما.
يغني_عن:
  - فنون الأفنان لابن الجوزي
  - جمال القراء وكمال الإقراء لعلم الدين السخاوي
يُقرأ_قبله:
  - مباحث في علوم القرآن لمناع القطان
أفضل_الطبعات:
  - المحقق_أو_المعتني: محمد أبو الفضل إبراهيم
    الدار: دار إحياء الكتب العربية (عيسى البابي الحلبي)، القاهرة
    السنة: 1376هـ/1957م (الطبعة الأولى)
    المجلدات: 4
    ملاحظة: التحقيق المعتمد الذي عليه الإحالات في الدراسات، وصُوِّر مرارًا (دار المعرفة وغيرها)
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: [جامع الكتب الإسلامية, قرآن بيديا]
الشروح_والمختصرات_والذيول: []
مستوى_القارئ: متوسط/متخصص
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  فيه نقول عن مصادر متقدمة بعضها لم يصل إلينا، وقد يسوق أقوالًا ضعيفة
  بلا تعقيب؛ والمتأخرون استدركوا على بعض تقسيماته، لكن ذلك لا يمس
  مكانته التأسيسية في الفن.
