ملاحظات_نقدية: >
  فيه روايات ضعيفة ومرسلة ساقها الواحدي بأسانيدها على عادة المتقدمين من
  غير حكم عليها، فيلزم قارئَه النظرُ في التخريج؛ وطبعة الحميدان تعالج
  ذلك بالحكم على الروايات.
