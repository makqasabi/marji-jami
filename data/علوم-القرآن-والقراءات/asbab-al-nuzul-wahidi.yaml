id: asbab-al-nuzul-wahidi
العنوان: أسباب نزول القرآن
المؤلف:
  الاسم: أبو الحسن علي بن أحمد الواحدي النيسابوري
  الوفاة_هجري: 468
  الوفاة_ميلادي: 1076
العلم: علوم القرآن والقراءات
التصنيف_الفرعي: أسباب النزول
لماذا_هو_أم_في_بابه: >
  أقدم كتاب مفرد جامع في أسباب النزول وصل إلينا وأشهرها على الإطلاق؛
  جمع فيه الواحدي — وهو من أئمة التفسير — روايات أسباب النزول مرتبة على
  سور القرآن بأسانيدها، وقد قال في مقدمته كلمته المشهورة في وجوب التثبت
  في هذا الباب وأنه «لا يحل القول في أسباب نزول الكتاب إلا بالرواية
  والسماع». صار الأصل الذي بنى عليه كل من صنف بعده، ومنه استمد السيوطي
  «لباب النقول» مع استدراكات، فهو أم هذا النوع من أنواع علوم القرآن
  ومرجعه الأول عند المفسرين والباحثين في سياقات الوحي.
يغني_عن:
  - لباب النقول في أسباب النزول للسيوطي (في أكثر مادته، والسيوطي زاد عليه)
يُقرأ_قبله:
  - مباحث في علوم القرآن لمناع القطان (فصل أسباب النزول)
