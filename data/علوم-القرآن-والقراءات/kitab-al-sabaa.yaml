id: kitab-al-sabaa
العنوان: كتاب السبعة في القراءات
المؤلف:
  الاسم: أبو بكر أحمد بن موسى بن مجاهد البغدادي
  الوفاة_هجري: 324
  الوفاة_ميلادي: 936
العلم: علوم القرآن والقراءات
التصنيف_الفرعي: أصول كتب القراءات المسندة
لماذا_هو_أم_في_بابه: >
  الكتاب الذي أسّس «التسبيع»؛ فابن مجاهد هو أول من جمع قراءات الأئمة
  السبعة الذين أطبقت الأمة على إمامتهم وضبط أصولهم وفرشهم بالأسانيد،
  فصار كتابه حدًّا فاصلًا في تاريخ علم القراءات: ما قبله اختيارات
  متناثرة، وما بعده تصنيف على سبعته، وعنه تفرعت كتب الفن كلها من التيسير
  والشاطبية إلى النشر. قيمته اليوم تأسيسية توثيقية من الطراز الأول، فهو
  أقدم مصادر القراءات الكاملة وصولًا إلينا، وإليه يرجع المحققون في ضبط
  الخلاف ونسبة الأوجه إلى أصحابها، ولا يستغني عنه باحث في تاريخ النص
  القرآني وقراءاته.
يغني_عن:
  - المصنفات المفقودة في قراءات الأمصار قبله (هو ديوانها الباقي)
يُقرأ_قبله:
  - مباحث في علوم القرآن لمناع القطان (فصل القراءات)
أفضل_الطبعات:
  - المحقق_أو_المعتني: شوقي ضيف
    الدار: دار المعارف، القاهرة
    السنة: 1400هـ (الطبعة الثانية)
    المجلدات: 1
    ملاحظة: التحقيق الوحيد المعتمد المتداول، وعليه الإحالات
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: [مشكاة, قرآن بيديا]
الشروح_والمختصرات_والذيول: []
مستوى_القارئ: متخصص
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  أُخذ على ابن مجاهد قديمًا حصره الاختيار في سبعة حتى توهّم العوام أنها
  الأحرف السبعة، وقد نبه على ذلك أئمة الفن كأبي شامة وابن الجزري؛ وفي
  تحقيق شوقي ضيف مواضع استدركها المتخصصون في دراسات لاحقة.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - طبعة دار المعارف بتحقيق شوقي ضيف (تحقق ويب 2026-06-12)
  - النشر لابن الجزري (نقولُه عنه)
آخر_تحديث: 2026-06-12
