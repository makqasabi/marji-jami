id: al-nashr-fil-qiraat-al-ashr
العنوان: النشر في القراءات العشر
المؤلف:
  الاسم: شمس الدين محمد بن محمد بن الجزري
  الوفاة_هجري: 833
  الوفاة_ميلادي: 1429
العلم: علوم القرآن والقراءات
التصنيف_الفرعي: كتب القراءات الجامعة
لماذا_هو_أم_في_بابه: >
  عمدة علم القراءات بلا منازع؛ حرّر فيه ابن الجزري — وهو خاتمة محققي هذا
  الفن — القراءات العشر المتواترة بطرقها ورواتها وأسانيدها، واستوعب نحو
  ستين كتابًا من أصول الفن المسندة، وقعّد فيه أركان القراءة المقبولة
  (صحة السند، وموافقة الرسم، وموافقة العربية) التي صارت ميزان القبول
  عند القراء بعده. عليه مدار الإقراء والتلقي في العالم الإسلامي إلى
  اليوم، ومنظومته «طيبة النشر» هي متن العشر الكبرى الذي يحفظه القراء،
  فمن أتقن النشر استغنى عن طبقة كتب القراءات المسندة قبله لأنه جمعها
  وحرر طرقها.
يغني_عن:
  - جامع البيان في القراءات السبع للداني (في جملة مادته)
  - المصنفات المسندة المتقدمة التي استوعبها (نحو ستين كتابًا)
يُقرأ_قبله:
  - متن الشاطبية (حرز الأماني)
  - التيسير للداني
أفضل_الطبعات:
  - المحقق_أو_المعتني: علي محمد الضباع (تصحيح ومراجعة)
    الدار: المطبعة التجارية الكبرى، القاهرة (ومصورتها بدار الكتب العلمية، بيروت)
    السنة: (بلا تاريخ، نحو منتصف القرن الـ14هـ)
    المجلدات: 2
    ملاحظة: الطبعة المتداولة التي عليها العمل والإحالات منذ نحو قرن؛ وظهرت تحقيقات أكاديمية أوفى تُستكمل بياناتها عند التثبت
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: [قرآن بيديا]
الشروح_والمختصرات_والذيول:
  - طيبة النشر في القراءات العشر (نظم المؤلف نفسه)
  - تقريب النشر (اختصار المؤلف نفسه)
  - شرح طيبة النشر لابنه أحمد بن الجزري
مستوى_القارئ: متخصص
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  طبعة الضباع المتداولة على إتقانها النسبي وقع فيها سقط وتصحيف نبّه
  عليه المتخصصون، والكتاب بحاجة معلنة عند أهل الفن إلى تحقيق نقدي كامل
  متداول؛ وهو كتاب صناعة دقيقة لا يقرؤه المبتدئ ابتداء.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - طبعة المطبعة التجارية الكبرى بتصحيح الضباع ومصوراتها
  - مكانة الكتاب المتواترة عند أهل الإقراء
آخر_تحديث: 2026-06-12
