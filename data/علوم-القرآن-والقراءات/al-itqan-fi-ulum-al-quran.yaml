id: al-itqan-fi-ulum-al-quran
العنوان: الإتقان في علوم القرآن
المؤلف:
  الاسم: جلال الدين عبد الرحمن بن أبي بكر السيوطي
  الوفاة_هجري: 911
  الوفاة_ميلادي: 1505
العلم: علوم القرآن والقراءات
التصنيف_الفرعي: الموسوعات الجامعة لعلوم القرآن
لماذا_هو_أم_في_بابه: >
  أجمع كتب علوم القرآن وأكثرها استيعابًا؛ رتّبه السيوطي على ثمانين نوعًا،
  فاستوعب «البرهان» للزركشي وزاد عليه من سعة محفوظه ونقوله عن مئات
  المصنفات، حتى صار قول أهل الفن: من ملك الإتقان فقد ملك خزانة علوم
  القرآن. هو المرجع الذي تُختبر به المسائل في هذا العلم، ومقدمةُ كل بحث
  أكاديمي فيه تكاد لا تخلو من الإحالة إليه، وجعله السيوطي نفسه مقدمةً
  لتفسيره الكبير الذي أراده. يغني الطالبَ المتمكن عن عامة المصنفات
  المفردة في أنواع علوم القرآن لأنه لخّص مقاصدها وأحال على مظانّها.
يغني_عن:
  - معترك الأقران في إعجاز القرآن للسيوطي (في كثير من مباحثه)
  - التحبير في علم التفسير للسيوطي (وهو أصله المختصر)
  - المصنفات المفردة في أنواع بعينها (أوسعها استيعابًا لمقاصدها)
يُقرأ_قبله:
  - مباحث في علوم القرآن لمناع القطان
  - مناهل العرفان للزرقاني
أفضل_الطبعات:
  - المحقق_أو_المعتني: مركز الدراسات القرآنية
    الدار: مجمع الملك فهد لطباعة المصحف الشريف (وزارة الشؤون الإسلامية)، المدينة المنورة
    السنة: 1426هـ (الطبعة الأولى)
    المجلدات: 7
    ملاحظة: أوفى التحقيقات المتداولة، قوبل على نسخ خطية عدة وخُرّجت نقوله
  - المحقق_أو_المعتني: محمد أبو الفضل إبراهيم
    الدار: الهيئة المصرية العامة للكتاب، القاهرة
    السنة: 1394هـ/1974م
    المجلدات: 4
    ملاحظة: الطبعة المشهورة التي عليها إحالات الدراسات قبل طبعة المجمع
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: [طريق الإسلام, جامع الكتب الإسلامية, أرشيف]
الشروح_والمختصرات_والذيول: []
مستوى_القارئ: متوسط/متخصص
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  غلب عليه الجمع والنقل، فيسوق الروايات بأسانيد فيها الضعيف من غير
  تمييز دائم، وأُخذ عليه التوسع في الإسرائيليات في بعض الأنواع؛ فيُقرأ
  بعين الناقد المحصِّل لا الجامع فحسب.
