ملاحظات_نقدية: >
  نشرة برجشتراسر على ريادتها خلت من التعليق المستوعب وفيها تصحيف يسير؛
  ونبّه باحثون إلى حاجة الكتاب لتحقيق حديث يقابل نسخه الخطية المكتشفة
  بعد النشرة الأولى.
