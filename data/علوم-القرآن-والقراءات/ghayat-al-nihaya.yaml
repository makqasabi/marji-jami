id: ghayat-al-nihaya
العنوان: غاية النهاية في طبقات القراء
المؤلف:
  الاسم: شمس الدين محمد بن محمد بن الجزري
  الوفاة_هجري: 833
  الوفاة_ميلادي: 1429
العلم: علوم القرآن والقراءات
التصنيف_الفرعي: تراجم القراء وطبقاتهم
لماذا_هو_أم_في_بابه: >
  ديوان تراجم القراء الجامع؛ اختصر فيه ابن الجزري كتابيه الكبيرين في
  طبقات القراء وضم إليهما كتابي الذهبي «معرفة القراء الكبار» وغيره،
  فجمع نحو أربعة آلاف ترجمة لقراء الأمة من الصحابة إلى عصره، بأسانيدهم
  وشيوخهم وتلاميذهم ومروياتهم. به تُعرف رجال أسانيد القراءات وتُحرَّر
  طرق الأداء، فهو لعلم القراءات بمنزلة تهذيب الكمال لعلم الحديث، ولا
  يستغني عنه محقق في الفن ولا باحث في تاريخ الإقراء؛ وقد أغنى عن أصوله
  حتى إن أكثرها لم يصل إلينا كاملًا، فبقي هو العمدة الفريدة في بابه.
يغني_عن:
  - معرفة القراء الكبار للذهبي (في أكثر مادته)
  - طبقات القراء المتقدمة المفقودة (هو خلاصتها الباقية)
يُقرأ_قبله: []
