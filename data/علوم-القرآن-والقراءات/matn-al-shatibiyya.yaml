id: matn-al-shatibiyya
العنوان: حرز الأماني ووجه التهاني في القراءات السبع (متن الشاطبية)
المؤلف:
  الاسم: القاسم بن فِيرُّه الرُّعيني الشاطبي
  الوفاة_هجري: 590
  الوفاة_ميلادي: 1194
العلم: علوم القرآن والقراءات
التصنيف_الفرعي: متون القراءات المنظومة
لماذا_هو_أم_في_بابه: >
  أعظم متون القراءات إطلاقًا وأكثر منظومات العلوم الإسلامية حفظًا
  وتلقّيًا بعد القرآن؛ نظم فيه الشاطبي «التيسير» للداني في 1173 بيتًا من
  بحر الطويل مع زيادات وتحريرات، وابتكر فيه رموز القراء التي صارت لغة
  الفن. أطبق القراء على تلقيه بالقبول قرابة تسعة قرون، فلا يُجاز قارئ
  بالسبع إلا من طريقه، وعليه مدار الإقراء في المشرق والمغرب، وشروحه
  بالعشرات. وقد عُدّ مع «طيبة النشر» ركنَي الإقراء المسند، فمن حفظ
  الشاطبية وفهم شروحها ملك مفاتيح القراءات السبع كاملة، وأغنته عن طبقة
  المنظومات والمختصرات التي قبلها.
يغني_عن:
  - المنظومات والمختصرات المتقدمة في السبع
يُقرأ_قبله:
  - متن تحفة الأطفال ومقدمة ابن الجزري في التجويد
أفضل_الطبعات:
  - المحقق_أو_المعتني: محمد تميم الزعبي (ضبط وتصحيح)
    الدار: مكتبة دار الهدى ودار الغوثاني للدراسات القرآنية، المدينة المنورة/دمشق
    السنة: 1426هـ/2005م (الطبعة الرابعة)
    المجلدات: 1
    ملاحظة: الضبط المعتمد عند القراء والمتداول في حلقات الإقراء
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: [طريق الإسلام, إسلام هاوس]
الشروح_والمختصرات_والذيول:
  - إبراز المعاني من حرز الأماني لأبي شامة المقدسي
  - سراج القارئ المبتدي لابن القاصح
  - فتح الوصيد للسخاوي (أول شروحها)
  - الوافي في شرح الشاطبية لعبد الفتاح القاضي (شرح حديث ميسر)
مستوى_القارئ: متوسط/متخصص
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  متن مرموز لا يُفهم إلا بشرح وتلقٍّ عن أهله؛ وظهر له تحقيق علمي حديث
  بعناية أكاديمية (نشرة علي الغامدي) أثنى عليه متخصصون، وبقي ضبط
  الزعبي هو المتداول في التلقي.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - نشرة الزعبي ط4 1426هـ (تحقق ويب 2026-06-12)
  - غاية النهاية لابن الجزري (ترجمة الشاطبي ومكانة المتن)
آخر_تحديث: 2026-06-12
