id: manahil-al-irfan
العنوان: مناهل العرفان في علوم القرآن
المؤلف:
  الاسم: محمد عبد العظيم الزُّرقاني
  الوفاة_هجري: 1367
  الوفاة_ميلادي: 1948
العلم: علوم القرآن والقراءات
التصنيف_الفرعي: المصنفات الحديثة الجامعة
لماذا_هو_أم_في_بابه: >
  أهم مصنف حديث جامع في علوم القرآن؛ كتبه الزرقاني مدرّسًا بكلية أصول
  الدين بالأزهر فجمع مباحث الفن السبعة عشر الكبرى (الوحي، النزول، جمع
  القرآن، ترتيبه، نزوله على سبعة أحرف، القراءات، الرسم، الترجمة،
  الإعجاز...) بعرض منهجي مرتب وعبارة ميسّرة، وامتاز بمناقشة الشبهات
  المثارة حول القرآن في العصر الحديث والرد عليها، وهو ما لا تجده مجموعًا
  عند المتقدمين. صار العمدة في التدريس الجامعي لعلوم القرآن في العالم
  الإسلامي، وجسرًا لا غنى عنه بين المختصرات المدرسية وبين البرهان
  والإتقان، فهو أم المصنفات الحديثة في هذا الفن.
يغني_عن:
  - عامة المقررات الجامعية الحديثة في علوم القرآن
يُقرأ_قبله:
  - مباحث في علوم القرآن لمناع القطان
أفضل_الطبعات:
  - المحقق_أو_المعتني: (طبعة المؤلف المعتمدة)
    الدار: مطبعة عيسى البابي الحلبي وشركاه، القاهرة
    السنة: الطبعة الثالثة (بلا تاريخ)
    المجلدات: 2
    ملاحظة: الطبعة الأم التي عليها الإحالات؛ والطبعات اللاحقة (دار الكتاب العربي وغيرها) مصورة عنها أو معاد صفها
  - المحقق_أو_المعتني: فواز أحمد زمرلي
    الدار: دار الكتاب العربي، بيروت
    السنة: 1415هـ/1995م
    المجلدات: 2
    ملاحظة: طبعة معتنى بها متداولة
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: [طريق الإسلام]
الشروح_والمختصرات_والذيول: []
مستوى_القارئ: متوسط
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  ناقشه باحثون في مواضع من مباحث الترجمة والقراءات، وكُتبت حوله دراسات
  نقدية أكاديمية؛ وهو في عرضه الكلامي على طريقة متكلمي الأزهر، فينتبه
  لذلك من يقرؤه في مباحث الصفات والوحي.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - طبعة عيسى البابي الحلبي الثالثة
  - شهرة الكتاب في المقررات الجامعية لعلوم القرآن
آخر_تحديث: 2026-06-12
