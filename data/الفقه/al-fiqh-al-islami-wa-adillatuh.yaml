ملاحظات_نقدية: >
  عمل جمعٍ وعرض لا تحقيقٍ وترجيح عالٍ، ووقعت في عزوه للمذاهب مواضع
  تحتاج مراجعة على كتب أهلها كما نبه المتخصصون؛ فهو باب الوصول لا
  غاية التحقيق.
