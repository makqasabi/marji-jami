id: al-fiqh-al-islami-wa-adillatuh
العنوان: الفقه الإسلامي وأدلته
المؤلف:
  الاسم: وهبة بن مصطفى الزحيلي
  الوفاة_هجري: 1436
  الوفاة_ميلادي: 2015
العلم: الفقه
التصنيف_الفرعي: الفقه المقارن المعاصر
لماذا_هو_أم_في_بابه: >
  أوسع موسوعة فقهية مقارنة كتبها مؤلف واحد في العصر الحديث وأكثرها
  تداولًا؛ عرض فيها الزحيلي — شيخ فقهاء الشام المعاصرين — أبواب
  الفقه كلها على المذاهب الأربعة بأدلتها، بعبارة عصرية منظمة
  وعناوين محررة، وأضاف ما تمس إليه حاجة العصر: النظريات الفقهية
  (الملكية، العقد، الضمان) والمعاملات المالية الحديثة والقضايا
  الطبية والسياسية الشرعية. صارت منذ صدورها المرجع التدريسي الأول
  في كليات الشريعة والقانون عربيًّا، وعدة الباحث والقاضي والمفتي
  للوصول السريع إلى أقوال المذاهب موثقة، وتُرجمت لعدة لغات، فهي أم
  المراجع الفقهية المعاصرة الجامعة يقصدها من أراد الفقه المقارن
  بلسان العصر قبل الصعود إلى الأمهات التراثية.
يغني_عن:
  - المراجع الجامعية المقارنة المعاصرة في عمومها
