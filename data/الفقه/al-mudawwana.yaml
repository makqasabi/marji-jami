id: al-mudawwana
العنوان: المدونة الكبرى
المؤلف:
  الاسم: سحنون بن سعيد التنوخي (عن ابن القاسم عن مالك)
  الوفاة_هجري: 240
  الوفاة_ميلادي: 854
العلم: الفقه
التصنيف_الفرعي: أمهات المذهب المالكي
لماذا_هو_أم_في_بابه: >
  أصل المذهب المالكي وأمه التي عليها مداره بعد الموطأ؛ دوّن فيها
  سحنون أسئلته لعبد الرحمن بن القاسم — أخص أصحاب مالك — عن أقوال
  مالك في الفروع كلها، بصيغة السؤال والجواب التي تصور مجلس الفقه
  حيًّا، فحفظت آلاف المسائل عن مالك وأصحابه بأقرب إسناد. قال عنها
  المالكية: المدونة عندنا كالأم تُقدَّم على كل كتاب بعد الموطأ، وعليها
  بنيت مختصرات المذهب كلها من ابن أبي زيد إلى خليل، وحولها دارت
  شروح المدرسة العراقية والقروية والأندلسية. فلا يفهم مذهب مالك من
  أصله إلا بها، وهي مع موطئه الديوانان اللذان قام عليهما فقه أهل
  المدينة في الأمصار.
يغني_عن:
  - الأمهات المالكية الأخرى المفقودة أو النادرة (كالواضحة والعتبية في مقام الأصل المطبوع)
يُقرأ_قبله:
  - متن ابن عاشر أو الرسالة لابن أبي زيد القيرواني
أفضل_الطبعات:
  - المحقق_أو_المعتني: (طبعة مصححة)
    الدار: مطبعة السعادة، القاهرة (ومصوراتها)
    السنة: 1323–1324هـ
    المجلدات: 16 جزءًا
    ملاحظة: الطبعة الأم التي عليها إحالات المذهب
  - المحقق_أو_المعتني: (طبعة معاد صفها)
    الدار: دار الكتب العلمية، بيروت
    السنة: 1415هـ/1994م
    المجلدات: 4
    ملاحظة: الطبعة المتداولة حديثًا
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: []
الشروح_والمختصرات_والذيول:
  - التهذيب في اختصار المدونة للبراذعي
  - النوادر والزيادات لابن أبي زيد (توسعة عليها وعلى غيرها)
مستوى_القارئ: متخصص
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  صيغة السماع والسؤال تجعل ترتيبها وعرضها شاقين على غير المتمرس،
  وفيها مسائل بقيت على الخلاف بين رواياتها حررتها شروح المذهب؛
  وهي بحاجة قائمة إلى تحقيق نقدي حديث كامل.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - طبعة السعادة ومصوراتها
  - ترتيب المدارك للقاضي عياض (منزلة المدونة)
آخر_تحديث: 2026-06-12
