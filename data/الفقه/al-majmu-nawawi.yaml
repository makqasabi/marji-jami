id: al-majmu-nawawi
العنوان: المجموع شرح المهذب
المؤلف:
  الاسم: أبو زكريا يحيى بن شرف النووي
  الوفاة_هجري: 676
  الوفاة_ميلادي: 1277
العلم: الفقه
التصنيف_الفرعي: أمهات المذهب الشافعي
لماذا_هو_أم_في_بابه: >
  أجلّ موسوعات الفقه الشافعي الاستدلالية وأكملها منهجًا؛ شرح فيه
  النووي مهذّبَ الشيرازي فجمع تحرير المذهب وطرقه ووجوهه إلى الفقه
  المقارن العالي: يسوق مذاهب العلماء بأدلتها وينصف في عرضها، مع
  تحقيق حديثي يليق بإمامته يميز الصحيح من الضعيف في أدلة الباب،
  ولغوي يضبط الألفاظ، حتى عدّه العلماء — على كونه شرحًا شافعيًّا —
  من أعظم كتب الفقه المقارن في التراث كله. توفي قبل تمامه (بلغ
  الربا) فأكمله السبكي ثم المطيعي، وبقي قسم النووي منه المثل الأعلى
  للتصنيف الفقهي: به مع الروضة ومنهاجه استقر معتمد المذهب، وإليه
  ترجع المجامع والدراسات في قول الشافعية محررًا بدليله.
يغني_عن:
  - شروح المهذب والوسيط قبله
  - فتح العزيز للرافعي (في جملة مقاصده الاستدلالية)
يُقرأ_قبله:
  - منهاج الطالبين بشرح ميسر
أفضل_الطبعات:
  - المحقق_أو_المعتني: (مع تكملتي السبكي والمطيعي)
    الدار: إدارة الطباعة المنيرية، القاهرة (ومصورات دار الفكر وطبعة مكتبة الإرشاد بجدة بتحقيق محمد نجيب المطيعي)
    السنة: 1344هـ وما بعدها (الأصل)؛ طبعة الإرشاد نحو 1400هـ
    المجلدات: 20 (الإرشاد) / 18 (المنيرية)
    ملاحظة: المنيرية هي الأم؛ وطبعة الإرشاد أكمل تداولًا
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: []
الشروح_والمختصرات_والذيول:
  - تكملة السبكي ثم المطيعي
مستوى_القارئ: متخصص
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  لم يكمله النووي والتكملتان دونه تحقيقًا ونفَسًا بفارق ظاهر؛
  فالاعتماد العالي على قسم النووي، ويميز الباحث بين الأقسام عند
  النقل.
روابط_التحميل:
  - المصدر: المكتبة الشاملة (ط المنيرية)
    الرابط: https://shamela.ws/book/2186
    النوع: حر
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - الطبعة المنيرية وطبعة الإرشاد
آخر_تحديث: 2026-06-12
