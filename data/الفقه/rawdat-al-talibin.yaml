id: rawdat-al-talibin
العنوان: روضة الطالبين وعمدة المفتين
المؤلف:
  الاسم: أبو زكريا يحيى بن شرف النووي
  الوفاة_هجري: 676
  الوفاة_ميلادي: 1277
العلم: الفقه
التصنيف_الفرعي: أمهات المذهب الشافعي (المعتمد المحرر)
لماذا_هو_أم_في_بابه: >
  ديوان المذهب الشافعي المحرر الذي عليه مدار الفتوى؛ اختصر فيه
  النووي فتحَ العزيز للرافعي مجردًا من الأدلة، فاستوعب فروع المذهب
  ووجوهه وطرقه مع بيان الراجح في كل مسألة بمصطلحاته الدقيقة
  (الأظهر، الأصح، المذهب) التي صارت ميزان الترجيح عند الشافعية.
  وقد استقر عمل متأخري المذهب على أن ما اتفق عليه الشيخان — الرافعي
  والنووي — فهو المعتمد، فصارت الروضة وأختها (منهاج الطالبين
  وشروحه) عماد الإفتاء والقضاء الشافعي في مصر والشام والحجاز
  وحضرموت وجنوب شرق آسيا إلى اليوم. فهي للمذهب مستقرًّا ما الأم له
  مصدرًا: بها يعرف قول الشافعية المعتمد في أي مسألة بأيسر طريق.
يغني_عن:
  - فتح العزيز للرافعي (في مقام معرفة المعتمد)
يُقرأ_قبله:
  - منهاج الطالبين
أفضل_الطبعات:
  - المحقق_أو_المعتني: زهير الشاويش (إشراف وعناية)
    الدار: المكتب الإسلامي، بيروت/دمشق
    السنة: 1412هـ/1991م (الطبعة الثالثة)
    المجلدات: 12
    ملاحظة: الطبعة المعتمدة المتداولة
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: []
الشروح_والمختصرات_والذيول:
  - حواشي المتأخرين عليها (كحاشية ابن قاضي شهبة)
مستوى_القارئ: متخصص
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  مجردة من الأدلة بطبيعة غرضها فلا تغني عن المجموع لطالب الدليل؛
  وتعقب المتأخرون مواضع يسيرة خالف فيها ترجيحُها معتمدَ المذهب
  المستقر، حررتها كتب المعتمد.
