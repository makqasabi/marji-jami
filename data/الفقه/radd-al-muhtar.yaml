id: radd-al-muhtar
العنوان: رد المحتار على الدر المختار (حاشية ابن عابدين)
المؤلف:
  الاسم: محمد أمين بن عمر عابدين الدمشقي
  الوفاة_هجري: 1252
  الوفاة_ميلادي: 1836
العلم: الفقه
التصنيف_الفرعي: أمهات المذهب الحنفي (المعتمد المتأخر)
لماذا_هو_أم_في_بابه: >
  خاتمة المذهب الحنفي وعمدته في الفتوى إلى اليوم؛ حشّى ابن عابدين —
  خاتمة محققي المذهب — الدرَّ المختار للحصكفي فاستوعب أقوال المذهب
  وطبقاته ورسائل محققيه، محررًا المعتمد للفتوى من غيره بقواعد رسمها
  في رسالته «عقود رسم المفتي»، فصار قوله هو الفصل في معتمد المذهب
  عند متأخري الحنفية قاطبة. عليه دارت الفتوى والقضاء في الدولة
  العثمانية وما بعدها، وهو المرجع الأول الذي تستند إليه المحاكم
  والمجامع في البلاد التي يعمل فيها الفقه الحنفي، حتى صار اسم «ابن
  عابدين» مرادفًا للمعتمد عند الحنفية، ولا يستغني عنه دارس مقارن
  أراد قول المذهب النهائي.
يغني_عن:
  - حواشي المتأخرين وفتاواهم المتفرقة (حررها وجمعها)
يُقرأ_قبله:
  - بدائع الصنائع (لفهم بناء المذهب قبل محصلته)
أفضل_الطبعات:
  - المحقق_أو_المعتني: (طبعة مصححة معتمدة)
    الدار: مكتبة ومطبعة مصطفى البابي الحلبي، القاهرة
    السنة: 1386هـ/1966م (الطبعة الثانية)
    المجلدات: 6
    ملاحظة: الطبعة المعتمدة المتداولة وعنها المصورات (دار الفكر وغيرها)
  - المحقق_أو_المعتني: عادل عبد الموجود وعلي معوض
    الدار: دار عالم الكتب، الرياض (طبعة خاصة)
    السنة: 1423هـ/2003م
    المجلدات: 14
    ملاحظة: طبعة محققة موسعة مع رسائل ابن عابدين
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: []
الشروح_والمختصرات_والذيول:
  - قرة عيون الأخيار (تكملة لابنه علاء الدين)
مستوى_القارئ: متخصص
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  حاشية على شرح على متن، فلغتها مركبة لا يفكها إلا متمرس بطريقة
  الكتب الحنفية المتأخرة؛ وترجيحاته اجتهاد محقق متأخر قد يخالف
  اختيار المعاصرين في مسائل.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - طبعة الحلبي
آخر_تحديث: 2026-06-12
