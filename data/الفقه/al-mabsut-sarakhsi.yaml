id: al-mabsut-sarakhsi
العنوان: المبسوط
المؤلف:
  الاسم: شمس الأئمة محمد بن أحمد السرخسي
  الوفاة_هجري: 483
  الوفاة_ميلادي: 1090
العلم: الفقه
التصنيف_الفرعي: أمهات المذهب الحنفي
لماذا_هو_أم_في_بابه: >
  أم كتب الحنفية الاستدلالية وأوسع دواوين المذهب المتقدمة؛ أملاه شمس
  الأئمة من حفظه وهو سجين الجب في نحو ثلاثين جزءًا، شرحًا لكتب ظاهر
  الرواية بمختصر الكافي للحاكم الشهيد، يسوق المسائل بأدلتها وتعليلها
  وقياساتها واستحساناتها، فأظهر فقه أبي حنيفة وصاحبيه معلَّلًا
  مبرهَنًا بعد أن كان فروعًا مجردة. قالوا في وصفه: من حفظ المبسوط
  فهو من أكبر فقهاء الأرض، وبقي تسعة قرون مرجع المذهب الأول الذي
  ينقل عنه المتأخرون ويحيلون عليه، فلا يحقق باحث مسألة حنفية
  استدلالًا إلا منه، وهو نافذة الفقه المقارن على عقل المدرسة
  الحنفية في أنضج بيانه.
يغني_عن:
  - شروح ظاهر الرواية المتقدمة المفقودة (هو ديوانها الباقي)
يُقرأ_قبله:
  - متن مدرسي حنفي (كمختصر القدوري)
أفضل_الطبعات:
  - المحقق_أو_المعتني: (طبعة مصححة عن الأصول)
    الدار: مطبعة السعادة، القاهرة (ومصورتها بدار المعرفة، بيروت)
    السنة: 1324–1331هـ
    المجلدات: 30 جزءًا
    ملاحظة: الطبعة الأم التي عليها الإحالات كلها
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: []
الشروح_والمختصرات_والذيول: []
مستوى_القارئ: متخصص
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  أملاه من حفظه فوقعت فيه أوهام يسيرة في العزو نبه عليها المتأخرون؛
  وطبعته القديمة بحاجة إلى تحقيق نقدي حديث، وقد صدرت محاولات لم
  تكتمل مرجعيتها بعد.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - طبعة السعادة ومصوراتها
  - مقدمات كتب طبقات الحنفية في وصفه
آخر_تحديث: 2026-06-12
