id: al-mughni-ibn-qudama
العنوان: المغني
المؤلف:
  الاسم: موفق الدين عبد الله بن أحمد بن قدامة المقدسي
  الوفاة_هجري: 620
  الوفاة_ميلادي: 1223
العلم: الفقه
التصنيف_الفرعي: أمهات المذهب الحنبلي
لماذا_هو_أم_في_بابه: >
  أعظم موسوعة في الفقه المقارن كتبها التراث وأم كتب الحنابلة بلا
  منازع؛ شرح فيه ابن قدامة مختصر الخرقي فساق في كل مسألة مذهب أحمد
  برواياته ثم مذاهب الصحابة والتابعين والأئمة بأدلتها، يعرض بإنصاف
  ويرجح بالدليل بعبارة فقيه ورع قال فيه ابن تيمية: ما دخل الشام بعد
  الأوزاعي أفقه من الموفق. واشتهر عن العز بن عبد السلام — وهو شافعي
  — قوله: لم تطب نفسي بالإفتاء حتى صارت عندي نسخة من المغني. فهو
  المرجع الذي يفزع إليه أهل كل مذهب لمعرفة الخلاف العالي بأدلته،
  وعمدة المجامع الفقهية والموسوعات والرسائل في كل مقارنة، ولا يُعرف
  كتاب فقه واحد انتفعت به الأمة على اختلاف مذاهبها مثله.
يغني_عن:
  - كتب الخلاف العالي المتقدمة (كالإشراف لابن المنذر في جملة مقاصده)
يُقرأ_قبله:
  - زاد المستقنع أو عمدة الفقه بشرح ميسر
أفضل_الطبعات:
  - المحقق_أو_المعتني: عبد الله بن عبد المحسن التركي وعبد الفتاح محمد الحلو
    الدار: دار عالم الكتب، الرياض
    السنة: 1417هـ/1997م (الطبعة الثالثة؛ الأولى بدار هجر 1406هـ)
    المجلدات: 15
    ملاحظة: التحقيق المعتمد الذي عليه الإحالات اليوم
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: [إسلام ويب]
الشروح_والمختصرات_والذيول: []
مستوى_القارئ: متوسط/متخصص
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  مذهبه المحكي عن المخالفين يحتاج مقابلة بكتبهم أحيانًا إذ ينقل
  بواسطة، وترجيحات الموفق قد تخالف معتمد متأخري الحنابلة المحرر في
  الإنصاف.
روابط_التحميل:
