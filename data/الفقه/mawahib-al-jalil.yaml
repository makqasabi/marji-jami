id: mawahib-al-jalil
العنوان: مواهب الجليل لشرح مختصر خليل
المؤلف:
  الاسم: شمس الدين محمد بن محمد الحطاب الرعيني
  الوفاة_هجري: 954
  الوفاة_ميلادي: 1547
العلم: الفقه
التصنيف_الفرعي: أمهات المذهب المالكي (المعتمد المتأخر)
لماذا_هو_أم_في_بابه: >
  أوثق شروح مختصر خليل الذي هو عمود المذهب المالكي عند المتأخرين؛
  فمختصر خليل بن إسحاق (ت776هـ) هو المتن الذي أطبق عليه المالكية
  شرقًا وغربًا حتى قيل: عليه الفتوى في سائر الأمصار، وجاء شرح
  الحطاب — محقق المذهب في عصره — فبيّن مفرداته وفك رموزه ووثّق
  أقواله بعزوها إلى أمهات المذهب ونصوص أهله توثيقًا صار به الحكم
  بين الشراح: إذا اختلفت الشروح فالمرجع ما حرره الحطاب. فهو الجسر
  المعتمد بين متن الفتوى وأصول المذهب، وعمدة القضاء والإفتاء
  المالكي في المغرب وأفريقيا إلى اليوم، ولا يستغني عنه دارس للفقه
  المالكي المتأخر بحال.
يغني_عن:
  - شروح خليل المتوسطة (في مقام التوثيق والتحرير)
يُقرأ_قبله:
  - مختصر خليل بشرح ميسر
أفضل_الطبعات:
  - المحقق_أو_المعتني: (طبعة مصححة)
    الدار: دار الفكر، بيروت
    السنة: 1412هـ/1992م (الطبعة الثالثة، عن طبعة مطبعة السعادة 1329هـ)
    المجلدات: 6
    ملاحظة: الطبعة المتداولة التي عليها الإحالات
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: []
الشروح_والمختصرات_والذيول: []
مستوى_القارئ: متخصص
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  مرتبط ببنية مختصر خليل ورموزه فلا يقرأ مستقلًّا عنه؛ ومعتمد
  الفتوى النهائي عند بعض المتأخرين شروح أخرى كالدسوقي على الشرح
  الكبير في مسائل، والمسألة محررة في أدبيات المذهب.
روابط_التحميل:
  - المصدر: المكتبة الشاملة (دار الفكر)
    الرابط: https://shamela.ws/book/569
    النوع: حر
