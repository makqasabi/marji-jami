  - المحقق_أو_المعتني: محمد صبحي حسن حلاق
    الدار: مكتبة ابن تيمية، القاهرة
    السنة: 1415هـ/1994م
    المجلدات: 4
    ملاحظة: طبعة محققة مخرجة الأحاديث
  - المحقق_أو_المعتني: (طبعة قديمة معتمدة)
    الدار: مكتبة ومطبعة مصطفى البابي الحلبي، القاهرة
    السنة: 1395هـ/1975م (الطبعة الرابعة)
    المجلدات: 2
    ملاحظة: الطبعة المتداولة التي عليها إحالات الدراسات
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: [إسلام ويب]
الشروح_والمختصرات_والذيول:
  - الهداية في تخريج أحاديث البداية للغماري
مستوى_القارئ: متوسط
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  لا يستوعب كل الفروع ولا أقوال كل المذاهب (يغلب عليه المذاهب
  الأربعة والظاهرية)، وفي نقله أحيانًا تجوز نبه عليه المحققون؛
  وهو كتاب تعليل لا كتاب فتوى.
