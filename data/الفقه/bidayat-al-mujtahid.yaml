id: bidayat-al-mujtahid
العنوان: بداية المجتهد ونهاية المقتصد
المؤلف:
  الاسم: أبو الوليد محمد بن أحمد بن رشد الحفيد
  الوفاة_هجري: 595
  الوفاة_ميلادي: 1198
العلم: الفقه
التصنيف_الفرعي: الفقه المقارن
لماذا_هو_أم_في_بابه: >
  أنفس كتاب في فقه الخلاف وأسبابه على الإطلاق؛ لم يكتف ابن رشد —
  الفيلسوف القاضي — بسرد مذاهب الفقهاء، بل ابتكر منهجًا فريدًا:
  يذكر مواضع الاتفاق ثم الخلاف ثم يعلل **سبب الخلاف** — تعارض
  الآثار، أو الاشتراك اللغوي، أو تردد القياس — فيخرج القارئ فاهمًا
  لماذا اختلفوا لا حافظًا أنهم اختلفوا. بهذا صار الكتاب مدرسة في
  الاجتهاد المقارن تخرّج بها طلاب الفقه ثمانية قرون، واعتمدته
  الجامعات في مقررات الفقه المقارن قاطبة لأنه يبني العقل الفقهي
  الموازن بأوجز طريق، وأثنى عليه العلماء على اختلاف مذاهبهم حتى
  عُدّ من «عبقريات» التصنيف الإسلامي التي لا نظير لها في بابها.
يغني_عن:
  - كتب الخلاف المجردة عن التعليل
يُقرأ_قبله:
  - متن فقهي في أي مذهب (ليعرف الطالب مذهبًا قبل الموازنة)
