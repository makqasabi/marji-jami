id: al-dhakhira-qarafi
العنوان: الذخيرة
المؤلف:
  الاسم: شهاب الدين أحمد بن إدريس القرافي
  الوفاة_هجري: 684
  الوفاة_ميلادي: 1285
العلم: الفقه
التصنيف_الفرعي: أمهات المذهب المالكي
لماذا_هو_أم_في_بابه: >
  أعظم موسوعات المالكية الاستدلالية؛ جمع القرافي فيها فقه المذهب من
  أمهاته الخمس (المدونة والواضحة والعتبية والموازية والمجموعة) مع
  أدلته وقواعده وفروقه، بنَفَس المحقق الأصولي صاحب الفروق، فقرن
  الفرع بقاعدته والحكم بحكمته على طريقة لم تجتمع لمالكي قبله. صارت
  مرجع المذهب الاستدلالي الأول الذي يقابل المغني عند الحنابلة
  والمجموع عند الشافعية، وبها يدخل المذهب المالكي في كل مقارنة
  فقهية عالية، ولما حُققت كاملة في العصر الحديث عاد الاعتماد عليها
  في الدراسات والمجامع حتى صارت أكثر كتب المالكية إحالة في البحث
  المعاصر بعد مختصر خليل وشروحه.
يغني_عن:
  - الجمع المتفرق من أمهات المذهب الخمس في مقام الاستدلال
يُقرأ_قبله:
  - الرسالة لابن أبي زيد القيرواني
أفضل_الطبعات:
  - المحقق_أو_المعتني: محمد حجي وسعيد أعراب ومحمد بو خبزة
    الدار: دار الغرب الإسلامي، بيروت
    السنة: 1994م
    المجلدات: 14
    ملاحظة: التحقيق الكامل المعتمد الوحيد
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: []
الشروح_والمختصرات_والذيول: []
مستوى_القارئ: متخصص
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  للقرافي اختيارات وتعليلات ينفرد بها ناقشها متأخرو المذهب،
  واعتماد الفتوى عند المتأخرين على مختصر خليل وشروحه لا عليها؛
  فهي كتاب استدلال وفهم لا كتاب فتوى أخير.
حالة_التوثيق: موثّق
مصادر_التوثيق:
