id: al-umm-shafii
العنوان: الأم
المؤلف:
  الاسم: محمد بن إدريس الشافعي
  الوفاة_هجري: 204
  الوفاة_ميلادي: 820
العلم: الفقه
التصنيف_الفرعي: أمهات المذهب الشافعي
لماذا_هو_أم_في_بابه: >
  ديوان فقه الشافعي بقلمه ولسانه، وأول موسوعة فقهية استدلالية كاملة
  وصلت إلينا لإمام متبوع؛ أملاه بمصر في مذهبه الجديد، يعرض المسألة
  ثم يسوق أدلتها من الكتاب والسنة ويناظر مخالفيه مناظرة حية بلغته
  الحجازية البليغة التي جعلت كتابه نصًّا في الفقه والأصول والبيان
  معًا. هو المصدر الأول لمذهب الشافعية كله: منه استمد المزني مختصره
  الذي تفرعت عنه طريقتا الخراسانيين والعراقيين، وإليه يرجع المحققون
  عند تحرير نصوص الإمام، وفيه كتبه الملحقة كاختلاف الحديث وجماع
  العلم. فمن أراد فقه إمام مجتهد يبني ويستدل ويناظر بنصه الأصلي لا
  بواسطة فليس في فقه الإسلام كله أقدم ولا أتم من الأم.
يغني_عن:
  - النقول الوسيطة عن نصوص الشافعي
يُقرأ_قبله:
  - متن أبي شجاع أو منهاج الطالبين (لتصور المذهب المستقر)
أفضل_الطبعات:
  - المحقق_أو_المعتني: رفعت فوزي عبد المطلب
    الدار: دار الوفاء، المنصورة
    السنة: 1422هـ/2001م
    المجلدات: 11
    ملاحظة: التحقيق المعتمد عن النسخ الخطية ومعه كتب الشافعي الملحقة
  - المحقق_أو_المعتني: (الطبعة الأم)
    الدار: المطبعة الكبرى الأميرية، بولاق
    السنة: 1321–1325هـ
    المجلدات: 7
    ملاحظة: الطبعة القديمة التي عليها إحالات المتقدمين من الدارسين
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: []
الشروح_والمختصرات_والذيول:
  - مختصر المزني (المدخل التاريخي للمذهب)
مستوى_القارئ: متخصص
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  في إسناد رواية الكتاب عن الشافعي (طريق الربيع وما دخل فيه من جمع
  البويطي) مباحث حررتها الدراسات؛ وعرضه المناظري غير المرتب على
  المتون المستقرة يحتاج صبر الباحث.
روابط_التحميل:
  - المصدر: المكتبة الشاملة (ط الفكر)
    الرابط: https://shamela.ws/book/1655
    النوع: حر
