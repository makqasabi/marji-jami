id: badai-al-sanai
العنوان: بدائع الصنائع في ترتيب الشرائع
المؤلف:
  الاسم: علاء الدين أبو بكر بن مسعود الكاساني
  الوفاة_هجري: 587
  الوفاة_ميلادي: 1191
العلم: الفقه
التصنيف_الفرعي: أمهات المذهب الحنفي
لماذا_هو_أم_في_بابه: >
  أحسن كتب الحنفية ترتيبًا وأبدعها صنعة باتفاق أهل المذهب؛ خالف
  الكاساني — الملقب بملك العلماء — طريقة السرد المتوارثة فبنى كل
  باب بناءً تحليليًّا: ركن العقد وشرائطه وصفاته وأحكامه ومفسداته،
  بتقسيم منطقي حاصر جعل الوصول إلى المسألة وفهم عللها أيسر منه في
  أي كتاب حنفي آخر، حتى قيل: هو بديع في اسمه ومعناه. يقدَّم على
  المبسوط في مقام الدرس المنظم ويقدَّم المبسوط عليه في مقام النقل
  والاستدلال الموسع، وبهما معًا تكتمل أمومة المذهب: ولذا لا تكاد
  تخلو منه دراسة مقارنة أو مذكرة قانونية في البلاد التي قننت الفقه
  الحنفي، فهو واجهة المذهب المعتمدة في البحث الحديث.
يغني_عن:
  - تحفة الفقهاء للسمرقندي (وهو أصله الذي بنى عليه وتوسع)
يُقرأ_قبله:
  - مختصر القدوري أو متن مدرسي
أفضل_الطبعات:
  - المحقق_أو_المعتني: (طبعة مصححة)
    الدار: دار الكتب العلمية، بيروت
    السنة: 1406هـ/1986م (الطبعة الثانية)
    المجلدات: 7
    ملاحظة: الطبعة المتداولة التي عليها الإحالات (عن الطبعة المصرية الأولى 1327هـ)
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: []
الشروح_والمختصرات_والذيول: []
مستوى_القارئ: متوسط/متخصص
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  لا يستوعب فروع المذهب وأقواله المتأخرة استيعاب الموسوعات (يكمله
  رد المحتار)، وعزوه للأدلة أوجز من المبسوط.
