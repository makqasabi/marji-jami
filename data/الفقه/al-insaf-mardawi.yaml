id: al-insaf-mardawi
العنوان: الإنصاف في معرفة الراجح من الخلاف
المؤلف:
  الاسم: علاء الدين علي بن سليمان المرداوي
  الوفاة_هجري: 885
  الوفاة_ميلادي: 1480
العلم: الفقه
التصنيف_الفرعي: أمهات المذهب الحنبلي (المعتمد المتأخر)
لماذا_هو_أم_في_بابه: >
  ديوان تحرير المذهب الحنبلي وميزان معتمده؛ تتبع المرداوي — منقح
  المذهب — رواياتِ أحمد وأوجه أصحابه في كل مسألة على ترتيب المقنع،
  يحكي الخلاف الداخلي بأمانة ثم يبين «الصحيح من المذهب» بقواعد
  ترجيح منضبطة، فحسم اضطراب النقول الذي تراكم في ثمانية قرون. عليه
  وعلى تصحيحه قامت كتب المتأخرين المعتمدة (الإقناع والمنتهى
  وشرحاهما)، فما من باحث في معتمد الحنابلة — وهو مذهب القضاء في
  السعودية وقطر — إلا والإنصاف مرجعه الفاصل، وهو النظير الحنبلي
  لمواهب الجليل عند المالكية والروضة عند الشافعية وابن عابدين عند
  الحنفية: كتاب المعتمد الذي تستقر عنده الفتوى.
يغني_عن:
  - تتبع كتب الروايتين والوجهين المتفرقة
يُقرأ_قبله:
  - المغني (للاستدلال قبل التحرير)
أفضل_الطبعات:
  - المحقق_أو_المعتني: عبد الله بن عبد المحسن التركي (ضمن طبعة المقنع والشرح الكبير مع الإنصاف)
    الدار: دار هجر، القاهرة
    السنة: 1415هـ/1995م
    المجلدات: 30 (المجموعة كاملة)
    ملاحظة: الطبعة المحققة الأوفى
  - المحقق_أو_المعتني: محمد حامد الفقي
    الدار: مطبعة السنة المحمدية، القاهرة (ومصورات دار إحياء التراث)
    السنة: 1374هـ/1955م
    المجلدات: 12
    ملاحظة: الطبعة المتداولة قديمًا وعليها إحالات كثيرة
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: []
الشروح_والمختصرات_والذيول:
  - التنقيح المشبع للمرداوي نفسه (خلاصته)
مستوى_القارئ: متخصص
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  كتاب تحرير داخلي مجرد من الأدلة غالبًا فلا يقرأ للاستدلال؛
  والمعتمد النهائي عند متأخري الحنابلة ما اتفق عليه الإقناع
  والمنتهى وقد يفارق تصحيح الإنصاف في مسائل معدودة.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - طبعة دار هجر
  - المدخل المفصل لبكر أبو زيد (تحرير المعتمد)
آخر_تحديث: 2026-06-12
