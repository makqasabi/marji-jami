id: riyad-al-salihin
العنوان: رياض الصالحين من كلام سيد المرسلين
المؤلف:
  الاسم: أبو زكريا يحيى بن شرف النووي
  الوفاة_هجري: 676
  الوفاة_ميلادي: 1277
العلم: التزكية والسلوك والأخلاق
التصنيف_الفرعي: جوامع الترغيب والآداب المسندة
لماذا_هو_أم_في_بابه: >
  أكثر كتب الإسلام انتشارًا بعد القرآن في باب العمل والآداب؛ انتقى
  النووي نحو ألف وتسعمائة حديث في أبواب الإخلاص والتقوى والآداب
  والفضائل، أكثرها من الصحيحين، مصدّرًا كل باب بآياته، بترتيب
  تربوي محكم يأخذ بيد المسلم من تصحيح القصد إلى جوامع الأخلاق.
  بورك للكتاب قبولٌ لم يُعرف لمثله: يُقرأ في مساجد الدنيا كلها
  يوميًّا منذ قرون، وشروحه وترجماته بالعشرات، واتخذته الأمة منهاج
  التربية الأول للعامة والخاصة، فهو أم كتب العمل اليومي بلا
  منازع: تزكيةٌ مادتها الوحي الصافي لا الحكايات، وبهذا فاق ما
  سواه.
يغني_عن:
  - مجاميع الترغيب الميسرة (في مقام التربية اليومية)
يُقرأ_قبله: []
