مستوى_القارئ: متخصص
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  فيها حكايات لا تثبت وأذواق ومواجيد تُقرأ بميزان الكتاب والسنة،
  وأهل الأثر ينتقدون مباحث منها (كالفناء والسماع)؛ وقد أُثبتت هنا
  وثيقةً مرجعية لبابها مع هذا التنبيه، على منهج ذكر الخلاف
  بإنصاف.
