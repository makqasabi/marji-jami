id: al-risala-al-qushayriyya
العنوان: الرسالة القشيرية
المؤلف:
  الاسم: أبو القاسم عبد الكريم بن هوازن القشيري
  الوفاة_هجري: 465
  الوفاة_ميلادي: 1072
العلم: التزكية والسلوك والأخلاق
التصنيف_الفرعي: أمهات التصوف المعتدل
لماذا_هو_أم_في_بابه: >
  أوثق نص جامع للتصوف السني المعتدل وأكثر كتب القوم اعتمادًا؛
  كتبها القشيري — الفقيه الشافعي المحدّث — سنة 437هـ رسالةً إلى
  الصوفية ينعى عليهم انحراف المنتسبين ويحرر طريق القوم الأول:
  تراجم مشايخ الطريق الأوائل، ثم شرح اصطلاحاتهم، ثم منازل السلوك
  (التوبة والورع والزهد والتوكل...) بنقولهم موزونة بميزان الشرع.
  فصارت المرجع المعياري لمعرفة التصوف من داخله في طوره المنضبط:
  عليها يعوّل الدارس والناقد معًا، وتعتمدها الجامعات نصًّا أول في
  الباب، ولا يُعرف كتاب يقوم مقامها في توثيق المرحلة التأسيسية
  للتصوف ومصطلحه، فهي أم الباب بوصفها وثيقته لا بوصفها عمدة
  تعبدية.
يغني_عن:
  - اللمع للطوسي والتعرف للكلاباذي (في مقام التوثيق الجامع)
يُقرأ_قبله:
  - مدارج السالكين (للميزان النقدي)
أفضل_الطبعات:
  - المحقق_أو_المعتني: عبد الحليم محمود ومحمود بن الشريف
    الدار: دار المعارف، القاهرة
    السنة: 1415هـ/1995م
    المجلدات: 2
    ملاحظة: التحقيق المعتمد المتداول
التوافر_الرقمي:
