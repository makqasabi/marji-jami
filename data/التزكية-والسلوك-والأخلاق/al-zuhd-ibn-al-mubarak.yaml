id: al-zuhd-ibn-al-mubarak
العنوان: الزهد والرقائق
المؤلف:
  الاسم: أبو عبد الرحمن عبد الله بن المبارك المروزي
  الوفاة_هجري: 181
  الوفاة_ميلادي: 797
العلم: التزكية والسلوك والأخلاق
التصنيف_الفرعي: دواوين الزهد المسندة
لماذا_هو_أم_في_بابه: >
  أقدم دواوين الزهد المسندة وأصل هذا الجنس كله؛ جمعه ابن المبارك —
  الإمام الجامع الذي اجتمعت فيه خصال العلم والزهد والجهاد
  والتجارة حتى قيل: ما رأيت مثله — من أحاديث الرقائق وآثار
  الصحابة والتابعين في الزهد والورع وذم الدنيا، بأسانيده العالية،
  فقدّم تزكيةً موزونة بميزان المحدثين قبل أن تتشكل اصطلاحات
  التصوف. عليه بنى من صنف في الزهد بعده (أحمد وهناد ووكيع)،
  وإليه ترجع المدرسة السلوكية الحديثية كلها، فهو أم الباب
  ووثيقته الأولى: من أراد زهد السلف من معينه الصافي بأسانيده فلا
  معدل له عنه.
يغني_عن:
  - كتب الزهد المسندة بعده (في جملة مادتها؛ وأكثرها عيال عليه)
يُقرأ_قبله:
  - رياض الصالحين (للترتيب الموضوعي الميسر)
أفضل_الطبعات:
  - المحقق_أو_المعتني: حبيب الرحمن الأعظمي
    الدار: دار الكتب العلمية، بيروت (عن الطبعة الهندية)
    السنة: (بلا تاريخ؛ الأصل الهندي 1386هـ/1966م)
    المجلدات: 1 (ومعه زوائد نعيم بن حماد)
    ملاحظة: التحقيق المعتمد المتداول
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: []
الشروح_والمختصرات_والذيول: []
مستوى_القارئ: متوسط/متخصص
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  فيه الضعيف والمقطوع بأسانيده على عادة كتب الرقائق المتسامحة في
  غير الأحكام، وزوائد نعيم بن حماد تميَّز عن أصل الكتاب لكلام
  النقاد في نعيم.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - طبعة الأعظمي
آخر_تحديث: 2026-06-12
