id: madarij-al-salikin
العنوان: مدارج السالكين بين منازل إياك نعبد وإياك نستعين
المؤلف:
  الاسم: شمس الدين محمد بن أبي بكر ابن قيم الجوزية
  الوفاة_هجري: 751
  الوفاة_ميلادي: 1350
العلم: التزكية والسلوك والأخلاق
التصنيف_الفرعي: السلوك المحرر على منهج السلف
لماذا_هو_أم_في_بابه: >
  أعظم كتاب في فقه السلوك على منهج أهل السنة؛ شرح فيه ابن القيم
  «منازل السائرين» للهروي شرحَ محبٍّ ناقد: يبسط كل منزلة من
  منازل العبودية (الإخلاص والتوكل والمحبة والرضا...) بتحقيقات
  قلبية تذوب رقةً وعمقًا، ثم يتعقب ما في عبارات الهروي من شطح
  بقوله الشهير «شيخ الإسلام حبيب إلينا والحق أحب إلينا منه»،
  فجمع لذة كتب القوم وانضباط أهل الأثر في نسق واحد لا نظير له.
  صار مذ صُنّف عمدة السلوك السني: عليه تعتمد برامج التزكية
  العلمية، ومنه تستمد الكتابات المعاصرة في أعمال القلوب قاطبة،
  فهو أم الباب المحرر وميزانه.
يغني_عن:
  - منازل السائرين وشروحه الأخرى
  - كتب أعمال القلوب المعاصرة (في أصل مادتها)
يُقرأ_قبله:
  - الداء والدواء لابن القيم (الأيسر مدخلًا)
أفضل_الطبعات:
  - المحقق_أو_المعتني: محمد المعتصم بالله البغدادي
    الدار: دار الكتاب العربي، بيروت
    السنة: 1416هـ/1996م (الطبعة الثالثة)
    المجلدات: 3
    ملاحظة: الطبعة المتداولة المعتمدة
  - المحقق_أو_المعتني: محمد أجمل الإصلاحي (ضمن آثار ابن القيم)
    الدار: دار عالم الفوائد، مكة
    السنة: 1440هـ وما حولها
    المجلدات: 4
    ملاحظة: أتقن التحقيقات (مشروع آثار ابن القيم)
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: [طريق الإسلام]
الشروح_والمختصرات_والذيول:
  - تهذيب مدارج السالكين (مختصرات معاصرة)
مستوى_القارئ: متوسط
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  استطراداته الطويلة على عادة ابن القيم تشق على المستعجل، وبعض
  مباحث المنازل الذوقية دقيقة لا يحسن إنزالها على غير سياقها؛
  والمختصرات المعاصرة تيسرها.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - طبعة المعتصم بالله
آخر_تحديث: 2026-06-12
