id: al-daa-wal-dawa
العنوان: الداء والدواء (الجواب الكافي لمن سأل عن الدواء الشافي)
المؤلف:
  الاسم: شمس الدين محمد بن أبي بكر ابن قيم الجوزية
  الوفاة_هجري: 751
  الوفاة_ميلادي: 1350
العلم: التزكية والسلوك والأخلاق
التصنيف_الفرعي: طب القلوب العملي
لماذا_هو_أم_في_بابه: >
  أنفع كتاب عملي في علاج أمراض القلب والمعاصي؛ كتبه ابن القيم
  جوابًا عن سؤال واحد — من ابتلي ببلية يعلم أنها معصية فما طريق
  الخلاص؟ — فبسط الجواب كتابًا كاملًا في أثر الذنوب على القلب
  والبدن والرزق، وعقوباتها الخفية، ثم دواء الدعاء والاستغفار
  والتوبة بشروطها، وختم بفصوله الشهيرة في علاج العشق وفساده.
  جمع التشخيص النفسي الدقيق إلى العلاج الشرعي المحض بعبارة آسرة،
  فصار أوسع كتب ابن القيم قراءة بين عموم المتدينين، وتوصي به
  برامج التزكية مدخلًا أول لأعمال القلوب قبل المدارج، فهو أم
  كتب العلاج القلبي العملي بإطلاق.
يغني_عن:
  - رسائل التوبة وعلاج المعاصي المعاصرة (في أصل مادتها)
