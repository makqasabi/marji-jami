id: tahdhib-al-akhlaq-miskawayh
العنوان: تهذيب الأخلاق وتطهير الأعراق
المؤلف:
  الاسم: أبو علي أحمد بن محمد مسكويه
  الوفاة_هجري: 421
  الوفاة_ميلادي: 1030
العلم: التزكية والسلوك والأخلاق
التصنيف_الفرعي: الأخلاق الفلسفية
لماذا_هو_أم_في_بابه: >
  أم علم الأخلاق الفلسفي عند المسلمين والنص المؤسس لهذا الجنس؛
  صاغ مسكويه — الفيلسوف المؤرخ — أول نظرية أخلاقية إسلامية
  مكتملة البناء: قوى النفس الثلاث وفضائلها الأربع (الحكمة والعفة
  والشجاعة والعدالة) ووسطية الفضيلة بين رذيلتين، ممزوجًا من حكمة
  أرسطو وجالينوس بمقاصد الشريعة وتجربة رجل دولة، مع فصول عملية
  في تربية الأحداث وعلاج الحزن والخوف من الموت. عليه بنى كل من
  كتب في الأخلاق الفلسفية بعده — الراغب في الذريعة والغزالي في
  ميزان العمل والطوسي في أخلاقه — فمن أراد المدخل النظري لعلم
  الأخلاق الإسلامي من نصه الأول فلا معدل له عنه.
يغني_عن:
  - كتب الأخلاق الفلسفية الوسيطة المبنية عليه
يُقرأ_قبله:
  - أدب الدنيا والدين (للمنحى العملي قبل النظري)
أفضل_الطبعات:
