  منصات_أخرى: []
الشروح_والمختصرات_والذيول: []
مستوى_القارئ: متخصص
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  بناؤه يوناني الأصول فينتقده أهل الأثر حيث قدّم قسمة الفلاسفة
  على تزكية الوحي، ويقرأ بوصفه نص الأخلاق الفلسفية المرجعي لا
  منهاج تعبد؛ والموازنة بينه وبين تزكية الكتاب والسنة من مباحث
  الدارسين.
