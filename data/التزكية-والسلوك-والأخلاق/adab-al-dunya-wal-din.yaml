id: adab-al-dunya-wal-din
العنوان: أدب الدنيا والدين
المؤلف:
  الاسم: أبو الحسن علي بن محمد الماوردي
  الوفاة_هجري: 450
  الوفاة_ميلادي: 1058
العلم: التزكية والسلوك والأخلاق
التصنيف_الفرعي: الأخلاق العملية والحكمة
لماذا_هو_أم_في_بابه: >
  أنضج كتب الأخلاق العملية في التراث وأجمعها بين الدين والدنيا؛
  رتّبه الماوردي — الفقيه القاضي صاحب الحاوي والأحكام السلطانية —
  خمسة أبواب: فضل العقل، وأدب العلم، وأدب الدين، وأدب الدنيا،
  وأدب النفس، يمزج فيها الآية والحديث بحكمة العرب والفرس
  واليونان وتجارب القضاة والملوك، بعبارة رصينة متزنة لا وعظ فيها
  مبتذل ولا فلسفة معلقة. فجاء كتاب «الحكمة العملية» الإسلامي
  الأول: واقعي يعرف الناس والدنيا كما يعرف الدين، ولهذا اعتُمد
  في التأديب والتدريس قرونًا وقررته وزارات المعارف حديثًا،
  وبقي أمتع ما يقرأ في أدب النفس وأمتنه، فهو أم الأخلاق العملية
  المتزنة.
