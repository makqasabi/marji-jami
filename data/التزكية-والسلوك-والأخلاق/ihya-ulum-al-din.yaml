id: ihya-ulum-al-din
العنوان: إحياء علوم الدين
المؤلف:
  الاسم: أبو حامد محمد بن محمد الغزالي
  الوفاة_هجري: 505
  الوفاة_ميلادي: 1111
العلم: التزكية والسلوك والأخلاق
التصنيف_الفرعي: موسوعات التزكية الجامعة
لماذا_هو_أم_في_بابه: >
  أشهر كتاب في تاريخ التأليف الإسلامي بعد كتب الحديث وأعظم
  موسوعات التزكية أثرًا؛ بناه الغزالي أرباعًا أربعة — العبادات
  والعادات والمهلكات والمنجيات — فشرّح أمراض القلوب (الكبر
  والرياء والعجب...) تشريحًا نفسيًّا لم يُسبق إليه، وربط الفقه
  الظاهر بفقه الباطن في نسق واحد بأسلوب آسر. طبّق ذكره الآفاق حتى
  قيل: «كاد الإحياء يكون قرآنًا» مبالغةً في وصف إقبال الناس، وما
  من كتاب سلوك بعده إلا وهو عيال عليه اقتباسًا أو اختصارًا أو
  تعقبًا، وعليه قامت مدارس التربية في المشرق والمغرب تسعة قرون،
  فهو أم الباب التي لا ينازعها فيه كتاب.
يغني_عن:
  - كتب آفات القلوب المتفرقة قبله (استوعب مقاصدها)
يُقرأ_قبله:
  - مختصر منهاج القاصدين (تهذيبه المصفّى)
أفضل_الطبعات:
  - المحقق_أو_المعتني: (ومعه تخريج العراقي «المغني عن حمل الأسفار»)
    الدار: دار المعرفة، بيروت (عن طبعة مصطفى البابي الحلبي 1358هـ)
    السنة: (مصورة، بلا تاريخ)
    المجلدات: 4
    ملاحظة: الطبعة المتداولة التي عليها الإحالات، وتخريج العراقي ملازم لها
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: [طريق الإسلام]
الشروح_والمختصرات_والذيول:
  - إتحاف السادة المتقين للزبيدي (شرحه الأعظم)
  - منهاج القاصدين لابن الجوزي ومختصره (تهذيب)
مستوى_القارئ: متوسط
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  فيه أحاديث ضعيفة وموضوعة كثيرة بيّنها تخريج العراقي، ومباحث
  كلامية وصوفية انتقدها أهل العلم قديمًا (أحرقه بعض فقهاء المغرب
  وانتصر له آخرون) — وميزانه المنصف: تُقرأ معالجاته القلبية
  الفذة مع تمييز ما خالف فيه السنة، ومختصر منهاج القاصدين يقدم
  ذلك مصفًّى.
روابط_التحميل:
  - المصدر: المكتبة الشاملة (ط دار المعرفة مع تخريج العراقي)
    الرابط: https://shamela.ws/book/9472
    النوع: حر
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - طبعة دار المعرفة مع تخريج العراقي
آخر_تحديث: 2026-06-12
