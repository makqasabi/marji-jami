id: mukhtasar-minhaj-al-qasidin
العنوان: مختصر منهاج القاصدين
المؤلف:
  الاسم: أحمد بن عبد الرحمن بن قدامة المقدسي (ابن قدامة الصغير)
  الوفاة_هجري: 742
  الوفاة_ميلادي: 1341
العلم: التزكية والسلوك والأخلاق
التصنيف_الفرعي: التزكية المصفاة على منهج السلف
لماذا_هو_أم_في_بابه: >
  الإحياء مصفًّى بميزان أهل الحديث؛ فابن الجوزي هذّب إحياء الغزالي
  في «منهاج القاصدين» محذوفًا أحاديثَه الواهية ومباحثَه المنتقدة،
  ثم جاء ابن قدامة المقدسي الصغير فاختصر المنهاج في هذا الكتاب
  الذي جمع خلاصة الخلاصة: معالجات الإحياء القلبية العظيمة بأرباعها
  الأربعة، سالمةً من علله الحديثية والكلامية، في مجلد لطيف بعبارة
  سهلة. فصار الكتاب المعتمد عند من أراد تزكية الإحياء على منهج
  السلف، توصي به برامج طلب العلم والمشايخ المعاصرون قاطبة بوصفه
  كتاب السلوك الأول للمتدين المعاصر، فهو أم التزكية المصفاة
  وأنفع صيغ الإحياء انتشارًا في عصرنا.
يغني_عن:
  - الإحياء (لعموم المتدينين؛ مع بقاء الأصل للمتوسع)
يُقرأ_قبله: []
أفضل_الطبعات:
  - المحقق_أو_المعتني: علي بن حسن الحلبي (وطبعات أخرى معتنى بها)
    الدار: دار البيان، دمشق (الأصل)، ودور عدة
    السنة: طبعة دار البيان 1398هـ/1978م وما بعدها
    المجلدات: 1
    ملاحظة: الطبعات الكاملة المخرجة متقاربة؛ طبعة دار البيان هي الأم المتداولة
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: [طريق الإسلام, إسلام هاوس]
الشروح_والمختصرات_والذيول: []
مستوى_القارئ: مبتدئ
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  اختصار على اختصار ففيه إيجاز يحوج المتوسع إلى المنهاج أو
  الإحياء؛ وبقيت فيه أحاديث يسيرة ضعيفة ميزتها الطبعات المخرجة.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - طبعة دار البيان والطبعات المخرجة
آخر_تحديث: 2026-06-12
