id: ilm-al-ijtima-giddens
العنوان: علم الاجتماع
المؤلف:
  الاسم: أنتوني غِدنز (Anthony Giddens)
  معاصر: نعم
العلم: مراجع العلوم الإنسانية والاجتماعية الحديثة بالعربية
التصنيف_الفرعي: المراجع المترجَمة الجامعة (علم الاجتماع)
مترجَم: نعم
المترجِم: فايز الصيّاغ
جهة_الترجمة: المنظمة العربية للترجمة، بيروت
لماذا_هو_أم_في_بابه: >
  أشمل مرجع جامع في علم الاجتماع متاحٌ بالعربية اليوم؛ كتابُ أنتوني
  غدنز — أحد أكبر علماء الاجتماع المعاصرين وصاحب «نظرية البناء» —
  هو المقرَّر التأسيسي الأوسع انتشارًا في جامعات العالم، يستوعب
  حقول الاجتماع كلها (المنهج، التنشئة، الطبقة، الأسرة، الدين،
  العولمة، الإعلام، الانحراف...) بعرضٍ منهجيٍّ محدَّث. نقله إلى
  العربية فايز الصيّاغ نقلًا رصينًا أصدرته المنظمة العربية للترجمة
  (2005) ونال عليه جائزة الشيخ زايد للترجمة (2008). فهو يسدّ —
  ترجمةً لا تأليفًا — موقعَ «المرجع الجامع المعاصر» في علم الاجتماع
  حيث لا نظير له مؤلَّفًا بالعربية، ويكمّل معجمَ العلوم الاجتماعية
  لمدكور (مصطلحًا) بالمرجع الموضوعي الشامل.
يغني_عن:
  - المقررات الجامعية المترجمة الأصغر في مدخل علم الاجتماع
يُقرأ_قبله:
  - معجم العلوم الاجتماعية (لضبط المصطلح)
أفضل_الطبعات:
  - المحقق_أو_المعتني: ترجمة فايز الصيّاغ
    الدار: المنظمة العربية للترجمة، بيروت
    السنة: 2005م (وطبعات لاحقة)
    المجلدات: 1 (مجلد كبير)
    ملاحظة: الترجمة المعتمدة الفائزة بجائزة الشيخ زايد للترجمة 2008 (تحقق ويب 2026-06-13)
التوافر_الرقمي:
  المكتبة_الشاملة: لا
  منصات_أخرى: [نسخ رقمية متداولة]
الشروح_والمختصرات_والذيول: []
مستوى_القارئ: متوسط
نوع_المرجعية: معاصرة
ملاحظات_نقدية: >
  مرجعٌ مترجَمٌ لا مؤلَّفٌ عربيٌّ أصيل، فهو يُدرج بوصفه أقربَ البدائل
  المتاحة لسدّ فجوة المرجع الجامع لا بوصفه تأليفًا عربيًّا؛ وإطاره
  سوسيولوجيٌّ غربيٌّ يحتاج القارئَ العربيَّ إلى وعيٍ نقدي بمنطلقاته
  (العلمانية، فلسفة العلوم الاجتماعية الغربية)، وأمثلتُه من
  المجتمعات الغربية؛ كما أن طبعته العربية تقابل طبعةً إنكليزيةً
  بعينها قد تَلتها طبعاتٌ أحدث.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - بيانات المنظمة العربية للترجمة وجائزة الشيخ زايد 2008 (تحقق ويب 2026-06-13)
آخر_تحديث: 2026-06-13
