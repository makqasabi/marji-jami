الشروح_والمختصرات_والذيول: []
مستوى_القارئ: متخصص
نوع_المرجعية: معاصرة
ملاحظات_نقدية: >
  معجم مصطلحات لا موسوعة أعلام ومذاهب (يكمله بدوي)، ومادته
  بحدود السبعينيات فلا تستوعب مصطلح الفلسفة المعاصرة المتأخر؛
  وبعض تأصيلاته التراثية محل مناقشة المتخصصين.
