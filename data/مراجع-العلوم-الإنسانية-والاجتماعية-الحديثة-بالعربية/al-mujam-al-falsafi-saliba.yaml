id: al-mujam-al-falsafi-saliba
العنوان: المعجم الفلسفي
المؤلف:
  الاسم: جميل صليبا
  الوفاة_هجري: 1396
  الوفاة_ميلادي: 1976
العلم: مراجع العلوم الإنسانية والاجتماعية الحديثة بالعربية
التصنيف_الفرعي: معاجم المصطلح الفلسفي
لماذا_هو_أم_في_بابه: >
  المرجع الأول لضبط المصطلح الفلسفي العربي وأوسعه تأصيلًا؛
  حرر جميل صليبا — أستاذ الفلسفة الدمشقي وعضو المجمع — نحو ألف
  ومئة وستين مصطلحًا فلسفيًّا، يردّ كلًّا منها إلى أصله في
  التراث العربي ويثبت مقابلاته بالفرنسية والإنكليزية واللاتينية،
  ثم يسوق نصوصًا من كلام الفلاسفة قدماء ومحدثين تبين استعماله،
  مغطيًا المنطق والأخلاق وعلم النفس والاجتماع والجمال والميتافيزيقا.
  فجمع بين تحقيق المصطلح ووصل الحديث منه بجذره التراثي، فصار
  منذ صدوره (دار الكتاب اللبناني، 1971 ثم 1982) عمدةَ المترجم
  والباحث في الفلسفة والعلوم الإنسانية: لا تكاد رسالة جامعية في
  الحقل تخلو من الإحالة إليه، فهو أم معاجم المصطلح الفلسفي
  بالعربية.
يغني_عن:
  - معاجم المصطلح الفلسفي الأصغر (الكندي والتهانوي في مقام المعجم المعاصر الموحد)
يُقرأ_قبله: []
