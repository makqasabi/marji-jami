ملاحظات_نقدية: >
  معجم مصطلحات لا موسوعة شارحة، ومادته بحدود سبعينيات القرن
  العشرين فلا تواكب مصطلح العلوم الاجتماعية المتجدد؛ ويحتاج
  الحقلُ تحديثًا مجمعيًّا له لم ينجز بعدُ على مستواه.
