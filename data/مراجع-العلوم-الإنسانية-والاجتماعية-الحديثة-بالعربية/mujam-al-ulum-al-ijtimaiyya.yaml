id: mujam-al-ulum-al-ijtimaiyya
العنوان: معجم العلوم الاجتماعية
المؤلف:
  الاسم: نخبة من المتخصصين بإشراف ومراجعة إبراهيم مدكور (مجمع اللغة العربية)
  هيئة: نعم
العلم: مراجع العلوم الإنسانية والاجتماعية الحديثة بالعربية
التصنيف_الفرعي: معاجم المصطلح الاجتماعي المؤسسية
لماذا_هو_أم_في_بابه: >
  أول معجم مؤسسي جامع لمصطلحات العلوم الاجتماعية بالعربية
  وأوسعها مرجعيةً؛ أعدّته نخبة من أساتذة العرب بإشراف إبراهيم
  مدكور — رئيس مجمع اللغة العربية وعميد الدرس الفلسفي
  الاجتماعي المصري — فجمع مصطلحات علم الاجتماع والأنثروبولوجيا
  والاقتصاد والسياسة والإدارة والإحصاء وعلم النفس الاجتماعي،
  مع تعريف كل مصطلح ومقابلاته بالإنكليزية والفرنسية. صدر عن
  الهيئة المصرية العامة للكتاب (1975) فصار المرجع المعياري
  لتعريب العلوم الاجتماعية: تعتمده الجامعات والمترجمون في ضبط
  المصطلح، وعليه بنت المعاجم الاجتماعية اللاحقة، فهو أم معاجم
  المصطلح الاجتماعي بالعربية ووثيقة المشروع المجمعي في تعريب
  هذه العلوم.
يغني_عن:
