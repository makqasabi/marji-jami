id: mawsuat-al-falsafa-badawi
العنوان: موسوعة الفلسفة
المؤلف:
  الاسم: عبد الرحمن بدوي
  الوفاة_هجري: 1423
  الوفاة_ميلادي: 2002
العلم: مراجع العلوم الإنسانية والاجتماعية الحديثة بالعربية
التصنيف_الفرعي: الموسوعات الفلسفية
لماذا_هو_أم_في_بابه: >
  أوسع موسوعة فلسفية بقلم مؤلف عربي واحد وأعمقها تحريرًا؛
  أنجزها عبد الرحمن بدوي — أكثر فلاسفة العرب المعاصرين إنتاجًا
  والمحقق الذي عرّف العربية بالوجودية والتراث اليوناني — فجمع
  أعلام الفلسفة شرقًا وغربًا ومصطلحاتِها ومدارسَها في مادة
  محررة بقلم متخصص لا بترجمة جماعية، مستلًّا كثيرًا منها من
  مؤلفاته التاريخية الكبرى. صارت منذ صدورها (المؤسسة العربية
  للدراسات والنشر، 1984) المرجع العربي الأول الذي يُفتح على
  مذهب فلسفي أو فيلسوف، تعتمده أقسام الفلسفة والدراسات
  الإنسانية، ولا يدانيها عمل فردي عربي في الإحاطة الفلسفية، فهي
  أم الموسوعات الفلسفية بالعربية وثمرة عمر باحثها.
يغني_عن:
  - معاجم الفلسفة المترجمة الأصغر (في مقام المرجع العربي المحرر)
يُقرأ_قبله:
  - المعجم الفلسفي لجميل صليبا (لضبط المصطلح أولًا)
أفضل_الطبعات:
  - المحقق_أو_المعتني: عبد الرحمن بدوي (تأليف)
    الدار: المؤسسة العربية للدراسات والنشر، بيروت
    السنة: 1984م وما بعدها (طبعات في مجلدين، وبعضها أعيد في أكثر)
    المجلدات: 2
    ملاحظة: طبعة المؤسسة العربية المعتمدة (تحقق ويب 2026-06-13)
التوافر_الرقمي:
  المكتبة_الشاملة: لا
  منصات_أخرى: [أرشيف, نسخ رقمية متداولة]
الشروح_والمختصرات_والذيول: []
مستوى_القارئ: متخصص
نوع_المرجعية: معاصرة
ملاحظات_نقدية: >
  عمل فردي يحمل آراء صاحبه وميوله الفلسفية (نقده للفكر الديني
  وانحيازه الوجودي ظاهران)، ومادتها بحدود ثمانينيات القرن
  العشرين فلا تواكب فلسفة ما بعدها؛ تُقرأ مرجعًا محررًا مع
  وعيٍ بمنظور مؤلفها.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - بيانات المؤسسة العربية للدراسات والنشر (تحقق ويب 2026-06-13)
آخر_تحديث: 2026-06-13
