id: al-tahawwul-al-kabir-polanyi
العنوان: التحول الكبير — الأصول السياسية والاقتصادية لزمننا المعاصر
المؤلف:
  الاسم: كارل بولاني (Karl Polanyi)
  الوفاة_ميلادي: 1964
العلم: مراجع العلوم الإنسانية والاجتماعية الحديثة بالعربية
التصنيف_الفرعي: المراجع المترجَمة (الاقتصاد السياسي)
مترجَم: نعم
المترجِم: محمد فاضل طبّاخ
جهة_الترجمة: المنظمة العربية للترجمة، بيروت
لماذا_هو_أم_في_بابه: >
  أحد أعظم كلاسيكيات الاقتصاد السياسي والأنثروبولوجيا الاقتصادية في
  القرن العشرين، وأثرُه في فهم نشأة اقتصاد السوق ممتدٌّ إلى اليوم؛
  بيّن فيه كارل بولاني أن «السوق المنظِّمة لذاتها» لم تكن نظامًا
  طبيعيًّا بل مشروعًا سياسيًّا فرضته الدولة، وأن فصل الاقتصاد عن
  المجتمع أنتج كوارث القرن، فأرسى مفهوم «التعشيب» (تجذُّر الاقتصاد في
  المجتمع) الذي صار ركنًا في الاقتصاد المؤسسي ونقد الليبرالية. نقلته
  المنظمة العربية للترجمة بترجمة محررة (2009)، فدخل المكتبة العربية
  مرجعًا تأسيسيًّا لا يستغني عنه دارس الاقتصاد السياسي والتنمية —
  ترجمةً تسدّ نقص التأليف العربي الأصيل في هذا الباب.
يغني_عن: []
يُقرأ_قبله:
  - معجم العلوم الاجتماعية (لضبط المصطلح الاقتصادي والاجتماعي)
أفضل_الطبعات:
  - المحقق_أو_المعتني: ترجمة محمد فاضل طبّاخ
    الدار: المنظمة العربية للترجمة، بيروت (بدعم مؤسسة محمد بن راشد آل مكتوم)
    السنة: 2009م (الطبعة الأولى)
    المجلدات: 1 (573 صفحة)
    ملاحظة: الترجمة العربية المعتمدة (تحقق ويب 2026-06-13)
التوافر_الرقمي:
  المكتبة_الشاملة: لا
  منصات_أخرى: [موقع المنظمة العربية للترجمة]
الشروح_والمختصرات_والذيول: []
مستوى_القارئ: متخصص
نوع_المرجعية: معاصرة
ملاحظات_نقدية: >
  مرجعٌ مترجَمٌ لا مؤلَّفٌ عربيٌّ أصيل، وهو كلاسيكيةٌ تأسيسيةٌ في
  الاقتصاد السياسي لا مرجعٌ تعليميٌّ شاملٌ في علم الاقتصاد (تبقى فجوةُ
  المرجع الاقتصادي العربي الجامع قائمة)؛ وأطروحتُه نقديةٌ لليبرالية
  السوق محلُّ سجالٍ بين المدارس الاقتصادية، تُقرأ بوعيٍ بمنطلقاتها.
حالة_التوثيق: موثّق
