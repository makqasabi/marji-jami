id: muallafat-al-kindi-al-musiqiyya
العنوان: مؤلفات الكندي الموسيقية
المؤلف:
  الاسم: أبو يوسف يعقوب بن إسحاق الكندي
  الوفاة_هجري: 256
  الوفاة_ميلادي: 873
العلم: الموسيقى النظرية
التصنيف_الفرعي: النصوص المؤسسة
لماذا_هو_أم_في_بابه: >
  أقدم ما وصل إلينا من التأليف الموسيقي النظري بالعربية وفاتحة
  الفن كله؛ فالكندي — أول الفلاسفة العرب — هو أول من نظّر
  للموسيقى بالعربية في رسائله (في خبر صناعة التأليف، وفي اللحون
  والنغم، والمصوّتات الوترية، والإيقاع)، فأدخل النسب الرياضية
  الفيثاغورية إلى الأبعاد العربية، ووصف العود وأوتاره ودساتينه،
  وربط النغم بالكون والنفس على مذهب عصره. سبق بها الفارابيَّ
  بقرن، فكانت الأساس الذي بنى عليه الفارابيُّ ثم تجاوزه، وهي
  أقدم وثيقة لنظرية الموسيقى العربية في نشأتها. جمعها وحققها
  زكريا يوسف فصارت متاحةً للدارسين، ولا يُؤرَّخ للموسيقى العربية
  النظرية إلا بالبدء بها، فهي أمُّ الفن تاريخيًّا ووثيقتُه
  الأولى.
يغني_عن:
  - رسائل الموسيقى اليونانية المترجمة المبكرة (في مقام التأسيس العربي)
يُقرأ_قبله: []
