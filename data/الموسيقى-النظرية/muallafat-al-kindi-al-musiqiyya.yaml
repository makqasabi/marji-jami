  - المحقق_أو_المعتني: زكريا يوسف (تحقيق وشرح وتعليق)
    الدار: مطبعة شفيق، بغداد
    السنة: 1962م
    المجلدات: 1
    ملاحظة: النشرة الجامعة المحققة المعتمدة لرسائله الموسيقية (تحقق ويب 2026-06-13)
التوافر_الرقمي:
  المكتبة_الشاملة: لا
  منصات_أخرى: [نسخ رقمية في مكتبات التراث العلمي]
الشروح_والمختصرات_والذيول:
  - رسالة الكندي في اللحون والنغم (ملحق ثانٍ بتحقيق زكريا يوسف 1965)
مستوى_القارئ: متخصص
نوع_المرجعية: علمية_تراثية_حضارية
ملاحظات_نقدية: >
  تدخل لمرجعيتها التاريخية الحضارية بوصفها فاتحة الفن؛ وأكثر
  تراث الكندي الموسيقي مفقود فالنشرة تمثل الباقي، وربطُه النغمَ
  بالأفلاك والطبائع من تصورات عصره لا من العلم؛ وملاحظة الخلاف
  الفقهي حول السماع قائمة كما في سائر الباب.
حالة_التوثيق: موثّق
مصادر_التوثيق:
