id: al-musiqa-al-kabir
العنوان: كتاب الموسيقى الكبير
المؤلف:
  الاسم: أبو نصر محمد بن محمد الفارابي
  الوفاة_هجري: 339
  الوفاة_ميلادي: 950
العلم: الموسيقى النظرية
التصنيف_الفرعي: النص المؤسس
لماذا_هو_أم_في_بابه: >
  أعظم كتاب في نظرية الموسيقى كتب في العصور الوسطى شرقًا وغربًا
  بإجماع مؤرخي الفن؛ أسس الفارابي — وكان عازفًا محترفًا إلى جانب
  فلسفته — علمَ الموسيقى العربي على قواعده: فيزياء الصوت
  وحدوثه، والأبعاد والأجناس والجموع (السلالم) بحساب رياضي دقيق
  تجاوز نظريات اليونان التي وصلته، ووصف الآلات (العود والطنبور
  والرباب والمزامير) وضبط دساتينها وصفًا هو أوثق سجل لممارسة
  عصره، ونظرية الإيقاع العربية الأولى. عليه بنيت المدرسة
  المنهجية كلها (ابن سينا فالأرموي)، وترجم جزئيًّا للاتينية
  والعبرية فأثر في نظرية الموسيقى الأوروبية، فهو أم الفن بلا
  منازع وأكمل وثيقة لموسيقى الحضارة في عصرها الذهبي.
يغني_عن:
  - رسائل الموسيقى اليونانية المترجمة (تجاوزها) ورسالة إخوان الصفا الموسيقية
يُقرأ_قبله:
  - مداخل تاريخ الموسيقى العربية المعاصرة
أفضل_الطبعات:
  - المحقق_أو_المعتني: غطاس عبد الملك خشبة، مراجعة محمود أحمد الحفني
    الدار: دار الكاتب العربي للطباعة والنشر، القاهرة
    السنة: 1967م
    المجلدات: 1 (مجلد كبير)
    ملاحظة: النشرة المحققة المعتمدة الوحيدة
التوافر_الرقمي:
  المكتبة_الشاملة: لا
  منصات_أخرى: [نسخ رقمية في مكتبات التراث]
الشروح_والمختصرات_والذيول:
  - قسم الموسيقى من الشفاء لابن سينا (بناء عليه)
مستوى_القارئ: متخصص
نوع_المرجعية: علمية_تراثية_حضارية
ملاحظات_نقدية: >
  يدخل لمرجعيته التاريخية الحضارية؛ وموقف الفقهاء من السماع
  والمعازف معلوم الخلاف — والكتاب وثيقة علم نظري لا فتوى —
  وقسمه الموعود في الصناعة العملية لم يصل، ومصطلحه يحتاج وسيط
  دراسات الحفني وفارمر.
روابط_التحميل:
