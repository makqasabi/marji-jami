id: kitab-al-adwar
العنوان: كتاب الأدوار في الموسيقى
المؤلف:
  الاسم: صفي الدين عبد المؤمن بن يوسف الأرموي البغدادي
  الوفاة_هجري: 693
  الوفاة_ميلادي: 1294
العلم: الموسيقى النظرية
التصنيف_الفرعي: المدرسة المنهجية (النظام المقامي)
لماذا_هو_أم_في_بابه: >
  الكتاب الذي أسس النظام المقامي الشرقي المعمول به إلى اليوم؛
  قسّم الأرموي — موسيقار بغداد الأخير قبل سقوطها وعازف بلاطها
  العباسي ثم الإلخاني — الديوانَ سبعة عشر قسمًا (التقسيم الذي
  بقي أساس الموسيقى العربية والتركية والفارسية) ورتب الأدوار
  (المقامات) والآوازات ترتيبًا منهجيًّا برموز حرفية وعددية هي
  أقدم تدوين موسيقي شرقي منضبط. صار كتابه ورسالته الشرفية متنَ
  المدرسة المنهجية التي شرحها المراغي واللاذقي قرونًا، وعدّه
  الدارسون (فارمر ورايت) أهم نص موسيقي بعد الفارابي وأبعدها
  أثرًا في الممارسة الحية، فهو أم النظرية المقامية وجسرها من
  التراث إلى موسيقى الشرق المعاصرة.
يغني_عن:
  - شروح المدرسة المنهجية (في مقام الأصل)
يُقرأ_قبله:
  - الموسيقى الكبير للفارابي
أفضل_الطبعات:
  - المحقق_أو_المعتني: غطاس عبد الملك خشبة (بمراجعة محمود أحمد الحفني)
    الدار: الهيئة المصرية العامة للكتاب، القاهرة
    السنة: 1986م
    المجلدات: 1
    ملاحظة: النشرة العربية المحققة المعتمدة (ولرايت دراسة إنجليزية معتمدة للمدرسة)
التوافر_الرقمي:
  المكتبة_الشاملة: لا
  منصات_أخرى: [نسخ رقمية في مكتبات التراث]
الشروح_والمختصرات_والذيول:
  - الرسالة الشرفية للأرموي (قسيمه النظري)
  - شروح المراغي واللاذقي
مستوى_القارئ: متخصص
نوع_المرجعية: علمية_تراثية_حضارية
ملاحظات_نقدية: >
  يدخل لمرجعيته التاريخية الحضارية؛ ومتنه شديد الإيجاز لا يفك
  إلا بالشروح ودراسات المدرسة، وملاحظة الخلاف الفقهي حول الفن
  قائمة.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - نشرة الهيئة المصرية
  - دراسات فارمر ورايت
آخر_تحديث: 2026-06-13
