id: jawami-ilm-al-musiqa
العنوان: جوامع علم الموسيقى (قسم الموسيقى من كتاب الشفاء)
المؤلف:
  الاسم: أبو علي الحسين بن عبد الله ابن سينا (الشيخ الرئيس)
  الوفاة_هجري: 428
  الوفاة_ميلادي: 1037
العلم: الموسيقى النظرية
التصنيف_الفرعي: التنظير الرياضي المنهجي
لماذا_هو_أم_في_بابه: >
  أنضج عرض منهجي موجز لعلم الموسيقى النظري في التراث؛ صاغه ابن
  سينا قسمًا رابعًا لرياضيات الشفاء، فلخص نظرية الفارابي وهذبها
  بمنهجه النسقي: الصوت وأسبابه الفيزيائية، والأبعاد ونسبها
  الرياضية مع نقد صريح لتقسيمات اليونان الموروثة (رفض اعتبارات
  الفيثاغوريين التنجيمية بحجة منطقية شهيرة)، والأجناس والإيقاع
  والتلحين والآلات. فقدّم الموسيقى علمًا رياضيًّا خالصًا داخل
  منظومة العلوم، وصار النص التعليمي المعتمد للفن في المدارس
  الشرقية، وعليه وعلى الفارابي بنى الأرموي مدرسته المنهجية،
  ولكونه ضمن أوسع موسوعات الفلسفة انتشارًا بلغ من الذيوع ما لم
  يبلغه كتاب موسيقي، فهو أم العرض المدرسي للفن.
يغني_عن:
  - مختصرات الموسيقى النظرية الوسيطة
يُقرأ_قبله:
  - الموسيقى الكبير للفارابي (الأصل الموسع)
أفضل_الطبعات:
  - المحقق_أو_المعتني: زكريا يوسف (ضمن نشرة الشفاء، تصدير أحمد فؤاد الأهواني)
    الدار: المطبعة الأميرية، القاهرة (ضمن مشروع نشرة الشفاء)
    السنة: 1376هـ/1956م
    المجلدات: 1 (جزء الرياضيات 3)
    ملاحظة: النشرة المعتمدة ضمن نشرة القاهرة للشفاء
التوافر_الرقمي:
  المكتبة_الشاملة: لا
  منصات_أخرى: [نسخ رقمية في مكتبات التراث العلمي]
الشروح_والمختصرات_والذيول: []
مستوى_القارئ: متخصص
نوع_المرجعية: علمية_تراثية_حضارية
ملاحظات_نقدية: >
  يدخل لمرجعيته التاريخية الحضارية؛ وهو إيجاز نظري لا يستوعب
  وصف الآلات والممارسة استيعاب الفارابي، وملاحظة الخلاف الفقهي
  حول السماع قائمة هنا كما في سائر الباب.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - نشرة القاهرة للشفاء
آخر_تحديث: 2026-06-13
