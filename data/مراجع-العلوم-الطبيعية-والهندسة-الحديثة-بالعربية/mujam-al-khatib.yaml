id: mujam-al-khatib
العنوان: معجم المصطلحات العلمية والفنية والهندسية الجديد
المؤلف:
  الاسم: أحمد شفيق الخطيب
  معاصر: نعم
العلم: مراجع العلوم الطبيعية والهندسة الحديثة بالعربية
التصنيف_الفرعي: معاجم المصطلح العلمي والهندسي التأليفية
لماذا_هو_أم_في_بابه: >
  أوسع معجم علمي هندسي ثنائي اللغة بقلم مؤلف عربي واحد وأكثرها
  تداولًا بين المهندسين والمترجمين؛ صنّفه أحمد شفيق الخطيب —
  عضو مجمع اللغة العربية بالقاهرة — فجمع أكثر من ستين ألف مصطلح
  من نحو عشرين علمًا (الطيران والفلك والأحياء والهندسة المدنية
  والكهربائية والإلكترونيات والجيولوجيا والرياضيات والميتالورجيا
  والفيزياء والبترول...) بمقابلات عربية محررة وصور إيضاحية
  وملاحق تحويلية وتصنيفية. اختاره اتحاد المهندسين العرب أساسًا
  لتعريب التعليم الهندسي منذ طبعاته الأولى (1970)، وبلغ عشر
  طبعات قبل أن يُنقَّح ويُوسَّع ويصدر بالاتجاهين، فصار عمدة
  الترجمة العلمية والهندسية، وأمَّ المعاجم العلمية الفردية
  المعاصرة في بابه.
