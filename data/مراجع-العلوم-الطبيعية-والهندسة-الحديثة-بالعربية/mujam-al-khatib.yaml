ملاحظات_نقدية: >
  عمل فردي لا يحمل صفة الإقرار المجمعي للمعاجم الموحدة، فتقع
  مقابلاته أحيانًا على خلاف المعتمد رسميًّا؛ ومعجم مصطلحات لا
  مرجع علمي موضوعي، ويحتاج تحديثًا لمواكبة المستجد التقني
  المتسارع.
