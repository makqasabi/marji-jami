id: al-maajim-al-muwahhada-taarib
العنوان: المعاجم الموحدة لمصطلحات العلوم (الفيزياء والرياضيات والفلك والكيمياء)
المؤلف:
  الاسم: مكتب تنسيق التعريب، المنظمة العربية للتربية والثقافة والعلوم (الرباط)
  هيئة: نعم
العلم: مراجع العلوم الطبيعية والهندسة الحديثة بالعربية
التصنيف_الفرعي: معاجم المصطلح المجمعية الموحدة
لماذا_هو_أم_في_بابه: >
  المرجعية الرسمية العليا لتوحيد المصطلح العلمي بين الأقطار
  العربية كلها؛ أنجز مكتب تنسيق التعريب — الذراع المعجمية
  للمنظمة العربية (ألكسو) منذ 1961 — سلسلةً من المعاجم
  الموحدة ثلاثية اللغة (إنكليزي-فرنسي-عربي) تُقَرّ مصطلحاتها في
  مؤتمرات التعريب بحضور المجامع اللغوية كافة، فتصير ملزمة
  مرجعيًّا: المعجم الموحد لمصطلحات الفيزياء العامة والنووية
  (1989)، ومصطلحات الرياضيات والفلك (1990)، ومصطلحات الكيمياء
  (1992)، وعشرات سواها. فهذه السلسلة هي الأصل الذي تَرُدّ إليه
  الجامعاتُ والمجامعُ ودورُ النشر العلمية اختلافَ المقابلات،
  وأمُّ التعريب العلمي المؤسسي في العالم العربي بلا منازع.
يغني_عن:
  - معاجم المصطلح العلمي القُطرية المتفرقة (في مقام المرجعية الموحدة)
يُقرأ_قبله: []
أفضل_الطبعات:
  - المحقق_أو_المعتني: مكتب تنسيق التعريب (مؤتمرات التعريب ومجلسه العلمي)
    الدار: المنظمة العربية للتربية والثقافة والعلوم — مكتب تنسيق التعريب، الرباط
    السنة: 1989م (الفيزياء)، 1990م (الرياضيات والفلك)، 1992م (الكيمياء) وما بعدها
    المجلدات: سلسلة (مجلد لكل علم)
    ملاحظة: السلسلة الرسمية المعتمدة، تصدر تباعًا وتُراجَع (تحقق ويب 2026-06-13)
التوافر_الرقمي:
  المكتبة_الشاملة: لا
  منصات_أخرى: [أرشيف, بوابة المكتب الرسمية, البنك الآلي العربي للمصطلحات «العربية»]
الشروح_والمختصرات_والذيول: []
مستوى_القارئ: متخصص
نوع_المرجعية: معاصرة
ملاحظات_نقدية: >
  معاجم مصطلحات لا مراجع علمية موضوعية؛ ودورات إقرارها الطويلة
  تجعل بعضها متأخرًا عن مستجد المصطلح، وإلزامها المرجعي أقوى من
  انتشارها الفعلي بين الباحثين الذين قد يؤثرون المقابل الشائع؛
  وبعض مجلداتها القديمة بحاجة إلى تحديث.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - بيانات مكتب تنسيق التعريب والمعاجم الموحدة (تحقق ويب 2026-06-13)
آخر_تحديث: 2026-06-13
