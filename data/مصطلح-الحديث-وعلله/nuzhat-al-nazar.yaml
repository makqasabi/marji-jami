id: nuzhat-al-nazar
العنوان: نزهة النظر في توضيح نخبة الفكر في مصطلح أهل الأثر
المؤلف:
  الاسم: أحمد بن علي بن حجر العسقلاني
  الوفاة_هجري: 852
  الوفاة_ميلادي: 1449
العلم: مصطلح الحديث وعلله
التصنيف_الفرعي: متون المصطلح وشروحها
لماذا_هو_أم_في_بابه: >
  أنفس متن مختصر في المصطلح وشرحُه بقلم مؤلفه نفسه؛ ابتكر ابن حجر في
  «نخبة الفكر» ترتيبًا عقليًّا بالسبر والتقسيم لم يُسبق إليه — كما صرح
  هو — يبني أنواع الحديث بعضها على بعض بدل سرد الأنواع المتناثر، ثم
  شرحها في النزهة شرحًا محررًا ضبط حدود الفن ضبطَ أمير المؤمنين في
  الحديث. صار المتن وشرحه عمدة الدرس في المصطلح في عامة المعاهد
  والجامعات وحلقات العلم منذ خمسة قرون، عليه عشرات الحواشي والشروح
  والمنظومات، ومن أتقنه ملك مفاتيح الفن وصحّ له الارتقاء إلى المطولات،
  فهو أم متون المصطلح من غير منازع.
يغني_عن:
  - متون المصطلح المختصرة قبله (كالبيقونية في مقام التحصيل)
يُقرأ_قبله:
  - تيسير مصطلح الحديث للطحان
أفضل_الطبعات:
  - المحقق_أو_المعتني: عبد الله بن ضيف الله الرحيلي
    الدار: مطبعة سفير، الرياض
    السنة: 1422هـ
    المجلدات: 1
    ملاحظة: طبعة محررة مقابلة على نسخ خطية، متداولة في الدرس
  - المحقق_أو_المعتني: نور الدين عتر
    الدار: مطبعة الصباح، دمشق
    السنة: 1413هـ/1992م (الطبعة الثالثة)
    المجلدات: 1
    ملاحظة: طبعة محققة معتمدة بتعليقات نافعة
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: [إسلام هاوس, تطبيقات المتون]
الشروح_والمختصرات_والذيول:
  - حواش كثيرة (كحاشية ابن قطلوبغا ولقط الدرر)
  - شروح معاصرة صوتية ومكتوبة كثيرة جدًّا
مستوى_القارئ: مبتدئ/متوسط
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  إيجازه الشديد يحوج المبتدئ إلى شيخ أو شرح معاصر، وبعض تعريفاته
  محل مدارسة دقيقة بين الشراح؛ وذلك من كثافة المتون لا من خلل فيه.
