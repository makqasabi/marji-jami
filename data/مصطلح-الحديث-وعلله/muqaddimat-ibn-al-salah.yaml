id: muqaddimat-ibn-al-salah
العنوان: معرفة أنواع علوم الحديث (مقدمة ابن الصلاح)
المؤلف:
  الاسم: أبو عمرو عثمان بن عبد الرحمن ابن الصلاح الشهرزوري
  الوفاة_هجري: 643
  الوفاة_ميلادي: 1245
العلم: مصطلح الحديث وعلله
التصنيف_الفرعي: أمهات كتب المصطلح
لماذا_هو_أم_في_بابه: >
  الكتاب الذي استقر عليه علم المصطلح كله؛ هذّب ابن الصلاح ما تفرق في
  كتب من قبله — كالمحدث الفاصل والكفاية ومعرفة الحاكم — ورتب الفن في
  خمسة وستين نوعًا حررها تحريرًا صار هو المعتمد، حتى قال ابن حجر: «فعكف
  الناس عليه وساروا بسيره، فلا يُحصى كم ناظم له ومختصِر، ومستدرِك عليه
  ومقتصر». فكل ما أُلّف بعده من متون المصطلح ومنظوماته وشروحه عيال
  عليه: التقريب للنووي مختصره، والألفيتان نظمه، والنكت استدراك عليه،
  وفتح المغيث وتدريب الراوي شرحان لفرعيه. فهو أم الفن بلا منازع
  ومحور مكتبته كلها إلى اليوم.
يغني_عن:
  - المحدث الفاصل للرامهرمزي ومعرفة علوم الحديث للحاكم (في مقام التقعيد المستقر)
يُقرأ_قبله:
  - تيسير مصطلح الحديث للطحان
  - نزهة النظر لابن حجر
أفضل_الطبعات:
  - المحقق_أو_المعتني: نور الدين عتر
    الدار: دار الفكر، دمشق
    السنة: 1406هـ/1986م
    المجلدات: 1
    ملاحظة: التحقيق المعتمد المتداول الذي عليه الإحالات
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: []
الشروح_والمختصرات_والذيول:
  - التقييد والإيضاح للعراقي
  - النكت على ابن الصلاح لابن حجر وللزركشي
  - محاسن الاصطلاح للبلقيني
  - التقريب والتيسير للنووي (مختصره)
مستوى_القارئ: متوسط/متخصص
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  له مسائل خولف فيها كقوله بإغلاق باب التصحيح في الأعصار المتأخرة
  وتعقبه فيه ابن حجر وغيره؛ وتلك الاستدراكات نفسها من خدمة الفن لكتابه
  وعلامة مركزيته.
روابط_التحميل:
  - المصدر: المكتبة الشاملة (ت عتر)
    الرابط: https://shamela.ws/book/22870
    النوع: حر
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - طبعة دار الفكر بتحقيق عتر
  - النكت لابن حجر (وصفه لمكانة الكتاب)
آخر_تحديث: 2026-06-12
