id: fath-al-mughith
العنوان: فتح المغيث بشرح ألفية الحديث
المؤلف:
  الاسم: شمس الدين محمد بن عبد الرحمن السخاوي
  الوفاة_هجري: 902
  الوفاة_ميلادي: 1497
العلم: مصطلح الحديث وعلله
التصنيف_الفرعي: الشروح الجامعة لكتب المصطلح
لماذا_هو_أم_في_بابه: >
  أوسع شروح ألفية العراقي وأجمع مطولات المصطلح على الإطلاق؛ صنفه
  السخاوي — أنجب تلامذة ابن حجر وحامل لواء الفن بعده — فاستوعب فيه
  علوم شيخه ومدرسته كلها مع زيادات من حفظه الواسع وتحريراته، حتى صار
  عند أهل الفن أنفع كتب المصطلح المطولة وأكثرها استيعابًا للمسائل
  والفروع والأمثلة التطبيقية. قدّمه المتخصصون على ما سواه من الشروح
  والمطولات لأنه جمع التقعيد النظري إلى التطبيق النقدي العملي، فهو
  الكتاب الذي يختم به طالب المصطلح مرحلة التحصيل ويفتح به مرحلة
  التحقيق، ومرجع الدراسات العليا الأول في مسائل الفن الدقيقة.
يغني_عن:
  - شروح الألفية الأخرى (كشرح العراقي نفسه في جملة مادته)
  - المطولات المتأخرة في المصطلح
يُقرأ_قبله:
  - نزهة النظر
  - مقدمة ابن الصلاح
أفضل_الطبعات:
  - المحقق_أو_المعتني: علي حسين علي
    الدار: مكتبة السنة، القاهرة
    السنة: 1424هـ/2003م
    المجلدات: 4
    ملاحظة: الطبعة المحققة المتداولة المعتمدة في الدراسات
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: []
الشروح_والمختصرات_والذيول: []
مستوى_القارئ: متخصص
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  مطول مزدحم النقول يحتاج صبرًا وأساسًا مكينًا قبله؛ وفي بعض مسائله
  يحكي الأقوال من غير حسم جريًا على عادة الشراح الجامعين.
روابط_التحميل:
