id: al-kifaya
العنوان: الكفاية في علم الرواية
المؤلف:
  الاسم: أبو بكر أحمد بن علي الخطيب البغدادي
  الوفاة_هجري: 463
  الوفاة_ميلادي: 1071
العلم: مصطلح الحديث وعلله
التصنيف_الفرعي: أصول الفن المسندة
لماذا_هو_أم_في_بابه: >
  ديوان أصول الرواية المسند وأعظم ما صنفه «ثاني الدارقطني» في قوانين
  الفن؛ جمع الخطيب البغدادي فيه مذاهب أئمة النقد الأوائل في شروط
  الراوي والتحمل والأداء والجرح والتعديل بأسانيدها إلى قائليها، فحفظ
  لنا نصوص يحيى بن معين وأحمد وابن المديني وطبقتهم التي لولاه لضاعت.
  قال الحافظ أبو بكر ابن نقطة كلمته المشهورة: «كل من أنصف علم أن
  المحدثين بعد الخطيب عيال على كتبه»، ومقدمة ابن الصلاح نفسها مبنية
  على كتب الخطيب وأولها الكفاية. فهو أصل أصول المصطلح، يرجع إليه
  المحقق ليرى المذاهب بنصوصها الأولى قبل استقرار الاصطلاح.
يغني_عن:
  - المحدث الفاصل للرامهرمزي (في جملة مقاصده)
يُقرأ_قبله:
  - مقدمة ابن الصلاح
أفضل_الطبعات:
  - المحقق_أو_المعتني: (نشرة دائرة المعارف)
    الدار: دائرة المعارف العثمانية، حيدر آباد الدكن
    السنة: 1357هـ
    المجلدات: 1
    ملاحظة: النشرة الأم التي عليها الإحالات وعنها المصورات
  - المحقق_أو_المعتني: أبو عبد الله السورقي وإبراهيم حمدي المدني
    الدار: المكتبة العلمية، المدينة المنورة
    السنة: (بلا تاريخ)
    المجلدات: 1
    ملاحظة: طبعة متداولة عن الحيدرآبادية
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: []
الشروح_والمختصرات_والذيول:
  - الجامع لأخلاق الراوي وآداب السامع للخطيب (قسيمه في الآداب)
مستوى_القارئ: متخصص
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  كتاب نصوص مسندة لا متن مرتب، فلا يصلح مدخلًا؛ وهو بحاجة معلنة إلى
  تحقيق نقدي حديث يقابل نسخه ويخرّج نقوله.
روابط_التحميل:
