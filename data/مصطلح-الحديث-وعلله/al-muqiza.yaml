id: al-muqiza
العنوان: الموقظة في علم مصطلح الحديث
المؤلف:
  الاسم: شمس الدين محمد بن أحمد الذهبي
  الوفاة_هجري: 748
  الوفاة_ميلادي: 1348
العلم: مصطلح الحديث وعلله
التصنيف_الفرعي: متون المصطلح النقدية
لماذا_هو_أم_في_بابه: >
  أنفس مختصر كتبه ناقد ممارس في المصطلح؛ فالذهبي — حافظ العصر وصاحب
  الميزان والسير — لم يكتب قواعد نظرية مجردة بل قيّد فيها خلاصة خبرة
  النقاد العملية: في الحسن وتفاوت درجاته، وفي الثقة والصدوق ومراتب
  التجريح، وفي قرائن الترجيح التي يعمل بها أهل الاستقراء التام. ولهذا
  عظّمه المتأخرون وقدّموه على المطولات في بابه، وقالوا: صفحة من
  الموقظة خير من أبواب من كتب المتكلمين في المصطلح، وشاع في الدرس
  الحديثي المعاصر عناية فائقة به وبشروحه لأنه يصل الطالب بمنهج النقاد
  المتقدمين مباشرة، فهو أم المتون النقدية الممارسة في الفن.
يغني_عن:
  - المختصرات النظرية المجردة في المصطلح
يُقرأ_قبله:
  - نزهة النظر لابن حجر
أفضل_الطبعات:
  - المحقق_أو_المعتني: عبد الفتاح أبو غدة (عناية وتعليق)
    الدار: مكتب المطبوعات الإسلامية، حلب
    السنة: 1405هـ
    المجلدات: 1
    ملاحظة: الطبعة المعتمدة المتداولة بتعليقات نفيسة
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: [إسلام هاوس]
الشروح_والمختصرات_والذيول:
  - شروح معاصرة عدة (دروس مفرغة ومطبوعة)
مستوى_القارئ: متوسط
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  شديد الإيجاز، وأصله تلخيص لمقدمة ابن دقيق العيد في الاقتراح مع
  زيادات الذهبي؛ فلا يستقل به الطالب عن متن منهجي مرتب.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - طبعة أبي غدة
آخر_تحديث: 2026-06-12
