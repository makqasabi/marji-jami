id: marifat-ulum-al-hadith-hakim
العنوان: معرفة علوم الحديث
المؤلف:
  الاسم: أبو عبد الله محمد بن عبد الله الحاكم النيسابوري
  الوفاة_هجري: 405
  الوفاة_ميلادي: 1014
العلم: مصطلح الحديث وعلله
التصنيف_الفرعي: أصول الفن المتقدمة
لماذا_هو_أم_في_بابه: >
  أول كتاب رتّب علوم الحديث أنواعًا مستقلة؛ قسّمه الحاكم — صاحب
  المستدرك وإمام أهل الحديث في عصره — إلى اثنين وخمسين نوعًا، فوضع
  الإطار الذي صار عليه بناء الفن كله، وعنه أخذ ابن الصلاح ترتيب
  الأنواع وطوّره. يمتاز بأنه كتاب ناقد متقدم يسوق لكل نوع أمثلته
  المسندة وتطبيقاته من صنعة المحدثين أنفسهم، ففيه من فقه الفن العملي
  — كأنواع العلل ومعرفة المداخل في الأسانيد — ما يصل الباحث بمنهج
  النقاد قبل استقرار الاصطلاح النظري. فهو مع المحدث الفاصل والكفاية
  ثالوث الأصول المتقدمة التي لا يستغني عنها محقق في تاريخ المصطلح
  ونشأته.
يغني_عن:
  - المحدث الفاصل للرامهرمزي (في مقام التأصيل التاريخي للأنواع)
يُقرأ_قبله:
  - مقدمة ابن الصلاح
أفضل_الطبعات:
  - المحقق_أو_المعتني: السيد معظم حسين
    الدار: دائرة المعارف العثمانية، حيدر آباد (ومصورات دار الكتب العلمية، بيروت 1397هـ)
    السنة: 1354هـ/1935م
    المجلدات: 1
    ملاحظة: النشرة المعتمدة التي عليها الإحالات
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: []
الشروح_والمختصرات_والذيول: []
مستوى_القارئ: متخصص
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  ترتيبه غير مستقصٍ وتداخلت بعض أنواعه — وهو ما هذّبه ابن الصلاح بعده
  — ونشرته المتداولة بحاجة إلى تحقيق نقدي حديث.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - نشرة حيدر آباد بتحقيق معظم حسين
آخر_تحديث: 2026-06-12
