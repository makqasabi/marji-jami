id: sharh-ilal-al-tirmidhi
العنوان: شرح علل الترمذي
المؤلف:
  الاسم: زين الدين عبد الرحمن بن أحمد ابن رجب الحنبلي
  الوفاة_هجري: 795
  الوفاة_ميلادي: 1393
العلم: مصطلح الحديث وعلله
التصنيف_الفرعي: كتب العلل وقواعدها
لماذا_هو_أم_في_بابه: >
  أنفس كتاب صُنف في تقعيد علم العلل وكشف منهج النقاد المتقدمين؛ شرح
  فيه ابن رجب «العلل الصغير» للترمذي ثم بسط القول في قواعد الفن:
  مذاهب الأئمة في الجرح والتعديل وزيادة الثقة والتفرد، وأحوال الرواة
  المختلطة بلدانًا وطبقات، وقرائن الترجيح عند الاختلاف، بما لا يوجد
  مجموعًا محررًا في كتاب سواه. عدّه أهل الفن مفتاح علم العلل الذي
  يدخل به الطالب إلى دواوينه الكبرى ككتاب ابن أبي حاتم والدارقطني،
  واعتمدته المدرسة الحديثية المعاصرة المعنية بمنهج المتقدمين عمدةً
  أولى، فلا يُعرف لطالب هذا الفن طريق سواه.
يغني_عن:
  - المتفرق من كلام الأئمة في قواعد العلل قبله
يُقرأ_قبله:
  - نزهة النظر
  - الموقظة للذهبي
