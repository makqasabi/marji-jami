id: tadrib-al-rawi
العنوان: تدريب الراوي في شرح تقريب النواوي
المؤلف:
  الاسم: جلال الدين عبد الرحمن بن أبي بكر السيوطي
  الوفاة_هجري: 911
  الوفاة_ميلادي: 1505
العلم: مصطلح الحديث وعلله
التصنيف_الفرعي: الشروح الجامعة لكتب المصطلح
لماذا_هو_أم_في_بابه: >
  أجمع كتب المصطلح المتأخرة لأقوال الفن وفروعه؛ شرح فيه السيوطي
  «التقريب» للنووي — مختصر مقدمة ابن الصلاح — فحشد فيه بسعة اطلاعه
  المعهودة نقول الحفاظ ومذاهبهم في كل نوع، وزياداتٍ والتقاطاتٍ من كتب
  لا تكاد تجتمع لغيره، حتى صار من أراد استقصاء كلام أهل الفن في مسألة
  مصطلحية وجده فيه مجموعًا منسوبًا. وهو لذلك عمدة الباحثين والمدرسين:
  لا تخلو منه رسالة جامعية في علوم الحديث، وبه مع فتح المغيث يكتمل
  جناحا المطالعة العالية في الفن بعد مقدمة ابن الصلاح، فهو خزانة
  المصطلح وديوانه الجامع عند المتأخرين.
يغني_عن:
  - الحواشي والمختصرات المتأخرة على التقريب والمقدمة
يُقرأ_قبله:
  - نزهة النظر لابن حجر
  - مقدمة ابن الصلاح
أفضل_الطبعات:
  - المحقق_أو_المعتني: أبو قتيبة نظر محمد الفاريابي
    الدار: دار طيبة، الرياض
    السنة: (طبعات متكررة؛ لم تُجزم هنا سنة الأولى)
    المجلدات: 2
    ملاحظة: الطبعة المحققة المتداولة المعتمدة في الدرس
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: []
الشروح_والمختصرات_والذيول: []
مستوى_القارئ: متوسط/متخصص
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  غلب عليه الجمع فيسوق الأقوال أحيانًا من غير ترجيح محرر، وللسيوطي
  اختيارات تساهل فيها تعقبها المتأخرون؛ فيُقرأ قراءة موازنة لا تقليد.
حالة_التوثيق: موثّق
مصادر_التوثيق:
