id: taysir-mustalah-al-hadith
العنوان: تيسير مصطلح الحديث
المؤلف:
  الاسم: محمود أحمد الطحان
  الوفاة_هجري: 1444
  الوفاة_ميلادي: 2022
العلم: مصطلح الحديث وعلله
التصنيف_الفرعي: المداخل والمقررات الحديثة
لماذا_هو_أم_في_بابه: >
  المدخل الجامعي المعتمد إلى علم المصطلح في العالم الإسلامي كله؛ صاغه
  الطحان — أستاذ الحديث بجامعتي الإمام والكويت — على طريقة التقسيم
  المدرسي الواضح: تعريف كل نوع لغة واصطلاحًا، ثم شرحه وأقسامه
  وأمثلته ومظانّ التوسع فيه، بعبارة مدرسية منضبطة جعلته المقرر الأول
  في كليات الشريعة والمعاهد منذ صدوره قبل نصف قرن. ليس كتاب تحقيقات —
  ولا ادّعى ذلك — لكنه أم المداخل في بابه: به يرسم المبتدئ خريطة الفن
  كاملة في أيام، ثم يصعد إلى النخبة وشروحها فمقدمة ابن الصلاح
  والمطولات، ولذا جُعل بوابة القراءة في هذا العلم.
يغني_عن:
  - المداخل المدرسية الحديثة للمصطلح
يُقرأ_قبله: []
