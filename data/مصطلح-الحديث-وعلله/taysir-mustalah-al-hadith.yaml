مستوى_القارئ: مبتدئ
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  تبسيط تعليمي يعرض المشهور من أقوال المتأخرين ولا يدخل في خلافات
  المتقدمين والمتأخرين الدقيقة؛ فمن وقف عنده ظن الفن أيسر مما هو.
حالة_التوثيق: موثّق
