id: ilal-ibn-abi-hatim
العنوان: علل الحديث
المؤلف:
  الاسم: أبو محمد عبد الرحمن بن أبي حاتم الرازي
  الوفاة_هجري: 327
  الوفاة_ميلادي: 938
العلم: مصطلح الحديث وعلله
التصنيف_الفرعي: كتب العلل
لماذا_هو_أم_في_بابه: >
  أعظم دواوين العلل المرتبة وأنفسها؛ سأل ابن أبي حاتم أباه أبا حاتم
  وأبا زرعة الرازيين — وهما من أجبال النقد وأطبائه — عن نحو ثلاثة
  آلاف حديث معلول، فدوّن أجوبتهما مرتبة على الأبواب الفقهية، فحفظ لنا
  أدق صناعة في علوم الحديث وأعزّها: نقد الخفي من أوهام الثقات الذي لا
  يدركه إلا الجهابذة. هو المدرسة التطبيقية الأولى لمن أراد فهم منهج
  النقاد المتقدمين في الترجيح بين الروايات وإدراك قرائنهم، وقد عكف
  عليه المحدثون قديمًا وحديثًا شرحًا ودراسة واستخراج قواعد، ولا
  يُعرف في بابه كتاب يدانيه إلا علل الدارقطني المرتب على المسانيد.
يغني_عن: []
يُقرأ_قبله:
  - شرح علل الترمذي لابن رجب (لفهم قواعد الفن قبل تطبيقاته)
أفضل_الطبعات:
  - المحقق_أو_المعتني: فريق من الباحثين بإشراف سعد بن عبد الله الحميد وخالد بن عبد الرحمن الجريسي
    الدار: مطابع الحميضي، الرياض
    السنة: 1427هـ/2006م
    المجلدات: 7
    ملاحظة: الطبعة المحققة المعتمدة بدراسة وافية وتخريج وفهارس
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: []
الشروح_والمختصرات_والذيول:
  - دراسات معاصرة في منهج الكتاب وقواعده
مستوى_القارئ: متخصص
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  أجوبة النقاد فيه مقتضبة تفترض علم السائل، فلا ينتفع به مبتدئ؛
  وأحكام أبي حاتم تميل إلى التشدد وقد نبّه على ذلك الذهبي وغيره.
