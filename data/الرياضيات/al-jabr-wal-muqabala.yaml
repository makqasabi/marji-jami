id: al-jabr-wal-muqabala
العنوان: الكتاب المختصر في حساب الجبر والمقابلة
المؤلف:
  الاسم: أبو عبد الله محمد بن موسى الخوارزمي
  الوفاة_هجري: 232
  الوفاة_ميلادي: 847
العلم: الرياضيات
التصنيف_الفرعي: النص المؤسس للجبر
لماذا_هو_أم_في_بابه: >
  الكتاب الذي وُلد به علم الجبر وأعطاه اسمه في لغات الأرض كلها؛
  أسس الخوارزمي فيه — بتكليف من المأمون — علمًا جديدًا مستقلًّا
  عن هندسة اليونان وحساب الهند: حلّ المعادلات بعمليتي الجبر
  والمقابلة، وصنّف معادلات الدرجتين الأولى والثانية أنواعها
  الستة بحلولها المبرهنة هندسيًّا، ثم طبّقها على المعاملات
  والوصايا والمواريث. ترجم للاتينية في القرن السادس الهجري فدخل
  الجبر أوروبا باسمه العربي (Algebra) وصار اسم مؤلفه علمًا على
  الخوارزمية (Algorithm)، وما من تاريخ للرياضيات في الدنيا إلا
  وهذا الكتاب فاتحة فصل الجبر فيه، فهو أم الفن بالمعنى الحرفي
  وأشهر كتاب رياضي عربي بإطلاق.
يغني_عن: []
يُقرأ_قبله:
  - مداخل تاريخ الرياضيات العربية المعاصرة
أفضل_الطبعات:
  - المحقق_أو_المعتني: علي مصطفى مشرفة ومحمد مرسي أحمد
    الدار: مطبعة بول بربيه (نشر الجامعة المصرية)، القاهرة (وأعيد بدار الكتاب العربي)
    السنة: 1939م (وإعادات لاحقة 1968م)
    المجلدات: 1
    ملاحظة: التحقيق العربي المعتمد
  - المحقق_أو_المعتني: فريدريك روزن (بالنص والترجمة الإنجليزية)
    الدار: لندن
    السنة: 1831م
    المجلدات: 1
    ملاحظة: النشرة النقدية الأولى المعتمدة في الدراسات الغربية
التوافر_الرقمي:
  المكتبة_الشاملة: لا
  منصات_أخرى: [نسخ رقمية متداولة في مكتبات التراث العلمي]
الشروح_والمختصرات_والذيول: []
مستوى_القارئ: متوسط/متخصص
نوع_المرجعية: علمية_تراثية_حضارية
ملاحظات_نقدية: >
  يدخل لمرجعيته التاريخية الحضارية؛ ورياضياته بلسان الكلام لا
  الرموز (الرمزية لاحقة) فقراءته اليوم قراءة تاريخ علم، ودراسات
  رشدي راشد وسزكين مدخله الصحيح.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - نشرتا مشرفة وروزن
  - دراسات تاريخ الرياضيات (راشد)
