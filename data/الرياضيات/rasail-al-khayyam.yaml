id: rasail-al-khayyam
العنوان: رسائل الخيام الجبرية (مقالة في الجبر والمقابلة)
المؤلف:
  الاسم: غياث الدين عمر بن إبراهيم الخيام النيسابوري
  الوفاة_هجري: 517
  الوفاة_ميلادي: 1123
العلم: الرياضيات
التصنيف_الفرعي: ذروة الجبر النظري
لماذا_هو_أم_في_بابه: >
  ذروة الجبر العربي بعد الخوارزمي والقفزة التي لم تتجاوزها
  البشرية أربعة قرون؛ صنّف الخيام — الرياضي الفلكي الذي طغت
  شهرة رباعياته على عبقريته العلمية — معادلاتِ الدرجة الثالثة
  تصنيفًا حاصرًا (خمسة وعشرين نوعًا) وحلّها حلولًا هندسية
  بتقاطع القطوع المخروطية، في أول معالجة منهجية كاملة للمعادلات
  التكعيبية في التاريخ، مع وعي نظري معلن بحدود طرقه وتمييزٍ
  مبكر بين الجبر والحساب. عدّه مؤرخو الرياضيات شرقًا وغربًا أهم
  جبريّ بين الخوارزمي والإيطاليين، ورسالته في شرح ما أشكل من
  مصادرات إقليدس مهدت لهندسات ما بعد إقليدس، فهو أم الجبر
  النظري العالي في التراث.
يغني_عن: []
يُقرأ_قبله:
  - الجبر والمقابلة للخوارزمي (الأصل الذي بنى عليه)
أفضل_الطبعات:
  - المحقق_أو_المعتني: رشدي راشد وأحمد جبار
    الدار: معهد التراث العلمي العربي بجامعة حلب
    السنة: 1981م
    المجلدات: 1
    ملاحظة: النشرة النقدية العربية المعتمدة (ولراشد نشرة موسعة لاحقة بالفرنسية)
التوافر_الرقمي:
  المكتبة_الشاملة: لا
  منصات_أخرى: [نسخ رقمية في مكتبات التراث العلمي]
الشروح_والمختصرات_والذيول: []
مستوى_القارئ: متخصص
نوع_المرجعية: علمية_تراثية_حضارية
ملاحظات_نقدية: >
  تدخل لمرجعيتها التاريخية الحضارية؛ وحلول الخيام هندسية وجودية
  لا عددية جذرية (الحل الجذري جاء مع الإيطاليين لاحقًا) — وهو
  ما صرح هو بقصوره عنه — وقراءتها تحتاج أنسًا بالقطوع المخروطية.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - نشرة راشد وجبار
آخر_تحديث: 2026-06-12
