id: miftah-al-hisab
العنوان: مفتاح الحساب
المؤلف:
  الاسم: غياث الدين جمشيد بن مسعود الكاشي
  الوفاة_هجري: 832
  الوفاة_ميلادي: 1429
العلم: الرياضيات
التصنيف_الفرعي: ذروة الحساب العملي
لماذا_هو_أم_في_بابه: >
  خاتمة الحساب العربي وقمته التي ودّع بها التراثُ الرياضيات؛
  صنفه الكاشي — رياضي مرصد سمرقند وأعظم حسّاب القرون الوسيطة —
  موسوعةً للحساب العملي: حساب الصحاح والكسور، والجذور بطرق
  مبتكرة، وأبدع ما فيه الكسور العشرية التي عرضها أول عرض منهجي
  كامل في التاريخ قبل أوروبا بقرنين، مع تطبيقات للمهندسين
  والمسّاحين (حساب القباب والمقرنصات لا نظير له). وصاحبه حاسب π
  إلى ست عشرة منزلة عشرية برقم قياسي بقي قرنين. اعتمدته المدارس
  الشرقية مقررًا أعلى للحساب قرونًا، وعدّه مؤرخو الرياضيات أنضج
  كتاب حساب قبل الحداثة، فهو أم الحساب التطبيقي في التراث
  الإنساني.
يغني_عن:
  - كتب الحساب الوسيطة قبله (استوعبها وتجاوزها)
