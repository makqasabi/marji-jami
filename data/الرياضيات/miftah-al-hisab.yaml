ملاحظات_نقدية: >
  يدخل لمرجعيته التاريخية الحضارية؛ وطرقه يدوية ما قبل حاسوبية
  تقرأ تاريخَ علم، وأولويته في الكسور العشرية نوقشت (سبقه
  الأقليدسي جزئيًّا في القرن الرابع) والمحرر أنه صاحب العرض
  المنهجي الكامل.
