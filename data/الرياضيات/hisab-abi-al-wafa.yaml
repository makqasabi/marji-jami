id: hisab-abi-al-wafa
العنوان: كتاب فيما يحتاج إليه الكتّاب والعمال من علم الحساب
المؤلف:
  الاسم: أبو الوفاء محمد بن محمد البوزجاني
  الوفاة_هجري: 388
  الوفاة_ميلادي: 998
العلم: الرياضيات
التصنيف_الفرعي: الحساب التطبيقي الإداري
لماذا_هو_أم_في_بابه: >
  أم كتب الحساب التطبيقي للدواوين والوثيقة الأولى لرياضيات
  الإدارة الإسلامية؛ صنفه أبو الوفاء — أحد أعظم رياضيي القرن
  الرابع وصاحب الإسهامات المؤسسة في المثلثات — لحُسّاب الدولة
  البويهية: حساب الخراج والأعشار والصرف والنفقات والجيوش
  بأمثلة من واقع الدواوين، فقدّم صورة فريدة لكيفية عمل
  الرياضيات في إدارة دولة إسلامية كبرى. ومنهجه فيه عجيبة شهيرة:
  تجنّب الكسور العشرية والأرقام الهندية مراعاةً لعرف الكتّاب،
  فصار شاهدًا على ازدواج التقاليد الحسابية. اعتمدته دراسات
  تاريخ الرياضيات والاقتصاد الإسلامي مصدرًا أول، وهو مع أعمال
  سعيدان في نشره ركن مكتبة الحساب العربي.
يغني_عن:
  - رسائل حساب الدواوين المتفرقة
يُقرأ_قبله: []
أفضل_الطبعات:
  - المحقق_أو_المعتني: أحمد سليم سعيدان (ضمن تاريخ علم الحساب العربي)
    الدار: جمعية عمال المطابع التعاونية، عمّان
    السنة: 1971م
    المجلدات: 1 (ضمن المجلد الأول)
    ملاحظة: النشرة المحققة المعتمدة
التوافر_الرقمي:
  المكتبة_الشاملة: لا
  منصات_أخرى: [نسخ رقمية في مكتبات التراث العلمي]
الشروح_والمختصرات_والذيول: []
مستوى_القارئ: متخصص
نوع_المرجعية: علمية_تراثية_حضارية
ملاحظات_نقدية: >
  يدخل لمرجعيته التاريخية الحضارية؛ وهو حساب كتّاب لا نظرية
  عالية، وأعمال أبي الوفاء المثلثاتية الأهم علميًّا (في المجسطي
  وزيجه) أكثرها مفقود — وهي فجوة معلنة.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - نشرة سعيدان
