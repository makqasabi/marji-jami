العنوان: الباهر في الجبر
المؤلف:
  الاسم: السموأل بن يحيى المغربي
  الوفاة_هجري: 570
  الوفاة_ميلادي: 1175
العلم: الرياضيات
التصنيف_الفرعي: الجبر الحسابي (الحدوديات)
لماذا_هو_أم_في_بابه: >
  وثيقة «حسْبَنة الجبر» الكبرى التي اكتشف بها مؤرخو العلم مدرسةً
  عربية كاملة؛ صنفه السموأل وهو ابن تسع عشرة سنة مطورًا أعمال
  الكرجي، فعالج كثيرات الحدود معالجة منهجية: قسمتها بعضها على
  بعض بخوارزمية تامة، والأسس السالبة، وقاعدة الإشارات، واستخراج
  جذور الحدوديات، وأقدم استعمال موثق لمبدأ شبيه بالاستقراء
  الرياضي في البرهان. لما حُقق ونُشر سنة 1972 أعاد كتابة فصول
  من تاريخ الرياضيات — إذ ثبت سبق المدرسة العربية إلى ما نُسب
  لأوروبا بقرون — فصار من أكثر نصوص التراث العلمي استشهادًا في
  الدراسات، وهو أم الجبر الحسابي ووثيقته الفاصلة.
يغني_عن:
  - أعمال الكرجي الجبرية (طوّرها واستوعب جوهرها؛ وكتب الكرجي نفسها فجوة تحقيق)
يُقرأ_قبله:
  - الجبر والمقابلة للخوارزمي
