id: rihlat-ibn-battuta
العنوان: تحفة النظار في غرائب الأمصار وعجائب الأسفار (رحلة ابن بطوطة)
المؤلف:
  الاسم: أبو عبد الله محمد بن عبد الله بن بطوطة الطنجي
  الوفاة_هجري: 779
  الوفاة_ميلادي: 1377
العلم: الجغرافيا والبلدان والرحلات
التصنيف_الفرعي: أدب الرحلات
لماذا_هو_أم_في_بابه: >
  أعظم رحلة في تاريخ البشرية قبل العصر الحديث؛ طاف ابن بطوطة
  ثمانيًا وعشرين سنة فيما يقارب مئة وعشرين ألف كيلومتر — من طنجة
  إلى الصين ومن القرم إلى مالي — وأملى مشاهداته على ابن جزي،
  فجاءت الرحلة وثيقة لا نظير لها عن القرن الثامن: ممالك الهند
  ومالديف والملايو وأفريقيا جنوب الصحراء مما لا يوجد عند مؤرخ
  سواه، حتى اعتمدتها الدراسات العالمية مصدرًا أول لتاريخ تلك
  الأقاليم وترجمت لعشرات اللغات. فهي أشهر نص عربي عالميًّا بعد
  ألف ليلة، وأم الرحلات بإطلاق: شاهدُ وحدة العالم الإسلامي
  وامتداده في ذروة اتساعه بعين رجل واحد رآه كله.
يغني_عن:
  - مصادر تاريخ الهند ومالي وجزر المحيط الهندي العربية لحقبته (تنفرد بمادتها)
يُقرأ_قبله:
  - رحلة ابن جبير (أم الجنس وأوثقه)
أفضل_الطبعات:
  - المحقق_أو_المعتني: عبد الهادي التازي
    الدار: أكاديمية المملكة المغربية، الرباط
    السنة: 1417هـ/1997م
    المجلدات: 5 (مع الفهارس)
    ملاحظة: التحقيق العلمي المعتمد
  - المحقق_أو_المعتني: (نشرة ديفريمري وسانغينيتي بالنص والترجمة الفرنسية)
    الدار: باريس
    السنة: 1853–1858م
    المجلدات: 4
    ملاحظة: النشرة النقدية الأم التي عليها الدراسات
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: []
الشروح_والمختصرات_والذيول: []
مستوى_القارئ: مبتدئ/متوسط
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  شكك الدارسون في معاينته بعضَ الأقاليم (الصين وبلغار) ورجحوا
  النقل فيها، وفي أخباره مبالغات وتداخل تواريخ من طبيعة الإملاء
  من الذاكرة، وقلم ابن جزي تصرف في الصياغة؛ وتبقى جوهر مادتها
  موثوقًا معتمدًا.
