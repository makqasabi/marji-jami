id: rihlat-ibn-jubayr
العنوان: رحلة ابن جبير (تذكرة بالأخبار عن اتفاقات الأسفار)
المؤلف:
  الاسم: أبو الحسين محمد بن أحمد بن جبير الكناني الأندلسي
  الوفاة_هجري: 614
  الوفاة_ميلادي: 1217
العلم: الجغرافيا والبلدان والرحلات
التصنيف_الفرعي: أدب الرحلات
لماذا_هو_أم_في_بابه: >
  أم أدب الرحلة العربي وأرقاها أسلوبًا؛ دوّن ابن جبير — كاتب
  غرناطة الأديب — رحلته للحج (578–581هـ) يوميات دقيقة مؤرخة: وصف
  مصر الصلاحية ومكة والمدينة وموسم الحج بتفاصيله الحية، والعراق
  والشام إبان الحروب الصليبية بمشاهدات عين على التعايش والتجارة
  بين الفريقين لا توجد عند مؤرخ، بنثر فني رفيع جعل الرحلة قطعة
  أدب كما هي وثيقة تاريخ. صارت النموذج الذي احتذاه الرحالون بعده
  — والعبدري والبلوي عيال عليه وابن بطوطة نقل منه مقاطع — وعدّها
  الدارسون أوثق رحلات التراث وأصدقها، فهي أم الجنس الأدبي
  الجغرافي الذي تفردت به العربية.
يغني_عن:
  - رحلات الحج المغربية المتأخرة (نسجت على منوالها)
يُقرأ_قبله: []
أفضل_الطبعات:
  - المحقق_أو_المعتني: (عن نشرة وليم رايت بمراجعة دي خويه)
    الدار: دار صادر، بيروت
    السنة: 1384هـ/1964م وما بعدها
    المجلدات: 1
    ملاحظة: الطبعة المتداولة عن النشرة النقدية
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: []
الشروح_والمختصرات_والذيول: []
مستوى_القارئ: مبتدئ/متوسط
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  مقصورة على طريق الحج المشرقي فلا تصف المغرب والأندلس، وفي
  أحكامه على بعض البلدان حدّة المجاور المتعجل.
حالة_التوثيق: موثّق
مصادر_التوثيق:
