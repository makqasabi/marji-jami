id: mujam-ma-istajam
العنوان: معجم ما استعجم من أسماء البلاد والمواضع
المؤلف:
  الاسم: أبو عبيد عبد الله بن عبد العزيز البكري الأندلسي
  الوفاة_هجري: 487
  الوفاة_ميلادي: 1094
العلم: الجغرافيا والبلدان والرحلات
التصنيف_الفرعي: معاجم مواضع جزيرة العرب
لماذا_هو_أم_في_بابه: >
  أول معجم بلداني محرر في التراث وأوثقها في مواضع جزيرة العرب
  القديمة؛ خصّه البكري — موسوعي الأندلس — بالمواضع الواردة في
  الشعر الجاهلي والحديث والأخبار، يضبطها بالحروف ويوثقها بالشاهد،
  مفتتحًا بمقدمة نفيسة في ديار القبائل ومنازلها هي أصل في
  الجغرافيا القبلية. فهو عدة المحقق الأولى لما استعجم من أسماء
  المواضع في النصوص العالية: عليه يعتمد شراح الدواوين والسيرة
  والمعلقات، وقد سبق ياقوت بقرن ونصف وبقي شريكه الذي لا يُستغنى
  عنه في مواضع الجزيرة خاصة، إذ حرر ما يختص بنصوص الاحتجاج
  تحريرًا لم يبلغه معجم ياقوت الأعم.
يغني_عن:
  - رسائل مواضع الجزيرة المتقدمة (كبلاد العرب للأصفهاني في جملة المقصد)
