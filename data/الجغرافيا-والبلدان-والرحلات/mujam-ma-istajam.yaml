ملاحظات_نقدية: >
  مؤلفه أندلسي لم يرَ المشرق فاعتمد الرواية لا المعاينة، فيقع
  الخلاف بينه وبين من عاين؛ وتصحح مواضعه اليوم بمعاجم البلادي
  الميدانية.
