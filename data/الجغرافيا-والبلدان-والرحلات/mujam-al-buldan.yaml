ملاحظات_نقدية: >
  معلوماته الوصفية بحدود القرن السابع فلا تطابق الواقع الحاضر،
  وفي بعض مواضعه أخبار غير موثقة من عادة كتب البلدان؛ وتُستكمل
  مواضع الجزيرة بمعاجم البلادي المعاصرة.
