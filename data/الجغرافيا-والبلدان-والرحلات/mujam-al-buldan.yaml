id: mujam-al-buldan
العنوان: معجم البلدان
المؤلف:
  الاسم: شهاب الدين ياقوت بن عبد الله الحموي
  الوفاة_هجري: 626
  الوفاة_ميلادي: 1229
العلم: الجغرافيا والبلدان والرحلات
التصنيف_الفرعي: معاجم البلدان
لماذا_هو_أم_في_بابه: >
  أم المعاجم الجغرافية في التراث الإنساني كله؛ رتب ياقوت أسماء
  البلدان والمواضع على الحروف، يضبط الاسم ضبطًا حرفيًّا ويحدد
  الموضع ويسوق تاريخه وأعلامه وما قيل فيه من شعر وخبر، مستوعبًا
  ما في كتب المسالك والممالك قبله وما عاينه في رحلاته من مرو إلى
  حلب. فصار المرجع الذي لا بديل عنه لكل من لقي اسم موضع في حديث
  أو تاريخ أو ديوان: عليه عوّل شراح الحديث والمؤرخون والمحققون
  ثمانية قرون، واعتمده المستشرقون أساس الجغرافيا التاريخية
  للمشرق، وما زال أول ما يُفتح لضبط أي بلد قديم، فهو في بابه
  كاللسان في المعاجم: الجامع الذي أغنى عما قبله.
يغني_عن:
  - كتب أسماء المواضع المتقدمة (استوعب مادتها)
يُقرأ_قبله: []
