    الدار: نشرة نابولي/روما، ومصورة عالم الكتب، بيروت
    السنة: 1970–1984م (النشرة)؛ مصورة عالم الكتب 1409هـ/1989م
    المجلدات: 2 (في تسعة أجزاء بالنشرة)
    ملاحظة: النشرة النقدية الكاملة الوحيدة وعنها المصورة المتداولة
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: []
الشروح_والمختصرات_والذيول: []
مستوى_القارئ: متخصص
نوع_المرجعية: علمية_تراثية_حضارية
ملاحظات_نقدية: >
  يدخل لمرجعيته الحضارية التاريخية؛ ومادته عن الأقاليم البعيدة
  (شرق آسيا وأعماق أفريقيا) منقولة بتفاوت دقة، وإحداثياته على
  نظام عصره البطلمي.
