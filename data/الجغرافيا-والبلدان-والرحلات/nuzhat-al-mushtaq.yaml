id: nuzhat-al-mushtaq
العنوان: نزهة المشتاق في اختراق الآفاق
المؤلف:
  الاسم: أبو عبد الله محمد بن محمد الشريف الإدريسي
  الوفاة_هجري: 560
  الوفاة_ميلادي: 1165
العلم: الجغرافيا والبلدان والرحلات
التصنيف_الفرعي: الجغرافيا العالمية والخرائط
لماذا_هو_أم_في_بابه: >
  أعظم عمل جغرافي خرائطي في العصور الوسطى شرقًا وغربًا؛ صنعه
  الإدريسي للملك روجر الثاني ملك صقلية فجمع علم العرب بمعطيات
  البحارة والرحالة الأوروبيين، ووصف العالم المعمور كله — وأوروبا
  وصفًا لا نظير له عند العرب — مقسومًا على الأقاليم السبعة
  وأجزائها السبعين، مع سبعين خريطة تفصيلية ولوح فضي شهير، فبلغ
  من الدقة أن ظلت خرائطه تُستنسخ في أوروبا قرونًا وتُرجم الكتاب
  ودُرّس في جامعاتها. فهو قمة الكارتوغرافيا الإسلامية وجسر
  الجغرافيا بين الحضارتين، والمصدر الأول لجغرافية حوض المتوسط
  والممالك الأوروبية والأفريقية في القرن السادس، ولا يُكتب تاريخ
  الخرائط العالمي بدونه.
يغني_عن:
  - أعمال الجغرافيا العالمية الوسيطة قبله
يُقرأ_قبله: []
أفضل_الطبعات:
