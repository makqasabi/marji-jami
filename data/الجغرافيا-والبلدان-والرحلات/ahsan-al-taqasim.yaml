id: ahsan-al-taqasim
العنوان: أحسن التقاسيم في معرفة الأقاليم
المؤلف:
  الاسم: شمس الدين محمد بن أحمد المقدسي البشاري
  الوفاة_هجري: 380
  الوفاة_ميلادي: 990
العلم: الجغرافيا والبلدان والرحلات
التصنيف_الفرعي: الجغرافيا الوصفية (المسالك والممالك)
لماذا_هو_أم_في_بابه: >
  ذروة مدرسة المسالك والممالك وأنضج كتاب جغرافي أنتجه التراث
  بشهادة الدارسين شرقًا وغربًا؛ قسّم المقدسي العالم الإسلامي
  أربعة عشر إقليمًا ووصفها من معاينة رحلاته التي طاف بها الأقاليم
  كلها، بمنهج أعلنه: لا يكتب إلا ما عاين أو سمعه من ثقة، فوصف
  المدن والمناخ والمياه والتجارات واللهجات والمذاهب والأوزان وصفًا
  «جغرافيا بشرية» متكاملة قبل المصطلح بألف سنة، حتى عدّه
  المستشرقون أعظم جغرافي عرفته الإنسانية قبل العصر الحديث. فهو
  المصدر الأول لأحوال العالم الإسلامي في القرن الرابع — عصره
  الذهبي — ولا غنى عنه لمؤرخ حضارة أو باحث في جغرافية التراث.
يغني_عن:
  - كتب المسالك قبله (الإصطخري وابن حوقل في مقام النضج المنهجي، مع بقاء قيمتها المستقلة)
يُقرأ_قبله: []
أفضل_الطبعات:
