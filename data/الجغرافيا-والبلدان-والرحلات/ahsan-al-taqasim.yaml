    الدار: مطبعة بريل، ليدن (ضمن المكتبة الجغرافية العربية)
    السنة: 1906م (الطبعة الثانية)
    المجلدات: 1
    ملاحظة: النشرة النقدية المعتمدة وعنها المصورات (مكتبة مدبولي وغيرها)
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: []
الشروح_والمختصرات_والذيول: []
مستوى_القارئ: متخصص
نوع_المرجعية: علمية_تراثية_حضارية
ملاحظات_نقدية: >
  يدخل لمرجعيته التاريخية الحضارية بوصفه قمة الجغرافيا العربية لا
  مرجعًا تطبيقيًّا معاصرًا؛ ولمؤلفه تحاملات مذهبية يسيرة في وصف
  بعض الأمصار نبه عليها الدارسون، ولغته المسجوعة تحتاج أنسًا.
