id: mujam-al-maalim-al-baladi
العنوان: معجم المعالم الجغرافية في السيرة النبوية
المؤلف:
  الاسم: عاتق بن غيث البلادي الحربي
  الوفاة_هجري: 1431
  الوفاة_ميلادي: 2010
العلم: الجغرافيا والبلدان والرحلات
التصنيف_الفرعي: المعاجم البلدانية الميدانية المعاصرة
لماذا_هو_أم_في_بابه: >
  أوثق مرجع معاصر لمواضع السيرة النبوية، وممثل مدرسة فريدة:
  الجغرافيا الميدانية التراثية؛ فالبلادي — رحالة الحجاز وعلامة
  بلدانه — لم يكتب من المظان بل مشى الأرض نفسها عقودًا، يطابق
  مواضع السيرة وكتب البلدان القديمة على الواقع المعاصر بإحداثياته
  وطرقه، مصححًا أوهامًا توارثتها الكتب قرونًا. فصار معجمه هذا —
  وسلسلة معاجمه (معالم الحجاز وغيرها) — عمدة محققي كتب السيرة
  والحديث والمؤسسات العلمية في ضبط المواضع، والمثال المعاصر
  النادر لبلوغ مؤلف فرد مقام المرجعية بالمعاينة، فهو أم الباب
  الميداني الحديث الذي يصل ياقوت والبكري بخريطة اليوم.
يغني_عن:
  - الرسائل المتفرقة في تحديد مواضع السيرة
يُقرأ_قبله:
  - معجم البلدان (للأصل التراثي)
أفضل_الطبعات:
  - المحقق_أو_المعتني: (تأليف ميداني معاصر)
    الدار: دار مكة للنشر والتوزيع، مكة المكرمة
    السنة: 1402هـ/1982م وطبعات لاحقة
    المجلدات: 1
    ملاحظة: طبعات دار مكة هي المعتمدة
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: []
الشروح_والمختصرات_والذيول:
  - معجم معالم الحجاز للمؤلف (موسوعته الأوسع)
مستوى_القارئ: متوسط
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  بعض مطابقاته اجتهاد ميداني ناقشه باحثون في مواضع معدودة،
  والتطور العمراني بعد وفاته غيّر معالم يسيرة مما حدده.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - طبعة دار مكة
آخر_تحديث: 2026-06-12
