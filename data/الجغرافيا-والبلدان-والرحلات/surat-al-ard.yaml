id: surat-al-ard
العنوان: صورة الأرض
المؤلف:
  الاسم: أبو القاسم محمد بن حوقل النصيبي
  الوفاة_هجري: 367
  الوفاة_ميلادي: 977
العلم: الجغرافيا والبلدان والرحلات
التصنيف_الفرعي: الجغرافيا الوصفية (المسالك والممالك)
لماذا_هو_أم_في_بابه: >
  عمدة الجغرافيا المصورة (الأطلس العربي الأول)؛ بنى ابن حوقل على
  مسالك الإصطخري — بوصية منه حين التقيا — فأعاد كتابته وزاد عليه
  من رحلة دامت ثلاثين سنة بين الأندلس والسند، وألحق بكل إقليم
  خريطته، فجمع النص والخريطة في عمل واحد صار نموذج «الأطلس
  الإسلامي» الذي تدرسه مدارس تاريخ الخرائط عالميًّا. وامتاز بحس
  اقتصادي فريد: يرصد الأسواق والمحاصيل والصناعات وطرق التجارة
  رصدَ تاجر خبير، فهو المصدر الأول للاقتصاد الجغرافي للعالم
  الإسلامي في قرنه الذهبي، ومع أحسن التقاسيم جناحا المدرسة
  الكلاسيكية اللذان لا يستغني عنهما باحث.
يغني_عن:
  - المسالك والممالك للإصطخري (وهو أصله الذي استوعبه وطوره)
يُقرأ_قبله: []
أفضل_الطبعات:
  - المحقق_أو_المعتني: يوهانس كرامرس
    الدار: مطبعة بريل، ليدن (ومصورات دار صادر ومكتبة الحياة، بيروت)
    السنة: 1938م (الطبعة الثانية للنشرة)
    المجلدات: 1 (في جزأين)
    ملاحظة: النشرة النقدية المعتمدة بخرائطها
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: []
الشروح_والمختصرات_والذيول: []
مستوى_القارئ: متخصص
نوع_المرجعية: علمية_تراثية_حضارية
ملاحظات_نقدية: >
  يدخل لمرجعيته الحضارية التاريخية؛ وخرائطه على طريقة عصره
  (مجردة هندسيًّا) لا تقرأ بمقاييس الخرائط الحديثة، وفي مواقفه
  من الدول المتصارعة في عصره (الفاطميون وغيرهم) ميول رصدها
  الدارسون.
