نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  بعض تأصيلاته اجتهادية ناقشها اللغويون قديمًا وحديثًا، وقد يجمع
  تحت الأصل الواحد ما أصله متعدد؛ وذلك من طبيعة كل عمل تأصيلي
  رائد.
