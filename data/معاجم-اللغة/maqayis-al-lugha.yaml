id: maqayis-al-lugha
العنوان: معجم مقاييس اللغة
المؤلف:
  الاسم: أبو الحسين أحمد بن فارس بن زكريا
  الوفاة_هجري: 395
  الوفاة_ميلادي: 1004
العلم: معاجم اللغة
التصنيف_الفرعي: المعاجم الاشتقاقية
لماذا_هو_أم_في_بابه: >
  أم المعاجم الاشتقاقية في العربية والكتاب الذي لا نظير له في
  اللغات؛ ردّ ابن فارس كل مادة لغوية إلى أصلها الدلالي الجامع —
  أو أصولها إن تعددت — ثم بيّن كيف تتفرع المعاني كلها عنه: فمادة
  (ق و ل) أصل واحد، و(ج ن ن) أصلها الستر فمنه الجِن والجَنين
  والجُنة والمجنون، فكشف المنطق الداخلي للمعجم العربي كله. به
  يفهم الدارس سر اللغة لا ظاهرها، ولهذا صار عمدة الدرس الدلالي
  والاشتقاقي قاطبة: عليه بنى المحدثون نظرياتهم في فقه اللغة، ومنه
  انطلق محمد حسن جبل في معجمه القرآني، ولا يستغني عنه مفسر ولا
  أصولي يحقق دلالة لفظ، فهو فتح في المعجمية لم يتكرر.
يغني_عن:
  - مجمل اللغة لابن فارس (وهو أصله المختصر)
