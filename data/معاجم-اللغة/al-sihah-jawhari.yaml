  - مختار الصحاح للرازي
  - التكملة والذيل والصلة للصغاني (استدراك عليه)
مستوى_القارئ: متوسط
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  وقعت فيه أوهام وتصحيفات تتبعها العلماء (وفيها صنف الصغاني
  تكملته وابن بري حواشيه) لأن المؤلف توفي قبل تمام تبييضه؛
  وشرطه الانتقائي أخرج فصيحًا كثيرًا أثبته غيره.
