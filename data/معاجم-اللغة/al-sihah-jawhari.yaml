id: al-sihah-jawhari
العنوان: الصحاح — تاج اللغة وصحاح العربية
المؤلف:
  الاسم: أبو نصر إسماعيل بن حماد الجوهري
  الوفاة_هجري: 393
  الوفاة_ميلادي: 1003
العلم: معاجم اللغة
التصنيف_الفرعي: معاجم الفصيح المعتمدة
لماذا_هو_أم_في_بابه: >
  المعجم الذي التزم الصحيح وحده فصار حجة الفصاحة عند الأمة؛ شرط
  الجوهري ألا يثبت إلا ما صح عنده من اللغة بشرطٍ كشرط البخاري في
  الحديث — وبه سمى كتابه — وابتكر نظام القافية (الترتيب بأواخر
  الكلمات) الذي ساد المعاجم بعده ستة قرون حتى القاموس واللسان.
  تلقاه العلماء والأدباء بالقبول فصار «الصحاح» علمًا على الفصيح:
  عليه مدار الاحتجاج في التفسير والفقه واللغة، وحوله نسجت
  المختصرات (مختار الصحاح) والحواشي (ابن بري) والاستدراكات، وهو
  أكثر معاجم العربية المتوسطة تداولًا في تاريخها. فهو أم معاجم
  الانتقاء الموثق، والميزان الذي توزن به فصاحة المفردة.
يغني_عن:
  - معاجم الفصيح المختصرة (مختار الصحاح فرعه)
يُقرأ_قبله:
  - مختار الصحاح للرازي (مدخله الميسر)
