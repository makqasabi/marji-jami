id: lisan-al-arab
العنوان: لسان العرب
المؤلف:
  الاسم: محمد بن مكرم بن منظور الأنصاري الإفريقي
  الوفاة_هجري: 711
  الوفاة_ميلادي: 1311
العلم: معاجم اللغة
التصنيف_الفرعي: المعاجم الجامعة المطولة
لماذا_هو_أم_في_بابه: >
  أوسع معاجم العربية التراثية وأجمعها؛ بناه ابن منظور على خمسة أصول صرّح
  بها في مقدمته: تهذيب اللغة للأزهري، والمحكم لابن سيده، والصحاح للجوهري،
  وحواشي ابن بري عليه، والنهاية في غريب الحديث لابن الأثير، فجمع مادتها
  وحرّر نصوصها وساق شواهدها من القرآن والحديث وكلام العرب. صار منذ تأليفه
  المرجعَ الأول لمن أراد استقصاء مادة لغوية بمعانيها وشواهدها واشتقاقاتها،
  وعليه عوّل أصحاب المعاجم المتأخرة كالزَّبيدي في تاج العروس. من اقتناه
  استغنى في عامة مباحث الألفاظ عن أصوله الخمسة مجتمعة، وبقي تاج العروس
  مكمّلًا له فيما استدركه.
يغني_عن:
  - تهذيب اللغة للأزهري
  - المحكم والمحيط الأعظم لابن سيده
  - الصحاح للجوهري (في جملة مادته)
  - النهاية في غريب الحديث والأثر لابن الأثير (في أكثر مادته)
يُقرأ_قبله:
  - مختار الصحاح للرازي
  - المعجم الوسيط (للتمرس بالكشف المعجمي)
أفضل_الطبعات:
  - المحقق_أو_المعتني: (مصورة عن طبعة بولاق مع إعادة صف)
    الدار: دار صادر، بيروت
    السنة: طبعات متكررة منذ 1374هـ/1955م
    المجلدات: 15
    ملاحظة: أشهر الطبعات المتداولة وعليها الإحالات في الدراسات
  - المحقق_أو_المعتني: عبد الله علي الكبير ومحمد أحمد حسب الله وهاشم محمد الشاذلي
    الدار: دار المعارف، القاهرة
    السنة: 1981م وما بعدها
    المجلدات: 6 مجلدات كبار
    ملاحظة: مرتبة على أوائل الكلمات لا أواخرها، مضبوطة، وهي أيسر للكشف لغير المتخصص
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: [الباحث العربي, معجم الدوحة التاريخي (إحالات)]
الشروح_والمختصرات_والذيول:
  - تاج العروس للزبيدي (توسعة واستدراك عليه وعلى القاموس)
مستوى_القارئ: متوسط/متخصص
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  أُخذ عليه ما يقع في النقول المجموعة من تصحيف أو تكرار أو وهم في العزو
  ورثه عن أصوله، فينبغي لمن يحقق مسألة دقيقة أن يراجع الأصول والمعاجم
  المحققة حديثًا؛ وترتيبه على أواخر الكلمات (نظام القافية) يصعب على
  المبتدئ، وطبعة دار المعارف تحل ذلك.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - مقدمة ابن منظور للسان العرب
  - مقدمة طبعة دار المعارف
آخر_تحديث: 2026-06-12
