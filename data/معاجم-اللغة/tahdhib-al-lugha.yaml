id: tahdhib-al-lugha
العنوان: تهذيب اللغة
المؤلف:
  الاسم: أبو منصور محمد بن أحمد الأزهري
  الوفاة_هجري: 370
  الوفاة_ميلادي: 980
العلم: معاجم اللغة
التصنيف_الفرعي: المعاجم الموسوعية المحررة
لماذا_هو_أم_في_بابه: >
  أوثق المعاجم الكبرى رواية وأشدها تحريًا؛ بناه الأزهري على نظام
  العين لكنه «هذّب» اللغة من الدخيل والمصحف والموضوع: لا يثبت إلا
  ما صح سماعه عن الثقات أو شافه به العرب الفصحاء — وقد أسرته
  القرامطة فعاش بين عرب البادية يدون عنهم مشافهة — وينص على ما
  ينكره من مفردات المعاجم قبله بقوله «ولا أحفظه لغير الليث». فهو
  ميزان النقد المعجمي: إذا اختلفت المعاجم في صحة مفردة فالحكم
  للتهذيب، ولهذا كان أجل أصول لسان العرب وأوثقها، وبقي عمدة
  المحققين في توثيق المفردات إلى اليوم، فهو أم المعاجم المحررة
  بميزان الرواية.
