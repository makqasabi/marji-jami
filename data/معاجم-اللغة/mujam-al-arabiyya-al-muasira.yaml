id: mujam-al-arabiyya-al-muasira
العنوان: معجم اللغة العربية المعاصرة
المؤلف:
  الاسم: أحمد مختار عمر (بمساعدة فريق عمل)
  الوفاة_هجري: 1424
  الوفاة_ميلادي: 2003
العلم: معاجم اللغة
التصنيف_الفرعي: معاجم العربية المعاصرة الوصفية
لماذا_هو_أم_في_بابه: >
  أوسع معجم وصفي للعربية المعاصرة وأحدث أمهات الفن؛ بناه أحمد
  مختار عمر — عميد الدلاليين العرب — على منهج المعجمية الحديثة:
  رصدُ اللغة كما تُستعمل فعلًا في الصحافة والأدب والعلم الحديث لا
  كما كانت في معاجم الاحتجاج، مع ضبط النطق والتأصيل الصرفي وبيان
  المتلازمات والتعابير الاصطلاحية والمجالات الدلالية، وترقيم
  المعاني ترقيمًا ميسرًا. سد فراغًا قائمًا منذ قرون — معجم يصف
  عربية اليوم — فاعتمدته الجامعات والمترجمون وصناعات المعالجة
  الحاسوبية للعربية مرجعًا أول، وصار النموذج الذي تقاس عليه
  مشاريع المعاجم المعاصرة، فهو أم هذا الجنس الجديد في المعجمية
  العربية.
يغني_عن:
  - المعاجم الوصفية المعاصرة الأصغر
