ملاحظات_نقدية: >
  منهجه الوصفي أدخل من الشائع ما لا يقره المعياريون، فلا يحتج به
  على الفصاحة التراثية وإنما على الاستعمال المعاصر — وهذا مقصوده
  المعلن.
