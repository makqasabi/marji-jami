ملاحظات_نقدية: >
  انتقد عليه لغويون تساهلًا في بعض ما أقره من المولد، وإيجاز
  الشواهد حتى كاد يخلو منها؛ وهو معجم وظيفي لا يغني الباحث عن
  أمهات الاحتجاج.
