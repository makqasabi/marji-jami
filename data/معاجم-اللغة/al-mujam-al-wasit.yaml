id: al-mujam-al-wasit
العنوان: المعجم الوسيط
المؤلف:
  الاسم: مجمع اللغة العربية بالقاهرة
  هيئة: نعم
العلم: معاجم اللغة
التصنيف_الفرعي: المعاجم المجمعية الحديثة
لماذا_هو_أم_في_بابه: >
  المعجم المؤسسي الحديث الأول للعربية وأوسعها اعتمادًا في التعليم
  والرسمي من الاستعمال؛ أصدره مجمع القاهرة سنة 1380هـ/1960م بعمل
  لجان استمر عقودًا، فجمع بين الفصيح التراثي وما أقره المجمع من
  المولَّد والمعرَّب والمصطلح العلمي الحديث، بترتيب هجائي ميسر
  وتعريفات مدرسية واضحة وصور إيضاحية، فكان أول معجم عربي يصنعه
  مجمع لغوي بمنهج معلن للتوليد والإقرار. صار المرجع المعياري في
  المدارس والجامعات والصحافة والقضاء عربيًّا، وعليه تقاس فصاحة
  المستحدث من الألفاظ («أقره الوسيط» حجة معاصرة)، فهو أم المعاجم
  الحديثة الوظيفية وجسر العربية بين تراثها وعصرها.
يغني_عن:
  - المعاجم المدرسية الحديثة (المنجد ونحوه في مقام الاعتماد)
