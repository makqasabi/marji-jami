id: al-qamus-al-muhit
العنوان: القاموس المحيط
المؤلف:
  الاسم: مجد الدين محمد بن يعقوب الفيروزآبادي
  الوفاة_هجري: 817
  الوفاة_ميلادي: 1415
العلم: معاجم اللغة
التصنيف_الفرعي: المعاجم الجامعة المحررة
لماذا_هو_أم_في_بابه: >
  أشهر معجم في تاريخ العربية حتى صار اسمه علمًا على الفن كله — فكل
  معجم عند الناس «قاموس»؛ ضغط الفيروزآبادي مادة ستين ألف مادة في
  حجم لطيف برموز مبتكرة (م للمعروف، ع للموضع، د للبلد) وعبارة
  مكثفة محررة، فجمع بين الإحاطة وخفة المحمل، وتعقب أوهام الجوهري
  مستدركًا. أقبلت عليه الأمة إقبالًا لم يلقه معجم: حفظًا وشرحًا
  وحواشيَ وتدريسًا من المغرب إلى الهند خمسة قرون، وعليه بنى
  الزبيدي تاج العروس شرحًا، وبقي إلى اليوم مرجع الضبط الأول عند
  أهل العلم («قال في القاموس» حجة)، فهو أم المعاجم المحررة
  المتداولة بلا منازع.
يغني_عن:
  - العباب للصغاني والمحكم (في مقام الكشف المحرر؛ وقد لخصهما)
يُقرأ_قبله:
  - مختار الصحاح أو المعجم الوسيط
أفضل_الطبعات:
  - المحقق_أو_المعتني: مكتب تحقيق التراث بمؤسسة الرسالة بإشراف محمد نعيم العرقسوسي
    الدار: مؤسسة الرسالة، بيروت
    السنة: 1426هـ/2005م (الطبعة الثامنة)
    المجلدات: 1
    ملاحظة: الطبعة المحققة المعتمدة المتداولة
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: [الباحث العربي]
الشروح_والمختصرات_والذيول:
  - تاج العروس للزبيدي (شرحه الأعظم)
  - حواشٍ كثيرة (كحاشية ابن الطيب الفاسي)
مستوى_القارئ: متوسط
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  إيجازه الشديد ورموزه يوقعان غير المتمرس في الغلط، وتعقباته على
  الجوهري فيها ما رُدّ عليه فيه (انتصر للجوهري جماعة)؛ وترتيبه
  على القافية يحتاج تعودًا.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - طبعة مؤسسة الرسالة
آخر_تحديث: 2026-06-12
