id: al-muhkam-ibn-sida
العنوان: المحكم والمحيط الأعظم
المؤلف:
  الاسم: أبو الحسن علي بن إسماعيل بن سيده المرسي
  الوفاة_هجري: 458
  الوفاة_ميلادي: 1066
العلم: معاجم اللغة
التصنيف_الفرعي: المعاجم الموسوعية الجامعة
لماذا_هو_أم_في_بابه: >
  أضخم معاجم العربية قبل اللسان وأوسعها استيعابًا للمادة؛ جمع ابن
  سيده — إمام الأندلس اللغوي الضرير الذي كان آية في الحفظ — كلام
  العرب جمعًا حاول به الإحاطة، على نظام التقليبات، مع عناية فريدة
  بالدقائق: الفروق والمتضادات وتحرير الصيغ، حتى عدّه أهل الفن أجمع
  ما صُنف قبل لسان العرب الذي جعله ابن منظور ثاني أصوله الخمسة.
  وله مع المحكم «المخصص» — معجم المعاني الموضوعي الأكبر — فكمل
  بكتابيه جناحا المعجمية: الألفاظ والمعاني. يبقى المحكم عمدة
  الباحث في استقصاء مادة بتمام فروعها وضبطها، ومصدر توثيق لا غنى
  عنه لما تفرد به عن المشارقة.
يغني_عن:
  - الجمع بين معاجم التقليبات قبله في مقام الاستقصاء
