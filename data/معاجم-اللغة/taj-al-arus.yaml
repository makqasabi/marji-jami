id: taj-al-arus
العنوان: تاج العروس من جواهر القاموس
المؤلف:
  الاسم: محمد مرتضى الحسيني الزَّبيدي
  الوفاة_هجري: 1205
  الوفاة_ميلادي: 1790
العلم: معاجم اللغة
التصنيف_الفرعي: المعاجم الجامعة الكبرى (خاتمة التراث)
لماذا_هو_أم_في_بابه: >
  أضخم معاجم العربية على الإطلاق وخاتمة المعجمية التراثية؛ شرح
  الزبيدي القاموسَ المحيط ففك رموزه وتعقب أوهامه، ثم أفرغ فيه
  خلاصة مئة وعشرين مصدرًا لغويًّا — استوعب اللسان والمحكم والتهذيب
  والعباب وما لا يحصى من الرسائل — وزاد عليها لغة عصره ومسموعه،
  فبلغ نحو مئة وعشرين ألف مادة في أربعين مجلدًا. هو المحطة
  الأخيرة في توثيق أي مفردة: ما لم تجده في التاج فعزيز أن تجده
  مدونًا، ولهذا اعتمدته المعاجم التاريخية والمجامع والمستشرقون
  (معجم لين بني عليه أساسًا) مرجعًا أعلى، وطبعته الكويتية المحققة
  من مفاخر التحقيق العربي الحديث، فهو تاج الفن واسمًا ومسمى.
يغني_عن:
  - الرجوع المتفرق إلى عشرات المعاجم والرسائل التي استوعبها
يُقرأ_قبله:
  - القاموس المحيط (وهو أصله)
أفضل_الطبعات:
  - المحقق_أو_المعتني: مجموعة من المحققين (عبد الستار فراج وآخرون)
    الدار: وزارة الإرشاد ثم وزارة الإعلام (التراث العربي)، الكويت
    السنة: 1385–1422هـ/1965–2001م
    المجلدات: 40
    ملاحظة: الطبعة المحققة المعتمدة التي استغرقت 36 سنة
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: [الباحث العربي]
الشروح_والمختصرات_والذيول: []
مستوى_القارئ: متخصص
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  حجمه يجعله معجم بحث لا قراءة، وترتيبه على القافية تبعًا لأصله؛
  وفي نقوله الموسوعية ما يحتاج مراجعة على أصوله عند التدقيق
  العالي.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - الطبعة الكويتية
آخر_تحديث: 2026-06-12
