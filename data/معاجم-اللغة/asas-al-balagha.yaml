id: asas-al-balagha
العنوان: أساس البلاغة
المؤلف:
  الاسم: جار الله محمود بن عمر الزمخشري
  الوفاة_هجري: 538
  الوفاة_ميلادي: 1144
العلم: معاجم اللغة
التصنيف_الفرعي: معاجم الاستعمال والمجاز
لماذا_هو_أم_في_بابه: >
  أول معجم للاستعمال البليغ وفصلِ الحقيقة عن المجاز، ولا نظير له
  في بابه إلى اليوم؛ لم يكتف الزمخشري بشرح المفردة بل أورد
  تراكيبها الحية كما تجري على ألسنة الفصحاء — «أساس البلاغة» أن
  تعرف كيف يُستعمل اللفظ لا ما معناه فحسب — ثم ميّز المعاني
  المجازية بقوله «ومن المجاز» فصار أول رصد منهجي للمجاز في المعجم
  العربي. وهو مع ذلك أول الأمهات التزامًا بالترتيب الهجائي على
  أوائل الكلمات المستقر اليوم. فالكاتب والمترجم والأديب يجدون فيه
  ما لا يجدونه في معاجم الشرح: اللفظ في سياقه الحي، ولهذا بقي
  تسعة قرون عدة المنشئين وأم معاجم الاستعمال.
يغني_عن:
  - معاجم التراكيب والمتلازمات القديمة (لم يصنف غيره في بابه)
