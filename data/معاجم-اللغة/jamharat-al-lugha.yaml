  الوفاة_ميلادي: 933
العلم: معاجم اللغة
التصنيف_الفرعي: المعاجم المؤسسة
لماذا_هو_أم_في_بابه: >
  ثاني أمهات المعاجم تأليفًا وأول من رتب على الأبنية مع تيسير
  الترتيب الهجائي داخلها؛ جمع ابن دريد — شيخ لغويي البصرة وراوية
  أشعار العرب — جمهور كلام العرب الفصيح وميّز مستعمله من نادره،
  بمادة غزيرة من أشعار العرب وأنسابها وأيامها لا توجد عند الخليل،
  فصار المعجم الثاني الذي لا بد منه لتوثيق المفردة في القرون
  الأولى. اعتمده أصحاب المعاجم بعده وأفادوا من شواهده، وعدّه
  الدارسون حلقة الوصل بين نظام الخليل الصوتي والترتيب الهجائي
  الذي استقر عليه الفن، ولتحقيق بعلبكي الحديث صار متاحًا محررًا
  ميسور الكشف، فثبتت مرجعيته للباحث المعاصر في عمدة معاجم
  الاحتجاج.
