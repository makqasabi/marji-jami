id: kitab-al-ayn
العنوان: كتاب العين
المؤلف:
  الاسم: الخليل بن أحمد الفراهيدي
  الوفاة_هجري: 170
  الوفاة_ميلادي: 786
العلم: معاجم اللغة
التصنيف_الفرعي: المعاجم المؤسسة
لماذا_هو_أم_في_بابه: >
  أول معجم في تاريخ العربية — بل من أوائل معاجم اللغات قاطبة —
  وأبو هذا الفن كله؛ ابتكر الخليل — عبقري العربية وواضع العروض —
  نظام التقليبات الصوتية: رتب الحروف على مخارجها من أقصى الحلق
  (العين) وقلّب كل مادة على وجوهها ليحصر كلام العرب حصرًا رياضيًّا
  مستعملِه ومهمَلِه، وهي فكرة سبقت عصرها بقرون. كل معجم عربي بعده
  مدين له: التهذيب والمحكم بنيا على نظامه، والبقية على مادته،
  وفيه من فصيح اللغة المسموع في القرن الثاني ما يجعله وثيقة لغوية
  لا تعوض. فهو أم المعاجم بالمعنى الحرفي: منه ولد الفن، وإليه
  يرجع تاريخ كل مادة لغوية.
يغني_عن: []
يُقرأ_قبله:
  - مدخل في المعجمية العربية (لفهم نظام التقليبات)
أفضل_الطبعات:
