    الدار: دار الرشيد، بغداد (وزارة الثقافة العراقية)، ومصورات دار ومكتبة الهلال، بيروت
    السنة: 1980–1985م
    المجلدات: 8
    ملاحظة: التحقيق الكامل المعتمد
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: [الباحث العربي]
الشروح_والمختصرات_والذيول: []
مستوى_القارئ: متخصص
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  في نسبة تمام الكتاب للخليل خلاف قديم — والمحقَّق أن أصله له
  وتلميذه الليث بن المظفر قام عليه — وفيه تصحيف ورثته النسخ؛
  ونظام التقليبات يشق على غير المتمرس فلا يصلح معجم كشف يومي.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - طبعة المخزومي والسامرائي
  - مقدمة تهذيب اللغة (مسألة النسبة)
