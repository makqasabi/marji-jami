id: tahafut-al-falasifa
العنوان: تهافت الفلاسفة
المؤلف:
  الاسم: أبو حامد محمد بن محمد الغزالي
  الوفاة_هجري: 505
  الوفاة_ميلادي: 1111
العلم: الفلسفة والمنطق
التصنيف_الفرعي: نقد الفلسفة
لماذا_هو_أم_في_بابه: >
  أخطر كتاب نقدي في تاريخ الفلسفة الإسلامية والحدث الذي غيّر
  مجراها؛ هاجم الغزالي — بعد أن أتقن الفلسفة حتى لخصها في مقاصد
  الفلاسفة — عشرين مسألة من إلهيات الفلاسفة بسلاحهم نفسه: البرهان
  والمنطق، مبينًا تهافت أدلتهم في قدم العالم وعلم الله بالجزئيات
  وإنكار المعاد الجسماني، وكفّرهم في الثلاث الأخيرة. زلزل الكتاب
  مكانة الفلسفة المشائية في المشرق حتى عُدّ سبب أفولها، واستدعى
  رد ابن رشد في تهافت التهافت فولدت أعظم مناظرة فكرية في تاريخ
  الإسلام، ودرسه الغرب بوصفه نصًّا مفصليًّا في تاريخ العقل. فهو
  أم النقد الفلسفي الداخلي ولا يُفهم مسار الفلسفة الإسلامية
  بدونه.
يغني_عن:
  - الردود الكلامية المتفرقة على الفلاسفة قبله
يُقرأ_قبله:
  - مقاصد الفلاسفة للغزالي (عرضه المحايد لما سينقضه)
أفضل_الطبعات:
  - المحقق_أو_المعتني: سليمان دنيا
    الدار: دار المعارف، القاهرة (ذخائر العرب)
    السنة: 1392هـ/1972م (الطبعة السادسة) وما حولها
    المجلدات: 1
    ملاحظة: النشرة المعتمدة المتداولة
  - المحقق_أو_المعتني: موريس بويج
    الدار: المطبعة الكاثوليكية (دار المشرق)، بيروت
    السنة: 1927م
    المجلدات: 1
    ملاحظة: النشرة النقدية التي عليها الدراسات الغربية
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: []
الشروح_والمختصرات_والذيول:
  - تهافت التهافت لابن رشد (الرد عليه)
مستوى_القارئ: متخصص
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  ناقش الفلاسفة بأدوات الكلام الأشعري فاعترض ابن رشد على فهمه
  لمذاهبهم في مواضع، وأخذ عليه ابن تيمية بقاءه داخل الأطر
  الكلامية مع ثنائه على مقصده؛ وتكفيره للمسائل الثلاث من أشهر
  قضايا الفكر الإسلامي المتنازَع تحريرها.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - نشرة سليمان دنيا
