id: al-radd-ala-al-mantiqiyyin
العنوان: الرد على المنطقيين (نصيحة أهل الإيمان في الرد على منطق اليونان)
المؤلف:
  الاسم: تقي الدين أحمد بن عبد الحليم ابن تيمية
  الوفاة_هجري: 728
  الوفاة_ميلادي: 1328
العلم: الفلسفة والمنطق
التصنيف_الفرعي: نقد المنطق
لماذا_هو_أم_في_بابه: >
  أعمق نقد للمنطق الأرسطي في التراث الإنساني قبل العصر الحديث
  بشهادة دارسين شرقًا وغربًا؛ هاجم ابن تيمية أساسي المنطق — الحد
  بدعوى إفادته التصورَ، والقياس الشمولي بدعوى إفادته التصديقَ
  اليقيني — فبيّن أن الحدود لا تفيد تصور الحقائق وأن القياس
  المنطقي لا ينتج علمًا جديدًا لأن نتيجته مضمرة في مقدماته،
  وقدّم بديلًا تجريبيًّا استقرائيًّا حتى قارن باحثون معاصرون
  نقدَه بنقود المناطقة المحدثين (ودرسه حلاق وغيره بهذا الوصف).
  فهو الجناح النقدي الذي لا تكتمل مكتبة المنطق العربية بدونه:
  المتون تعلّم الصناعة وهذا يحاكمها، ولا نظير له في بابه أصلًا.
يغني_عن:
  - نقوض المنطق المختصرة (كجهد القريحة الذي اختصره منه السيوطي)
يُقرأ_قبله:
  - متن منطقي (ليفهم ما يُنقد)
أفضل_الطبعات:
  - المحقق_أو_المعتني: عبد الصمد شرف الدين الكتبي (عناية)
    الدار: المطبعة القيمة، بومباي (الهند)
    السنة: 1368هـ/1949م
    المجلدات: 1
    ملاحظة: النشرة الأم المعتمدة وعنها المصورات (دار المعرفة وغيرها)
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: []
الشروح_والمختصرات_والذيول:
  - جهد القريحة في تجريد النصيحة للسيوطي (مختصره)
مستوى_القارئ: متخصص
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  كتاب استطرادي طويل النفس صعب على غير المتمرس بالمنطق وكلام ابن
  تيمية معًا، وخصومه من المتكلمين والمناطقة لهم مدافعات عن
  الصناعة معروفة؛ وهو بحاجة إلى تحقيق نقدي حديث.
