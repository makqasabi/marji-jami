id: ara-ahl-al-madina-al-fadila
العنوان: آراء أهل المدينة الفاضلة
المؤلف:
  الاسم: أبو نصر محمد بن محمد الفارابي
  الوفاة_هجري: 339
  الوفاة_ميلادي: 950
العلم: الفلسفة والمنطق
التصنيف_الفرعي: الفلسفة السياسية والميتافيزيقا
لماذا_هو_أم_في_بابه: >
  أنضج نص في الفلسفة السياسية الإسلامية وعمدة «المعلم الثاني»؛
  بنى فيه الفارابي — الذي انتهت إليه رئاسة الفلسفة والمنطق حتى
  لُقب بالمعلم الثاني بعد أرسطو — نسقه الكامل: من واجب الوجود
  وفيض العقول إلى النفس والنبوة، ثم نظريته الخالدة في المدينة
  الفاضلة ورئيسها وأضدادها من المدن الجاهلة والفاسقة، فقدم أول
  يوتوبيا فلسفية إسلامية تصل ميتافيزيقا اليونان بالنبوة
  والشريعة. صار الكتاب مرجع الفلسفة السياسية الإسلامية الأول:
  عليه تُبنى دراساتها قاطبة شرقًا وغربًا، ومنه استمد ابن سينا
  وابن رشد وابن خلدون في العمران، فهو أم بابه ووثيقة النسق
  الفارابي الذي حكم الفلسفة الإسلامية قرونًا.
يغني_عن:
  - السياسة المدنية للفارابي (قسيمه؛ يقاربه مضمونًا)
يُقرأ_قبله:
  - إحصاء العلوم للفارابي (خريطته للعلوم)
أفضل_الطبعات:
  - المحقق_أو_المعتني: ألبير نصري نادر
    الدار: دار المشرق، بيروت
    السنة: 1986م (الطبعة الثانية) وما بعدها
    المجلدات: 1
    ملاحظة: النشرة المعتمدة في الدرس الجامعي
التوافر_الرقمي:
  المكتبة_الشاملة: لا
  منصات_أخرى: [نسخ رقمية متداولة]
الشروح_والمختصرات_والذيول: []
مستوى_القارئ: متخصص
نوع_المرجعية: علمية_تراثية_حضارية
ملاحظات_نقدية: >
  يدخل لمرجعيته التاريخية الحضارية؛ ونظرية الفيض فيه ومقاربته
  للنبوة بالمخيلة مما رده عليه الغزالي وأهل السنة ردًّا مبسوطًا
  (التهافت وغيره)، فيقرأ نصًّا فلسفيًّا مرجعيًّا لا تقريرًا
  عقديًّا.
حالة_التوثيق: موثّق
