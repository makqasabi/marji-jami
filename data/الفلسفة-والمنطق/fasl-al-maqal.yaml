id: fasl-al-maqal
العنوان: فصل المقال فيما بين الحكمة والشريعة من الاتصال
المؤلف:
  الاسم: أبو الوليد محمد بن أحمد بن رشد الحفيد
  الوفاة_هجري: 595
  الوفاة_ميلادي: 1198
العلم: الفلسفة والمنطق
التصنيف_الفرعي: العلاقة بين الفلسفة والشريعة
لماذا_هو_أم_في_بابه: >
  أشهر نص في قضية العقل والنقل كتبه فيلسوف فقيه بصيغة فتوى؛ عالج
  ابن رشد — وهو قاضي قضاة قرطبة المالكي وصاحب بداية المجتهد —
  سؤالَ حكم النظر الفلسفي شرعًا، فقرر وجوبه على أهله بمقتضى الأمر
  القرآني بالاعتبار، ووضع قانونه الشهير في التأويل: الحق لا يضاد
  الحق، فإن عارض ظاهرُ النص البرهانَ أُوّل الظاهر بقانون لسان
  العرب، مع تحريم إذاعة التأويل لغير أهله. صار الرسالة الأكثر
  قراءة وترجمة ودرسًا في الفكر العربي الحديث كله — عليها بنيت
  مشاريع التنوير العربية ونقوضها — فهي أم بابها: وثيقة الموقف
  الفلسفي من الشريعة بقلم أعظم من جمع الصفتين.
يغني_عن:
  - الكشف عن مناهج الأدلة لابن رشد (قسيمها في المقصد)
يُقرأ_قبله:
  - تهافت الفلاسفة (للسياق الذي كتبت فيه)
