  منصات_أخرى: [نسخ رقمية كثيرة]
الشروح_والمختصرات_والذيول:
  - دراسات معاصرة كثيرة جدًّا (الجابري وغيره)
مستوى_القارئ: متوسط/متخصص
نوع_المرجعية: علمية_تراثية_حضارية
ملاحظات_نقدية: >
  يدخل لمرجعيته التاريخية؛ وقانونه في تقديم البرهان وتأويل النص
  هو عين «القانون الكلي» الذي نقضه ابن تيمية في درء التعارض،
  فالكتابان يقرآن متقابلين؛ ويُساء توظيفه حداثيًّا خارج سياقه
  كثيرًا.
