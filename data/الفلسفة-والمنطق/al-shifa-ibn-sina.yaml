id: al-shifa-ibn-sina
العنوان: الشفاء
المؤلف:
  الاسم: أبو علي الحسين بن عبد الله ابن سينا (الشيخ الرئيس)
  الوفاة_هجري: 428
  الوفاة_ميلادي: 1037
العلم: الفلسفة والمنطق
التصنيف_الفرعي: الموسوعات الفلسفية الجامعة
لماذا_هو_أم_في_بابه: >
  أضخم موسوعة فلسفية كتبها عقل واحد في التاريخ القديم والوسيط
  كله؛ استوعب ابن سينا فيها الفلسفة بأجمعها: المنطق بأقسامه
  التسعة، والطبيعيات (وفيها النفس والمعادن والآثار العلوية)،
  والرياضيات بفروعها الأربعة، ثم الإلهيات التي هي ذروة النسق
  السينوي وأنضج ميتافيزيقا وسيطة بإطلاق. حكم الكتاب الدرسَ
  الفلسفي شرقًا وغربًا قرونًا: تُرجم للاتينية فصنع المدرسية
  الأوروبية (أثره في توما الأكويني مركزي)، وحوله دارت شروح
  الشرق وانتقادات الغزالي وابن تيمية، فما من فلسفة إسلامية بعده
  إلا وهي حوار معه. فهو أم الفلسفة الإسلامية النسقية بلا منازع
  ونصها الأعظم.
يغني_عن:
  - النجاة لابن سينا (مختصره)
  - متون المشائين الوسيطة (تفرعت عنه)
يُقرأ_قبله:
  - الإشارات والتنبيهات بشرحها (الأيسر مدخلًا لنسقه)
أفضل_الطبعات:
  - المحقق_أو_المعتني: لجنة بإشراف إبراهيم مدكور (الأب قنواتي وسعيد زايد وآخرون)
    الدار: الهيئة المصرية العامة للكتاب (نشرة تصدير وزارة المعارف)، القاهرة
    السنة: 1380–1403هـ/1960–1983م (صدرت أقسامه تباعًا)
    المجلدات: نحو 10 أقسام كبرى (22 جزءًا)
    ملاحظة: النشرة النقدية الكاملة المعتمدة عالميًّا (نشرة القاهرة)
التوافر_الرقمي:
  المكتبة_الشاملة: لا
  منصات_أخرى: [نسخ رقمية متداولة في المكتبات البحثية]
الشروح_والمختصرات_والذيول:
  - النجاة وعيون الحكمة (مختصراته)
مستوى_القارئ: متخصص
نوع_المرجعية: علمية_تراثية_حضارية
ملاحظات_نقدية: >
  يدخل لمرجعيته التاريخية الحضارية بوصفه قمة الفلسفة العربية لا
  مذهبًا معتمدًا؛ ومسائله الكبرى (قدم العالم، علم الله
  بالجزئيات، المعاد) هي التي كفّر الغزالي الفلاسفة بها في
  التهافت وردّها أهل السنة، فالقراءة فيه قراءة دارس محصِّن لا
  متلقٍّ.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - نشرة القاهرة بإشراف مدكور
آخر_تحديث: 2026-06-12
