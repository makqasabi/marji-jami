id: rasail-al-kindi
العنوان: رسائل الكندي الفلسفية
المؤلف:
  الاسم: أبو يوسف يعقوب بن إسحاق الكندي
  الوفاة_هجري: 256
  الوفاة_ميلادي: 873
العلم: الفلسفة والمنطق
التصنيف_الفرعي: النصوص المؤسسة
لماذا_هو_أم_في_بابه: >
  نصوص «فيلسوف العرب» الأول الذي به دخلت الفلسفة لسانَ العربية؛
  فالكندي أول من تفلسف بالعربية أصالة لا ترجمة، ورسائله — في
  الفلسفة الأولى وحدود الأشياء ورسومها والعقل ودفع الأحزان —
  أسست المصطلح الفلسفي العربي نفسه وافتتحت المشروع الذي ورثه
  الفارابي وابن سينا. وفيها وثيقة منهجية خالدة: قوله بوجوب اقتناء
  الحق من أي جنس أتى «وإن أتى من الأجناس القاصية عنا»، مع سعيه
  للتوفيق بين الفلسفة والوحي. فهي شهادة ميلاد الفلسفة الإسلامية
  ووثيقتها الأولى التي لا يبدأ تاريخ الفن إلا بها، ونشرة أبو
  ريدة جمعت ما وصل منها محققًا.
يغني_عن:
  - تتبع رسائله المتفرقة في المجاميع
يُقرأ_قبله:
  - مدخل معاصر لتاريخ الفلسفة الإسلامية
أفضل_الطبعات:
  - المحقق_أو_المعتني: محمد عبد الهادي أبو ريدة
    الدار: دار الفكر العربي، القاهرة
    السنة: 1369–1372هـ/1950–1953م
    المجلدات: 2 (جزآن)
    ملاحظة: النشرة الجامعة المعتمدة وعنها المصورات
التوافر_الرقمي:
  المكتبة_الشاملة: لا
  منصات_أخرى: [نسخ رقمية متداولة في المكتبات البحثية]
الشروح_والمختصرات_والذيول: []
مستوى_القارئ: متخصص
نوع_المرجعية: علمية_تراثية_حضارية
ملاحظات_نقدية: >
  تدخل لمرجعيتها التاريخية الحضارية بوصفها فاتحة الفلسفة العربية
  لا بوصفها مذهبًا يعتمد؛ وفي مسائلها الكلامية ما خالف فيه
  الكندي أهلَ السنة وما خالف فيه الفلاسفةَ أنفسهم (كقوله بحدوث
  العالم)، وأكثر تراثه مفقود فالنشرة تمثل الباقي فحسب.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - نشرة أبو ريدة
  - الفهرست لابن النديم (حصر مؤلفاته)
آخر_تحديث: 2026-06-12
