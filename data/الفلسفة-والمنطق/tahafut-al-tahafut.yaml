id: tahafut-al-tahafut
العنوان: تهافت التهافت
المؤلف:
  الاسم: أبو الوليد محمد بن أحمد بن رشد الحفيد
  الوفاة_هجري: 595
  الوفاة_ميلادي: 1198
العلم: الفلسفة والمنطق
التصنيف_الفرعي: الجدل الفلسفي الأعلى
لماذا_هو_أم_في_بابه: >
  الجواب الفلسفي الأعظم في تاريخ الإسلام وذروة المناظرة العقلية
  العربية؛ تعقب ابن رشد — شارح أرسطو الأكبر وقاضي قرطبة — كتابَ
  الغزالي مسألةً مسألة: ينقل نصه ثم ينقضه، محاكمًا الطرفين معًا
  — فهو يخطّئ ابن سينا أحيانًا ويرى الغزالي إنما هدم سينويةً لا
  أرسطية خالصة — فقدّم أنضج دفاع عن العقلانية الأرسطية في لسان
  العربية. تُرجم للاتينية والعبرية فصار من أنفذ النصوص في الفكر
  الأوروبي الوسيط، وبه مع التهافت الأول تكتمل أعظم مساجلة فكرية
  عربية: لا يقرأ أحدهما بلا الآخر، ولا يُدرس الصراع بين الفلسفة
  والكلام في أي جامعة إلا بهما، فهو أم الجدل الفلسفي وقمته.
يغني_عن:
  - الردود الرشدية المتفرقة على المتكلمين
يُقرأ_قبله:
  - تهافت الفلاسفة (لا يفهم بدونه أصلًا)
أفضل_الطبعات:
  - المحقق_أو_المعتني: سليمان دنيا
    الدار: دار المعارف، القاهرة (ذخائر العرب)
    السنة: 1388هـ/1968م وما بعدها
    المجلدات: 2
    ملاحظة: النشرة المتداولة في الدرس العربي
  - المحقق_أو_المعتني: موريس بويج
    الدار: المطبعة الكاثوليكية (دار المشرق)، بيروت
    السنة: 1930م
    المجلدات: 1
    ملاحظة: النشرة النقدية المعتمدة في الدراسات
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: []
الشروح_والمختصرات_والذيول: []
مستوى_القارئ: متخصص
نوع_المرجعية: علمية_تراثية_حضارية
ملاحظات_نقدية: >
  يدخل لمرجعيته التاريخية الحضارية؛ وانتصاره لقِدَم العالم
  والمسائل المنقودة هو عين ما رده عليه أهل السنة (ابن تيمية ناقش
  الكتابين معًا في الدرء)، فيقرأ وثيقةَ مناظرة لا مقررَ اعتقاد.
