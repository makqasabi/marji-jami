    الدار: دار المشرق، بيروت
    السنة: 1993م وما حولها (طبعات متكررة)
    المجلدات: 1
    ملاحظة: النشرة المتداولة المعتمدة
  - المحقق_أو_المعتني: ليون غوتييه
    الدار: الجزائر ثم بيروت (النشرة النقدية مع ترجمة فرنسية)
    السنة: 1936م (الطبعة الثانية)
    المجلدات: 1
    ملاحظة: النشرة النقدية الأم
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: [نسخ رقمية كثيرة, مؤسسة هنداوي]
الشروح_والمختصرات_والذيول: []
مستوى_القارئ: مبتدئ/متوسط
نوع_المرجعية: علمية_تراثية_حضارية
ملاحظات_نقدية: >
  يدخل لمرجعيته الحضارية الأدبية؛ وأطروحته في بلوغ العقل وحده
  المعرفةَ الإلهية ناقشها المتكلمون وأهل الأثر (مقام الوحي
  والفطرة)، وهي قصة رمزية لا تقريرًا عقديًّا.
