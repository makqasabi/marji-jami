id: hayy-ibn-yaqzan
العنوان: حي بن يقظان
المؤلف:
  الاسم: أبو بكر محمد بن عبد الملك بن طفيل القيسي
  الوفاة_هجري: 581
  الوفاة_ميلادي: 1185
العلم: الفلسفة والمنطق
التصنيف_الفرعي: القصة الفلسفية
لماذا_هو_أم_في_بابه: >
  أشهر نص أدبي فلسفي في تراث الإسلام وأبعده أثرًا في الآداب
  العالمية؛ صاغ ابن طفيل الفلسفة قصةً: طفل ينشأ وحيدًا في جزيرة
  فيرتقي بالملاحظة والعقل المجرد من معرفة المحسوس إلى إدراك واجب
  الوجود، فإذا لقي أهل الشريعة وجد الحقيقتين متطابقتين. فقدّم
  أطروحة اكتفاء العقل الفطري وتصالُحه مع الوحي في أمتع قالب،
  وترجم مبكرًا للعبرية واللاتينية والإنجليزية فأثّر في فلسفة
  التنوير الأوروبي وروايته (روبنسون كروزو في ذمته عند الدارسين).
  فهو أم القصة الفلسفية عالميًّا والنص العربي الفلسفي الأكثر
  قراءة بإطلاق، ولا تكتمل مكتبة الفن بدونه.
يغني_عن:
  - رسالتي ابن سينا والسهروردي المسماتين باسمه (في مقام الشهرة والأثر)
يُقرأ_قبله: []
