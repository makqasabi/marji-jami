id: al-isharat-wal-tanbihat
العنوان: الإشارات والتنبيهات (مع شرح نصير الدين الطوسي)
المؤلف:
  الاسم: أبو علي الحسين بن عبد الله ابن سينا (الشيخ الرئيس)
  الوفاة_هجري: 428
  الوفاة_ميلادي: 1037
العلم: الفلسفة والمنطق
التصنيف_الفرعي: متون الدرس الفلسفي
لماذا_هو_أم_في_بابه: >
  آخر مصنفات ابن سينا الكبرى وأنضجها صياغة، ومتن الدرس الفلسفي
  الشرقي قرونًا؛ كثّف فيه الشيخ الرئيس نسقه كله — منطقًا
  وطبيعيات وإلهيات وأحوال العارفين — إشاراتٍ مضغوطة تستثير
  الفكر لا تلقمه، فصار الكتاب الذي عليه تخرّج المتفلسفة
  والمتكلمون معًا: شرحه الرازي شرح «الجرح» وردّ عليه الطوسي شرح
  «التعديل»، ثم تتابعت الشروح والمحاكمات (للقطب الرازي) حتى
  صارت المكتبة الإشارية ديوان الفلسفة المتأخرة بأسرها. ونمطه
  الأخير في «مقامات العارفين» أنفس نص فلسفي في التصوف النظري.
  فمن أراد ابن سينا الذي قرأه الشرق فعلًا فهذا كتابه، ومدخل
  نسقه المعتمد قبل الشفاء.
يغني_عن:
  - النجاة (في مقام المدخل لنسق ابن سينا)
يُقرأ_قبله:
  - مدخل منطقي (كمعيار العلم)
أفضل_الطبعات:
  - المحقق_أو_المعتني: سليمان دنيا (ومعه شرح نصير الدين الطوسي)
    الدار: دار المعارف، القاهرة (ذخائر العرب)
    السنة: 1377هـ/1957م وما بعدها (الطبعة الثالثة متداولة)
    المجلدات: 4
    ملاحظة: النشرة المعتمدة في الدرس بشرح الطوسي
التوافر_الرقمي:
  المكتبة_الشاملة: لا
  منصات_أخرى: [نسخ رقمية متداولة]
الشروح_والمختصرات_والذيول:
  - شرح الرازي وشرح الطوسي والمحاكمات للقطب الرازي
مستوى_القارئ: متخصص
نوع_المرجعية: علمية_تراثية_حضارية
ملاحظات_نقدية: >
  يدخل لمرجعيته التاريخية الحضارية؛ إيجازه الشديد لا يفك بغير
  الشروح، ومسائله العقدية عليها اعتراضات أهل السنة المبسوطة في
  كتب الردود (وابن تيمية تعقب شراحه في الدرء وغيره).
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - نشرة سليمان دنيا
آخر_تحديث: 2026-06-12
