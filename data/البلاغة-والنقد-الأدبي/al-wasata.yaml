id: al-wasata
العنوان: الوساطة بين المتنبي وخصومه
المؤلف:
  الاسم: القاضي علي بن عبد العزيز الجرجاني
  الوفاة_هجري: 392
  الوفاة_ميلادي: 1002
العلم: البلاغة والنقد الأدبي
التصنيف_الفرعي: النقد التطبيقي المتقدم
لماذا_هو_أم_في_بابه: >
  ذروة النقد التطبيقي العربي القديم ونموذجه الذي لم يُتجاوز؛ توسط
  القاضي الجرجاني في أعظم خصومة أدبية عرفها العرب — معركة المتنبي
  — فأنصف بمنهج معلن: الشاعر بشر يحسن ويخطئ، والذوق حكم لا
  العصبية، وقدّم قبل الحكم تأصيلًا في عيوب الشعر وسرقاته ومقاييس
  الموازنة جعل الكتاب مدرسة نقد كاملة لا فصلًا في خصومة. صار مثال
  «الناقد العدل» في التراث: يستشهد به البلاغيون والنقاد قديمًا،
  وتعده الدراسات الحديثة أنضج وثيقة للنقد العربي في عصره الذهبي،
  ومع الموازنة للآمدي جناحي النقد التطبيقي اللذين عليهما تخرج
  الفن، وهو أمتعهما وأعدلهما.
يغني_عن:
  - الموازنة للآمدي (في مقام التمثيل لمنهج الموازنة النقدية)
يُقرأ_قبله:
