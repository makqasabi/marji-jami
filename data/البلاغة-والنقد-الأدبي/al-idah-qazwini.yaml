id: al-idah-qazwini
العنوان: الإيضاح في علوم البلاغة
المؤلف:
  الاسم: جلال الدين محمد بن عبد الرحمن الخطيب القزويني
  الوفاة_هجري: 739
  الوفاة_ميلادي: 1338
العلم: البلاغة والنقد الأدبي
التصنيف_الفرعي: متون الدرس البلاغي المعتمدة
لماذا_هو_أم_في_بابه: >
  المتن الجامع المعتمد لعلوم البلاغة الثلاثة في صورتها المستقرة؛
  فالقزويني — خطيب دمشق وقاضي القضاة — هو الذي حرر قسمة الفن
  النهائية: معانٍ وبيانٌ وبديعٌ، في «تلخيص المفتاح» الذي صار متن
  الدرس العالمي، ثم بسطه في الإيضاح شرحًا وتمثيلًا وتكميلًا من
  دلائل عبد القاهر وأسراره، فجمع انضباط السكاكي وروح الجرجاني في
  كتاب وسط. صار الإيضاح عمدة تدريس البلاغة في المعاهد والجامعات
  إلى اليوم، وعليه تخرّج البلاغيون المعاصرون قاطبة، فهو الباب
  المعتمد إلى الفن كله: منه ينزل الطالب إلى المختصرات أو يصعد إلى
  عبد القاهر والمطولات.
يغني_عن:
  - تلخيص المفتاح وشروحه (في مقام الدرس؛ فهو بسطها بقلم صاحب المتن)
يُقرأ_قبله:
  - مختصر مدرسي في البلاغة (كالبلاغة الواضحة)
أفضل_الطبعات:
  - المحقق_أو_المعتني: محمد عبد المنعم خفاجي (شرح وتعليق)
    الدار: دار الجيل، بيروت
    السنة: (الطبعة الثالثة، بلا تاريخ)
    المجلدات: 2 (وتطبع في مجلد)
    ملاحظة: الطبعة المتداولة في الدرس
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: []
الشروح_والمختصرات_والذيول:
  - حواشي الدرس المعاصرة (بغية الإيضاح للصعيدي ونحوها)
مستوى_القارئ: متوسط
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  وارث للقالب السكاكي بما فيه من جفاف التقسيم، وشواهده مكررة
  متوارثة؛ ولذا يقرن بقراءة عبد القاهر لاستعادة روح الفن.
روابط_التحميل:
  - المصدر: المكتبة الشاملة (ت خفاجي)
    الرابط: https://shamela.ws/book/7380
    النوع: حر
حالة_التوثيق: موثّق
مصادر_التوثيق:
