id: al-bayan-wal-tabyin
العنوان: البيان والتبيين
المؤلف:
  الاسم: أبو عثمان عمرو بن بحر الجاحظ
  الوفاة_هجري: 255
  الوفاة_ميلادي: 869
العلم: البلاغة والنقد الأدبي
التصنيف_الفرعي: النصوص المؤسسة
لماذا_هو_أم_في_بابه: >
  الكتاب الذي وُلدت فيه البلاغة العربية؛ جمع الجاحظ — إمام البيان
  وأحد أركان النثر العربي الأربعة — مادة الفصاحة كلها: خطب العرب
  ورسائلها ووصايا البلغاء وكلام الزهاد والأعراب، مع أول نظرات
  نظرية في حد البلاغة ومقام الكلام ومطابقته لمقتضى الحال وعيوب
  النطق. قال فيه ابن خلدون كلمته الشهيرة بعدّه أحد أصول فن الأدب
  الأربعة التي ما سواها تبع لها. فهو ديوان النثر العربي الأول
  ومستودع شواهد البلاغيين جميعًا: ما من كتاب بلاغة أو نقد بعده
  إلا وهو يغترف منه، ولا تُعرف نشأة الفن ولا روح الفصاحة العربية
  إلا منه.
يغني_عن:
  - مجاميع الخطب والرسائل المتقدمة المفقودة (حفظ عيونها)
