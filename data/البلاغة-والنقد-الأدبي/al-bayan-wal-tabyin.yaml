ملاحظات_نقدية: >
  بناؤه استطرادي على طريقة الجاحظ لا ترتيب فيه، فهو كتاب قراءة
  وتذوق لا مرجع كشف؛ وللجاحظ اعتزالياته المبثوثة التي ينتبه لها
  القارئ.
