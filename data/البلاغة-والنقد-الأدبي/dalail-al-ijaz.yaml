id: dalail-al-ijaz
العنوان: دلائل الإعجاز
المؤلف:
  الاسم: أبو بكر عبد القاهر بن عبد الرحمن الجرجاني
  الوفاة_هجري: 471
  الوفاة_ميلادي: 1078
العلم: البلاغة والنقد الأدبي
التصنيف_الفرعي: أمهات النظرية البلاغية
لماذا_هو_أم_في_بابه: >
  أعظم كتاب في البلاغة العربية على الإطلاق والكتاب الذي أسس علم
  المعاني؛ قرر فيه عبد القاهر نظرية النظم الخالدة: ليست الفصاحة
  في اللفظ المفرد ولا المعنى المجرد بل في «توخي معاني النحو» —
  نظم الكلام وتعليق بعضه ببعض — فحلل التقديم والتأخير والحذف
  والفصل والوصل تحليلًا كشف سر الإعجاز القرآني وسبق نظريات
  الأسلوبية الحديثة بثمانية قرون باعتراف الدارسين شرقًا وغربًا.
  كل بلاغة بعده شرح له: السكاكي قنّن نظريته والقزويني لخصها
  وابن عاشور أحياها، وأفاضل المحدثين عدّوه أعبقر نص نظري في تراث
  العربية كله، فهو أم الفن بلا منازع وقمته التي لم تُتجاوز.
يغني_عن:
  - كتب علم المعاني المتأخرة (كلها تقنين لنظريته)
يُقرأ_قبله:
  - الإيضاح للقزويني (للاصطلاح المنظم قبل النظرية الحرة)
أفضل_الطبعات:
  - المحقق_أو_المعتني: محمود محمد شاكر
    الدار: مكتبة الخانجي، القاهرة، ومطبعة المدني
    السنة: 1413هـ/1992م (الطبعة الثالثة)
    المجلدات: 1
    ملاحظة: قراءة شاكر المعتمدة بتعليقاته النفيسة
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: []
الشروح_والمختصرات_والذيول:
  - دراسات معاصرة كثيرة في نظرية النظم
مستوى_القارئ: متوسط/متخصص
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  عرضه استطرادي يدور على الفكرة من وجوه متعددة فيحتاج قارئًا
  صبورًا، وعبد القاهر أشعري المنزع وظف نظريته في مسألة الكلام
  النفسي مما ينتبه له.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - طبعة محمود شاكر
