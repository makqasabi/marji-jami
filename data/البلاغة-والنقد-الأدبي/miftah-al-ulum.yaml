id: miftah-al-ulum
العنوان: مفتاح العلوم
المؤلف:
  الاسم: أبو يعقوب يوسف بن أبي بكر السكاكي
  الوفاة_هجري: 626
  الوفاة_ميلادي: 1229
العلم: البلاغة والنقد الأدبي
التصنيف_الفرعي: تقنين البلاغة المدرسي
لماذا_هو_أم_في_بابه: >
  الكتاب الذي قنّن البلاغة وحوّلها علمًا مدرسيًّا مضبوطًا؛ جمع
  السكاكي علوم العربية في مفتاح واحد — الصرف فالنحو فالبلاغة —
  وقسّم القسم الثالث قسمته الباقية: علم المعاني وعلم البيان (وما
  يتبعهما من البديع)، بحدود منطقية وتعريفات منضبطة صارت هيكل الفن
  النهائي. على قسمه الثالث انبنى الدرس البلاغي كله بعده: تلخيص
  القزويني له هو متن المدارس ثمانية قرون، وشروح التلخيص (السعد
  والسيد) وحواشيها مكتبة كاملة محورها المفتاح. فمن أراد فهم
  البلاغة كما دُرّست فعلًا في الأزهر والزيتونة والهند والعالم
  الإسلامي فأصل ذلك كله هذا الكتاب، وهو أم الطور المدرسي للفن بلا
  منازع.
يغني_عن:
  - المتون البلاغية المدرسية (كلها فروع قسمه الثالث)
يُقرأ_قبله:
  - الإيضاح للقزويني (الأيسر عبارة)
أفضل_الطبعات:
  - المحقق_أو_المعتني: نعيم زرزور (ضبط وتعليق)
    الدار: دار الكتب العلمية، بيروت
    السنة: 1407هـ/1987م (الطبعة الثانية)
    المجلدات: 1
    ملاحظة: الطبعة المتداولة المعتمدة في الدرس
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: []
الشروح_والمختصرات_والذيول:
  - تلخيص المفتاح للقزويني ثم شروحه (المطول والمختصر للتفتازاني)
مستوى_القارئ: متخصص
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  أُخذ عليه تجفيف روح عبد القاهر الذوقية في قوالب منطقية — وهي
  المعركة المشهورة بين أنصار البلاغة الأدبية والبلاغة المدرسية —
  وعبارته جافة مكثفة لغير المتمرس.
