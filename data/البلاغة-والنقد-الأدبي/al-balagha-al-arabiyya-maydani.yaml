id: al-balagha-al-arabiyya-maydani
العنوان: البلاغة العربية — أسسها وعلومها وفنونها
المؤلف:
  الاسم: عبد الرحمن حسن حبنكة الميداني
  الوفاة_هجري: 1425
  الوفاة_ميلادي: 2004
العلم: البلاغة والنقد الأدبي
التصنيف_الفرعي: المراجع الحديثة الجامعة
لماذا_هو_أم_في_بابه: >
  أوسع مرجع معاصر جامع للبلاغة العربية بمنهج أصيل غير مدرسي؛ أعاد
  الميداني — عالم دمشق المربي — بناء الفن كله من نصوصه الأولى:
  عرض علوم المعاني والبيان والبديع بترتيب مبتكر وعبارة عصرية
  واضحة، وأكثرَ من الشواهد القرآنية تحليلًا — وهو مقصده الأول —
  وأضاف فصولًا في الأسس النفسية والفكرية للبلاغة لا توجد في
  المتون، متحررًا من جفاف القوالب المتوارثة من غير قطيعة معها.
  صار منذ صدوره المرجع الجامعي الأول للبلاغة في العالم العربي
  يقدَّم على المختصرات والحواشي، فهو أم المراجع البلاغية الحديثة:
  به يحصّل الدارس الفن كاملًا بلسان العصر قبل الصعود إلى عبد
  القاهر والأمهات.
يغني_عن:
  - المقررات الجامعية البلاغية المعاصرة (في عمومها)
يُقرأ_قبله:
  - البلاغة الواضحة (للمبتدئ المدرسي)
أفضل_الطبعات:
  - المحقق_أو_المعتني: (تأليف معاصر)
    الدار: دار القلم، دمشق، والدار الشامية، بيروت
    السنة: 1416هـ/1996م (الطبعة الأولى)
    المجلدات: 2
    ملاحظة: طبعة دار القلم هي المعتمدة
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: []
الشروح_والمختصرات_والذيول: []
مستوى_القارئ: مبتدئ/متوسط
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  ترتيبه الخاص يخالف المتوارث فيحتاج طالب الامتحانات المدرسية إلى
  موازنته بالمتون، ونفَسه الوعظي التربوي ظاهر في التحليل.
حالة_التوثيق: موثّق
مصادر_التوثيق:
