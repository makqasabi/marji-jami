id: al-umda-ibn-rashiq
العنوان: العمدة في محاسن الشعر وآدابه ونقده
المؤلف:
  الاسم: أبو علي الحسن بن رشيق القيرواني
  الوفاة_هجري: 456
  الوفاة_ميلادي: 1064
العلم: البلاغة والنقد الأدبي
التصنيف_الفرعي: موسوعات النقد الجامعة
لماذا_هو_أم_في_بابه: >
  أجمع كتاب في علم الشعر العربي قاطبة، وسماه ابن خلدون الكتاب الذي
  «انفرد بهذه الصناعة وإعطاء حقها ولم يكتب فيها أحد قبله ولا
  بعده مثله»؛ استوعب ابن رشيق فن الشعر من كل وجوهه: حدّه وأقسامه
  وبواعثه، وأغراضه ومعانيه، وعيوبه وسرقاته، وأعاريضه وقوافيه،
  وطبقات الشعراء وأخبارهم، ملخصًا نقد من قبله (قدامة والآمدي
  والقاضي الجرجاني والمرزوقي) بترتيب موسوعي محكم وذوق شاعر ناقد.
  فصار منذ تأليفه عمدة الفن واسمًا ومسمى: عليه عوّل النقاد
  والبلاغيون بعده، وهو إلى اليوم المدخل الجامع الذي لا يستغني عنه
  دارس للشعرية العربية ونقدها التراثي.
يغني_عن:
  - نقد الشعر لقدامة وعيار الشعر لابن طباطبا (في جملة مادتهما)
