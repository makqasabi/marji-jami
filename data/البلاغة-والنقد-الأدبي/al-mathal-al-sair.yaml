id: al-mathal-al-sair
العنوان: المثل السائر في أدب الكاتب والشاعر
المؤلف:
  الاسم: ضياء الدين نصر الله بن محمد ابن الأثير الجزري
  الوفاة_هجري: 637
  الوفاة_ميلادي: 1239
العلم: البلاغة والنقد الأدبي
التصنيف_الفرعي: بلاغة الإنشاء والنقد التطبيقي
لماذا_هو_أم_في_بابه: >
  أم كتب البلاغة التطبيقية وصناعة الإنشاء؛ كتبه ضياء الدين ابن
  الأثير — كاتب صلاح الدين وأخو المؤرخ والمحدّث — من موقع الممارس
  لا المنظّر: بلاغة تُكتب بها الرسائل وتُحبَّر الخطب، فحلل النصوص
  بذوق صانع وجرأة ناقد لا يهاب قديمًا ولا حديثًا، وعرض السرقات
  والاقتباس وحل المنظوم بأمثلة من صنعته نفسها. أثار الكتاب معارك
  نقدية خلّدته: رد عليه ابن أبي الحديد في «الفلك الدائر» ثم
  السبكي، فصار مع رديه ملف النقد العربي الحي. فهو الجناح التطبيقي
  الذي يكمل نظرية عبد القاهر وقوالب السكاكي، ولا غنى عنه لدارس
  النثر الفني وصناعة الكتابة العربية.
