id: asrar-al-balagha
العنوان: أسرار البلاغة
المؤلف:
  الاسم: أبو بكر عبد القاهر بن عبد الرحمن الجرجاني
  الوفاة_هجري: 471
  الوفاة_ميلادي: 1078
العلم: البلاغة والنقد الأدبي
التصنيف_الفرعي: أمهات النظرية البلاغية
لماذا_هو_أم_في_بابه: >
  الكتاب الذي أسس علم البيان كما أسس قسيمُه «الدلائل» علمَ
  المعاني؛ حلل فيه عبد القاهر التشبيه والتمثيل والاستعارة والمجاز
  والكناية تحليلًا نفسيًّا جماليًّا غار به إلى أعماق لم يبلغها أحد:
  لماذا تؤثر الاستعارة في النفس؟ وما سر حسن التمثيل وقبح التعقيد؟
  فجاوز التقسيم الشكلي إلى تفسير الجمال نفسه، حتى عدّه الدارسون
  المحدثون رائد علم الجمال اللغوي ووضعوه بإزاء كبار منظري
  الاستعارة في النقد العالمي. ومنه استمد السكاكي والقزويني قسم
  البيان كله، فهو مع الدلائل توأما البلاغة العربية اللذان لا تقوم
  نظرية الفن إلا عليهما، وأمتعهما أسلوبًا وأقربهما إلى روح الأدب.
يغني_عن:
  - كتب علم البيان المتأخرة (تقنين لمادته)
يُقرأ_قبله:
  - الإيضاح للقزويني
