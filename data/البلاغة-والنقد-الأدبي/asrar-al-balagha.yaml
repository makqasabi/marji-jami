    الدار: دار المدني، جدة، ومطبعة المدني بالقاهرة
    السنة: 1412هـ/1991م
    المجلدات: 1
    ملاحظة: قراءة شاكر المعتمدة
  - المحقق_أو_المعتني: هلموت ريتر
