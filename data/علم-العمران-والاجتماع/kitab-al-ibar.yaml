id: kitab-al-ibar
العنوان: كتاب العبر وديوان المبتدأ والخبر في أيام العرب والعجم والبربر
المؤلف:
  الاسم: عبد الرحمن بن محمد بن خلدون الحضرمي
  الوفاة_هجري: 808
  الوفاة_ميلادي: 1406
العلم: علم العمران والاجتماع
التصنيف_الفرعي: التطبيق التاريخي للنظرية
لماذا_هو_أم_في_بابه: >
  الجسد التاريخي الذي كُتبت المقدمةُ مقدمةً له، والتطبيق العملي
  لعلم العمران على مادة التاريخ؛ أرّخ ابن خلدون فيه للعرب والعجم
  والبربر وفق نظريته في الدول والعصبيات، وانفرد قسمه المغاربي —
  تاريخ البربر ودول المغرب — بمكانة لا ينازع فيها: فهو المصدر
  الأول والأوثق لتاريخ المغرب الإسلامي الوسيط بإجماع مؤرخيه، إذ
  كتبه عالم عاش دواوينَ تلك الدول وسفاراتها من الداخل. ترجم
  قسم البربر مبكرًا (دي سلان) وقامت عليه المدرسة التاريخية
  المغاربية كلها، فالكتاب أم التاريخ المغاربي والتتمة التي لا
  تنفك عن المقدمة لمن أراد رؤية المنهج الخلدوني يعمل في مادته.
يغني_عن:
  - مصادر تاريخ المغرب والبربر الوسيطة (في جملتها)
يُقرأ_قبله:
  - المقدمة (نظريته أولًا)
أفضل_الطبعات:
  - المحقق_أو_المعتني: خليل شحادة بمراجعة سهيل زكار
    الدار: دار الفكر، بيروت
    السنة: 1408هـ/1988م
    المجلدات: 8 (مع المقدمة والفهارس)
    ملاحظة: الطبعة الكاملة المتداولة التي عليها الإحالات
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: [نسخ رقمية متداولة]
الشروح_والمختصرات_والذيول:
  - التعريف بابن خلدون ورحلته (سيرته الذاتية الملحقة)
مستوى_القارئ: متوسط/متخصص
نوع_المرجعية: علمية_تراثية_حضارية
ملاحظات_نقدية: >
  قسمه المشرقي ناقل ملخص عن مصادره دون تجديد قسمه المغاربي —
  وهي ملاحظة الدارسين المستقرة — والكتاب كله بحاجة إلى تحقيق
  نقدي بمستوى نشرة الشدادي للمقدمة.
روابط_التحميل:
  - المصدر: المكتبة الشاملة (ت خليل شحادة؛ وتشمل المقدمة)
    الرابط: https://shamela.ws/book/12320
    النوع: حر
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - طبعة دار الفكر
آخر_تحديث: 2026-06-13
