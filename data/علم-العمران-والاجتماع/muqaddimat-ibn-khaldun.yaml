id: muqaddimat-ibn-khaldun
العنوان: المقدمة (مقدمة كتاب العبر)
المؤلف:
  الاسم: عبد الرحمن بن محمد بن خلدون الحضرمي
  الوفاة_هجري: 808
  الوفاة_ميلادي: 1406
العلم: علم العمران والاجتماع
التصنيف_الفرعي: النص المؤسس
لماذا_هو_أم_في_بابه: >
  الكتاب الذي وُلد به علم الاجتماع قبل أوروبا بأربعة قرون
  ونصف، وأعظم نص نظري أنتجه العقل العربي بإجماع يكاد يطبق شرقًا
  وغربًا؛ أسس ابن خلدون فيه علمًا أعلن استحداثه — «علم العمران
  البشري» — بقوانينه: العصبية ودورة الدول وأطوارها، وأثر
  الجغرافيا والمعاش في الاجتماع، ونقد الأخبار بميزان طبائع
  العمران (أول منهجية نقد تاريخي مادية)، وفصوله في الصنائع
  والعلوم والاقتصاد (سبق فيها إلى أفكار في الضرائب والقيمة
  والعمل). قال عنه توينبي: «أعظم عمل من نوعه أنتجه أي عقل في أي
  زمان ومكان»، وعليه تقوم كراسي الدراسات الخلدونية في جامعات
  الدنيا، فهو أم العلم بالمعنى المطلق ومفخرة الفكر العربي.
يغني_عن:
  - فلسفات التاريخ الوسيطة (لا نظير له قبله أصلًا)
يُقرأ_قبله: []
