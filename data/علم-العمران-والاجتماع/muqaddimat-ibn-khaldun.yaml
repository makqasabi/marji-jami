    الدار: بيت الفنون والعلوم والآداب، الدار البيضاء (خزانة ابن خلدون)
    السنة: 1426هـ/2005م
    المجلدات: 5 (المقدمة بمجلداتها مع الفهارس)
    ملاحظة: التحقيق النقدي المعتمد اليوم على أوثق الأصول
  - المحقق_أو_المعتني: علي عبد الواحد وافي
    الدار: دار نهضة مصر، القاهرة
    السنة: 1376هـ/1957م وطبعات لاحقة
    المجلدات: 4
    ملاحظة: التحقيق المصري الشهير الذي عليه إحالات الدراسات قبل الشدادي
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: [نسخ رقمية كثيرة جدًّا, مؤسسة هنداوي]
الشروح_والمختصرات_والذيول:
  - دراسات خلدونية لا تحصى (الجابري، طه حسين، روزنتال...)
مستوى_القارئ: متوسط
نوع_المرجعية: علمية_تراثية_حضارية
ملاحظات_نقدية: >
  يدخل لمرجعيته الحضارية بوصفه قمة النظر الاجتماعي التراثي؛
  وفي أحكامه تعميمات أبناء عصره (في الأعراق والحرف) ناقشها
  الدارسون، وموقفه من الفلسفة والكيمياء صارم بميزان عمرانه؛
  وفي نُسَخ المقدمة طبقات تنقيح للمؤلف نفسه تعالجها النشرات
  النقدية.
