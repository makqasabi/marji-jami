id: al-ashbah-ibn-nujaym
العنوان: الأشباه والنظائر على مذهب أبي حنيفة النعمان
المؤلف:
  الاسم: زين الدين بن إبراهيم بن نجيم المصري
  الوفاة_هجري: 970
  الوفاة_ميلادي: 1563
العلم: القواعد الفقهية
التصنيف_الفرعي: قواعد المذاهب (الحنفية)
لماذا_هو_أم_في_بابه: >
  عمدة الحنفية في القواعد الفقهية والأصل الذي بنيت عليه مجلة الأحكام
  العدلية؛ نسج ابن نجيم — صاحب البحر الرائق — على منوال أشباه
  السيوطي فأقام الفن على مذهب أبي حنيفة: ست قواعد كبرى ثم تسع عشرة
  كلية ثم فنون الكتاب السبعة في الفروق والألغاز والحيل والجموع.
  تلقاه الحنفية بالقبول فشرحوه وحشّوه بالعشرات (أشهرها غمز عيون
  البصائر للحموي)، ولما قننت الدولة العثمانية الفقه افتتحت المجلة
  بتسع وتسعين قاعدة جلّها من هذا الكتاب، فدخلت قواعده القوانين
  المدنية في بلاد إسلامية عدة. فهو الجسر بين فقه الحنفية والتقنين
  الحديث، ولا يدرس فن القواعد عند الحنفية إلا به.
يغني_عن:
  - مجاميع قواعد الحنفية قبله (كتأسيس النظر للدبوسي في مقام الدرس)
يُقرأ_قبله:
  - الأشباه والنظائر للسيوطي (قالبه الأصلي)
