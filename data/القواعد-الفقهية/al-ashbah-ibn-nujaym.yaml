نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  فنّا الحيل والألغاز فيه عدّهما بعض أهل العلم مما يُتحفظ عليه،
  وفروعه حنفية خالصة؛ وتعقبه شراحه في مواضع من إطلاقاته.
