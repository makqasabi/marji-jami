id: al-manthur-zarkashi
العنوان: المنثور في القواعد
المؤلف:
  الاسم: بدر الدين محمد بن عبد الله الزركشي
  الوفاة_هجري: 794
  الوفاة_ميلادي: 1392
العلم: القواعد الفقهية
التصنيف_الفرعي: قواعد المذاهب (الشافعية)
لماذا_هو_أم_في_بابه: >
  أول موسوعة قواعد مرتبة على حروف المعجم وأنفع كتب القواعد الشافعية
  المتوسعة؛ جمع الزركشي — جامع علوم عصره — مئات القواعد والضوابط
  الفقهية مرتبة هجائيًّا ترتيبًا ابتكره فسهّل الكشف في فن كان
  منثورًا في بطون الكتب، يذكر القاعدة ومستثنياتها وفروعها وخلاف
  العلماء فيها بعزو دقيق إلى مصادر بعضها مفقود. منه استمد السيوطي
  وابن نجيم وغيرهما، وعليه عوّلت الموسوعات القانونية والفقهية
  المعاصرة في حصر القواعد الشافعية، فهو حلقة الوصل بين قواعد
  المتقدمين المتناثرة وفن القواعد المستقر عند المتأخرين، ولا غنى
  عنه لباحث في التقعيد الفقهي المقارن.
يغني_عن:
  - مجاميع القواعد الشافعية قبله (كقواعد العلائي في جملة المادة)
يُقرأ_قبله:
  - الأشباه والنظائر للسيوطي (أيسر ترتيبًا للمبتدئ)
أفضل_الطبعات:
  - المحقق_أو_المعتني: تيسير فائق أحمد محمود
    الدار: وزارة الأوقاف والشؤون الإسلامية، الكويت
    السنة: 1405هـ/1985م (الطبعة الثانية)
    المجلدات: 3
    ملاحظة: التحقيق المعتمد (أصله رسالة جامعية)
