ملاحظات_نقدية: >
  ترتيبه الهجائي يقطع القواعد المتقاربة موضوعًا عن بعضها، وبعض
  قواعده ضوابط بابٍ لا قواعد كلية — والتمييز بينهما مبحث الفن
  المعروف.
