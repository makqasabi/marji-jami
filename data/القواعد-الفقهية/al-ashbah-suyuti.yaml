id: al-ashbah-suyuti
العنوان: الأشباه والنظائر في قواعد وفروع فقه الشافعية
المؤلف:
  الاسم: جلال الدين عبد الرحمن بن أبي بكر السيوطي
  الوفاة_هجري: 911
  الوفاة_ميلادي: 1505
العلم: القواعد الفقهية
التصنيف_الفرعي: قواعد المذاهب (الشافعية)
لماذا_هو_أم_في_بابه: >
  أشهر كتب القواعد الفقهية وأكثرها تداولًا في الدرس قاطبة؛ رتّب
  السيوطي الفن ترتيبه المستقر الذي صار معيارًا: القواعد الخمس
  الكبرى (الأمور بمقاصدها، اليقين لا يزول بالشك، المشقة تجلب
  التيسير، الضرر يزال، العادة محكمة) ثم الأربعون القاعدة الكلية ثم
  القواعد المختلف فيها ثم الفن السابع في النظائر، ملخصًا قواعد
  العلائي والسبكي والزركشي بعبارة سهلة وفروع حاضرة. عليه قرأ
  الشافعية الفن خمسة قرون، وعنه نسج ابن نجيم أشباهه الحنفية، وصار
  ترتيبه قالب الفن في التأليف والتدريس إلى اليوم، فهو المتن الجامع
  الذي تُفتح به مكتبة القواعد كلها.
يغني_عن:
  - الأشباه والنظائر لابن السبكي وللعلائي (لخّصهما)
