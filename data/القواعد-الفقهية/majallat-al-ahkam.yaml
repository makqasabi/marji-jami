id: majallat-al-ahkam
العنوان: مجلة الأحكام العدلية
المؤلف:
  الاسم: لجنة من فقهاء الدولة العثمانية برئاسة أحمد جودت باشا
  هيئة: نعم
العلم: القواعد الفقهية
التصنيف_الفرعي: تقنين القواعد والفقه
لماذا_هو_أم_في_بابه: >
  أول تقنين مدني في تاريخ الفقه الإسلامي وأبعده أثرًا؛ صاغت لجنة
  جودت باشا (1286–1293هـ) فقه المعاملات الحنفي في 1851 مادة
  قانونية، وافتتحتها بتسع وتسعين قاعدة فقهية كلية صارت أشهر تدوين
  للقواعد في التاريخ: بها تستشهد المحاكم والفقهاء والقانونيون إلى
  اليوم بأرقامها. عملت بها المحاكم العثمانية ثم ورثتها دول عدة وبقيت
  مصدرًا تاريخيًّا للقوانين المدنية العربية، وعليها شروح كبار
  (كدرر الحكام لعلي حيدر). فهي الجسر العملي بين الفقه والقانون
  الحديث، ووثيقة لا غنى عنها لدارس القواعد أو تاريخ التقنين، وبها
  خرجت القاعدة الفقهية من بطون الكتب إلى نصوص ملزمة نافذة.
يغني_عن:
  - مداخل تاريخ التقنين المدني الإسلامي
يُقرأ_قبله:
  - الأشباه والنظائر لابن نجيم (مصدر قواعدها)
أفضل_الطبعات:
  - المحقق_أو_المعتني: (نشرة تجارية متقنة عن الأصل العثماني المعرب)
    الدار: نور محمد، كارخانه تجارتِ كتب، كراتشي
    السنة: (بلا تاريخ)
    المجلدات: 1
    ملاحظة: النشرة المتداولة المعتمدة في الإحالات
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: [قواعد بيانات القوانين العربية]
الشروح_والمختصرات_والذيول:
  - درر الحكام شرح مجلة الأحكام لعلي حيدر
  - شرح المجلة لسليم رستم باز
مستوى_القارئ: متوسط
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  مقصورة على المعاملات دون الأحوال الشخصية والعبادات، وعلى المعتمد
  الحنفي وحده وقد خرجت عنه في مواد يسيرة لمصلحة؛ وهي وثيقة تاريخية
  نُسخت قانونيًّا في أكثر الدول بقوانين لاحقة.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - نشرة كراتشي
  - مقدمة درر الحكام لعلي حيدر
آخر_تحديث: 2026-06-12
