ملاحظات_نقدية: >
  ترتيبه غير موضوعي (لا على أبواب الفقه ولا على حروف المعجم) فيشق
  الكشف فيه، وقواعده خاصة بمذهب الحنابلة فلا يعمم منها بلا موازنة.
