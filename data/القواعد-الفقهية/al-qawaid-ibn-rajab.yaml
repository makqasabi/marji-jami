id: al-qawaid-ibn-rajab
العنوان: القواعد (تقرير القواعد وتحرير الفوائد)
المؤلف:
  الاسم: زين الدين عبد الرحمن بن أحمد ابن رجب الحنبلي
  الوفاة_هجري: 795
  الوفاة_ميلادي: 1393
العلم: القواعد الفقهية
التصنيف_الفرعي: قواعد المذاهب (الحنابلة)
لماذا_هو_أم_في_بابه: >
  أنفس كتب القواعد المذهبية على الإطلاق في تقدير كثير من أهل الفن؛
  جمع ابن رجب مئة وستين قاعدة وضابطًا في فقه الحنابلة، يفرّع على كل
  قاعدة عشرات الفروع من أبواب شتى مع تحرير الروايات والأوجه، بحس
  فقيه محدّث يصل القاعدة بدليلها ومأخذها لا بالتجريد الشكلي، حتى قال
  فيه السيوطي وغيره: هو من عجائب الدهر، وقيل: كتاب أبهر العلماء حتى
  ظن بعضهم أنه جمع فيه قواعد المذهب فلم يغادر منها شيئًا. فهو نموذج
  الفن في أعلى صوره — القاعدة الحية المثمرة لا المحفوظة — وعمدة كل
  دارس لقواعد الحنابلة، ومثال يحتذى في صناعة التقعيد عند سائر
  المذاهب.
يغني_عن:
  - رسائل قواعد الحنابلة المتقدمة (كقواعد ابن قاضي الجبل)
يُقرأ_قبله:
  - متن قواعد ميسر
