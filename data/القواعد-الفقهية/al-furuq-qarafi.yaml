id: al-furuq-qarafi
العنوان: الفروق (أنوار البروق في أنواء الفروق)
المؤلف:
  الاسم: شهاب الدين أحمد بن إدريس القرافي
  الوفاة_هجري: 684
  الوفاة_ميلادي: 1285
العلم: القواعد الفقهية
التصنيف_الفرعي: فن الفروق والقواعد
لماذا_هو_أم_في_بابه: >
  أم فن الفروق الفقهية ومن أنفس كتب التراث القانوني الإسلامي إطلاقًا؛
  جمع القرافي ثمانيًا وأربعين وخمسمائة قاعدة في مئتين وأربع وسبعين
  «فرقًا»: يضع القاعدتين المتشابهتين ظاهرًا ثم يكشف الفرق الجوهري
  بينهما — كالفرق بين الرخصة والعزيمة وبين الشهادة والرواية وبين
  الفتوى والحكم — فعلّم الفقهاء صناعة التمييز الدقيق التي هي لبّ
  الاجتهاد. أثنى عليه العلماء حتى قيل: لم يؤلَّف مثله في بابه، وبنى
  عليه القانونيون المعاصرون دراسات النظريات الفقهية، ففرقه بين
  الفتوى والحكم وحده أسس فقهًا قضائيًّا كاملًا. فهو كتاب يصنع العقل
  الفقهي التحليلي ولا يقوم غيره مقامه.
يغني_عن:
  - رسائل الفروق المتفرقة قبله
يُقرأ_قبله:
  - قواعد الأحكام للعز (شيخه الذي بنى عليه)
أفضل_الطبعات:
  - المحقق_أو_المعتني: خليل المنصور (ضبط وتعليق)
    الدار: دار الكتب العلمية، بيروت
    السنة: 1418هـ/1998م
    المجلدات: 4
    ملاحظة: طبعة متداولة، ومعها تهذيب الفروق
  - المحقق_أو_المعتني: (طبعة قديمة معتمدة ومعها حاشيتا ابن الشاط والتهذيب)
    الدار: عالم الكتب، بيروت (عن طبعة دار إحياء الكتب العربية 1344هـ)
    السنة: (بلا تاريخ)
    المجلدات: 4
    ملاحظة: الطبعة التي عليها إحالات الدراسات، وحاشية ابن الشاط لازمة لتصحيح إطلاقاته
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: []
الشروح_والمختصرات_والذيول:
  - إدرار الشروق لابن الشاط (تصحيح وتعقب لازم)
  - تهذيب الفروق للمكي
مستوى_القارئ: متخصص
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  تعقبه ابن الشاط في مواضع كثيرة حتى قيل: لا يُقرأ الفروق إلا
  بإدرار الشروق؛ وفي بعض فروقه تكلف نبه عليه المحققون.
روابط_التحميل:
  - المصدر: المكتبة الشاملة (أنوار البروق؛ الطبعة لم تُؤكَّد مطابقتها للبطاقة)
    الرابط: https://shamela.ws/book/2215
    النوع: حر
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - طبعة عالم الكتب مع حاشية ابن الشاط
آخر_تحديث: 2026-06-12
