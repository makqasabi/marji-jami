id: sharh-al-qawaid-zarqa
العنوان: شرح القواعد الفقهية
المؤلف:
  الاسم: أحمد بن محمد الزرقا
  الوفاة_هجري: 1357
  الوفاة_ميلادي: 1938
العلم: القواعد الفقهية
التصنيف_الفرعي: الشروح والمداخل الحديثة
لماذا_هو_أم_في_بابه: >
  أنفع شرح حديث لقواعد المجلة التسع والتسعين وأكثرها اعتمادًا في
  الدرس المعاصر؛ شرح أحمد الزرقا — فقيه حلب — كل قاعدة بتأصيلها
  ومعناها ومستثنياتها وتطبيقاتها القديمة والحادثة بعبارة فقهية
  مشرقة تصل التراث بالعصر، ونقّحه ابنه مصطفى الزرقا — شيخ الفقهاء
  القانونيين — فاجتمع في الكتاب علم جيلين. صار المقرر الأول لمادة
  القواعد الفقهية في كليات الشريعة والحقوق عربيًّا، ومرجع المحاكم
  الشرعية والمجامع في فهم قواعد المجلة، فهو الباب المعاصر المعتمد
  إلى الفن كله: به يبدأ الطالب قبل أشباه السيوطي وابن نجيم
  ومطولات المتقدمين، وعليه تبنى البحوث التطبيقية الحديثة.
يغني_عن:
  - شروح قواعد المجلة المدرسية الحديثة
يُقرأ_قبله: []
