نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  مقصور على قواعد المجلة فلا يستوعب قواعد سائر المذاهب
  ومستثنياتها؛ يكمله الرجوع لكتب القواعد المذهبية الموسعة.
حالة_التوثيق: موثّق
مصادر_التوثيق:
