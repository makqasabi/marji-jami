id: qawaid-al-ahkam-izz
العنوان: قواعد الأحكام في مصالح الأنام
المؤلف:
  الاسم: عز الدين عبد العزيز بن عبد السلام السلمي
  الوفاة_هجري: 660
  الوفاة_ميلادي: 1262
العلم: القواعد الفقهية
التصنيف_الفرعي: قواعد المصالح والمقاصد
لماذا_هو_أم_في_بابه: >
  الكتاب الذي ردّ الشريعة كلها إلى قاعدة واحدة: جلب المصالح ودرء
  المفاسد؛ بناه العز بن عبد السلام — سلطان العلماء — على فكرة واحدة
  عبقرية فرّع عليها أحكام الفقه جميعًا، يوازن بين المصالح ومراتبها
  والمفاسد ودرجاتها بميزان دقيق، فكان أول من جعل المصلحة بناءً
  منهجيًّا كاملًا تنتظم به الأحكام، قبل الشاطبي بقرن وربع. أثره ممتد
  في كل من كتب في القواعد والمقاصد بعده: تلميذه القرافي بنى عليه
  فروقه، والمقاصديون المعاصرون يعدونه نصًّا مؤسسًا ثانيًا. فهو أم
  قواعد المصالح، يقرؤه الفقيه فيتعلم كيف يزن لا كيف يحفظ، ولا نظير
  له في بابه.
يغني_عن:
  - مختصراته (كالقواعد الصغرى للمؤلف نفسه)
يُقرأ_قبله:
  - متن قواعد ميسر (كالقواعد الفقهية للسعدي)
أفضل_الطبعات:
  - المحقق_أو_المعتني: طه عبد الرؤوف سعد (مراجعة وتعليق)
    الدار: مكتبة الكليات الأزهرية، القاهرة
    السنة: 1414هـ/1991م
    المجلدات: 2
    ملاحظة: الطبعة المتداولة التي عليها الإحالات
  - المحقق_أو_المعتني: نزيه كمال حماد وعثمان جمعة ضميرية
    الدار: دار القلم، دمشق
    السنة: 1421هـ/2000م
    المجلدات: 2
    ملاحظة: طبعة محققة أتقن
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: []
الشروح_والمختصرات_والذيول:
  - القواعد الصغرى (الفوائد في اختصار المقاصد) للمؤلف
مستوى_القارئ: متوسط/متخصص
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  ليس كتاب قواعد مذهبية مفهرسة بل نظرية كلية، فلا يغني عن كتب
  القواعد التفصيلية؛ وفي مباحثه الكلامية نزعة أشعرية ظاهرة من مذهب
  مؤلفه.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - طبعة دار القلم
آخر_تحديث: 2026-06-12
