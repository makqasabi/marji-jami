id: maalim-al-sunan
العنوان: معالم السنن (شرح سنن أبي داود)
المؤلف:
  الاسم: أبو سليمان حمد بن محمد الخطابي البستي
  الوفاة_هجري: 388
  الوفاة_ميلادي: 998
العلم: شروح الحديث
التصنيف_الفرعي: شروح السنن
لماذا_هو_أم_في_بابه: >
  أول شروح الحديث المصنفة على كتاب بعينه وأبو هذا الفن كله؛ شرح فيه
  الخطابي — الإمام اللغوي الفقيه — سنن أبي داود شرحًا موجزًا محررًا
  يبين الغريب ويستخرج الفقه ويوفق بين المختلِف، فوضع للأمة أنموذج
  الشرح الحديثي الذي احتذاه كل من جاء بعده، وكتابه مع «أعلام الحديث»
  في شرح البخاري و«غريب الحديث» ثلاثية أسست صناعة الشرح والبيان.
  بقي معالم السنن عمدة شراح السنن قاطبة ينقلون عنه ويبنون عليه —
  والعون والبذل عيال عليه — وفيه من تحقيقات اللغة والفقه ما لا يوجد
  عند المتأخرين، فهو أم شروح السنن ومفتاحها التاريخي والعلمي معًا.
يغني_عن:
  - شروح السنن الموجزة المتأخرة المبنية عليه
يُقرأ_قبله:
  - بلوغ المرام بشرح ميسر
أفضل_الطبعات:
  - المحقق_أو_المعتني: محمد راغب الطباخ (عناية وتصحيح)
    الدار: المطبعة العلمية، حلب
    السنة: 1351–1352هـ/1932–1934م
    المجلدات: 4
    ملاحظة: الطبعة المعتمدة وعنها المصورات (دار الكتب العلمية وغيرها)
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: []
الشروح_والمختصرات_والذيول:
  - تهذيب السنن لابن القيم (مبني عليه ومتعقب له)
مستوى_القارئ: متوسط/متخصص
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  موجز لا يشرح كل حديث، وتعقّبه ابن القيم في تهذيب السنن في مواضع؛
  وفي كلامه على الصفات مواضع تأول فيها نوقشت في الدراسات عنه.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - طبعة المطبعة العلمية بحلب
آخر_تحديث: 2026-06-12
