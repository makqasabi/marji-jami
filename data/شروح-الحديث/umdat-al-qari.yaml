id: umdat-al-qari
العنوان: عمدة القاري شرح صحيح البخاري
المؤلف:
  الاسم: بدر الدين محمود بن أحمد العيني
  الوفاة_هجري: 855
  الوفاة_ميلادي: 1451
العلم: شروح الحديث
التصنيف_الفرعي: شروح صحيح البخاري
لماذا_هو_أم_في_بابه: >
  قسيم فتح الباري في الإحاطة بشرح البخاري وثاني عظيمي شروحه؛ بناه
  العيني — إمام الحنفية في عصره — على تقسيم منهجي مطرد: يذكر مناسبة
  الباب، ثم رجال الإسناد، ثم لطائفه، ثم اللغة والإعراب والمعاني
  والبيان، ثم استنباط الأحكام، فامتاز بما لم يستوعبه ابن حجر من بسط
  العربية والبلاغة وتحرير فقه الحنفية بأدلته. وبينه وبين الفتح
  مناظرات ومآخذ متبادلة صارت من ملح العلم وفوائده، فمن جمع الكتابين
  أحاط بأطراف شرح الصحيح روايةً ولغةً وفقهًا، ولذا عدّه أهل الفن مع
  الفتح وإرشاد الساري أركان شروح البخاري الثلاثة.
يغني_عن:
  - الكواكب الدراري للكرماني (وقد استوعبه وناقشه)
يُقرأ_قبله:
  - هدي الساري (مقدمة فتح الباري)
أفضل_الطبعات:
  - المحقق_أو_المعتني: (مصورة عن الطبعة المنيرية)
    الدار: إدارة الطباعة المنيرية، القاهرة (ومصوراتها بدار إحياء التراث العربي، بيروت)
    السنة: 1348هـ وما حولها
    المجلدات: 25 جزءًا
    ملاحظة: الطبعة المعتمدة التي عليها الإحالات
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: [إسلام ويب]
الشروح_والمختصرات_والذيول: []
مستوى_القارئ: متخصص
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  أُخذ عليه إغارته الواسعة على فتح الباري مع تعقبه لصاحبه — وقد أجاب
  ابن حجر عن انتقاداته في «انتقاض الاعتراض» — وفيه انتصار ظاهر للمذهب
  الحنفي في مواضع الخلاف؛ والكتاب بحاجة إلى تحقيق نقدي حديث.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - الطبعة المنيرية ومصوراتها
  - الضوء اللامع للسخاوي (ترجمة العيني وخبر المعارضة)
آخر_تحديث: 2026-06-12
