id: nayl-al-awtar
العنوان: نيل الأوطار شرح منتقى الأخبار
المؤلف:
  الاسم: محمد بن علي الشوكاني
  الوفاة_هجري: 1250
  الوفاة_ميلادي: 1834
العلم: شروح الحديث
التصنيف_الفرعي: شروح متون الأحكام
لماذا_هو_أم_في_بابه: >
  ذروة شروح أحاديث الأحكام وأوسعها تحريرًا للفقه المقارن بالدليل؛ شرح
  فيه الشوكاني «المنتقى» لمجد الدين ابن تيمية فيسوق الحديث وطرقه
  وكلام الحفاظ فيه، ثم يستوعب مذاهب العلماء في المسألة بأدلتها
  ومناقشتها ويرجح بميزان الصناعة الحديثية والأصولية مجردًا عن التمذهب،
  على إمامته في الاجتهاد. صار منذ تأليفه عمدة الفقه المقارن الحديثي:
  عليه تعتمد لجان الإفتاء والبحوث والرسائل الجامعية في عرض الخلاف
  العالي، وهو الكتاب الذي يتخرج به الطالب من طور التلقي إلى طور
  الموازنة والترجيح، ولا يعرف أهل الفن كتابًا يقوم مقامه في بابه.
يغني_عن:
  - شروح المنتقى قبله
  - عامة كتب الخلاف الحديثي المتوسطة
يُقرأ_قبله:
  - سبل السلام
  - بلوغ المرام
أفضل_الطبعات:
  - المحقق_أو_المعتني: عصام الدين الصبابطي
    الدار: دار الحديث، القاهرة
    السنة: 1413هـ/1993م
    المجلدات: 8 أجزاء
    ملاحظة: الطبعة المحققة المتداولة المخرجة الأحاديث
  - المحقق_أو_المعتني: (طبعة قديمة)
    الدار: مكتبة مصطفى البابي الحلبي، القاهرة
    السنة: 1357هـ وما حولها
    المجلدات: 8 أجزاء
    ملاحظة: الطبعة الأم التي عليها إحالات الكتب المتقدمة
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: [طريق الإسلام]
الشروح_والمختصرات_والذيول: []
مستوى_القارئ: متخصص
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  للشوكاني اختيارات ينفرد بها عن الجمهور بحكم اجتهاده الحر، وأخذ عليه
  بعضهم حدّته في نقد المقلدين؛ وأصل المتن (المنتقى) فيه أحاديث ضعيفة
  يبين الشارح حالها غالبًا.
