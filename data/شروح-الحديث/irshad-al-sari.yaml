id: irshad-al-sari
العنوان: إرشاد الساري لشرح صحيح البخاري
المؤلف:
  الاسم: شهاب الدين أحمد بن محمد القسطلاني
  الوفاة_هجري: 923
  الوفاة_ميلادي: 1517
العلم: شروح الحديث
التصنيف_الفرعي: شروح صحيح البخاري
لماذا_هو_أم_في_بابه: >
  ثالث الشروح الثلاثة الكبرى للبخاري وأنفعها في ضبط المتن وروايات
  النسخ؛ عني القسطلاني عناية فريدة بضبط ألفاظ الصحيح على رواياته —
  ولا سيما اليونينية وفروعها — حتى صار شرحه ديوان ضبط البخاري الذي
  يفزع إليه المحققون في اختلاف النسخ، مع تلخيص محرر لزبدة الفتح
  والعمدة بعبارة سهلة قريبة. ولأجل هذا اعتمدته الطبعة السلطانية
  (بولاق) أصلًا في إثبات روايات الصحيح، وظل قرونًا شرحَ المدارسة
  الجاري في الأزهر والحرمين، فهو الجسر الأيسر إلى الشرحين الكبيرين
  والمرجع الذي لا بديل عنه في رواية الكتاب ورسمه.
يغني_عن:
  - حواشي ضبط روايات الصحيح المتفرقة
يُقرأ_قبله:
  - هدي الساري (مقدمة فتح الباري)
أفضل_الطبعات:
  - المحقق_أو_المعتني: (طبعة مقابلة على اليونينية)
    الدار: المطبعة الكبرى الأميرية، بولاق
    السنة: 1323هـ (الطبعة السابعة)
    المجلدات: 10
    ملاحظة: الطبعة المعتمدة المتقنة وعنها المصورات المتداولة
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: []
الشروح_والمختصرات_والذيول: []
مستوى_القارئ: متوسط
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  مادته الشارحة عيال على الفتح والعمدة بتصريحه، فقيمته الأصيلة في ضبط
  الروايات لا في الاستنباط؛ وأُخذت عليه مواضع في الصفات على طريقة
  الأشاعرة.
روابط_التحميل:
