id: al-minhaj-sharh-muslim
العنوان: المنهاج شرح صحيح مسلم بن الحجاج
المؤلف:
  الاسم: أبو زكريا يحيى بن شرف النووي
  الوفاة_هجري: 676
  الوفاة_ميلادي: 1277
العلم: شروح الحديث
التصنيف_الفرعي: شروح صحيح مسلم
لماذا_هو_أم_في_بابه: >
  أشهر شروح صحيح مسلم وأكثرها قبولًا واعتمادًا بإطلاق؛ جمع فيه النووي
  خلاصة من قبله — كالمعلم للمازري وإكماله للقاضي عياض — بعبارة وسط لا
  بالطويلة المملة ولا بالقصيرة المخلة كما وصفه هو، فضبط الألفاظ
  والأسانيد، وشرح الغريب، وحرر مذاهب الفقهاء بإنصاف، وقدّم له بمقدمة
  نفيسة في علوم الإسناد. صار منذ تأليفه قرين صحيح مسلم لا تكاد تُطبع
  نسخة من الصحيح إلا به، وهو عمدة المدرسين والخطباء وطلبة العلم في فهم
  الكتاب، يغني المتوسطَ عن شروح مسلم قاطبة، ولا يستغني عنه حتى
  المتخصص الراجع إلى المطولات.
يغني_عن:
  - المعلم بفوائد مسلم للمازري
  - إكمال المعلم للقاضي عياض (في جملة مقاصده لغير المتخصص)
يُقرأ_قبله:
  - نزهة النظر لابن حجر
أفضل_الطبعات:
  - المحقق_أو_المعتني: (طبعة مصححة معتمدة)
    الدار: المطبعة المصرية بالأزهر، القاهرة (ومصورتها بدار إحياء التراث العربي، بيروت 1392هـ)
    السنة: 1347–1349هـ/1929–1930م
    المجلدات: 18 جزءًا
    ملاحظة: الطبعة الأم التي عليها الإحالات وعنها أكثر المصورات
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: [إسلام ويب, موسوعة الحديث - حديث برو]
الشروح_والمختصرات_والذيول: []
مستوى_القارئ: متوسط
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  يجري في الصفات على التأويل في مواضع على طريقة متأخري الأشاعرة، نبّه
  عليها أهل العلم مع إطباقهم على إمامة النووي وجلالة شرحه؛ وإيجازه في
  مواضع يحوج المتخصص إلى إكمال المعلم وفتح الباري.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - الطبعة المصرية بالأزهر ومصوراتها
  - مقدمة النووي لشرحه
آخر_تحديث: 2026-06-12
