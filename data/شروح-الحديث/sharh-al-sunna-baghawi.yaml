id: sharh-al-sunna-baghawi
العنوان: شرح السنة
المؤلف:
  الاسم: أبو محمد الحسين بن مسعود البغوي
  الوفاة_هجري: 516
  الوفاة_ميلادي: 1122
العلم: شروح الحديث
التصنيف_الفرعي: الشروح الجامعة على الأبواب
لماذا_هو_أم_في_بابه: >
  أجمع شرح حديثي مرتب على أبواب الفقه لا على كتاب بعينه؛ انتقى البغوي
  — محيي السنة — أحاديث الأبواب من دواوين السنة ثم شرحها شرحًا
  متوسطًا يجمع بيان الغريب وفقه الحديث ومذاهب الصحابة والتابعين
  والأئمة بعدهم، فصار كالموسوعة المختصرة في فقه السنة كله، يجد فيه
  الطالب الحديث وشرحه وثمرته الفقهية في موضع واحد من غير تطويل
  المطولات. تلقاه العلماء بالقبول واعتمدوه في الدرس قرونًا، وهو من
  أنفع ما يقرؤه المتوسط بعد متون الأحكام وقبل الشروح الكبار، إذ يبني
  التصور الفقهي الحديثي كاملًا بترتيب ميسر وعبارة سهلة سالمة.
يغني_عن:
  - الشروح المتوسطة المتفرقة على كتب السنة لغير المتخصص
يُقرأ_قبله:
  - بلوغ المرام أو عمدة الأحكام
أفضل_الطبعات:
  - المحقق_أو_المعتني: شعيب الأرنؤوط ومحمد زهير الشاويش
    الدار: المكتب الإسلامي، دمشق/بيروت
    السنة: 1403هـ/1983م (الطبعة الثانية)
    المجلدات: 16 (مع الفهارس)
    ملاحظة: الطبعة المحققة المعتمدة المخرجة الأحاديث
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: []
الشروح_والمختصرات_والذيول:
  - مصابيح السنة للبغوي (متنه المجرد) ومشكاة المصابيح للتبريزي
مستوى_القارئ: متوسط
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  فيه أحاديث ضعيفة بيّن المحققان حالها، وفقهه يميل إلى الشافعية بحكم
  مذهب مؤلفه وإن حكى الخلاف بإنصاف.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - طبعة المكتب الإسلامي
آخر_تحديث: 2026-06-12
