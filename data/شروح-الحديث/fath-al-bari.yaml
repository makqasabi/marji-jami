id: fath-al-bari
العنوان: فتح الباري بشرح صحيح البخاري
المؤلف:
  الاسم: أحمد بن علي بن حجر العسقلاني
  الوفاة_هجري: 852
  الوفاة_ميلادي: 1449
العلم: شروح الحديث
التصنيف_الفرعي: شروح صحيح البخاري
لماذا_هو_أم_في_بابه: >
  أجلُّ شروح صحيح البخاري وأوسعها تحقيقًا، صنّفه ابن حجر في ربع قرن فجمع فيه
  علوم الرواية والدراية: ضبط الألفاظ، وبيان الوصل والتعليق، وسرد طرق الحديث
  وعلله، واستيعاب أقوال الفقهاء والمحدّثين قبله مع الترجيح. صار عمدة من جاء
  بعده حتى اشتهرت بين أهل العلم كلمة الشوكاني لما أُشير عليه بشرح البخاري:
  «لا هجرة بعد الفتح». ومقدمته «هدي الساري» كتاب مستقل في مدخل الصحيح
  ورجاله وغريبه. من أتقن فتح الباري استغنى به في فهم الصحيح عن طبقة كاملة
  من الشروح المتقدمة التي استوعبها ونقّحها وزاد عليها.
يغني_عن:
  - شرح ابن بطال على البخاري
  - أعلام الحديث للخطابي
  - الكواكب الدراري للكرماني
  - التوضيح لشرح الجامع الصحيح لابن الملقن (في جملة مقاصده)
يُقرأ_قبله:
  - هدي الساري (مقدمة الفتح)
  - نزهة النظر في مصطلح الحديث لابن حجر
أفضل_الطبعات:
  - المحقق_أو_المعتني: ترقيم محمد فؤاد عبد الباقي، وإخراج وتصحيح محب الدين الخطيب
    الدار: المطبعة السلفية، القاهرة
    السنة: ابتداء من 1380هـ
    المجلدات: 13 مجلدًا مع المقدمة
    ملاحظة: هي الطبعة المعتمدة عند أهل الفن؛ مرقمة على ترقيم عبد الباقي للصحيح، وعنها صُوّرت أكثر الطبعات المتداولة
  - المحقق_أو_المعتني: (طبعة قديمة معتمدة)
    الدار: المطبعة الكبرى الأميرية، بولاق
    السنة: 1300–1301هـ
    ملاحظة: الأصل المتقن الذي اعتُمد في الطبعات اللاحقة
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: [إسلام ويب, تراث]
الشروح_والمختصرات_والذيول: []
مستوى_القارئ: متخصص
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  أُخذ على المؤلف مواضع يسيرة في الصفات جرى فيها على التأويل، نبّه عليها
  بعض أهل العلم في تعليقاتهم (كتعليقات ابن باز على أوله) من غير غضّ من
  مكانة الكتاب وإمامة مصنفه.
روابط_التحميل:
  - المصدر: المكتبة الشاملة (ط السلفية)
    الرابط: https://shamela.ws/book/1673
    النوع: حر
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - مقدمات الطبعة السلفية
  - ترجمة ابن حجر في الضوء اللامع للسخاوي والمشتهر في كتب التراجم
آخر_تحديث: 2026-06-12
