id: al-tamhid-ibn-abd-al-barr
العنوان: التمهيد لما في الموطأ من المعاني والأسانيد
المؤلف:
  الاسم: أبو عمر يوسف بن عبد الله بن عبد البر النمري القرطبي
  الوفاة_هجري: 463
  الوفاة_ميلادي: 1071
العلم: شروح الحديث
التصنيف_الفرعي: شروح الموطأ
لماذا_هو_أم_في_بابه: >
  أعظم شروح الموطأ وأحد أجلّ كتب الإسلام إطلاقًا؛ قال ابن حزم — على
  تحفظه — : «لا أعلم في الكلام على فقه الحديث مثله أصلًا». رتبه ابن
  عبد البر — حافظ المغرب — على شيوخ مالك، يسوق طرق الحديث وعلله
  ووصْلَ بلاغاته، ثم يبسط فقهه ومذاهب علماء الأمصار فيه بأدلتها،
  فجمع بين صناعة الحديث العالية وفقه الموازنة، وكان مع قسيمه
  «الاستذكار» — المرتب على الأبواب — ديوانَ السنة والفقه المقارن عند
  المغاربة. لا يستغني عنه محدّث في علل الموطأ ولا فقيه في تحرير مذاهب
  السلف، فهو أم شروح الموطأ ومفخرة المدرسة الأندلسية.
يغني_عن:
  - شروح الموطأ المتقدمة (وقد استوعب مادتها)
  - الاستذكار (يقاربه في المادة مع اختلاف الترتيب والمقصد)
يُقرأ_قبله:
  - الموطأ نفسه
أفضل_الطبعات:
  - المحقق_أو_المعتني: مصطفى بن أحمد العلوي ومحمد عبد الكبير البكري وآخرون
    الدار: وزارة عموم الأوقاف والشؤون الإسلامية، المغرب
    السنة: صدر تباعًا من 1387هـ/1967م
    المجلدات: 26 جزءًا
    ملاحظة: الطبعة المغربية الأم التي عليها الإحالات
  - المحقق_أو_المعتني: بشار عواد معروف ومحمد بشار عواد
    الدار: دار الغرب الإسلامي / مؤسسة الفرقان
    السنة: 1436هـ/2015م وما حولها
    المجلدات: 17
    ملاحظة: طبعة محققة حديثة مرتبة على أبواب الموطأ؛ تُثبَّت بياناتها التفصيلية عند الاقتناء
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: []
الشروح_والمختصرات_والذيول:
  - الاستذكار لابن عبد البر (قسيمه على الأبواب)
مستوى_القارئ: متخصص
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  ترتيبه على شيوخ مالك يصعّب الكشف فيه على غير المتمرس — وطبعة بشار
  المرتبة على الأبواب تعالج ذلك — وفيه استطرادات طويلة من عادة
  الحفاظ المكثرين.
روابط_التحميل:
  - المصدر: المكتبة الشاملة
    الرابط: https://shamela.ws/book/236
    النوع: حر
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - الطبعة المغربية الوزارية
  - ثناء ابن حزم المنقول في ترجمته بالسير
آخر_تحديث: 2026-06-12
