id: subul-al-salam
العنوان: سبل السلام شرح بلوغ المرام
المؤلف:
  الاسم: محمد بن إسماعيل الأمير الصنعاني
  الوفاة_هجري: 1182
  الوفاة_ميلادي: 1768
العلم: شروح الحديث
التصنيف_الفرعي: شروح متون الأحكام
لماذا_هو_أم_في_بابه: >
  أشهر شروح بلوغ المرام وأكثرها تداولًا في طلب العلم منذ قرنين ونصف؛
  لخّص فيه الصنعاني — المجتهد اليماني — شرح شيخ شيوخه المغربي «البدر
  التمام» وزاد عليه، فيشرح الحديث ويبين درجته ثم يحرر مذاهب العلماء
  في المسألة بأدلتها ويرجح بالدليل من غير تعصب لمذهب، على طريقة
  مدرسة الاجتهاد اليمانية التي ختمت بالشوكاني. جمع الاختصار المنضبط
  إلى التحرير الفقهي المقارن، فصار الشرح المعتمد في الدرس على بلوغ
  المرام في عامة المعاهد والجامعات الشرعية، وهو الجسر الموصل من حفظ
  المتن إلى الفقه المقارن العالي في نيل الأوطار وأمثاله.
يغني_عن:
  - البدر التمام للمغربي (وهو أصله)
يُقرأ_قبله:
  - بلوغ المرام (حفظًا أو ضبطًا)
أفضل_الطبعات:
  - المحقق_أو_المعتني: محمد صبحي حلاق
    الدار: دار ابن الجوزي، الدمام
    السنة: 1421هـ وما حولها
    المجلدات: 8 (مع التحقيق الموسع)
    ملاحظة: أوفى الطبعات المحققة المخرجة
  - المحقق_أو_المعتني: (طبعة قديمة معتمدة)
    الدار: مكتبة مصطفى البابي الحلبي، القاهرة
    السنة: 1379هـ/1960م (الطبعة الرابعة)
    المجلدات: 4
    ملاحظة: الطبعة المتداولة التي عليها إحالات الكتب
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: [طريق الإسلام]
الشروح_والمختصرات_والذيول: []
مستوى_القارئ: متوسط
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  له اختيارات اجتهادية يخالف فيها الجمهور تبعًا لمنهجه الاجتهادي،
  ينبه عليها الدارسون؛ وأصل الكتاب تلخيص فينسب بعض تحقيقاته لأصله
  البدر التمام.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - طبعة دار ابن الجوزي بتحقيق حلاق
آخر_تحديث: 2026-06-12
