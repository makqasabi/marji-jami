id: al-mujam-al-kabir-cairo
العنوان: المعجم الكبير
المؤلف:
  الاسم: مجمع اللغة العربية بالقاهرة
  هيئة: نعم
العلم: معاجم المصطلحات العلمية المجمعية
التصنيف_الفرعي: المعاجم المجمعية الكبرى
لماذا_هو_أم_في_بابه: >
  أضخم مشروع معجمي مجمعي في تاريخ العربية الحديث وأرفع أعمال
  مجمع القاهرة طموحًا؛ أراده المجمع معجمًا تاريخيًّا استقصائيًّا
  يجمع ألفاظ العربية كلها — التراثية والمولَّدة والمعرَّبة
  والمصطلح العلمي الحديث الذي أقرّه المجمع — مع شواهدها وتطورها،
  على منهج علمي محكّم وضعته لجانه المتخصصة. صدر منه حتى الآن
  نحو تسعة عشر مجلدًا (من الهمزة إلى حرف الظاء وبعض العين)، فهو
  وإن لم يكتمل أوسعُ ما أنجزته المجامع العربية مجتمعةً في
  المعجمية، ومستودعُ المصطلح العلمي المجمعي المعتمد، تَرُدّ
  إليه الجامعاتُ والباحثون أصلَ المقابل العربي المقرَّر، فهو أم
  المشاريع المعجمية المجمعية ووثيقةُ أكبر جهد مؤسسي للسان
  العربي.
يغني_عن:
  - المعاجم المجمعية الأصغر (في مقام الاستقصاء التاريخي والمصطلحي)
يُقرأ_قبله:
  - المعجم الوسيط (للكشف العام الميسر)
أفضل_الطبعات:
  - المحقق_أو_المعتني: لجنة المعجم الكبير بالمجمع
    الدار: مجمع اللغة العربية، القاهرة
    السنة: 1390هـ/1970م وما بعدها (تصدر مجلداته تباعًا؛ بلغت نحو 19 مجلدًا)
    المجلدات: نحو 19 (غير مكتمل)
    ملاحظة: الطبعة الرسمية للمجمع؛ آخر ما صدر حرفا الطاء والظاء (تحقق ويب 2026-06-13)
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: [أرشيف, موقع مجمع القاهرة]
الشروح_والمختصرات_والذيول: []
مستوى_القارئ: متخصص
نوع_المرجعية: معاصرة
ملاحظات_نقدية: >
  لم يكتمل بعد عقودٍ من بدئه — فلا يغطي إلا نحو نصف حروف
  المعجم — وبُطء صدوره من أبرز مآخذ العمل المجمعي العربي
  المعلنة؛ فيكمَّل بالمعجم الوسيط وأمهات المعاجم التراثية فيما
  لم يصدر.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - موقع مجمع اللغة العربية بالقاهرة وبيانات الإصدار (تحقق ويب 2026-06-13)
آخر_تحديث: 2026-06-13
