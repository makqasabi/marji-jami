id: majmuat-al-mustalahat
العنوان: مجموعة المصطلحات العلمية والفنية التي أقرها المجمع
المؤلف:
  الاسم: مجمع اللغة العربية بالقاهرة
  هيئة: نعم
العلم: معاجم المصطلحات العلمية المجمعية
التصنيف_الفرعي: مدونات المصطلح المُقَرّ
لماذا_هو_أم_في_بابه: >
  السجل الرسمي الجامع للمصطلح العلمي العربي المعتمد، ومرجعية
  التعريب المجمعي الأولى؛ جمع فيه مجمع القاهرة — على مدى عقود
  منذ ثلاثينيات القرن العشرين — ما أقرّته لجانه المتخصصة من
  مقابلات عربية للمصطلحات العلمية والفنية في الطب والكيمياء
  والفيزياء والأحياء والقانون والفلسفة وسائر العلوم، صادرةً عن
  مؤتمر المجمع السنوي بصفة القرار الملزم. فهو الأصل الذي تَرُدّ
  إليه المعاجم العلمية المتأخرة شرعيةَ مقابلاتها («مما أقرّه
  المجمع»)، ووثيقةُ مسيرة التعريب العلمي العربي منذ نشأته
  المؤسسية، تعتمده الجامعات ودور النشر العلمية حكمًا في صحة
  المصطلح المعرَّب، فهو أم مدونات المصطلح المُقَرّ بلا منازع.
يغني_عن:
  - تتبع قرارات المجمع المصطلحية المتفرقة في مجلاته
يُقرأ_قبله: []
أفضل_الطبعات:
  - المحقق_أو_المعتني: لجان المصطلحات بمجمع اللغة العربية بالقاهرة
    الدار: مجمع اللغة العربية، القاهرة (والهيئة العامة لشؤون المطابع الأميرية)
    السنة: صدرت مجموعاتها تباعًا منذ نحو 1376هـ/1957م
    المجلدات: سلسلة (مجموعات متتابعة)
    ملاحظة: الإصدار الرسمي للمجمع، يصدر مجموعةً بعد أخرى مع تقدم الإقرار (تحقق ويب 2026-06-13)
التوافر_الرقمي:
  المكتبة_الشاملة: لا
  منصات_أخرى: [أرشيف, موقع مجمع القاهرة, مجلة المجمع]
الشروح_والمختصرات_والذيول: []
مستوى_القارئ: متخصص
نوع_المرجعية: معاصرة
ملاحظات_نقدية: >
  مدونةُ مقابلاتٍ مُقَرّة لا معجمٌ شارح، وقراراتها أحيانًا محل
  نقاش المعرّبين أو تتأخر عن المستجد العلمي المتسارع؛ وتتكامل
  مع المعاجم الموحدة لمكتب تنسيق التعريب التي تنسّق بين قرارات
  المجامع العربية كلها.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - موقع مجمع اللغة العربية بالقاهرة (تحقق ويب 2026-06-13)
آخر_تحديث: 2026-06-13
