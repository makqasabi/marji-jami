id: sunan-ibn-majah
العنوان: سنن ابن ماجه
المؤلف:
  الاسم: أبو عبد الله محمد بن يزيد بن ماجه القزويني
  الوفاة_هجري: 273
  الوفاة_ميلادي: 887
العلم: متون الحديث
التصنيف_الفرعي: السنن الأربعة
لماذا_هو_أم_في_بابه: >
  سادس الكتب الستة الذي به اكتمل الديوان؛ امتاز بحسن الترتيب وسهولة
  التبويب حتى وصفه الحفاظ بأنه من أحسن الكتب تبويبًا، وانفرد بزوائد
  كثيرة على الخمسة (نحو 1339 حديثًا زائدًا) فيها الصحيح والحسن، فصار
  ضمه إلى الخمسة مذهب جمهور أصحاب الأطراف منذ ابن طاهر المقدسي لما
  فيه من الزيادة، وبه تمت «الكتب الستة» التي هي عماد المكتبة الحديثية
  ومادة موسوعات الأطراف والرجال (كتحفة الأشراف وتهذيب الكمال). فدخوله
  في هذا المستودع لمكانه من بنية الدواوين الستة التي لا تنفك عنه.
