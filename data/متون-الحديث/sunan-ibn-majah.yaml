ملاحظات_نقدية: >
  أنزل الستة درجة؛ فيه أحاديث ضعيفة ومناكير وأفراد عن متروكين أكثر من
  أقرانه، حتى قال الذهبي: فيه مناكير وقليل من الموضوعات؛ فيُستعمل مع
  الحكم على أحاديثه لا استقلالًا.
