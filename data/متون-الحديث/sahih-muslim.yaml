id: sahih-muslim
العنوان: المسند الصحيح المختصر بنقل العدل عن العدل إلى رسول الله صلى الله عليه وسلم (صحيح مسلم)
المؤلف:
  الاسم: أبو الحسين مسلم بن الحجاج القشيري النيسابوري
  الوفاة_هجري: 261
  الوفاة_ميلادي: 875
العلم: متون الحديث
التصنيف_الفرعي: الصحيحان
لماذا_هو_أم_في_بابه: >
  ثاني أصح كتب الحديث وأحسنها صناعةً وسياقة؛ جمع مسلم طرق الحديث الواحد
  في موضع واحد وحرر ألفاظ الرواة وميّز زياداتهم تمييزًا دقيقًا حتى فضّله
  بعض المغاربة على البخاري من جهة حسن الترتيب وجودة السياق، ومقدمته
  أول نص منهجي محرر في أصول الرواية ونقد الأخبار. هو قسيم البخاري في
  تلقي الأمة بالقبول، وما اتفقا عليه فهو أعلى درجات الصحيح المجمع
  عليه، وقد خُدم بشروح عظيمة على رأسها المنهاج للنووي وإكمال المعلم
  للقاضي عياض، فلا غنى لمحدث ولا فقيه ولا طالب علم عنه بحال من
  الأحوال.
يغني_عن: []
يُقرأ_قبله:
  - نزهة النظر لابن حجر
أفضل_الطبعات:
  - المحقق_أو_المعتني: محمد فؤاد عبد الباقي
    الدار: دار إحياء الكتب العربية (عيسى البابي الحلبي)، القاهرة
    السنة: 1374هـ/1955م
    المجلدات: 5
    ملاحظة: الطبعة المرقمة المعتمدة التي عليها الإحالات العلمية كلها
  - المحقق_أو_المعتني: (عن نسخ خطية عتيقة)
    الدار: المطبعة العامرة، الآستانة (التركية)
    السنة: 1329–1334هـ
    المجلدات: 8 أجزاء
    ملاحظة: الطبعة التركية المتقنة المعتمدة قبل طبعة عبد الباقي
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: [موسوعة الحديث - حديث برو, إسلام ويب, sunnah.com]
الشروح_والمختصرات_والذيول:
  - المنهاج شرح صحيح مسلم للنووي
  - إكمال المعلم للقاضي عياض
  - مختصر صحيح مسلم للمنذري
مستوى_القارئ: مبتدئ/متوسط/متخصص
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  انتقد الدارقطني وغيره أحاديث يسيرة فيه أُجيب عن عامتها؛ وأحاديثه
  المعنعنة عمّن وُصف بالتدليس مسألة مبحوثة في علوم الحديث، والكتاب
  فوق ذلك كله بتلقي الأمة.
