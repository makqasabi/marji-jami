id: bulugh-al-maram
العنوان: بلوغ المرام من أدلة الأحكام
المؤلف:
  الاسم: أحمد بن علي بن حجر العسقلاني
  الوفاة_هجري: 852
  الوفاة_ميلادي: 1449
العلم: متون الحديث
التصنيف_الفرعي: متون أحاديث الأحكام
لماذا_هو_أم_في_بابه: >
  أنفع متون أحاديث الأحكام وأكثرها اعتمادًا في طلب العلم قاطبة؛ انتقى
  فيه ابن حجر — أمير المؤمنين في الحديث — نحو ألف وخمسمائة حديث هي
  عمدة أبواب الفقه، وبيّن عقب كل حديث من أخرجه وعلته ودرجته بإشارات
  محررة هي زبدة صناعته النقدية، وختمه بجوامع الآداب. جمع ما تفرق في
  المنتقى لابن تيمية الجد وعمدة الأحكام وزاد التحرير الحديثي، فصار
  المتن الذي يحفظه طلبة العلم في الأمصار كلها منذ خمسة قرون، وعليه
  شروح نفيسة أشهرها سبل السلام للصنعاني، فهو باب الفقه المقارن
  بالدليل لكل طالب.
يغني_عن:
  - عمدة الأحكام للمقدسي (لمن أراد التوسع عنها)
  - المنتقى لمجد الدين ابن تيمية (في مقام الحفظ والتفقه)
يُقرأ_قبله:
  - عمدة الأحكام (لمن شاء التدرج)
أفضل_الطبعات:
  - المحقق_أو_المعتني: سمير بن أمين الزهيري
    الدار: دار الفلق، الرياض
    السنة: 1424هـ (الطبعة السابعة وما حولها)
    المجلدات: 1
    ملاحظة: الطبعة المحررة المتداولة في الدرس
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: [إسلام هاوس, تطبيقات المتون]
الشروح_والمختصرات_والذيول:
  - سبل السلام للصنعاني
  - منحة العلام لعبد الله الفوزان
  - توضيح الأحكام للبسام
مستوى_القارئ: مبتدئ/متوسط
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  متن مختصر لا يذكر نص الحديث بتمامه أحيانًا ويكتفي بمحل الشاهد،
  وإشاراته النقدية الموجزة تحتاج شرحًا؛ وهو مدخل لا غاية.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - طبعة دار الفلق بتحقيق الزهيري
آخر_تحديث: 2026-06-12
