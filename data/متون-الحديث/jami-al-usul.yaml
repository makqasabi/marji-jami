id: jami-al-usul
العنوان: جامع الأصول في أحاديث الرسول
المؤلف:
  الاسم: مجد الدين المبارك بن محمد ابن الأثير الجزري
  الوفاة_هجري: 606
  الوفاة_ميلادي: 1210
العلم: متون الحديث
التصنيف_الفرعي: الجوامع بين دواوين السنة
لماذا_هو_أم_في_بابه: >
  أعظم ما جمعت به دواوين السنة الكبرى في كتاب واحد؛ ضم ابن الأثير
  أحاديث الكتب الخمسة والموطأ — بانيًا على تجريد الصحاح لرزين العبدري
  ومهذبًا له — ورتبها على الأبواب ترتيبًا معجميًّا مبتكرًا، مع حذف
  الأسانيد وبيان من أخرج كل حديث وشرح غريبه. به يقف الطالب على أحاديث
  الباب الواحد من ستة دواوين دفعة واحدة، فكان ولا يزال من أنفع كتب
  السنة للفقيه والواعظ والباحث، وأثنى عليه العلماء حتى عُدّ من الكتب
  التي يُبنى عليها التحصيل، ولخصه ابن الديبع في تيسير الوصول. فهو أم
  كتب الجمع بين الأصول، لا يقوم غيره مقامه قبل الموسوعات الحاسوبية
  وبعدها.
يغني_عن:
  - تجريد الصحاح لرزين (وهو أصله المهذب)
  - مراجعة الدواوين الستة مفرقة لغير المتخصص في الأسانيد
يُقرأ_قبله:
  - بلوغ المرام لابن حجر
أفضل_الطبعات:
  - المحقق_أو_المعتني: عبد القادر الأرنؤوط
    الدار: مكتبة الحلواني ومطبعة الملاح ومكتبة دار البيان، دمشق
    السنة: 1389–1392هـ/1969–1972م
    المجلدات: 12 (مع التتمة والفهارس)
    ملاحظة: الطبعة المحققة المعتمدة المخرجة الأحاديث
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: []
الشروح_والمختصرات_والذيول:
  - تيسير الوصول إلى جامع الأصول لابن الديبع (مختصره)
مستوى_القارئ: متوسط
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  حذفه الأسانيد واعتماده على تجريد رزين أدخلا عليه أحاديث ليست في
  الأصول الستة بلفظها نبّه المحقق على كثير منها؛ فمن أراد التدقيق
  الإسنادي رجع إلى الأصول نفسها.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - طبعة عبد القادر الأرنؤوط
آخر_تحديث: 2026-06-12
