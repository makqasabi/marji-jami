  الوفاة_هجري: 179
  الوفاة_ميلادي: 795
العلم: متون الحديث
التصنيف_الفرعي: دواوين السنة المتقدمة
لماذا_هو_أم_في_بابه: >
  أول كتاب جامع منقح في الحديث والفقه وصل إلينا وأعظمها بركة؛ انتقاه
  مالك من نحو مائة ألف حديث في أربعين سنة، وجمع فيه إلى المرفوع آثار
  الصحابة والتابعين وعمل أهل المدينة وفتاواه، فهو ديوان فقه السلف
  الأول قبل تدوين المذاهب. قال الشافعي قبل ظهور الصحيحين: ما على ظهر
  الأرض كتاب بعد كتاب الله أصح من كتاب مالك، وعدّه قوم سادس الستة بل
  جعله بعض المغاربة في رتبة الصحيحين. رواياته المتعددة (يحيى الليثي،
  محمد بن الحسن، أبو مصعب) علمٌ قائم، وعليه انبنى مذهب المالكية كله
  وشروح عظيمة كالاستذكار والتمهيد لابن عبد البر.
