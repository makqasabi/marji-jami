ملاحظات_نقدية: >
  فيه الصحيح والحسن والضعيف المحتمل، وسكوته عن الحديث لا يلزم منه
  الاحتجاج عند المحققين، فلا يستعمله إلا من يعرف الحكم على الحديث أو
  يعتمد طبعة محكومًا على أحاديثها.
