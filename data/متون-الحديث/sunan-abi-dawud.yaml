id: sunan-abi-dawud
العنوان: سنن أبي داود
المؤلف:
  الاسم: أبو داود سليمان بن الأشعث السجستاني
  الوفاة_هجري: 275
  الوفاة_ميلادي: 889
العلم: متون الحديث
التصنيف_الفرعي: السنن الأربعة
لماذا_هو_أم_في_بابه: >
  ديوان أحاديث الأحكام الأول؛ جمع فيه أبو داود — تلميذ أحمد — ما يدور
  عليه فقه الفقهاء من أحاديث السنن والأحكام، وقال: يكفي الفقيهَ من
  الحديث ما ضمّنته كتابي هذا، وبيّن منهجه في رسالته الشهيرة إلى أهل
  مكة وأنه يسكت عما هو صالح للاحتجاج. قال عنه الخطابي: لم يُصنف في علم
  الدين كتاب مثله، وتلقاه الفقهاء على اختلاف مذاهبهم بالقبول فهو حكم
  بينهم في أحاديث الأحكام، ومن جمعه إلى الصحيحين حصّل عامة أحاديث
  الأحكام المحتج بها، ولذا قدّمه أهل العلم أولَ السنن الأربعة.
