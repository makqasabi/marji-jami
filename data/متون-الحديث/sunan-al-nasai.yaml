id: sunan-al-nasai
العنوان: المجتبى من السنن (سنن النسائي الصغرى)
المؤلف:
  الاسم: أبو عبد الرحمن أحمد بن شعيب النسائي
  الوفاة_هجري: 303
  الوفاة_ميلادي: 915
العلم: متون الحديث
التصنيف_الفرعي: السنن الأربعة
لماذا_هو_أم_في_بابه: >
  أقل السنن الأربعة حديثًا ضعيفًا وأدقها صناعة إسنادية؛ فالنسائي أشد
  الأربعة شرطًا في الرجال حتى قال الحفاظ: شرطه أشد من شرط مسلم، وكتابه
  مدرسة في علل الحديث المبثوثة في تراجم أبوابه وتمييزه طرق الحديث
  وألفاظ رواته، فهو إلى عناية المحدثين النقاد أقرب منه إلى مجرد الجمع.
  انتقاه من سننه الكبرى لما سُئل: أكُلُّ ما فيها صحيح؟ فجرّد المجتبى
  مما تُكُلِّم فيه. به تكتمل دواوين الأحكام الأربعة، ولا يستغني عنه
  من يدرس صناعة الإسناد ودقائق الاختلاف على الرواة ووجوه نقد
  المرويات عمليًّا.
يغني_عن:
  - السنن الكبرى للنسائي (لغير المتخصص في التخريج)
يُقرأ_قبله:
  - بلوغ المرام لابن حجر
أفضل_الطبعات:
  - المحقق_أو_المعتني: عبد الفتاح أبو غدة (عناية وترقيم)
    الدار: مكتب المطبوعات الإسلامية، حلب
    السنة: 1406هـ/1986م
    المجلدات: 9 أجزاء
    ملاحظة: الطبعة المعتمدة المتداولة بترقيمها المعروف
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: [موسوعة الحديث - حديث برو, sunnah.com]
الشروح_والمختصرات_والذيول:
  - حاشية السندي على النسائي
  - ذخيرة العقبى للإثيوبي (شرح معاصر مطول)
مستوى_القارئ: متخصص
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  ليس له شرح تراثي مستوعب كأقرانه — وهو ما يسميه المحدثون من «حظ
  الكتاب» — وفيه أحاديث يسيرة تُكُلِّم فيها؛ ودقة تبويبه تحتاج قارئًا
  متمرسًا يفهم مقاصد تراجمه.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - طبعة مكتب المطبوعات الإسلامية بعناية أبي غدة
آخر_تحديث: 2026-06-12
