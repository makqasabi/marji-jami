id: sahih-al-bukhari
العنوان: الجامع المسند الصحيح المختصر من أمور رسول الله صلى الله عليه وسلم وسننه وأيامه (صحيح البخاري)
المؤلف:
  الاسم: أبو عبد الله محمد بن إسماعيل البخاري
  الوفاة_هجري: 256
  الوفاة_ميلادي: 870
العلم: متون الحديث
التصنيف_الفرعي: الصحيحان
لماذا_هو_أم_في_بابه: >
  أصح كتاب بعد كتاب الله بإجماع الأمة؛ انتقاه البخاري من ستمائة ألف
  حديث في ست عشرة سنة، واشترط فيه أعلى درجات الصحة من اتصال السند
  وعدالة الرواة وتمام الضبط، وضمّنه فقهه الدقيق في تراجم أبوابه حتى
  قيل: فقه البخاري في تراجمه. تلقته الأمة بالقبول جيلًا عن جيل، وعليه
  مدار التصحيح والاحتجاج في السنة، وخدمته الأمة بما لم يُخدم به كتاب:
  شروحًا ومستخرجات ورجالًا وأطرافًا. هو رأس الكتب الستة وأولها قراءةً
  وسماعًا وإجازة في كل بلاد الإسلام منذ اثني عشر قرنًا.
يغني_عن: []
يُقرأ_قبله:
  - نزهة النظر لابن حجر (لفهم الصناعة)
  - مختصرات الصحيح للمبتدئ (كالتجريد الصريح)
أفضل_الطبعات:
  - المحقق_أو_المعتني: لجنة من العلماء (عن النسخة اليونينية)
    الدار: المطبعة الكبرى الأميرية، بولاق (الطبعة السلطانية)
    السنة: 1311هـ
    المجلدات: 9 أجزاء
    ملاحظة: أتقن طبعات الكتاب وعليها المعوّل
  - المحقق_أو_المعتني: محمد زهير بن ناصر الناصر
    الدار: دار طوق النجاة، بيروت
    السنة: 1422هـ
    المجلدات: 9
    ملاحظة: مصورة محسنة عن السلطانية بترقيم محمد فؤاد عبد الباقي، وهي المتداولة اليوم
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: [موسوعة الحديث - حديث برو, إسلام ويب, sunnah.com]
الشروح_والمختصرات_والذيول:
  - فتح الباري لابن حجر
  - عمدة القاري للعيني
  - إرشاد الساري للقسطلاني
  - التجريد الصريح للزبيدي (مختصر)
مستوى_القارئ: مبتدئ/متوسط/متخصص
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  انتُقدت أحاديث يسيرة منه (نحو بضعة عشر موضعًا انتقدها الدارقطني)
  وأجاب عنها الحفاظ كابن حجر في مقدمة الفتح وهدي الساري، والجمهور على
  أن الصواب فيها مع البخاري في عامتها.
روابط_التحميل:
  - المصدر: المكتبة الشاملة (ط السلطانية)
    الرابط: https://shamela.ws/book/1681
    النوع: حر
  - المصدر: الموسوعة الحديثية (الدرر السنية)
    الرابط: https://dorar.net/hadith
    النوع: حر
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - الطبعة السلطانية ومصورتها بدار طوق النجاة
  - هدي الساري لابن حجر
آخر_تحديث: 2026-06-12
