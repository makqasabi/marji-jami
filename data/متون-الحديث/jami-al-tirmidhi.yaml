id: jami-al-tirmidhi
العنوان: الجامع الكبير (سنن الترمذي)
المؤلف:
  الاسم: أبو عيسى محمد بن عيسى الترمذي
  الوفاة_هجري: 279
  الوفاة_ميلادي: 892
العلم: متون الحديث
التصنيف_الفرعي: السنن الأربعة
لماذا_هو_أم_في_بابه: >
  أنفع كتب الحديث للفقيه المتفقه على الإطلاق كما قال أهل العلم؛ انفرد
  الترمذي بمنهج لم يُسبق إليه: يحكم على كل حديث صحةً وحسنًا وضعفًا،
  ويبين من أخرجه ومن في الباب من الصحابة، ثم يذكر مذاهب فقهاء الأمصار
  في المسألة، فجمع الحديث وعلله والفقه المقارن في كتاب واحد، وهو الذي
  أشاع مصطلح «الحسن» وقسّمه. قال أبو إسماعيل الهروي: جامع الترمذي
  عندي أنفع من كتاب البخاري ومسلم لأنهما لا يقف على الفائدة منهما إلا
  المتبحر والجامع يصل إلى فائدته كل أحد. وعلله الملحقة (العلل الصغير)
  أصلٌ في صناعة الحديث.
