ملاحظات_نقدية: >
  وُصف بالتساهل النسبي في التحسين والتصحيح فلا يُقلَّد حكمه بلا نظر،
  وفيه أحاديث ضعيفة بيّن هو ضعفها؛ ومصطلحاته المركبة (حسن صحيح غريب)
  بُسط شرحها في كتب المصطلح.
