id: musnad-ahmad
العنوان: مسند الإمام أحمد بن حنبل
المؤلف:
  الاسم: أبو عبد الله أحمد بن محمد بن حنبل الشيباني
  الوفاة_هجري: 241
  الوفاة_ميلادي: 855
العلم: متون الحديث
التصنيف_الفرعي: المسانيد
لماذا_هو_أم_في_بابه: >
  أعظم المسانيد وأوسع دواوين السنة المسندة على الإطلاق؛ انتقاه أحمد من
  أكثر من سبعمائة وخمسين ألف حديث فضم نحو أربعين ألفًا مرتبة على مسانيد
  الصحابة، وقال: جعلته إمامًا إذا اختلف الناس في سنة عن رسول الله صلى
  الله عليه وسلم رُجع إليه. فيه من الطرق والزوائد على الكتب الستة ما
  لا يوجد في غيره، فهو خزانة المحدثين التي لا يستغني عنها مخرِّج ولا
  باحث في طرق حديث، وقد كمل الانتفاع به في عصرنا بطبعته المحققة
  المحكوم على أحاديثها وفهارسها، فصار بحره المحيط مسلوك الشواطئ بعد أن
  كان لا يقتحمه إلا الحفاظ.
يغني_عن:
  - عامة المسانيد المتقدمة (كمسند الطيالسي والحميدي في جملة مادتهما)
يُقرأ_قبله:
  - الكتب الستة (فهو توسع بعدها لا بديل عنها)
أفضل_الطبعات:
  - المحقق_أو_المعتني: شعيب الأرنؤوط وعادل مرشد وآخرون، بإشراف عبد الله بن عبد المحسن التركي
    الدار: مؤسسة الرسالة، بيروت
    السنة: 1421هـ/2001م
    المجلدات: 50 (منها الفهارس)
    ملاحظة: الطبعة المحققة المعتمدة المحكوم على كل أحاديثها، نسخت ما قبلها
  - المحقق_أو_المعتني: أحمد محمد شاكر (غير مكتمل)
    الدار: دار المعارف، القاهرة
    السنة: ابتداء من 1365هـ
    المجلدات: 16 (بلغ نحو ثلث الكتاب)
    ملاحظة: تحقيق نفيس بأحكام شاكر، لم يتم
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: [موسوعة الحديث - حديث برو, sunnah.com]
الشروح_والمختصرات_والذيول:
  - الفتح الرباني بترتيب المسند للبنا الساعاتي (ترتيب على الأبواب مع شرح)
مستوى_القارئ: متخصص
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  فيه أحاديث ضعيفة ويسير منتقد بحكم سعته، وزيادات ابنه عبد الله
  والقطيعي تميَّز عن أصل الكتاب؛ ومسألة وجود الموضوع فيه خلاف مشهور
  بين ابن الجوزي وابن حجر الذي دافع عنه في القول المسدد.
روابط_التحميل:
  - المصدر: الموسوعة الحديثية (الدرر السنية)
    الرابط: https://dorar.net/hadith
    النوع: حر
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - مقدمة طبعة مؤسسة الرسالة
  - خصائص المسند لأبي موسى المديني
آخر_تحديث: 2026-06-12
