id: hiyal-banu-musa
العنوان: كتاب الحيل
المؤلف:
  الاسم: بنو موسى بن شاكر (محمد وأحمد والحسن)
  الوفاة_هجري: 259
  الوفاة_ميلادي: 873
العلم: الفيزياء والبصريات والحيل
التصنيف_الفرعي: الحيل (النص المؤسس)
لماذا_هو_أم_في_بابه: >
  النص المؤسس لعلم الحيل العربي وأول كتاب هندسة ميكانيكية أصيل
  بالعربية؛ وصف الإخوة الثلاثة — أعيان بيت الحكمة ورعاة الترجمة
  في عصر المأمون — مئة آلة (أكثرها لأحمد الميكانيكي) من أوانٍ
  ذاتية الحركة ونوافير متبدلة وقناديل آلية وآلات سقي، قائمة على
  مبادئ الضغط والتخلخل والصمامات والعوامات بتراكيب فاقت ميكانيكا
  اليونان (فيلون وهيرون) براعةً في التحكم الذاتي حتى عدّها
  الدارسون أول استخدام منهجي لمفاهيم الأتمتة. فالكتاب فاتحة
  التقنية العربية المبدعة — لا المترجمة — وعليه بنى الجزري بعد
  ثلاثة قرون ونصف، فهو أم الجنس ووثيقة عبقريته الأولى.
يغني_عن:
  - حيل اليونان المترجمة (في مقام الإبداع العربي)
يُقرأ_قبله: []
أفضل_الطبعات:
  - المحقق_أو_المعتني: أحمد يوسف الحسن
    الدار: معهد التراث العلمي العربي بجامعة حلب
    السنة: 1981م
    المجلدات: 1
    ملاحظة: النشرة النقدية المعتمدة (وترجمة هيل الإنجليزية 1979 قرينتها)
التوافر_الرقمي:
  المكتبة_الشاملة: لا
  منصات_أخرى: [نسخ رقمية في مكتبات التراث العلمي]
الشروح_والمختصرات_والذيول: []
مستوى_القارئ: متخصص
نوع_المرجعية: علمية_تراثية_حضارية
ملاحظات_نقدية: >
  يدخل لمرجعيته التاريخية الحضارية؛ ورسوم مخطوطاته أقل وضوحًا
  من الجزري فاعتمدت النشرة إعادة رسم تفسيرية، وأصول بعض حيله
  اليونانية مبحث قائم عند الدارسين.
حالة_التوثيق: موثّق
مصادر_التوثيق:
