id: al-manazir-ibn-al-haytham
العنوان: كتاب المناظر
المؤلف:
  الاسم: أبو علي الحسن بن الحسن ابن الهيثم
  الوفاة_هجري: 430
  الوفاة_ميلادي: 1039
العلم: الفيزياء والبصريات والحيل
التصنيف_الفرعي: البصريات (النص المؤسس)
لماذا_هو_أم_في_بابه: >
  أعظم كتاب علمي أنتجته الحضارة الإسلامية وأحد أعظم كتب العلم في
  تاريخ البشرية؛ هدم ابن الهيثم فيه نظرية الشعاع الخارج من العين
  المتوارثة عن اليونان وأثبت بالتجربة المنهجية أن الإبصار بدخول
  الضوء إلى العين، وأسس علم الضوء الحديث: انتشاره المستقيم،
  والغرفة المظلمة، والانعكاس والانكسار، وتشريح العين ووظائفها،
  وعلم النفس الإدراكي للرؤية — كل ذلك بمنهج تجريبي صارم («نعتبر»
  أي نختبر) جعله عند مؤرخي العلم أبا المنهج التجريبي قبل بيكون
  بستة قرون. ترجم للاتينية فبنى عليه كبلر وعلماء النهضة بصرياتهم،
  واحتفل العالم به في سنة الضوء الدولية 2015 مؤسسًا، فهو أم
  البصريات العالمية بلا منازع.
يغني_عن:
  - بصريات اليونان والكندي (تجاوزها منهجًا ونتائج)
يُقرأ_قبله:
  - دراسات ابن الهيثم المعاصرة (صبرة وراشد)
أفضل_الطبعات:
  - المحقق_أو_المعتني: عبد الحميد صبرة
    الدار: المجلس الوطني للثقافة والفنون والآداب (سلسلة التراث)، الكويت
    السنة: 1983م (الكتب 1–3) و2002م (الكتابان 4–5)
    المجلدات: 3 (للمنشور)
    ملاحظة: النشرة النقدية المعتمدة عالميًّا (مع ترجمة صبرة الإنجليزية للكتب 1–3 بلندن)
التوافر_الرقمي:
  المكتبة_الشاملة: لا
  منصات_أخرى: [نسخ رقمية في مكتبات التراث العلمي]
الشروح_والمختصرات_والذيول:
  - تنقيح المناظر لكمال الدين الفارسي (شرحه وتطويره)
مستوى_القارئ: متخصص
نوع_المرجعية: علمية_تراثية_حضارية
ملاحظات_نقدية: >
  يدخل لمرجعيته التاريخية الحضارية بوصفه قمة العلم العربي؛
  وبصرياته الهندسية تجاوزها الضوء الموجي والكمي طبعًا، وبعض
  الكتب السبعة لم تكتمل نشرته النقدية العربية بعد.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - نشرة صبرة الكويتية
  - دراسات تاريخ البصريات
آخر_تحديث: 2026-06-13
