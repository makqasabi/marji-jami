id: al-jami-al-jazari
العنوان: الجامع بين العلم والعمل النافع في صناعة الحيل
المؤلف:
  الاسم: بديع الزمان أبو العز إسماعيل بن الرزاز الجزري
  الوفاة_هجري: 602
  الوفاة_ميلادي: 1206
العلم: الفيزياء والبصريات والحيل
التصنيف_الفرعي: الحيل (الهندسة الميكانيكية)
لماذا_هو_أم_في_بابه: >
  أعظم كتاب في الهندسة الميكانيكية قبل عصر النهضة بإجماع مؤرخي
  التقنية؛ وصف الجزري — مهندس بلاط أرتقيي ديار بكر — خمسين آلة
  صنعها بيده في ست فئات: ساعات مائية ودموية، وأوانٍ وتحف
  للمجالس، وآلات رفع الماء، ونوافير، وأبواب مصبوبة، برسوم
  تفصيلية ملونة وتعليمات صنع دقيقة تجعل الكتاب أول «دليل هندسي
  تنفيذي» في التاريخ. وفي آلاته عمود الكامات والمرفق
  (الكرنك) ونظم التحكم الذاتي مما يعده الدارسون أصولًا مبكرة
  لعناصر الآلية الحديثة والروبوتات. ترجمه هِيل للإنجليزية ودُرس
  عالميًّا، فهو أم الحيل العربية وذروة التقنية الوسيطة بلا
  منازع.
يغني_عن:
  - كتب الحيل الوسيطة بعده (بُنيت عليه)
يُقرأ_قبله:
  - حيل بني موسى (أصل الجنس)
أفضل_الطبعات:
  - المحقق_أو_المعتني: أحمد يوسف الحسن
    الدار: معهد التراث العلمي العربي بجامعة حلب
    السنة: 1979م
    المجلدات: 1 (مجلد كبير مصور)
    ملاحظة: النشرة النقدية العربية المعتمدة (وترجمة دونالد هيل الإنجليزية 1974 قرينتها)
التوافر_الرقمي:
  المكتبة_الشاملة: لا
  منصات_أخرى: [نسخ رقمية ومخطوطات مصورة شهيرة]
الشروح_والمختصرات_والذيول: []
مستوى_القارئ: متخصص
نوع_المرجعية: علمية_تراثية_حضارية
ملاحظات_نقدية: >
  يدخل لمرجعيته التاريخية الحضارية؛ وآلاته تقنية ما قبل البخار
  تقرأ تاريخَ هندسة، ومصطلحه الصناعي يحتاج وسيط دراسات الحسن
  وهيل.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - نشرة حلب
  - ترجمة هيل ودراساته
آخر_تحديث: 2026-06-13
