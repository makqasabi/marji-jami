id: tanqih-al-manazir
العنوان: تنقيح المناظر لذوي الأبصار والبصائر
المؤلف:
  الاسم: كمال الدين الحسن بن علي الفارسي
  الوفاة_هجري: 718
  الوفاة_ميلادي: 1319
العلم: الفيزياء والبصريات والحيل
التصنيف_الفرعي: البصريات (الذروة المتأخرة)
لماذا_هو_أم_في_بابه: >
  ذروة البصريات الإسلامية بعد ابن الهيثم وصاحب أول تفسير علمي
  صحيح لقوس قزح في التاريخ؛ شرح كمال الدين الفارسي — تلميذ قطب
  الدين الشيرازي — كتابَ المناظر شرحَ منقِّح مجتهد لا ناقل،
  فصحح وطوّر، وأبدع ما فيه إلحاقه: فسّر قوسَ قزح بانكسارين
  وانعكاس داخل قطرة الماء، مثبتًا ذلك بالتجربة على كرة زجاجية
  مملوءة ماء تحاكي القطرة — وهو عين ما توصل إليه ثيودوريك
  الألماني معاصرًا له وما قرره ديكارت بعده بثلاثة قرون. فالكتاب
  وثيقة الذروة التجريبية للمدرسة وأمّ تفسير الظواهر الضوئية
  الجوية، وبه تختم البصريات الإسلامية أعظم فصولها.
يغني_عن:
  - شروح المناظر الأخرى
يُقرأ_قبله:
  - المناظر لابن الهيثم (أصله)
أفضل_الطبعات:
  - المحقق_أو_المعتني: (لجنة دائرة المعارف)
    الدار: دائرة المعارف العثمانية، حيدر آباد الدكن
    السنة: 1347–1348هـ/1928–1930م
    المجلدات: 2
    ملاحظة: النشرة المعتمدة وعنها المصورات
التوافر_الرقمي:
  المكتبة_الشاملة: لا
  منصات_أخرى: [نسخ رقمية في مكتبات التراث العلمي]
الشروح_والمختصرات_والذيول: []
مستوى_القارئ: متخصص
نوع_المرجعية: علمية_تراثية_حضارية
ملاحظات_نقدية: >
  يدخل لمرجعيته التاريخية الحضارية؛ ونشرته الهندية القديمة بحاجة
  إلى تحقيق نقدي حديث، وتفسيره للألوان بقي على نظرية عصره.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - نشرة حيدر آباد
  - دراسات تاريخ البصريات (راشد)
آخر_تحديث: 2026-06-13
