id: mizan-al-hikma
العنوان: ميزان الحكمة
المؤلف:
  الاسم: أبو الفتح عبد الرحمن الخازني
  الوفاة_هجري: 550
  الوفاة_ميلادي: 1155
العلم: الفيزياء والبصريات والحيل
التصنيف_الفرعي: الميكانيكا النظرية (علم الأثقال)
لماذا_هو_أم_في_بابه: >
  أم كتب الميكانيكا النظرية العربية وموسوعة «علم الأثقال»
  الجامعة؛ صنفه الخازني — الفلكي المروزي — حول ميزانه المائي
  الدقيق «ميزان الحكمة»، فاستوعب علم التوازن والثقل النوعي كله:
  نظريات أرسطو وأرشميدس ومن قبله من العرب (البيروني وابن الهيثم
  والأسفزاري)، وجداول الأوزان النوعية للفلزات والأحجار والسوائل
  التي بلغت من الدقة ما أدهش الفيزيائيين المحدثين، ومباحث في
  الجاذبية نحو مركز الأرض وتغير كثافة الهواء بالارتفاع، مع
  تطبيقات في كشف الغش وعيارات النقد. عدّه مؤرخو العلم أهم وثيقة
  للفيزياء النظرية الإسلامية وأنضج علم استاتيكا قبل الحداثة،
  فهو أم بابه بلا منازع.
يغني_عن:
  - رسائل الأثقال والموازين المتفرقة (جمعها)
