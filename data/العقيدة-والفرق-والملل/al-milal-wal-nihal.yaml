id: al-milal-wal-nihal
العنوان: الملل والنحل
المؤلف:
  الاسم: أبو الفتح محمد بن عبد الكريم الشهرستاني
  الوفاة_هجري: 548
  الوفاة_ميلادي: 1153
العلم: العقيدة والفرق والملل
التصنيف_الفرعي: مقارنة الأديان والفرق
لماذا_هو_أم_في_بابه: >
  أشهر كتب الملل والنحل وأكثرها انتشارًا واعتمادًا في التعريف
  بالأديان والفرق؛ امتاز الشهرستاني بمنهج وصفي منظم قلّ نظيره:
  يعرض مذهب كل فرقة وملة كما يقرره أصحابها بترتيب منطقي محكم
  وتجريد للمقالات عن الرد العنيف، حتى شهد له الدارسون قديمًا
  وحديثًا بأنه أعدل كتب الباب عرضًا وأحسنها تصنيفًا، وترجم إلى
  لغات عدة وصار مرجع الدرس الأكاديمي لتاريخ الأديان عند العرب
  والمستشرقين معًا. جمع ما تفرق في مقالات الأشعري وفرق البغدادي
  وزاد الأديان والفلسفات، فأغنى عن طبقة كتب الفرق الوسيطة، وبقي
  تسعة قرون الكتاب التعليمي الأول في فنه.
يغني_عن:
  - الفرق بين الفرق للبغدادي والتبصير في الدين للإسفراييني (في مقام العرض المنظم)
