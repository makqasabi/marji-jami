ملاحظات_نقدية: >
  مؤلفه أشعري النظر وفي نقل بعض مقالات المعتزلة والفلاسفة تصرف
  ناقشه المحققون، واتُّهم قديمًا بالميل إلى الإسماعيلية ودافع عنه
  آخرون — والمسألة مبسوطة في الدراسات — فيقرأ عرضه مع المقابلة
  بمصادر الفرق نفسها عند التدقيق.
