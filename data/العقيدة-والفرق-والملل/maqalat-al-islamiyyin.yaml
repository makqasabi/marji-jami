id: maqalat-al-islamiyyin
العنوان: مقالات الإسلاميين واختلاف المصلين
المؤلف:
  الاسم: أبو الحسن علي بن إسماعيل الأشعري
  الوفاة_هجري: 324
  الوفاة_ميلادي: 936
العلم: العقيدة والفرق والملل
التصنيف_الفرعي: مقالات الفرق ومصادرها الأولى
لماذا_هو_أم_في_بابه: >
  أوثق مصادر مقالات الفرق الإسلامية وأقدمها الجامعة؛ دوّن فيه أبو
  الحسن الأشعري — وقد خبر الاعتزال من داخله قبل رجوعه — مقالات
  المسلمين على اختلافهم: الخوارج والروافض والمعتزلة والمرجئة وأهل
  الحديث، بنقل وصفي مجرد قلّ نظيره في الإنصاف حتى اعتمد العلماء
  حكايته للمذاهب دون حكاية الخصوم، وفيه نص اعتقاد أصحاب الحديث
  الشهير الذي يحكيه عن أهل السنة. كل من كتب في الفرق بعده — من
  البغدادي إلى الشهرستاني — عيال عليه، والمستشرقون والدارسون
  المعاصرون يعدونه المصدر الأول لتاريخ الكلام الإسلامي المبكر، فهو
  أم كتب المقالات بلا منازع.
يغني_عن:
  - حكايات الفرق المتأخرة عن المرحلة المبكرة
