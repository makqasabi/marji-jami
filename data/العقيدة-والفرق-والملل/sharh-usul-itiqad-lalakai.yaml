id: sharh-usul-itiqad-lalakai
العنوان: شرح أصول اعتقاد أهل السنة والجماعة
المؤلف:
  الاسم: أبو القاسم هبة الله بن الحسن اللالكائي
  الوفاة_هجري: 418
  الوفاة_ميلادي: 1027
العلم: العقيدة والفرق والملل
التصنيف_الفرعي: دواوين العقيدة الأثرية المسندة
لماذا_هو_أم_في_بابه: >
  أجمع دواوين العقيدة السلفية المسندة وأوثقها؛ ساق اللالكائي اعتقاد
  أهل السنة في مسائله كلها — التوحيد والصفات والقرآن والقدر والصحابة
  والإيمان — بأسانيده إلى الصحابة والتابعين والأئمة المتبوعين،
  فحفظ نصوص اعتقاد السلف بألفاظها وعزوها كما تحفظ كتب الحديث متونها،
  وضمّنه عقائد مكتوبة كاملة لأئمة متقدمين لولاه لفُقدت. فهو لمذهب
  السلف بمنزلة الديوان الموثق: إليه يفزع من أراد قول الأئمة بنصه
  المسند لا بحكايته، وعليه عوّل من صنف في السنة بعده، واعتمدته
  الدراسات العقدية المعاصرة أصلًا أولَ في تحرير اعتقاد القرون الثلاثة
  الفاضلة.
يغني_عن:
  - كتب السنة المسندة المتفرقة قبله (كالسنة لعبد الله بن أحمد والإبانة لابن بطة في جملة المادة)
يُقرأ_قبله:
  - شرح العقيدة الطحاوية
أفضل_الطبعات:
  - المحقق_أو_المعتني: أحمد بن سعد بن حمدان الغامدي
    الدار: دار طيبة، الرياض
    السنة: 1402هـ وما بعدها (طبعات متكررة)
    المجلدات: 9 (ومعها كرامات الأولياء)
    ملاحظة: التحقيق المعتمد (أصله رسالة جامعية بأم القرى)
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: []
الشروح_والمختصرات_والذيول: []
مستوى_القارئ: متوسط/متخصص
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  في أسانيده الضعيف والواهي إذ مقصوده جمع المنقول فيحتاج قارئه إلى
  تمييز، وكتاب الكرامات الملحق به فيه أخبار لا تثبت نبه عليها
  المحقق.
