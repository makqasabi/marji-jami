id: sharh-al-aqaid-al-nasafiyya
العنوان: شرح العقائد النسفية
المؤلف:
  الاسم: سعد الدين مسعود بن عمر التفتازاني
  الوفاة_هجري: 793
  الوفاة_ميلادي: 1390
العلم: العقيدة والفرق والملل
التصنيف_الفرعي: شروح متون العقيدة الكلامية
لماذا_هو_أم_في_بابه: >
  أوسع متون الكلام السني المتأخر انتشارًا في التدريس على الإطلاق؛
  فمتن «العقائد» لنجم الدين عمر النسفي (ت537هـ) لخص عقيدة
  الماتريدية في وريقات، وجاء شرح التفتازاني — إمام المعقول في عصره
  — فبسطه بتحقيقات جمعت بين المدرستين الأشعرية والماتريدية وبيّنت
  مواضع وفاقهما وخلافهما، فصار الكتاب المعتمد في تدريس الكلام في
  المدارس العثمانية والهندية والأزهرية قرونًا متطاولة، وعليه من
  الحواشي ما يجاوز المئات (الخيالي والكستلي والسيالكوتي وغيرها)
  حتى عُدّ محورَ منظومة تعليمية كاملة. فمن أراد فهم الكلام السني
  المتأخر كما دُرّس فعلًا في العالم الإسلامي فلا طريق له إلا هذا
  الكتاب، وهو وثيقة الفن المعتمدة عند أهله.
يغني_عن:
  - المتون الكلامية المدرسية المتأخرة (كشروح السنوسية في المشرق)
يُقرأ_قبله:
  - الملل والنحل (لخريطة المقالات)
أفضل_الطبعات:
  - المحقق_أو_المعتني: أحمد حجازي السقا
    الدار: مكتبة الكليات الأزهرية، القاهرة
    السنة: 1408هـ/1988م (الطبعة الأولى)
    المجلدات: 1
    ملاحظة: الطبعة المحققة المعتمدة المتداولة (تحقق ويب 2026-06-13)؛ وللكتاب نشرات تركية وهندية قديمة كثيرة وحواشٍ مطبوعة معه
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: []
الشروح_والمختصرات_والذيول:
  - حواشي الخيالي والكستلي والسيالكوتي وغيرها
مستوى_القارئ: متخصص
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  كتاب صناعة كلامية خالصة بلغة منطقية مكثفة لا ينتفع به غير
  المتمرس؛ وتقريراته محل النقد المعروف عند المدرسة الأثرية، ويقرأ
  بوصفه وثيقة الدرس الكلامي التاريخية المرجعية.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - طبعة الكليات الأزهرية بتحقيق أحمد حجازي السقا 1408هـ (تحقق ويب 2026-06-13)
آخر_تحديث: 2026-06-13
