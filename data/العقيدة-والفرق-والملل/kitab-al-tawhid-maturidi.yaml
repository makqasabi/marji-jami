id: kitab-al-tawhid-maturidi
العنوان: كتاب التوحيد
المؤلف:
  الاسم: أبو منصور محمد بن محمد الماتريدي
  الوفاة_هجري: 333
  الوفاة_ميلادي: 944
العلم: العقيدة والفرق والملل
التصنيف_الفرعي: أصول المدرسة الماتريدية
لماذا_هو_أم_في_بابه: >
  الكتاب المؤسس للمدرسة الماتريدية التي انتشرت في مشارق العالم
  الإسلامي مع المذهب الحنفي قرونًا؛ بسط فيه الماتريدي — إمام أهل
  سمرقند — نظرية المعرفة وإثبات الصانع والصفات والنبوة والقدر على
  منهج يجمع النظر العقلي إلى نصوص أبي حنيفة العقدية، فصار الأصل الذي
  انبنت عليه كتب المدرسة كلها من تأويلات أهل السنة له إلى تبصرة
  الأدلة للنسفي فالمتون المتأخرة. ولكل دارس للعقائد الإسلامية —
  موافقًا أو مخالفًا — حاجة قائمة إليه بوصفه النص الأم لإحدى أكبر
  مدرستين كلاميتين عند أهل السنة، ولا يُفهم تاريخ علم الكلام السني
  المشرقي إلا به.
يغني_عن:
  - الاستدلال غير المباشر لمذهب الماتريدي من كتب أتباعه
يُقرأ_قبله:
  - شرح العقائد النسفية (لتصور المدرسة مستقرة قبل أصلها)
أفضل_الطبعات:
  - المحقق_أو_المعتني: فتح الله خليف
    الدار: دار الجامعات المصرية، الإسكندرية
    السنة: 1970م
    المجلدات: 1
    ملاحظة: النشرة الأولى المعتمدة التي عرّفت بالكتاب
  - المحقق_أو_المعتني: بكر طوبال أوغلو ومحمد آروشي
    الدار: مكتبة الإرشاد، استانبول (بالتعاون مع دار صادر)
    السنة: 1423هـ/2003م وما حولها
    المجلدات: 1
    ملاحظة: تحقيق أكاديمي تركي أتقن وأوفى
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: []
الشروح_والمختصرات_والذيول:
  - تأويلات أهل السنة للماتريدي (قسيمه في التفسير العقدي)
مستوى_القارئ: متخصص
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  عبارته صعبة معقدة حتى وصفها الدارسون بالاستغلاق، ونسخه الخطية
  نادرة فالنشرات بحاجة دائمة لمراجعة؛ ومنهجه الكلامي محل نقد المدرسة
  الأثرية المثبت في كتب الخلاف العقدي.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - نشرة فتح الله خليف
  - دراسات المدرسة الماتريدية الأكاديمية
آخر_تحديث: 2026-06-12
