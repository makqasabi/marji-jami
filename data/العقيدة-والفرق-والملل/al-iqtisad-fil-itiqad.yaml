id: al-iqtisad-fil-itiqad
العنوان: الاقتصاد في الاعتقاد
المؤلف:
  الاسم: أبو حامد محمد بن محمد الغزالي
  الوفاة_هجري: 505
  الوفاة_ميلادي: 1111
العلم: العقيدة والفرق والملل
التصنيف_الفرعي: أمهات المدرسة الأشعرية
لماذا_هو_أم_في_بابه: >
  أنضج عرض وسيط لعقيدة الأشاعرة بقلم أنبه أعلامها؛ حرر فيه الغزالي
  مسائل الإلهيات والنبوات والسمعيات والإمامة على طريقة المدرسة في
  أوج استوائها، بمنهج سماه «الاقتصاد»: توسط بين تجريد المتكلمين
  المغلق وتقليد العوام، وعدّه هو نفسه أبلغ من كتبه الكلامية الأخرى
  في تحقيق المقصود. فمن أراد عقيدة الأشاعرة من نصها المعتمد — لا من
  حكاية خصومها — فهذا بابها الأوسط الجامع، وقد بقي عمدة الدرس
  الأشعري ومرجع الدراسات الأكاديمية لكلام الغزالي ومدرسته، وهو مع
  مقالات الأشعري وكتاب الماتريدي ثالوث النصوص الأم للكلام السني
  بمدرستيه في هذا المستودع.
يغني_عن:
  - المتون الأشعرية الوسيطة (كالإرشاد للجويني في مقام التحصيل الأول)
يُقرأ_قبله:
  - الملل والنحل (لتصور خريطة المقالات)
أفضل_الطبعات:
  - المحقق_أو_المعتني: حسين آتاي وإبراهيم آغاه چوبقچي
    الدار: كلية الإلهيات بجامعة أنقرة
    السنة: 1962م
    المجلدات: 1
    ملاحظة: النشرة النقدية المعتمدة في الدراسات وعنها مصورات وطبعات لاحقة
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: []
الشروح_والمختصرات_والذيول: []
مستوى_القارئ: متخصص
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  يمثل الطور الكلامي من فكر الغزالي قبل تحولاته الأخيرة في إلجام
  العوام؛ ومنهجه الكلامي محل النقد المعروف عند المدرسة الأثرية
  المبسوط في كتب ابن تيمية، ويُقرأ بوصفه نصًّا مذهبيًّا مرجعيًّا لا
  حكمًا نهائيًّا.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - نشرة أنقرة 1962
  - دراسات الغزالي الأكاديمية
