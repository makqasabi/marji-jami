id: dar-taarud-al-aql-wal-naql
العنوان: درء تعارض العقل والنقل
المؤلف:
  الاسم: تقي الدين أحمد بن عبد الحليم ابن تيمية
  الوفاة_هجري: 728
  الوفاة_ميلادي: 1328
العلم: العقيدة والفرق والملل
التصنيف_الفرعي: أمهات المدرسة الأثرية النظرية
لماذا_هو_أم_في_بابه: >
  أعظم كتب ابن تيمية النظرية وذروة المشروع الأثري في محاكمة الكلام
  والفلسفة؛ صنفه لنقض «القانون الكلي» عند الرازي ومدرسته القاضي
  بتقديم العقل على النقل عند توهم التعارض، فبسط في نقضه وجوهًا
  تجاوزت الأربعين، مستوعبًا في أثنائها مذاهب المتكلمين والفلاسفة
  بنصوصها — حتى صار الكتاب خزانة نصوص لمذاهب بعض أصحابها مفقودة
  الكتب — ومؤسسًا قاعدته أن صريح المعقول لا يعارض صحيح المنقول.
  عدّه الدارسون من أعمق ما أنتجه الفكر الإسلامي في نظرية المعرفة
  الدينية، وهو المرجع الذي لا غنى عنه لدارس العلاقة بين الوحي
  والعقل في الإسلام من أي مدرسة كان.
يغني_عن:
  - بيان تلبيس الجهمية (في جملة المقاصد النظرية)
يُقرأ_قبله:
  - شرح العقيدة الطحاوية
  - الملل والنحل (لمعرفة المقالات التي يحاكمها)
أفضل_الطبعات:
  - المحقق_أو_المعتني: محمد رشاد سالم
    الدار: جامعة الإمام محمد بن سعود الإسلامية، الرياض
    السنة: 1399–1403هـ/1979–1983م
    المجلدات: 11 (مع الفهارس)
    ملاحظة: التحقيق المعتمد الوحيد الكامل وعنه المصورات
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: []
الشروح_والمختصرات_والذيول:
  - دراسات ومختصرات معاصرة عدة
مستوى_القارئ: متخصص
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  كتاب نظر عالٍ طويل النفس كثير الاستطراد لا يقرؤه مبتدئ، وخصومه من
  المتكلمين يرون في نقولاته عنهم انتقاء وفي محاكمته قسوة — والجواب
  والرد مبسوطان في أدبيات الطرفين — وهو على كل حال نص لا يُتجاوز في
  بابه.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - طبعة جامعة الإمام بتحقيق رشاد سالم
آخر_تحديث: 2026-06-12
