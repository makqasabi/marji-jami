id: kitab-al-tawhid-ibn-abdulwahhab
العنوان: كتاب التوحيد الذي هو حق الله على العبيد
المؤلف:
  الاسم: محمد بن عبد الوهاب التميمي
  الوفاة_هجري: 1206
  الوفاة_ميلادي: 1792
العلم: العقيدة والفرق والملل
التصنيف_الفرعي: متون توحيد العبادة
لماذا_هو_أم_في_بابه: >
  أشهر متن أُفرد لتوحيد العبادة وأوسعها أثرًا في القرون الثلاثة
  الأخيرة؛ بناه محمد بن عبد الوهاب أبوابًا على الآيات والأحاديث
  وآثار السلف مجردة من كلام المصنف إلا تبويبًا ومسائل مستنبطة،
  فجاء كتاب نصوص خالص في تحقيق «لا إله إلا الله» وما يضادها من
  الشرك ووسائله. صار عماد الدرس العقدي في الجزيرة وما تأثر بدعوتها
  من العالم الإسلامي، تعقد له الحلقات وتترى عليه الشروح (تيسير
  العزيز الحميد، فتح المجيد، القول المفيد) حتى غدا هو وشروحه
  مكتبة قائمة. وأيًّا كان موقف الدارس من دعوة مؤلفه فالكتاب مرجع
  لا يُتجاوز لفهم أوسع حركة تجديد عقدي في العصر الحديث ونصِّها
  المؤسس.
يغني_عن:
  - رسائل توحيد العبادة المختصرة بعده (تفرعت عنه)
يُقرأ_قبله:
  - ثلاثة الأصول والقواعد الأربع للمؤلف
أفضل_الطبعات:
  - المحقق_أو_المعتني: ضمن مؤلفات الشيخ محمد بن عبد الوهاب (لجنة جامعة الإمام)
    الدار: جامعة الإمام محمد بن سعود الإسلامية، الرياض (طبعة أسبوع الشيخ)
    السنة: 1398هـ وما حولها
    المجلدات: 1 (ضمن المجموعة)
    ملاحظة: النشرة الجامعية المعتمدة المقابلة على الأصول
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: [إسلام هاوس, تطبيقات المتون]
الشروح_والمختصرات_والذيول:
  - تيسير العزيز الحميد لسليمان بن عبد الله
  - فتح المجيد لعبد الرحمن بن حسن
  - القول المفيد لابن عثيمين
مستوى_القارئ: مبتدئ/متوسط
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  حول الكتاب ودعوة مؤلفه خلاف مشهور بين مؤيد يراه إحياء للتوحيد
  ومعارض ينازع في بعض تقريراته وتنزيلاتها، والردود والمدافعات
  مدونة من الجانبين؛ وقد أثبت هنا لمرجعيته النصية في بابه وفق منهج
  ذكر الخلاف بإنصاف من غير حذف الكتاب المعتمد عند أهله.
روابط_التحميل:
  - المصدر: المكتبة الشاملة (جامعة الإمام)
    الرابط: https://shamela.ws/book/11318
    النوع: حر
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - طبعة جامعة الإمام ضمن مؤلفات الشيخ
آخر_تحديث: 2026-06-12
