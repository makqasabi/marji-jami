id: sharh-al-tahawiyya
العنوان: شرح العقيدة الطحاوية
المؤلف:
  الاسم: صدر الدين علي بن علي ابن أبي العز الحنفي
  الوفاة_هجري: 792
  الوفاة_ميلادي: 1390
العلم: العقيدة والفرق والملل
التصنيف_الفرعي: شروح متون العقيدة
لماذا_هو_أم_في_بابه: >
  أنفع شروح أشهر متون العقيدة قبولًا؛ فمتن الطحاوي (ت321هـ) «بيان
  اعتقاد أهل السنة والجماعة» تلقته المذاهب كلها بالقبول بوصفه عقيدة
  أبي حنيفة وصاحبيه، وجاء شرح ابن أبي العز فبسطه على منهج أهل الأثر
  مستمدًّا من تقريرات ابن تيمية وابن القيم بعبارة سهلة محررة، فجمع
  بين متن مجمَع عليه وشرح محرر سالم من الكلام المعقد. صار عمدة تدريس
  العقيدة في الجامعات والمعاهد في العالم الإسلامي منذ عقود، وأوصى به
  العلماء على اختلاف بلدانهم، فلا يُعرف كتاب عقدي وسيط جمع القبول
  والتحرير والشمول مثله، وهو باب الطالب إلى مطولات الفن.
يغني_عن:
  - الشروح الكلامية المتأخرة على الطحاوية
يُقرأ_قبله:
  - متن الطحاوية مجردًا
أفضل_الطبعات:
  - المحقق_أو_المعتني: شعيب الأرنؤوط وعبد الله بن عبد المحسن التركي
    الدار: مؤسسة الرسالة، بيروت
    السنة: 1408هـ/1988م وما بعدها
    المجلدات: 2
    ملاحظة: التحقيق المعتمد المخرج الأحاديث
  - المحقق_أو_المعتني: جماعة من العلماء بتخريج محمد ناصر الدين الألباني
    الدار: المكتب الإسلامي، بيروت
    السنة: طبعات متكررة (التاسعة 1408هـ)
    المجلدات: 1
    ملاحظة: الطبعة المتداولة قبل طبعة الرسالة
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: [طريق الإسلام, إسلام هاوس]
الشروح_والمختصرات_والذيول:
  - حواشي وتعليقات معاصرة كثيرة (ابن باز، صالح آل الشيخ وغيرهما)
مستوى_القارئ: متوسط
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  في نسبة الشرح لابن أبي العز كلام حسمته الدراسات بإثباته له؛ وكونه
  حنفيَّ الفقه أثريَّ الاعتقاد جعل بعض متكلمي الحنفية يتحفظون عليه،
  وهو من مواطن الخلاف المذهبي المعروف حول الكتاب.
روابط_التحميل:
  - المصدر: المكتبة الشاملة (ت الأرنؤوط والتركي)
    الرابط: https://shamela.ws/book/8352
    النوع: حر
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - طبعة مؤسسة الرسالة
آخر_تحديث: 2026-06-12
