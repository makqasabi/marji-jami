    الدار: دار الجيل، بيروت
    السنة: 1416هـ/1996م
    المجلدات: 5
    ملاحظة: الطبعة المحققة المتداولة
  - المحقق_أو_المعتني: (الطبعة الأم)
    الدار: المطبعة الأدبية، القاهرة
    السنة: 1317–1321هـ
    المجلدات: 5 أجزاء (وبهامشها الملل والنحل للشهرستاني)
    ملاحظة: الطبعة القديمة التي عليها إحالات الكتب المتقدمة
التوافر_الرقمي:
