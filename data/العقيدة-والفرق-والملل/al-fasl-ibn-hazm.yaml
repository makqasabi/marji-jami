  منصات_أخرى: []
الشروح_والمختصرات_والذيول: []
مستوى_القارئ: متخصص
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  حدّة ابن حزم في مخالفيه ظاهرة في الكتاب حتى عاب عليه العلماء
  لسانه، وله فيه آراء عقدية انفرد بها على أصله الظاهري (كقوله في
  الصفات) ناقشها أهل العلم؛ وحكايته لمقالات بعض الفرق من خصومها
  تحتاج موازنة بمصادرهم.
حالة_التوثيق: موثّق
