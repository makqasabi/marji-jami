id: al-fasl-ibn-hazm
العنوان: الفصل في الملل والأهواء والنحل
المؤلف:
  الاسم: أبو محمد علي بن أحمد بن حزم الأندلسي
  الوفاة_هجري: 456
  الوفاة_ميلادي: 1064
العلم: العقيدة والفرق والملل
التصنيف_الفرعي: مقارنة الأديان والفرق
لماذا_هو_أم_في_بابه: >
  أضخم موسوعة نقدية في الملل والنحل كتبها عقل واحد؛ عرض ابن حزم
  فيها أديان العالم وفلسفاته — الدهرية والسوفسطائية واليهودية
  والنصرانية والمجوسية — ثم فرق المسلمين، عرضًا مقرونًا بالنقد
  الصارم والمحاجّة النصية، وانفرد بنقده التفصيلي لأسفار العهدين
  بالتتبع النصي حتى عدّه الدارسون شرقًا وغربًا رائد النقد الأعلى
  للكتاب المقدس قبل الغرب بقرون. فهو ليس كتاب حكاية مقالات كمقالات
  الأشعري بل كتاب محاكمة ومناظرة، يمثل ذروة الجدل العقدي الأندلسي،
  ولا يستغني عنه دارس لمقارنة الأديان أو الفرق أو منهج الظاهرية في
  الاعتقاد، وأثره ممتد في كل من كتب في الباب بعده.
يغني_عن:
  - كتب الرد على أهل الكتاب المتقدمة المتفرقة
يُقرأ_قبله:
  - الملل والنحل للشهرستاني (لعرض أهدأ قبل جدله)
