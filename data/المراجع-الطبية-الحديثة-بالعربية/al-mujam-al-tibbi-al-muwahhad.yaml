id: al-mujam-al-tibbi-al-muwahhad
العنوان: المعجم الطبي الموحد (إنكليزي - فرنسي - عربي)
المؤلف:
  الاسم: منظمة الصحة العالمية واتحاد الأطباء العرب ومكتب تنسيق التعريب (إشراف محمد هيثم الخياط)
  هيئة: نعم
العلم: المراجع الطبية الحديثة بالعربية
التصنيف_الفرعي: معاجم المصطلح الطبي المؤسسية
لماذا_هو_أم_في_بابه: >
  المرجع المعياري الأول لتوحيد المصطلح الطبي العربي وأوسعها
  اعتمادًا رسميًّا؛ ثمرةُ تعاون منظمة الصحة العالمية (مكتب
  شرق المتوسط) واتحاد الأطباء العرب ومجامع اللغة ومكتب تنسيق
  التعريب على مدى عقود، حتى بلغ في طبعته الرابعة (2006) نحو
  مئة وخمسين ألف مصطلح إنكليزي-عربي، ثم صدرت إصدارته الثلاثية
  (مع الفرنسية) سنة 2009، ونسخته الشبكية تجاوزت 160 ألف
  مصطلح. أقرّته الجامعات وكليات الطب ودور النشر العلمية مرجعًا
  موحَّدًا للتعريب الطبي، فصار الفيصل عند اختلاف المقابلات
  العربية للمصطلح الأجنبي، فهو أم معاجم الطب الحديثة بالعربية
  ووثيقة المشروع التعريبي الطبي الأكبر.
يغني_عن:
  - معاجم المصطلح الطبي الأحادية الأصغر (في مقام المرجعية الموحدة)
يُقرأ_قبله: []
أفضل_الطبعات:
  - المحقق_أو_المعتني: إشراف محمد هيثم الخياط (لجان منظمة الصحة العالمية واتحاد الأطباء العرب)
    الدار: مكتبة لبنان ناشرون، بيروت (بالتعاون مع منظمة الصحة العالمية)
    السنة: 2006م (الطبعة الرابعة، إنكليزي-عربي) و2009م (الإصدارة الثلاثية)
    المجلدات: 1
    ملاحظة: الطبعة الرابعة هي المعتمدة، نحو 150 ألف مصطلح (تحقق ويب 2026-06-13)
التوافر_الرقمي:
  المكتبة_الشاملة: لا
  منصات_أخرى: [النسخة الشبكية الرسمية لمنظمة الصحة العالمية (UMD), أرشيف]
الشروح_والمختصرات_والذيول: []
مستوى_القارئ: متخصص
نوع_المرجعية: معاصرة
ملاحظات_نقدية: >
  معجم مصطلحات لا موسوعة شارحة، فلا يغني عن المراجع الطبية
  الموضوعية؛ ومقابلاته أحيانًا محل نقاش بين المعرّبين (تعدد
  المقابل المعتمد)، ويحتاج تحديثًا دوريًّا لمواكبة المستجد
  المصطلحي.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - بيانات الطبعة الرابعة ومنظمة الصحة العالمية (تحقق ويب 2026-06-13)
آخر_تحديث: 2026-06-13
