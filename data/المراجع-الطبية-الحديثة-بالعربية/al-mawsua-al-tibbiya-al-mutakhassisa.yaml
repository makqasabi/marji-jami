id: al-mawsua-al-tibbiya-al-mutakhassisa
العنوان: الموسوعة الطبية المتخصصة
المؤلف:
  الاسم: هيئة الموسوعة العربية، رئاسة الجمهورية، دمشق
  هيئة: نعم
العلم: المراجع الطبية الحديثة بالعربية
التصنيف_الفرعي: الموسوعات الطبية التأليفية
لماذا_هو_أم_في_بابه: >
  أوسع موسوعة طبية مؤلفة بالعربية أصالة على منهج علمي محكّم؛
  أنشأتها هيئة الموسوعة العربية بدمشق فرعًا متخصصًا، فحرر مئاتُ
  الأطباء الاختصاصيين موادها مرتبةً على أجهزة البدن وأمراضها
  (الهضم، القلب، الغدد، العصبية...) بعمق المرجع السريري لا
  إيجاز المعجم، موثقةً بمصادرها العالمية ومعرَّبةَ المصطلح وفق
  المعجم الطبي الموحد. صدر منها قرابة ثمانية عشر مجلدًا تباعًا
  وأُتيحت إلكترونيًّا، فصارت المرجع العربي الأول الذي يجد فيه
  الطبيب والطالب مادةً طبية محررة بلغته دون اللجوء إلى الأجنبي،
  فهي أم المراجع الطبية الموضوعية بالعربية وأرقى ثمار التأليف
  الطبي العربي المعاصر.
يغني_عن:
  - المراجع الطبية الموضوعية المترجمة الأصغر (في مقام المرجع العربي المؤصل)
يُقرأ_قبله:
  - المعجم الطبي الموحد (لضبط المصطلح)
أفضل_الطبعات:
  - المحقق_أو_المعتني: لجان من الأطباء المتخصصين بإشراف الهيئة
    الدار: هيئة الموسوعة العربية، دمشق
    السنة: صدرت المجلدات تباعًا (نحو 2000م وما بعدها؛ بلغت قرابة 18 مجلدًا)
    المجلدات: نحو 18 (مستمرة)
    ملاحظة: الطبعة الرسمية الورقية، ونسخة إلكترونية على موقع الهيئة (تحقق ويب 2026-06-13)
التوافر_الرقمي:
  المكتبة_الشاملة: لا
  منصات_أخرى: [موقع هيئة الموسوعة العربية الرسمي]
الشروح_والمختصرات_والذيول: []
مستوى_القارئ: متخصص
نوع_المرجعية: معاصرة
ملاحظات_نقدية: >
  لم تكتمل بعد (تصدر مجلداتها تباعًا وأبطأتها ظروف بلدها)،
  فتغطيتها للتخصصات متفاوتة، ومحتوى مجلداتها المبكرة يحتاج
  تحديثًا لمواكبة الطب المتغير؛ وهي للأطباء والمختصين لا لعموم
  القراء.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - موقع هيئة الموسوعة العربية وبياناتها (تحقق ويب 2026-06-13)
آخر_تحديث: 2026-06-13
