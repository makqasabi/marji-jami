id: mujam-marashi-al-tibbi
العنوان: معجم مرعشي الطبي الكبير
المؤلف:
  الاسم: محمد أسامة مرعشي
  معاصر: نعم
العلم: المراجع الطبية الحديثة بالعربية
التصنيف_الفرعي: معاجم المصطلح الطبي التأليفية
لماذا_هو_أم_في_بابه: >
  أوسع معجم طبي ثنائي أنجزه مؤلف عربي واحد وأكثرها استيعابًا
  للمصطلح المعاصر؛ صنّفه الطبيب السوري محمد أسامة مرعشي —
  أستاذ الجامعة — في طبعتيه المتقابلتين (عربي-إنكليزي
  وإنكليزي-عربي)، فجمع مئات الألوف من المصطلحات الطبية وفروعها
  الحديثة (الجزيئية والوراثية والتقنية) التي تستجد أسرع من
  تحديث المعاجم المؤسسية، مع ضبط دقيق واشتقاقات وأصول لاتينية
  ويونانية. صار منذ صدوره (مكتبة لبنان ناشرون، 2005) عمدةَ
  المترجمين الطبيين والباحثين وطلاب كليات الطب إلى جانب المعجم
  الموحد، يكمل أحدهما الآخر: الموحد مرجعية رسمية، ومرعشي أوسع
  استيعابًا للمستجد، فهو أم المعاجم الطبية الفردية المعاصرة.
يغني_عن:
  - معاجم الطب الفردية الأقدم (كقاموس حتي في مقام الاستيعاب المعاصر)
يُقرأ_قبله: []
أفضل_الطبعات:
  - المحقق_أو_المعتني: محمد أسامة مرعشي (تأليف)
    الدار: مكتبة لبنان ناشرون، بيروت
    السنة: 2005م (الطبعة الأولى) وطبعات لاحقة
    المجلدات: 2 (الاتجاهان عربي-إنكليزي وإنكليزي-عربي)
    ملاحظة: طبعات مكتبة لبنان ناشرون هي المعتمدة (تحقق ويب 2026-06-13)
التوافر_الرقمي:
  المكتبة_الشاملة: لا
  منصات_أخرى: [نسخ رقمية متداولة, تطبيقات معاجم طبية]
الشروح_والمختصرات_والذيول:
  - قاموس حتي الطبي الجديد (سلفه الذي ظل ربع قرن عمدة الباب)
مستوى_القارئ: متخصص
نوع_المرجعية: معاصرة
ملاحظات_نقدية: >
  عمل فردي فلا يحمل الصفة الرسمية للمعجم الموحد، وتقع فيه
  اختيارات تعريبية يخالف فيها المقابلَ المجمعي المعتمد، فيقرن
  به عند تحرير المصطلح الرسمي؛ ومعجم مصطلحات لا مرجع موضوعي.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - بيانات مكتبة لبنان ناشرون (تحقق ويب 2026-06-13)
آخر_تحديث: 2026-06-13
