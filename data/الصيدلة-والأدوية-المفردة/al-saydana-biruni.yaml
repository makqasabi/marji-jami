id: al-saydana-biruni
العنوان: الصيدنة في الطب
المؤلف:
  الاسم: أبو الريحان محمد بن أحمد البيروني
  الوفاة_هجري: 440
  الوفاة_ميلادي: 1048
العلم: الصيدلة والأدوية المفردة
التصنيف_الفرعي: تأصيل علم الصيدلة
لماذا_هو_أم_في_بابه: >
  الكتاب الذي أسس الصيدلة علمًا مستقلًّا عن الطب؛ افتتحه
  البيروني — عبقري الحضارة الإسلامية الموسوعي — بمقدمة خالدة
  حدّ فيها الصيدنة وصناعتها ومراتب الصيدلاني، هي أول تنظير
  لاستقلال المهنة في التاريخ، ثم ساق مفرداته بمنهجه الفريد:
  عنايةٌ فائقة بأسماء الدواء في اللغات (العربية والفارسية
  والسريانية والهندية واليونانية) وضبطِها ومرادفاتها، فجعل
  الكتاب معجمًا مقارنًا للعقاقير لا نظير له، يحل به الباحثون
  إشكالات تعيين الأدوية في النصوص القديمة إلى اليوم. كتبه في
  شيخوخته خاتمةً لعلمه، فجاء أم التأصيل النظري واللغوي للصيدلة
  وشاهدَ منهجها العلمي المقارن.
يغني_عن:
  - معاجم أسماء الأدوية المتعددة اللغات
