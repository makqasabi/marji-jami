id: tadhkirat-dawud
العنوان: تذكرة أولي الألباب والجامع للعجب العجاب (تذكرة داود)
المؤلف:
  الاسم: داود بن عمر الأنطاكي الضرير
  الوفاة_هجري: 1008
  الوفاة_ميلادي: 1599
العلم: الصيدلة والأدوية المفردة
التصنيف_الفرعي: خاتمة موسوعات الطب والمفردات الشعبية
لماذا_هو_أم_في_بابه: >
  خاتمة موسوعات الطب والصيدلة التراثية وأوسعها انتشارًا شعبيًّا
  إلى اليوم؛ جمع داود الأنطاكي — حكيم عصره الضرير الذي حفظ
  العلوم سماعًا — خلاصة الطب والمفردات في عصره العثماني: مقدمات
  نظرية ثم معجم مفردات هجائي ضخم ثم أبواب الأمراض وعلاجها، بلغة
  ميسرة قرّبت الفن لجمهور المتطببين والعطارين. صارت «تذكرة
  داود» اسمًا شعبيًّا مرادفًا لكتاب الطب نفسه في البيوت العربية
  أربعة قرون، وما زالت تطبع وتتداول في أسواق العطارة، فهي
  وثيقة الطور الأخير للفن وذاكرته الشعبية، ولا يدرس الطبُّ
  الشعبي العربي وتاريخ التداوي بالأعشاب الحديث إلا بها.
يغني_عن:
  - مجاميع الطب الشعبي العثمانية المتأخرة
يُقرأ_قبله:
  - الجامع لابن البيطار (الأصل العلمي المحرر)
أفضل_الطبعات:
  - المحقق_أو_المعتني: (طبعات مصرية مصححة)
    الدار: مكتبة ومطبعة مصطفى البابي الحلبي، القاهرة (وبهامشها طب الفقراء)
    السنة: 1371هـ/1952م وما قبلها (طبعات متكررة)
    المجلدات: 1 (مجلد كبير، وبعض الطبعات جزآن)
    ملاحظة: الطبعات المصرية المتداولة؛ لا تحقيق نقدي بعد
التوافر_الرقمي:
  المكتبة_الشاملة: لا
  منصات_أخرى: [نسخ رقمية متداولة كثيرة]
الشروح_والمختصرات_والذيول: []
مستوى_القارئ: متوسط
نوع_المرجعية: علمية_تراثية_حضارية
ملاحظات_نقدية: >
  تدخل لمرجعيتها التاريخية والشعبية لا العلمية التطبيقية؛ وفيها
  — بميزان عصرها المتأخر — خواصُّ وعجائب وطلاسم مما لا يثبت
  علمًا ولا شرعًا، نبه عليه الدارسون، فالتحذير من استعمالها
  العلاجي المباشر آكدُ من غيرها.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - طبعات الحلبي
آخر_تحديث: 2026-06-12
