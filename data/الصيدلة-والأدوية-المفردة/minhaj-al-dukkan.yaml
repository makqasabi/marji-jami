    الدار: مكتبة ومطبعة مصطفى البابي الحلبي، القاهرة
    السنة: 1360هـ/1941م
    المجلدات: 1
    ملاحظة: الطبعة المتداولة التي عليها الإحالات؛ وللكتاب تحقيقات أكاديمية حديثة جزئية
التوافر_الرقمي:
  المكتبة_الشاملة: لا
  منصات_أخرى: [نسخ رقمية متداولة]
الشروح_والمختصرات_والذيول: []
مستوى_القارئ: متخصص
نوع_المرجعية: علمية_تراثية_حضارية
ملاحظات_نقدية: >
  يدخل لمرجعيته التاريخية الحضارية لا التطبيقية — فتراكيبه لا
  تستعمل اليوم — وطبعته القديمة بحاجة إلى تحقيق نقدي كامل
  يحرر مقاديره وأسماء عقاقيره.
حالة_التوثيق: موثّق
