id: minhaj-al-dukkan
العنوان: منهاج الدكان ودستور الأعيان
المؤلف:
  الاسم: أبو المنى داود بن أبي نصر الكوهين العطار الإسرائيلي
  الوفاة_هجري: 658
  الوفاة_ميلادي: 1260
العلم: الصيدلة والأدوية المفردة
التصنيف_الفرعي: صناعة الصيدلة العملية (الأقرباذين)
لماذا_هو_أم_في_بابه: >
  أم كتب الصيدلة العملية ودستور مهنة العطارين قرونًا؛ كتبه
  الكوهين العطار — صيدلاني القاهرة في العصر الأيوبي — دليلًا
  عمليًّا شاملًا للدكان: تركيب الأشربة والمعاجين والأقراص
  والمراهم بمقاديرها وطرق صنعها وحفظها وأزمنة صلاحيتها، وغش
  الأدوية وكشفه، وآداب الصيدلاني وأخلاق المهنة وحسبتها، فقدّم
  أول «دستور أدوية» مهني متكامل بالمعنى الحديث. تداولته دكاكين
  الشرق مرجعًا معتمدًا إلى القرن الرابع عشر الهجري — وهو عمر
  مهني لم يبلغه كتاب صيدلة — واعتمدته دراسات تاريخ المهنة
  نموذجَ الأقرباذين الأعلى، فهو أم الصيدلة التطبيقية بلا
  منازع.
يغني_عن:
  - الأقرباذينات الوسيطة المتفرقة (كأقرباذين سابور بن سهل في مقام العمل)
يُقرأ_قبله: []
أفضل_الطبعات:
