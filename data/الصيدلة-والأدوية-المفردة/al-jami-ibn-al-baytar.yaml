id: al-jami-ibn-al-baytar
العنوان: الجامع لمفردات الأدوية والأغذية
المؤلف:
  الاسم: ضياء الدين عبد الله بن أحمد ابن البيطار المالقي
  الوفاة_هجري: 646
  الوفاة_ميلادي: 1248
العلم: الصيدلة والأدوية المفردة
التصنيف_الفرعي: موسوعات المفردات الجامعة
لماذا_هو_أم_في_بابه: >
  أعظم موسوعة في الأدوية المفردة في التراث الإنساني كله قبل
  العصر الحديث؛ جمع ابن البيطار — عشّاب الأندلس الذي جاب
  المغرب والمشرق يعاين النبات في منابته — نحو ألف وأربعمئة
  مفردة دوائية وغذائية مرتبة هجائيًّا، محررًا أقوال مئة وخمسين
  مصدرًا يونانيًّا وعربيًّا منسوبة بنصها، وزائدًا نحو ثلاثمئة
  مفردة لم يذكرها ديسقوريدس وجالينوس، بمنهج نقدي يصحح أوهام من
  قبله من المعاينة. بقي المرجع الأعلى للصيدلة قرونًا وترجم
  للاتينية والفرنسية، وعدّه مؤرخو العلم ذروة النبات الطبي
  الوسيط بإطلاق، فهو أم الصيدلة العربية ودرتها التي لم
  تُتجاوز حتى الكيمياء الحديثة.
يغني_عن:
  - كتب المفردات قبله (الغافقي وابن وافد وابن سمجون — استوعبها)
