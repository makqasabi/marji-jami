مستوى_القارئ: متخصص
نوع_المرجعية: علمية_تراثية_حضارية
ملاحظات_نقدية: >
  يدخل لمرجعيته التاريخية الحضارية لا التطبيقية — فلا يُتداوى
  بوصفاته اليوم دون الرجوع لعلم العقاقير الحديث — وفي تعيين
  بعض نباتاته على الأنواع الحديثة خلاف تعالجه دراسات النبات
  الطبي التاريخية (نشرة لكلير الفرنسية وأعمال معاصرة).
