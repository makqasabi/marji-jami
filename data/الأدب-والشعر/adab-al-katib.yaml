id: adab-al-katib
العنوان: أدب الكاتب (أدب الكُتّاب)
المؤلف:
  الاسم: أبو محمد عبد الله بن مسلم بن قتيبة الدينوري
  الوفاة_هجري: 276
  الوفاة_ميلادي: 889
العلم: الأدب والشعر
التصنيف_الفرعي: أصول كتب الأدب
لماذا_هو_أم_في_بابه: >
  أول أصول فن الأدب الأربعة وأداة تقويم اللسان الأولى في التراث؛
  وضعه ابن قتيبة عدةً للكاتب المتأدب: كتاب المعرفة (ما يضعه الناس
  في غير موضعه)، وتقويم اليد (الهجاء والخط)، وتقويم اللسان (ما
  يلحن فيه)، والأبنية وتصاريفها، فجمع المعجم الوظيفي إلى فقه
  اللغة إلى التصحيح اللغوي في منهج عملي لم يُسبق إليه. عكف عليه
  المتأدبون عشرة قرون وشرحه كبار (أشهرها الاقتضاب للبطليوسي)،
  وكل كتب «الفصيح» و«لحن العامة» والتصويب اللغوي إلى مجامع اليوم
  امتداد لمشروعه. فهو أم أدب اللسان التطبيقي: به يتحول الدارس من
  عارف بالقواعد إلى مالكٍ زمامَ الاستعمال الصحيح.
يغني_عن:
  - كتب لحن العامة والفصيح المتقدمة (في جملة مقاصدها)
