id: al-shir-wal-shuara
العنوان: الشعر والشعراء
المؤلف:
  الاسم: أبو محمد عبد الله بن مسلم بن قتيبة الدينوري
  الوفاة_هجري: 276
  الوفاة_ميلادي: 889
العلم: الأدب والشعر
التصنيف_الفرعي: طبقات الشعراء ونقدهم
لماذا_هو_أم_في_بابه: >
  أم كتب طبقات الشعراء وأخبارهم، ومقدمته أول وثيقة نقدية منهجية
  في تاريخ النقد العربي؛ ترجم ابن قتيبة لنحو مئتي شاعر من
  الجاهلية إلى عصره بأخبارهم ومختار شعرهم ونقدات موجزة نافذة،
  وقدم بمقدمته الخالدة التي قسمت الشعر أضربه الأربعة (حسن اللفظ
  والمعنى...) وأعلنت المبدأ الذي صار دستور الإنصاف النقدي: «ولم
  أسلك في ذلك سبيل من قلّد أو استحسن باستحسان غيره... ونظرت إلى
  المتقدم منهم بعين الجلالة لتقدمه والمتأخر بعين الاحتقار
  لتأخره، بل رأيت الله قسم ذلك بينهم». فكل كتب الطبقات والنقد
  بعده مدينة لمنهجه، وهو المدخل المعتمد إلى خريطة الشعراء
  وأخبارهم.
يغني_عن:
  - طبقات فحول الشعراء للجمحي (في مقام التداول والشمول)
