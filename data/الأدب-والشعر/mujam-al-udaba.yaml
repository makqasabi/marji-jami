id: mujam-al-udaba
العنوان: معجم الأدباء (إرشاد الأريب إلى معرفة الأديب)
المؤلف:
  الاسم: شهاب الدين ياقوت بن عبد الله الحموي
  الوفاة_هجري: 626
  الوفاة_ميلادي: 1229
العلم: الأدب والشعر
التصنيف_الفرعي: تراجم الأدباء واللغويين
لماذا_هو_أم_في_بابه: >
  ديوان تراجم أهل القلم الأكبر؛ خصه ياقوت — الرحالة الموسوعي
  صاحب معجم البلدان — بمن «أحرز قصب السبق في ميدان الأدب»: النحاة
  واللغويين والوراقين والكتاب وأصحاب الرسائل والمؤرخين، فجمع
  أخبارهم ومصنفاتهم ومختار نثرهم وشعرهم من مصادر جمّة فُقد
  كثير منها، فحفظ تاريخ الحياة الأدبية والعلمية للأمة في تسعة
  قرون. لا نظير له في بابه: تراجم المحدثين والفقهاء لها دواوينها
  أما أهل الأدب واللغة فديوانهم هذا وحده، ولهذا لهج به الدارسون
  مرجعًا أول لكل عَلَم لغوي أو أديب، وبتحقيق إحسان عباس اكتملت
  نشرته على أتم وجوهها، فهو أم تراجم الأدباء بلا منازع.
يغني_عن:
  - مصادر تراجم اللغويين المتقدمة (كأخبار النحويين ونزهة الألباء في جملة المادة)
