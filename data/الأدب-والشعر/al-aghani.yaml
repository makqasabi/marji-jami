id: al-aghani
العنوان: الأغاني
المؤلف:
  الاسم: أبو الفرج علي بن الحسين الأصفهاني
  الوفاة_هجري: 356
  الوفاة_ميلادي: 967
العلم: الأدب والشعر
التصنيف_الفرعي: موسوعات الأدب والأخبار
لماذا_هو_أم_في_بابه: >
  ديوان العرب الأكبر وأعظم موسوعة أدبية في التراث كله؛ بناه أبو
  الفرج على الأصوات المئة المختارة للرشيد ثم انداح إلى أخبار
  الشعراء والمغنين والأيام والمجتمع من الجاهلية إلى عصره، بأسانيده
  في كل خبر، فحفظ من الشعر والأخبار وأحوال المجتمع العربي ما لو
  ضاع لما عُرف وجه الحياة العربية الأولى — قال ابن خلدون: «هو
  ديوان العرب وجامع أشتات المحاسن التي سلفت لهم في كل فن... ولا
  نعلم كتابًا يساويه». أنفق في جمعه خمسين سنة، وتهاداه الملوك،
  وعليه عوّلت كل دراسة للأدب العربي القديم وتاريخه الاجتماعي
  والفني شرقًا وغربًا، فهو أم كتب الأدب بشهادة الأمة.
يغني_عن:
  - مجاميع أخبار الشعراء المتقدمة (حفظ مادتها)
