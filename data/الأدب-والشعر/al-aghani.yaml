ملاحظات_نقدية: >
  لمؤلفه تشيع معروف ظهر في مواضع، وفي أخباره الإسرافُ والمجونُ
  وما لا يثبت سندًا — وهو كتاب أدب وأخبار لا دين ورواية — فينتقي
  القارئ المتدين ويتثبت المؤرخ.
