id: diwan-al-hamasa
العنوان: ديوان الحماسة
المؤلف:
  الاسم: حبيب بن أوس الطائي أبو تمام
  الوفاة_هجري: 231
  الوفاة_ميلادي: 845
العلم: الأدب والشعر
التصنيف_الفرعي: المختارات الشعرية الفنية
لماذا_هو_أم_في_بابه: >
  أعظم مختارات الشعر العربي أثرًا والكتاب الذي قيل فيه: «أبو تمام
  في اختياره أشعرُ منه في شعره»؛ انتقى أبو تمام — وهو محتبس في
  همذان على خزانة كتبها — عيون الشعر القديم في عشرة أبواب يقدمها
  باب الحماسة الذي سمى الديوان، بذوق شاعر فحل يلتقط البيت النادر
  من القصيدة المغمورة، فخلّد مقطوعات لشعراء لولاه ما ذُكروا. أقبل
  عليه العلماء شرحًا حتى جاوزت شروحه الثلاثين (المرزوقي والتبريزي
  أشهرها) — وما شُرح مختار شعري مثله قط — وصار مقياس الذوق
  العربي: تُروى أبياته أمثالًا وتُدرس نموذجًا للاختيار الفني، فهو
  أم المختارات الفنية كما المفضليات أم المختارات الموثقة.
يغني_عن:
  - حماسات من بعده (البحتري وابن الشجري — نسجت على منواله)
يُقرأ_قبله: []
