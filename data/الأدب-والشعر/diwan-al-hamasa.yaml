    الدار: لجنة التأليف والترجمة والنشر، القاهرة (ومصورات دار الجيل)
    السنة: 1371هـ/1951م
    المجلدات: 4
    ملاحظة: أنفس شروحه وأجلّ طبعاته
  - المحقق_أو_المعتني: بشرح التبريزي
    الدار: (طبعات متعددة عن بولاق)
    السنة: 1296هـ وما بعدها
    المجلدات: 4 أجزاء
    ملاحظة: الشرح المدرسي المتداول
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: [الموسوعة الشعرية]
الشروح_والمختصرات_والذيول:
  - شروح المرزوقي والتبريزي والأعلم (أشهر ثلاثين شرحًا)
مستوى_القارئ: متوسط
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  مقطوعات مجتزأة لا قصائد كاملة — وهذا منهجه — فلا يعطي صورة
  القصيدة العربية التامة؛ وتنسب أبيات فيه لغير قائليها أحيانًا
  حررتها الشروح.
