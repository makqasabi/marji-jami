id: diwan-al-mutanabbi
العنوان: ديوان المتنبي
المؤلف:
  الاسم: أبو الطيب أحمد بن الحسين المتنبي
  الوفاة_هجري: 354
  الوفاة_ميلادي: 965
العلم: الأدب والشعر
التصنيف_الفرعي: دواوين الفحول
لماذا_هو_أم_في_بابه: >
  ديوان «مالئ الدنيا وشاغل الناس» وأعظم دواوين العربية أثرًا
  وانتشارًا بلا منازع؛ جمع المتنبي في شعره ذروة الصنعة وذروة
  الطبع: حكمة سارت أمثالًا على كل لسان عربي إلى اليوم، وفخرًا
  ومديحًا بلغ بهما غاية الطاقة اللغوية. عُني به العلماء عناية لم
  يلقها ديوان: شروحه بالعشرات (الفسر لابن جني، التبيان المنسوب
  للعكبري، الواحدي، معجز أحمد للمعري)، وحوله قامت أضخم معارك
  النقد (الوساطة والموازنات)، وكان مادة الدرس البلاغي والنقدي
  قرونًا. فهو أم دواوين الشعراء أُدرج ممثلًا للذروة: من أراد قمة
  الشعر العربي قاطبة فديوان أبي الطيب عنوانها بإجماع الأذواق على
  اختلافها.
يغني_عن:
  - الاكتفاء به ذروةً عن دواوين المديح والحكمة المتأخرة
يُقرأ_قبله:
  - ديوان الحماسة (للتدرج في الذوق)
أفضل_الطبعات:
  - المحقق_أو_المعتني: بشرح عبد الرحمن البرقوقي
    الدار: دار الكتاب العربي، بيروت
    السنة: 1407هـ/1986م
    المجلدات: 4 (في مجلدين)
    ملاحظة: أيسر الشروح الجامعة وأكثرها تداولًا
  - المحقق_أو_المعتني: بشرح الواحدي، عناية فريدريش ديتريصي
    الدار: برلين
    السنة: 1861م
    المجلدات: 1
    ملاحظة: النشرة النقدية القديمة المعتمدة في الدراسات
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: [الموسوعة الشعرية, الديوان]
الشروح_والمختصرات_والذيول:
  - الفسر لابن جني، شرح الواحدي، التبيان، معجز أحمد للمعري
مستوى_القارئ: متوسط
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  في رواية بعض قصائده وترتيبها اختلاف بين الشروح، وفي شعره
  مواضع غلو ومعانٍ فلسفية أُخذت عليه قديمًا — وهي من ملفات النقد
  المشهورة حوله لا من عيوب الديوان مرجعًا.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - شرح البرقوقي
آخر_تحديث: 2026-06-12
