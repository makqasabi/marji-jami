id: al-kamil-mubarrad
العنوان: الكامل في اللغة والأدب
المؤلف:
  الاسم: أبو العباس محمد بن يزيد المبرد
  الوفاة_هجري: 285
  الوفاة_ميلادي: 898
العلم: الأدب والشعر
التصنيف_الفرعي: أصول كتب الأدب
لماذا_هو_أم_في_بابه: >
  أحد أصول فن الأدب الأربعة التي نص عليها ابن خلدون: «سمعنا من
  شيوخنا في مجالس التعليم أن أصول هذا الفن وأركانه أربعة دواوين:
  أدب الكاتب والكامل والبيان والتبيين والنوادر»؛ جمع المبرد فيه
  مختار الكلام العربي شعرًا ونثرًا وخطبًا ورسائل، يشرح غريبه
  ويعرب مشكله ويعلق بنوادر اللغة والنحو، فجاء مدرسة متكاملة في
  تذوق الفصيح وفهمه، وفيه نصوص تاريخية فريدة (كأخبار الخوارج
  المستوعبة). بقي ألف سنة كتاب التأديب الذي يقرأه الطالب على
  الشيوخ ليستقيم لسانه وذوقه، وهو إلى اليوم مادة الدرس الأدبي
  ومنبع شواهده الذي لا ينضب.
يغني_عن:
  - مجالس ثعلب وأمالي الزجاجي (في جملة المقصد التأديبي)
