id: al-mufaddaliyyat
العنوان: المفضليات
المؤلف:
  الاسم: المفضل بن محمد الضبي
  الوفاة_هجري: 168
  الوفاة_ميلادي: 784
العلم: الأدب والشعر
التصنيف_الفرعي: مجاميع الشعر الجاهلي الموثقة
لماذا_هو_أم_في_بابه: >
  أوثق مجموع وصل إلينا من الشعر الجاهلي وصدر الإسلام؛ اختاره
  المفضل الضبي — الراوية الكوفي الثقة الذي أجمعوا على صدقه في
  الرواية — للمهدي العباسي: نحو مئة وثلاثين قصيدة لشعراء أكثرهم
  مقلّون لولاه لضاع شعرهم كله، بروايته المتقنة التي جعلت النقاد
  يقدمون نسخته على ما سواها. فهي بعد المعلقات الديوان الثاني
  للشعر القديم وأصدقه تمثيلًا لشعر الفرسان والصعاليك وشعراء
  القبائل لا النجوم وحدهم، وعليها عوّل اللغويون في الاحتجاج
  والمؤرخون في أيام العرب، وشرحها كبار أقدمها شرح ابن الأنباري.
  فهي أم المختارات الموثقة: بها يقرأ الجاهليون من غير وسائط
  الانتحال التي شابت غيرها.
يغني_عن:
  - الأصمعيات (تكملها وتقاربها مكانة، والمفضليات أوثق وأوسع)
يُقرأ_قبله:
  - شرح المعلقات (للتأنس بالشعر الجاهلي)
أفضل_الطبعات:
  - المحقق_أو_المعتني: أحمد محمد شاكر وعبد السلام محمد هارون
    الدار: دار المعارف، القاهرة
    السنة: 1383هـ/1964م (الطبعة السادسة) وما بعدها
    المجلدات: 1
    ملاحظة: التحقيق المعتمد بشرحه الموجز
التوافر_الرقمي:
