مستوى_القارئ: متوسط/متخصص
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  في عدد قصائدها وترتيبها اختلاف بين رواياتها (رواية ابن الأعرابي
  أوسع)، ولغتها الجاهلية تحتاج شرحًا ملازمًا.
