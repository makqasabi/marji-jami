id: al-iqd-al-farid
العنوان: العقد الفريد
المؤلف:
  الاسم: أبو عمر أحمد بن محمد بن عبد ربه الأندلسي
  الوفاة_هجري: 328
  الوفاة_ميلادي: 940
العلم: الأدب والشعر
التصنيف_الفرعي: موسوعات الأدب الموضوعية
لماذا_هو_أم_في_بابه: >
  أشهر موسوعة أدبية مرتبة على الموضوعات وأكثرها تداولًا عبر
  القرون؛ نظم ابن عبد ربه كتابه عقدًا من خمسة وعشرين «جوهرة» —
  السلطان والحرب والأجواد والوفود والخطب والأمثال والنساء... —
  جمع في كل بابٍ عيونَ المنثور والمنظوم والأخبار، بذوق أندلسي
  صافٍ وعبارة سهلة جعلته كتاب المجالس والأدباء الأول. وفيه
  المفارقة المشهورة: لما وصل المشرق قال الصاحب بن عباد «هذه
  بضاعتنا رُدت إلينا» — وهي شهادة أن الرجل أحاط بأدب المشارقة حتى
  مثّلهم. فهو الباب الموضوعي الميسر إلى الأدب العربي كله: من
  أراد ما قالت العرب في معنى بعينه وجده فيه مجموعًا منتقى.
يغني_عن:
  - مجاميع الأدب الموضوعية الوسيطة (كعيون الأخبار في جملة مادته)
