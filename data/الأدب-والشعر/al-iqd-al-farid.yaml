ملاحظات_نقدية: >
  يسوق الأخبار بلا أسانيد غالبًا وفيها ما لا يثبت، وأغفل أدب
  الأندلس عجبًا وهو أندلسي — وهي ملاحظة الدارسين المشهورة عليه.
