  منصات_أخرى: []
الشروح_والمختصرات_والذيول: []
مستوى_القارئ: متخصص
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  مرجع كشف ضخم لا كتاب قراءة، ومدخله شواهد الرضي فمن طلب شاهدًا
  من غير طريقها احتاج الفهارس؛ وفي نقوله عن المفقود ما لا سبيل
  لمراجعة أصله.
