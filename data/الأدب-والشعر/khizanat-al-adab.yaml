id: khizanat-al-adab
العنوان: خزانة الأدب ولب لباب لسان العرب
المؤلف:
  الاسم: عبد القادر بن عمر البغدادي
  الوفاة_هجري: 1093
  الوفاة_ميلادي: 1682
العلم: الأدب والشعر
التصنيف_الفرعي: موسوعات الشواهد
لماذا_هو_أم_في_بابه: >
  خزانة الشعر العربي المحتج به وخاتمة الموسوعات الأدبية اللغوية؛
  صنفها البغدادي شرحًا لشواهد شرح الرضي على الكافية، فتتبع كل
  شاهد: قائله وقصته والقصيدة التي منها وروايات البيت ومعناه
  وإعرابه وتراجم أعلامه، معتمدًا مئات المصادر منها ما فُقد فبقيت
  نصوصه في الخزانة وحدها. فصارت المرجع الأعلى لتوثيق الشاهد
  الشعري: ما من محقق ديوان أو دارس نحو أو معجمي إلا يفزع إليها،
  وعدّها الدارسون أعظم عمل في نقد الرواية الشعرية وتوثيقها قبل
  المناهج الحديثة. وبفهارس طبعة هارون صارت ميسورة الكشف، فهي أم
  علم الشاهد بلا منازع ومفخرة القرن الحادي عشر.
يغني_عن:
  - شروح الشواهد المتفرقة (شواهد المغني وابن عقيل وغيرها في جملة مادتها)
يُقرأ_قبله: []
