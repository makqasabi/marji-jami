id: umdat-al-tabib
العنوان: عمدة الطبيب في معرفة النبات لكل لبيب
المؤلف:
  الاسم: أبو الخير الإشبيلي (الشجّار)
  الوفاة_هجري: 510
  الوفاة_ميلادي: 1116
العلم: النبات والحيوان والفلاحة
التصنيف_الفرعي: علم النبات (المعاجم النباتية الأندلسية)
لماذا_هو_أم_في_بابه: >
  أوسع معجم نباتي أندلسي وصل إلينا وأغناه بأسماء النبات في
  اللغات؛ صنّفه أبو الخير الإشبيلي — عالم النبات والفلاحة
  السبتي الإشبيلي الملقب بالشجّار — فوصف ألوف الأنواع النباتية
  من معاينةٍ ميدانية في الأندلس والمغرب، مُثبتًا أسماءها
  باليونانية واللاتينية والفارسية والقشتالية والأمازيغية
  والنبطية والعامية المحلية، مع عناية فريدة بالجغرافيا النباتية
  وبيئة كل نوع وتصحيح أوهام من سبقه. عوّل عليه ابن البيطار في
  جامعه وأكثر النقل عنه، واعتمدته دراسات النبات الطبي
  والمعجمية النباتية التاريخية شرقًا وغربًا مصدرًا فريدًا في
  توثيق أسماء النبات الأندلسي، فهو أم المعجم النباتي الأندلسي
  وقرين كتاب الدينوري في المشرق.
يغني_عن:
  - معاجم النبات الأندلسية المتقدمة المتفرقة (في مقام الجمع والتوثيق)
يُقرأ_قبله:
  - كتاب النبات للدينوري (الأصل المشرقي للفن)
أفضل_الطبعات:
  - المحقق_أو_المعتني: خواكين بوستمنتي وفيديريكو كورينتي ومحند تيلماتين
    الدار: المجلس الأعلى للأبحاث العلمية (CSIC)، مدريد (سلسلة المصادر العربية الإسبانية)
    السنة: 2004–2010م
    المجلدات: 4 (النص والترجمة الإسبانية والدراسة)
    ملاحظة: النشرة النقدية الكاملة المعتمدة عالميًّا (تحقق ويب 2026-06-13)
  - المحقق_أو_المعتني: محمد العربي الخطابي (نشرة سابقة)
    الدار: الرباط (المغرب)
    السنة: نحو 1990م
    ملاحظة: نشرة عربية سابقة لأجزاء منه؛ تُضبط بياناتها التفصيلية عند الاقتناء
التوافر_الرقمي:
  المكتبة_الشاملة: لا
  منصات_أخرى: [أرشيف, نسخ رقمية في مكتبات التراث العلمي]
الشروح_والمختصرات_والذيول: []
مستوى_القارئ: متخصص
نوع_المرجعية: علمية_تراثية_حضارية
ملاحظات_نقدية: >
  يدخل لمرجعيته التاريخية الحضارية لا التطبيقية؛ وتعيين أنواعه
  على النبات الحديث مبحث دراسات النبات التاريخية، وأسماؤه
  متعددة اللغات تحتاج وسيط النشرة النقدية لفكّها.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - نشرة CSIC مدريد (تحقق ويب 2026-06-13)
  - الجامع لابن البيطار (نقولُه عنه)
آخر_تحديث: 2026-06-13
