id: kitab-al-filaha-ibn-al-awwam
العنوان: كتاب الفلاحة
المؤلف:
  الاسم: أبو زكريا يحيى بن محمد ابن العوام الإشبيلي
  الوفاة_هجري: 580
  الوفاة_ميلادي: 1184
العلم: النبات والحيوان والفلاحة
التصنيف_الفرعي: علم الفلاحة (الزراعة)
لماذا_هو_أم_في_بابه: >
  أعظم كتاب زراعي في العصور الوسطى شرقًا وغربًا بإجماع مؤرخي
  العلم؛ استوعب ابن العوام — عالم إشبيلية الزراعي — مدرسةَ
  الفلاحة الأندلسية كلها (ابن بصال وابن حجاج والطغنري) وتراثَ
  المشرق واليونان، في خمس وثلاثين بابًا: الأرضون والمياه
  والأسمدة، وغراسة خمسمئة وثمانين نوعًا من الشجر والزرع،
  والتطعيم والتركيب، وطب البيطرة، مميزًا تجاربه الشخصية بقوله
  «وهذا من تجربتي». ترجمه بانكري للإسبانية وكليمان-موليه
  للفرنسية واعتمدته أوروبا الزراعية قرنًا كاملًا مرجعًا
  عمليًّا، فهو أم الفلاحة العربية وذروة أعظم مدرسة زراعية عرفها
  التاريخ الوسيط بإجماع دارسي الفن.
يغني_عن:
  - كتب الفلاحة الأندلسية قبله (استوعبها) والفلاحة النبطية (نقّى مادتها)
يُقرأ_قبله: []
أفضل_الطبعات:
  - المحقق_أو_المعتني: خوسيه أنطونيو بانكري (بالنص والترجمة الإسبانية)
    الدار: المطبعة الملكية، مدريد (ومصورات عنها)
    السنة: 1802م
    المجلدات: 2
    ملاحظة: النشرة النقدية الأم المعتمدة وعنها المصورات والإحالات
التوافر_الرقمي:
  المكتبة_الشاملة: لا
  منصات_أخرى: [نسخ رقمية في مكتبات التراث العلمي]
الشروح_والمختصرات_والذيول: []
مستوى_القارئ: متخصص
نوع_المرجعية: علمية_تراثية_حضارية
ملاحظات_نقدية: >
  يدخل لمرجعيته التاريخية الحضارية؛ وفيه نقول عن «الفلاحة
  النبطية» بما فيها من مواد فلكلورية ينتبه لها الدارس، ونشرته
  القديمة بحاجة إلى تحقيق عربي حديث.
حالة_التوثيق: موثّق
مصادر_التوثيق:
