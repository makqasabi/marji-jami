id: hayat-al-hayawan
العنوان: حياة الحيوان الكبرى
المؤلف:
  الاسم: كمال الدين محمد بن موسى الدميري
  الوفاة_هجري: 808
  الوفاة_ميلادي: 1405
العلم: النبات والحيوان والفلاحة
التصنيف_الفرعي: معاجم الحيوان الجامعة
لماذا_هو_أم_في_بابه: >
  أول معجم موسوعي للحيوان مرتب على الحروف وأوسع كتب الباب
  انتشارًا؛ جمع الدميري — الفقيه الشافعي الأزهري — تحت كل حيوان
  (نحو ألف ومئة مدخل) لغتَه وصفتَه وأحكامَه الفقهية في الأكل
  والبيع، وما ورد فيه من حديث ومثل وشعر وتعبير رؤيا وخواص، فصار
  المرجع الذي يفتح على اسم أي حيوان فيجد علومه مجموعة — وفيه
  استطرادات تاريخية نفيسة أشهرها سياقه تاريخ الخلافة كاملًا عند
  مدخل «الإوز». طبع مرارًا وترجم للفارسية والتركية والإنجليزية
  واعتمده الشراح والفقهاء قاطبة، فهو أم معاجم الحيوان في
  التراث وخاتمتها الجامعة.
يغني_عن:
  - معاجم الحيوان الوسيطة (عجائب المخلوقات في باب الحيوان ونحوها)
يُقرأ_قبله:
  - الحيوان للجاحظ (الأصل الفكري للباب)
أفضل_الطبعات:
  - المحقق_أو_المعتني: (طبعات مصرية مصححة)
    الدار: مكتبة ومطبعة مصطفى البابي الحلبي، القاهرة
    السنة: 1356هـ/1937م (وطبعات متكررة)
    المجلدات: 2
    ملاحظة: الطبعة المتداولة التي عليها الإحالات
  - المحقق_أو_المعتني: أحمد حسن بسج (ضبط)
    الدار: دار الكتب العلمية، بيروت
    السنة: 1424هـ/2003م
    المجلدات: 2
    ملاحظة: طبعة متداولة حديثة
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: []
الشروح_والمختصرات_والذيول:
  - مختصرات وذيول (كذيل السيوطي «ديوان الحيوان»)
مستوى_القارئ: متوسط
نوع_المرجعية: علمية_تراثية_حضارية
ملاحظات_نقدية: >
  يدخل لمرجعيته التاريخية الحضارية؛ وفيه من الخواص والعجائب
  والرؤيا ما لا يثبت علمًا ولا شرعًا — وهو ابن منهج عصره — فيقرأ
  وثيقةً ثقافية ومعجمَ نصوص لا علمَ حيوان تجريبيًّا.
حالة_التوثيق: موثّق
مصادر_التوثيق:
