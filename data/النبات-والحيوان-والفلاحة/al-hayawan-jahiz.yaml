id: al-hayawan-jahiz
العنوان: كتاب الحيوان
المؤلف:
  الاسم: أبو عثمان عمرو بن بحر الجاحظ
  الوفاة_هجري: 255
  الوفاة_ميلادي: 869
العلم: النبات والحيوان والفلاحة
التصنيف_الفرعي: علم الحيوان (الموسوعة المؤسسة)
لماذا_هو_أم_في_بابه: >
  أعظم موسوعة في الحيوان أنتجها التراث وأغناها فكرًا؛ جمع الجاحظ
  فيها أخبار الحيوان من مشاهداته وتجاربه — وله فيها تجارب مقصودة
  موصوفة — ومن أعراب البادية وكتب أرسطو ناقدًا لها، ونثر بين
  ذلك نظرات أذهلت الدارسين المحدثين: في تأثير البيئة على
  الحيوان وتكيفه، وتنازع البقاء وسلاسل الغذاء، والتطور الجغرافي
  للأنواع، حتى عقدت الدراسات المقارنات بينه وبين مفاهيم البيئة
  والتطور الحديثة. وهو فوق ذلك آية من آيات النثر العربي ومنجم
  اعتزاليات الجاحظ وفِكَره. فالكتاب أم علم الحيوان العربي وأمتع
  أمهات العلوم قراءةً بلا منازع، وتحقيق هارون له من ذرى التحقيق
  العربي.
يغني_عن:
  - كتب الحيوان اللغوية المتقدمة (في جملة مادتها)
