نوع_المرجعية: علمية_تراثية_حضارية
ملاحظات_نقدية: >
  يدخل لمرجعيته التاريخية الحضارية؛ وبناؤه استطرادي جاحظي لا
  ترتيب علميًّا فيه، وفيه أخبار وعجائب لا تثبت ساقها أدبًا،
  واعتزالياته مبثوثة ينتبه لها القارئ.
