الشروح_والمختصرات_والذيول: []
مستوى_القارئ: متخصص
نوع_المرجعية: علمية_تراثية_حضارية
ملاحظات_نقدية: >
  يدخل لمرجعيته التاريخية الحضارية؛ ولم يصل كاملًا — فالمتداول
  جزء أصلي وإعادة بناء من النقول — وتعيين نباتاته على الأنواع
  الحديثة مبحث دراسات النبات التاريخية.
