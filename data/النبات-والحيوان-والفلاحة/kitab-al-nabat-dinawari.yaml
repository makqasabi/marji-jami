id: kitab-al-nabat-dinawari
العنوان: كتاب النبات
المؤلف:
  الاسم: أبو حنيفة أحمد بن داود الدينوري
  الوفاة_هجري: 282
  الوفاة_ميلادي: 895
العلم: النبات والحيوان والفلاحة
التصنيف_الفرعي: علم النبات (النص المؤسس)
لماذا_هو_أم_في_بابه: >
  أم علم النبات العربي وصاحبه «شيخ علماء النبات» بإطباق من جاء
  بعده؛ وصف الدينوري — الموسوعي الجامع بين اللغة والفلك والتاريخ
  — نباتَ جزيرة العرب وصفًا علميًّا لغويًّا فريدًا: منابتها
  وأطوارها ومنافعها وأسماؤها بشواهدها من الشعر، من أفواه العرب
  ومعاينة البادية لا من كتب اليونان، فقدّم علم نبات عربيًّا
  أصيلًا عدّه الدارسون أنضج وصف نباتي قبل عصر النهضة. صار
  المرجع الذي اغترف منه اللغويون (الأزهري وابن سيده) والصيادلة
  (ابن البيطار) جميعًا، ولما أعاد لوين بناء مفقوده من نقولهم
  ثبت أن الكتاب كله بقي حيًّا في المعاجم، فهو أم الباب
  ووثيقته الأولى.
يغني_عن:
  - كتب نبات اللغويين المتقدمة (الأصمعي وأبي زيد — استوعبها)
يُقرأ_قبله: []
