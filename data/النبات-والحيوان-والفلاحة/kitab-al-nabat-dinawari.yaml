    الدار: جامعة أوبسالا (الجزء الخامس 1953) وفرانتس شتاينر بفيسبادن (إعادة بناء النصف الأول من النقول 1974)
    السنة: 1953م و1974م
    المجلدات: 2 (الواصل والمستعاد)
    ملاحظة: النشرة النقدية المعتمدة لما وصل وما استعيد من النقول
