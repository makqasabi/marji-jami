    الدار: روما (مطبعة بريل لاحقًا)، ومصورات دار المعارف ومكتبات القاهرة
    السنة: 1911م (الأصل)
    المجلدات: 1
    ملاحظة: النص العربي الأصلي وعنه المصورات المتداولة
التوافر_الرقمي:
  المكتبة_الشاملة: لا
  منصات_أخرى: [نسخ رقمية متداولة]
الشروح_والمختصرات_والذيول: []
مستوى_القارئ: متوسط
نوع_المرجعية: معاصرة
ملاحظات_نقدية: >
  كتاب قرنٍ مضى: استدركت عليه اكتشافات مدرسة مراغة وابن الشاطر
  (كنيدي وصليبا) مما لم يكن معلومًا في عصره، فيقرأ تأسيسًا
  ويُكمل بالدراسات الحديثة.
حالة_التوثيق: موثّق
مصادر_التوثيق:
