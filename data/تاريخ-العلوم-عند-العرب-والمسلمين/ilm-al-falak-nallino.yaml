id: ilm-al-falak-nallino
العنوان: علم الفلك — تاريخه عند العرب في القرون الوسطى
المؤلف:
  الاسم: كارلو ألفونسو نالينو
  الوفاة_هجري: 1357
  الوفاة_ميلادي: 1938
العلم: تاريخ العلوم عند العرب والمسلمين
التصنيف_الفرعي: الدراسات التأسيسية
لماذا_هو_أم_في_بابه: >
  الدراسة التي أسست حقل تاريخ العلوم العربية بالعربية نفسها؛
  ألقاها نالينو — ناشر زيج البتاني وأعلم أهل عصره بفلك العرب —
  محاضراتٍ بالجامعة المصرية الوليدة (1909–1910م) بعربية فصيحة
  كتبها بنفسه، فأرّخ لعلم الفلك العربي من أصوله الهندية
  والفارسية واليونانية إلى مدارسه ومراصده وأزياجه وآلاته، بمنهج
  فيلولوجي صارم ظل قرنًا كاملًا أوثق عرض عربي للحقل. فهي وثيقة
  مزدوجة: أول كتاب أكاديمي حديث بالعربية في تاريخ العلوم، وعمل
  مرجعي لم تبطله الدراسات اللاحقة بل بنت عليه، وما من باحث عربي
  في الحقل إلا وهو فاتحة مكتبته، فهي أم الدراسات التأسيسية
  للباب.
يغني_عن:
  - المداخل العامة القديمة لتاريخ الفلك العربي
يُقرأ_قبله: []
