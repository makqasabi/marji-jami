id: tarikh-al-turath-sezgin
العنوان: تاريخ التراث العربي
المؤلف:
  الاسم: محمد فؤاد سزكين
  الوفاة_هجري: 1439
  الوفاة_ميلادي: 2018
العلم: تاريخ العلوم عند العرب والمسلمين
التصنيف_الفرعي: الببليوغرافيا العلمية الكبرى
لماذا_هو_أم_في_بابه: >
  أعظم مشروع علمي فردي في خدمة التراث العربي في القرن العشرين؛
  استدرك سزكين — تلميذ ريتر وعميد معهد فرانكفورت لتاريخ العلوم —
  على بروكلمان فأعاد مسح التراث حتى عام 430هـ مسحًا استقصائيًّا:
  لكل علم مجلد أو أكثر (القرآن والحديث والفقه والتاريخ والشعر
  والطب والكيمياء والنبات والفلك والرياضيات...) يقدم له بدراسة
  تأسيسية ثم يحصي الأعلام وآثارهم ومخطوطاتهم بمواضعها في خزائن
  الدنيا. غيّر الكتاب خريطة الدرس الاستشراقي والعربي معًا —
  فأثبت أصالة علوم شكك فيها وقدّم آلاف المخطوطات المجهولة —
  وترجمته العربية (جامعة الإمام ثم مصورات) جعلته عدة كل باحث،
  فهو أم الببليوغرافيا العلمية للتراث بلا منازع.
يغني_عن:
  - بروكلمان (للقرون الأربعة الأولى خاصة؛ ويبقى بروكلمان لما بعدها)
يُقرأ_قبله: []
أفضل_الطبعات:
  - المحقق_أو_المعتني: الترجمة العربية بإشراف محمود فهمي حجازي وعرفة مصطفى وآخرين
    الدار: جامعة الإمام محمد بن سعود الإسلامية، الرياض (ثم مصورات جامعة الملك سعود ومعهد فرانكفورت)
    السنة: 1411هـ/1991م وما بعدها (صدرت المجلدات تباعًا)
    المجلدات: صدر بالعربية أكثر من 10 مجلدات (الأصل الألماني 17 مجلدًا بليدن وفرانكفورت 1967–2015)
    ملاحظة: الترجمة العربية الرسمية المعتمدة؛ والأصل الألماني (GAS) هو المرجع الأكاديمي الكامل
التوافر_الرقمي:
  المكتبة_الشاملة: لا
  منصات_أخرى: [نسخ رقمية متداولة في مكتبات المخطوطات]
الشروح_والمختصرات_والذيول:
  - محاضرات سزكين في تاريخ العلوم (مدخله الميسر)
مستوى_القارئ: متخصص
نوع_المرجعية: معاصرة
ملاحظات_نقدية: >
  وقف الأصل عند 430هـ فلا يغني عن بروكلمان لما بعدها، والترجمة
  العربية لم تكتمل لكل مجلدات الأصل وتفاوتت دقتها؛ ولسزكين
  أطروحات حماسية في أسبقيات العرب ناقشها دارسون. محتواه
  الببليوغرافي محدَّث حتى وفاته وهو أحدث حصر شامل قائم.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - الترجمة العربية والأصل الألماني
آخر_تحديث: 2026-06-13
