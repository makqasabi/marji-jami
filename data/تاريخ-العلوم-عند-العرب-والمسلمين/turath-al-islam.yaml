id: turath-al-islam
العنوان: تراث الإسلام
المؤلف:
  الاسم: جماعة من المستشرقين بتحرير جوزيف شاخت وكليفورد بوزورث
  هيئة: نعم
العلم: تاريخ العلوم عند العرب والمسلمين
التصنيف_الفرعي: الدراسات الحضارية الجامعة
لماذا_هو_أم_في_بابه: >
  أشهر عرض أكاديمي جامع لأثر الحضارة الإسلامية في الحضارة
  الإنسانية؛ حرره شاخت وبوزورث (في صيغته الثانية المنقحة 1974م)
  بأقلام كبار المتخصصين فصلًا فصلًا: أثر الإسلام في الغرب،
  والأدب والفن والعمارة، والعلوم والطب والفلسفة والتصوف والقانون
  والاقتصاد، بمنهج يؤرخ للعطاء الحضاري وانتقاله إلى أوروبا.
  وترجمته في سلسلة عالم المعرفة الكويتية (جزآن) جعلته أوسع كتب
  الحقل تداولًا بالعربية على الإطلاق: به تعرّفت أجيال القراء
  العرب على شهادة الدرس الغربي المحكم لحضارتهم، فهو أم العروض
  الحضارية الجامعة للباب وأكثرها أثرًا في الثقافة العربية
  المعاصرة.
يغني_عن:
  - العروض العامة المتفرقة لأثر الحضارة الإسلامية
يُقرأ_قبله: []
أفضل_الطبعات:
  - المحقق_أو_المعتني: ترجمة محمد زهير السمهوري وحسين مؤنس وإحسان صدقي العمد، مراجعة فؤاد زكريا
    الدار: سلسلة عالم المعرفة (العددان 8 و12)، المجلس الوطني للثقافة والفنون والآداب، الكويت
    السنة: 1978م
    المجلدات: 2
    ملاحظة: الترجمة العربية المعتمدة المتداولة، عن الأصل The Legacy of Islam بطبعة أكسفورد الثانية 1974م
التوافر_الرقمي:
  المكتبة_الشاملة: لا
  منصات_أخرى: [أرشيف سلسلة عالم المعرفة الرقمي]
الشروح_والمختصرات_والذيول: []
مستوى_القارئ: مبتدئ/متوسط
نوع_المرجعية: معاصرة
ملاحظات_نقدية: >
  كتاب استشراقي المنظور تُقرأ أحكامه التقويمية بميزانها (ولا
  سيما فصول الدين والتشريع لشاخت صاحب الأطروحات المعروفة في
  أصول الفقه التي ردّ عليها باحثون مسلمون)؛ ومادته العلمية
  بحدود سبعينيات القرن العشرين.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - ترجمة عالم المعرفة
