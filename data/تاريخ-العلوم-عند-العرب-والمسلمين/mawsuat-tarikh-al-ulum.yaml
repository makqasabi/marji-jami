id: mawsuat-tarikh-al-ulum
العنوان: موسوعة تاريخ العلوم العربية
المؤلف:
  الاسم: مجموعة من الباحثين بإشراف رشدي راشد (بمشاركة ريجيس مورلون)
  هيئة: نعم
العلم: تاريخ العلوم عند العرب والمسلمين
التصنيف_الفرعي: الموسوعات التحليلية المعاصرة
لماذا_هو_أم_في_بابه: >
  أوفى موسوعة تحليلية بالعربية لتاريخ العلوم عند العرب؛ حررها
  نخبة من كبار مؤرخي العلم العالميين بإشراف رشدي راشد — عميد
  الحقل ومحقق الرياضيات العربية الأول — في ثلاثة مجلدات: الفلك
  النظري والتطبيقي، ثم الرياضيات والفيزياء، ثم التقانة
  والكيمياء وعلوم الحياة، بمنهج تحليلي يعرض مضمون العلوم
  ومسائلها ومناهجها لا مجرد ببليوغرافيتها — فهي القرين التحليلي
  لإحصاء سزكين. صارت منذ صدورها (1997م) المرجع الجامعي العربي
  الأول للحقل: تعتمدها أقسام تاريخ العلوم والدراسات قاطبة،
  وتقدم خلاصة قرن من البحث العالمي بلسان عربي محرر، فهي أم
  المعالجة التحليلية للباب.
يغني_عن:
  - الدراسات الجزئية المتفرقة في تاريخ كل علم (في مقام المدخل الجامع)
يُقرأ_قبله: []
أفضل_الطبعات:
  - المحقق_أو_المعتني: تحرير رشدي راشد، ترجمة عن الأصل الفرنسي/الإنجليزي
    الدار: مركز دراسات الوحدة العربية، بيروت (بدعم مؤسسة عبد الحميد شومان)
    السنة: 1997م (وطبعات لاحقة)
    المجلدات: 3
    ملاحظة: الطبعة العربية الرسمية المعتمدة
التوافر_الرقمي:
  المكتبة_الشاملة: لا
  منصات_أخرى: [نسخ رقمية متداولة بحثيًّا]
الشروح_والمختصرات_والذيول: []
مستوى_القارئ: متوسط/متخصص
نوع_المرجعية: معاصرة
ملاحظات_نقدية: >
  معرّبة عن أصل أجنبي فتحمل سمات الترجمة الجماعية، وتغطيتها
  للعلوم الشرعية واللغوية خارج مقصدها (فهي للعلوم الدقيقة
  والطبيعية)؛ ومحتواها يمثل حال البحث حتى التسعينيات ويُكمل بما
  استجد في الدوريات.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - طبعة مركز دراسات الوحدة العربية
آخر_تحديث: 2026-06-13
