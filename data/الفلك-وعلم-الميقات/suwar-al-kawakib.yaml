id: suwar-al-kawakib
العنوان: صور الكواكب الثمانية والأربعين
المؤلف:
  الاسم: أبو الحسين عبد الرحمن بن عمر الصوفي الرازي
  الوفاة_هجري: 376
  الوفاة_ميلادي: 986
العلم: الفلك وعلم الميقات
التصنيف_الفرعي: علم النجوم الثوابت
لماذا_هو_أم_في_بابه: >
  أم كتب النجوم الثوابت في التراث الإنساني الوسيط كله؛ راجع
  الصوفي — فلكي عضد الدولة — فهرسَ بطليموس نجمًا نجمًا بالرصد
  المباشر، فصحح مواضع وأقدارًا وأضاف ملاحظات منها أول وصف موثق
  في التاريخ لمجرة المرأة المسلسلة (أندروميدا) «لطخة سحابية»،
  وقرن كل كوكبة بصورتين مرسومتين (كما ترى في السماء وكما على
  الكرة) مع أسماء العرب لنجومها. صار الكتاب مرجع الثوابت
  المعتمد شرقًا وغربًا سبعة قرون، وعنه دخلت أسماء النجوم
  العربية إلى أطالس أوروبا حتى اليوم (الدبران، الطائر،
  الغول...)، ومخطوطاته المصورة من روائع الفن الإسلامي، فهو أم
  بابه بإجماع مؤرخي الفلك.
يغني_عن:
  - فهارس الثوابت الوسيطة (بُنيت عليه)
يُقرأ_قبله: []
أفضل_الطبعات:
  - المحقق_أو_المعتني: (لجنة دائرة المعارف)
    الدار: دائرة المعارف العثمانية، حيدر آباد الدكن
    السنة: 1373هـ/1954م
    المجلدات: 1
    ملاحظة: النشرة المعتمدة وعنها المصورات
التوافر_الرقمي:
  المكتبة_الشاملة: لا
  منصات_أخرى: [نسخ رقمية ومخطوطات مصورة متاحة]
الشروح_والمختصرات_والذيول:
  - أراجيز وتهذيبات لاحقة عليه
مستوى_القارئ: متخصص
نوع_المرجعية: علمية_تراثية_حضارية
ملاحظات_نقدية: >
  يدخل لمرجعيته التاريخية الحضارية؛ ومواضع نجومه بإحداثيات عصره
  (مع مبادرة الاعتدالين) فلا تطابق سماء اليوم إلا بالتحويل،
  والنشرة الهندية دون مخطوطاته المصورة النفيسة.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - نشرة حيدر آباد
  - دراسات تاريخ الفلك (كونيتش في أسماء النجوم)
آخر_تحديث: 2026-06-13
