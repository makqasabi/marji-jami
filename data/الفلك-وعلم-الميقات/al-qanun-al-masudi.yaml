id: al-qanun-al-masudi
العنوان: القانون المسعودي
المؤلف:
  الاسم: أبو الريحان محمد بن أحمد البيروني
  الوفاة_هجري: 440
  الوفاة_ميلادي: 1048
العلم: الفلك وعلم الميقات
التصنيف_الفرعي: الموسوعات الفلكية الجامعة
لماذا_هو_أم_في_بابه: >
  موسوعة الفلك العربي الكبرى و«مجسطي» الحضارة الإسلامية؛ صنفه
  البيروني للسلطان مسعود الغزنوي في أحد عشر مقالة استوعبت الفن
  كله: حساب المثلثات الكروية والمسطحة بتحريرات تفوق من قبله،
  والتقاويم وأنظمتها المقارنة، والأرصاد الشمسية والقمرية
  والكوكبية بنقد منهجي لأرصاد السابقين، وتحديد خطوط الطول
  والعرض بطرق رياضية مبتكرة (ومنها طريقته الشهيرة لحساب محيط
  الأرض)، مع نزعة تجريبية نقدية تناقش حتى دوران الأرض حول
  محورها احتمالًا رياضيًّا. عدّه مؤرخو العلم أنضج عمل فلكي شامل
  قبل الحداثة وأوسعه نفَسًا علميًّا، فهو أم الفلك النظري
  والعملي في التراث ومفخرة مؤلفه الذي سمّوه «الأستاذ».
يغني_عن:
  - الموسوعات الفلكية الوسيطة قبله
يُقرأ_قبله:
  - الزيج الصابئ (الجداول قبل النظرية الموسعة)
أفضل_الطبعات:
  - المحقق_أو_المعتني: (لجنة دائرة المعارف بمراجعة مستشرقين)
    الدار: دائرة المعارف العثمانية، حيدر آباد الدكن
    السنة: 1373–1375هـ/1954–1956م
    المجلدات: 3
    ملاحظة: النشرة الكاملة المعتمدة وعنها المصورات
التوافر_الرقمي:
  المكتبة_الشاملة: لا
  منصات_أخرى: [نسخ رقمية في مكتبات التراث العلمي]
الشروح_والمختصرات_والذيول:
  - التفهيم لأوائل صناعة التنجيم للبيروني (مدخله التعليمي)
مستوى_القارئ: متخصص
نوع_المرجعية: علمية_تراثية_حضارية
ملاحظات_نقدية: >
  يدخل لمرجعيته التاريخية الحضارية؛ وهيئته بطلمية المركز وإن
  ناقش بدائلها، ونشرته الهندية تحتاج تحقيقًا نقديًّا حديثًا
  بمعايير اليوم.
حالة_التوثيق: موثّق
مصادر_التوثيق:
