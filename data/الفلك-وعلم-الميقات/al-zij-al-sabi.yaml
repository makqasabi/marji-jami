id: al-zij-al-sabi
العنوان: الزيج الصابئ
المؤلف:
  الاسم: أبو عبد الله محمد بن جابر البتاني
  الوفاة_هجري: 317
  الوفاة_ميلادي: 929
العلم: الفلك وعلم الميقات
التصنيف_الفرعي: الأزياج (الجداول الفلكية)
لماذا_هو_أم_في_بابه: >
  أعظم أزياج التراث وأدقها رصدًا، وصاحبه أشهر فلكي عربي في
  الغرب؛ رصد البتاني — من مرصده بالرقة أربعين سنة — فصحح حسابات
  بطليموس تصحيحات جوهرية: طول السنة الشمسية بدقة فارق فيها
  الصواب دقائق، وميل دائرة البروج، وحركة الأوج الشمسي مكتشفًا
  تغيره، وأحكم استعمال الجيوب بدل الأوتار اليونانية ممهدًا
  للمثلثات الحديثة. ترجم زيجه للاتينية مرتين فاعتمده الفلكيون
  الأوروبيون قرونًا — استشهد به كوبرنيكوس نفسه مرارًا في كتابه
  الثوري — وعدّه مؤرخو العلم أوثق وثيقة للفلك الرصدي الوسيط،
  فهو أم الأزياج بلا منازع وعنوان دقة الرصد العربي.
يغني_عن:
  - أزياج طبقته (زيج الممتحن وأمثاله — أدق منها رصدًا)
يُقرأ_قبله:
  - مداخل تاريخ الفلك الإسلامي المعاصرة
أفضل_الطبعات:
  - المحقق_أو_المعتني: كارلو ألفونسو نالينو (بالنص العربي والترجمة اللاتينية ودراسة)
    الدار: مطبعة ميلانو الملكية، روما/ميلانو (ومصورات معهد تاريخ العلوم بفرانكفورت)
    السنة: 1899–1907م
    المجلدات: 3
    ملاحظة: النشرة النقدية المعتمدة عالميًّا ولم تُستبدل بعد
التوافر_الرقمي:
  المكتبة_الشاملة: لا
  منصات_أخرى: [نسخ رقمية في مكتبات التراث العلمي]
الشروح_والمختصرات_والذيول: []
مستوى_القارئ: متخصص
نوع_المرجعية: علمية_تراثية_حضارية
ملاحظات_نقدية: >
  يدخل لمرجعيته التاريخية الحضارية؛ وفلكه على هيئة بطليموس
  (مركزية الأرض) المتجاوزة، وقيمته في أرصاده ومعالجاته الرياضية
  التي تقرأ بوسيط دراسات تاريخ الفلك (كنيدي وسزكين).
