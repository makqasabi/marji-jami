id: al-tadhkira-fil-haya
العنوان: التذكرة في علم الهيئة
المؤلف:
  الاسم: نصير الدين محمد بن محمد الطوسي
  الوفاة_هجري: 672
  الوفاة_ميلادي: 1274
العلم: الفلك وعلم الميقات
التصنيف_الفرعي: الهيئة النظرية (مدرسة مراغة)
لماذا_هو_أم_في_بابه: >
  نص مدرسة مراغة المؤسس وأهم كتاب في «إصلاح الهيئة البطلمية»
  قبل كوبرنيكوس؛ صاغ فيه الطوسي — مؤسس مرصد مراغة — نقد
  الفلكيين لمعضلات نظام بطليموس (معدِّل المسير المخالف لمبدأ
  الحركة الدائرية المنتظمة) وقدّم حله الرياضي الخالد: «مزدوجة
  الطوسي» التي تولّد حركة مستقيمة من دائريتين، وعليها بنى ابن
  الشاطر وقطب الدين الشيرازي نماذجهم. وأثبت مؤرخو العلم تطابق
  أدوات كوبرنيكوس الرياضية مع أدوات هذه المدرسة حتى صارت مسألة
  انتقالها إليه من أشهر قضايا تاريخ العلم. فالتذكرة أم الهيئة
  النظرية المتأخرة، وعليها شروح كثيرة كانت مقرر الفن قرونًا.
يغني_عن:
  - متون الهيئة الوسيطة (الملخص للجغميني في مقام النظر العالي)
يُقرأ_قبله: []
أفضل_الطبعات:
  - المحقق_أو_المعتني: جميل رجب (بالنص المحقق والترجمة الإنجليزية ودراسة)
    الدار: شبرنغر، نيويورك (سلسلة مصادر تاريخ العلوم)
    السنة: 1993م
    المجلدات: 2
    ملاحظة: النشرة النقدية المعتمدة عالميًّا
التوافر_الرقمي:
  المكتبة_الشاملة: لا
  منصات_أخرى: [نسخ رقمية في مكتبات التراث العلمي]
الشروح_والمختصرات_والذيول:
  - شروح التذكرة (للجرجاني والبرجندي وغيرهما)
مستوى_القارئ: متخصص
نوع_المرجعية: علمية_تراثية_حضارية
ملاحظات_نقدية: >
  يدخل لمرجعيته التاريخية الحضارية؛ وهو إصلاح داخل المركزية
  الأرضية لا خروج عليها، ولا نشرة عربية حديثة متداولة له —
  فالاعتماد على نشرة رجب — وهي فجوة نشر عربية معلنة.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - نشرة جميل رجب
  - دراسات مدرسة مراغة (صليبا وكنيدي)
آخر_تحديث: 2026-06-13
