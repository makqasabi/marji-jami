ملاحظات_نقدية: >
  فيه نزعة اعتزالية ظاهرة في تعليلاته (شيخه أبو علي الفارسي
  ومدرسته)، وبعض أقيسته توسّع فيها حتى تعقبه المتأخرون؛ وذلك لا
  يمس قيمته المنهجية.
