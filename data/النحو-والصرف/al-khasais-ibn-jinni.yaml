id: al-khasais-ibn-jinni
العنوان: الخصائص
المؤلف:
  الاسم: أبو الفتح عثمان بن جني الموصلي
  الوفاة_هجري: 392
  الوفاة_ميلادي: 1002
العلم: النحو والصرف
التصنيف_الفرعي: أصول النحو وفلسفة العربية
لماذا_هو_أم_في_بابه: >
  أعظم كتاب في فلسفة العربية وأصول نحوها، ولا نظير له في التراث
  اللغوي كله؛ لم يصنف ابن جني كتاب قواعد بل كتاب «لماذا»: لماذا
  أُعربت العربية؟ ما العلة والقياس والسماع وحدودها؟ كيف تتصرف
  اللغة في الاشتقاق الأكبر والتصاقب بين اللفظ والمعنى؟ فأسس بذلك
  أصول النحو علمًا — كما الأصول للفقه — وفتح أبوابًا في فقه اللغة
  وعلم الدلالة عدّها الدارسون المحدثون شرقًا وغربًا سبقًا منهجيًّا
  مدهشًا، حتى صار أكثر كتب التراث اللغوي استشهادًا في الدرس
  اللساني المعاصر. فهو أم النظر اللغوي العالي: به يتحول الدارس من
  حافظ قواعد إلى فاهم للسان العرب وأسراره.
يغني_عن:
  - سر صناعة الإعراب لابن جني (في جملة المقاصد النظرية)
يُقرأ_قبله:
  - شرح ابن عقيل ومغني اللبيب (لا يفتح إلا بعد إحكام الصناعة)
