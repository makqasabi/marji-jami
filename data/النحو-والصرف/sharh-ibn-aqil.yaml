id: sharh-ibn-aqil
العنوان: شرح ابن عقيل على ألفية ابن مالك
المؤلف:
  الاسم: بهاء الدين عبد الله بن عقيل العقيلي
  الوفاة_هجري: 769
  الوفاة_ميلادي: 1367
العلم: النحو والصرف
التصنيف_الفرعي: شروح الألفية (متن الدرس الأول)
لماذا_هو_أم_في_بابه: >
  عمدة تعليم النحو في العالم الإسلامي منذ سبعة قرون؛ فألفية ابن
  مالك (ت672هـ) هي المتن الذي أطبقت الأمة على حفظه — ألف بيت جمعت
  النحو والصرف — وشرح ابن عقيل أوسط شروحها وأوفقها للتعليم: عبارة
  سهلة تحل البيت وتقرر القاعدة وتعرب الشاهد من غير استطراد يرهق
  ولا إيجاز يخل، حتى قيل فيه قول الشافعية في صاحبه: «ما تحت أديم
  السماء أنحى من ابن عقيل». فهو الكتاب الذي تعلمت به أجيال الأمة
  النحو في الأزهر والزيتونة والحرمين وشناقطة الصحراء إلى جامعات
  اليوم، وبتحقيق محيي الدين عبد الحميد وحاشيته صار نسخة الدرس
  المعيارية، فهو أم كتب تعليم النحو بلا منازع.
يغني_عن:
  - شروح الألفية التعليمية الأخرى (كالمكودي والأشموني في مقام الدرس الأول)
يُقرأ_قبله:
  - الآجرومية بشرح ميسر
أفضل_الطبعات:
  - المحقق_أو_المعتني: محمد محيي الدين عبد الحميد (ومعه حاشيته «منحة الجليل»)
    الدار: دار التراث، القاهرة (ومطبعة السعادة)
    السنة: 1400هـ/1980م (الطبعة العشرون)
    المجلدات: 4
    ملاحظة: طبعة الدرس المعتمدة بحاشيتها
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: [إسلام هاوس, تطبيقات المتون]
الشروح_والمختصرات_والذيول:
  - حاشية الخضري عليه
مستوى_القارئ: مبتدئ/متوسط
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  شرح تعليمي لا يستقصي الخلاف العالي ولا يحقق المذاهب؛ يصعد منه
  الطالب إلى المغني وشرح الرضي.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - طبعة محيي الدين عبد الحميد
آخر_تحديث: 2026-06-12
