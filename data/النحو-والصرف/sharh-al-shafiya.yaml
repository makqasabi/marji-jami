id: sharh-al-shafiya
العنوان: شرح شافية ابن الحاجب
المؤلف:
  الاسم: رضي الدين محمد بن الحسن الأسترآباذي
  الوفاة_هجري: 686
  الوفاة_ميلادي: 1287
العلم: النحو والصرف
التصنيف_الفرعي: أمهات الصرف
لماذا_هو_أم_في_بابه: >
  أم كتب الصرف عند المتأخرين وذروة التحقيق في هذا الفن؛ فشافية
  ابن الحاجب هي متن الصرف الذي عليه المدار كما كافيته في النحو،
  وجاء شرح الرضي فاستوعب مذاهب الصرفيين في الأبنية والإعلال
  والإبدال والإدغام بتعليل عميق وتحرير حر يناقش الأئمة ويرجح،
  حتى صار المرجع الذي يفزع إليه في كل مسألة صرفية دقيقة، وقرنه
  أهل الفن بشرحه على الكافية جناحين لتحقيق علمي العربية. والطبعة
  المتداولة معها شرح شواهده للبغدادي صاحب الخزانة فاجتمع تحقيق
  المتن وتحرير الشاهد. لا يعرف الصرف العالي من لم يقرأه، ولا
  أُلّف بعده ما يغني عنه.
يغني_عن:
  - شروح الشافية الأخرى (كشرح الجاربردي) والمطولات الصرفية المتأخرة
يُقرأ_قبله:
  - قسم الصرف من شرح ابن عقيل
أفضل_الطبعات:
  - المحقق_أو_المعتني: محمد نور الحسن ومحمد الزفزاف ومحمد محيي الدين عبد الحميد (ومعه شرح شواهده للبغدادي)
    الدار: دار الكتب العلمية، بيروت (عن الطبعة المصرية 1356هـ)
    السنة: 1395هـ/1975م
    المجلدات: 4 (مع شرح الشواهد)
    ملاحظة: الطبعة المعتمدة المتداولة
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: []
الشروح_والمختصرات_والذيول:
  - شرح شواهد الشافية لعبد القادر البغدادي (ملازم له)
مستوى_القارئ: متخصص
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  صعب المأخذ لعمق تعليله، لا ينتفع به مبتدئ؛ وفيه مواضع اجتهد
  فيها على خلاف الجمهور حررتها الدراسات الصرفية.
روابط_التحميل:
  - المصدر: المكتبة الشاملة (ت محيي الدين ورفاقه)
    الرابط: https://shamela.ws/book/21567
    النوع: حر
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - الطبعة المصرية ومصوراتها
آخر_تحديث: 2026-06-12
