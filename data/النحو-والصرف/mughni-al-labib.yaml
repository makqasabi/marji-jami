id: mughni-al-labib
العنوان: مغني اللبيب عن كتب الأعاريب
المؤلف:
  الاسم: جمال الدين عبد الله بن يوسف ابن هشام الأنصاري
  الوفاة_هجري: 761
  الوفاة_ميلادي: 1360
العلم: النحو والصرف
التصنيف_الفرعي: نحو الأدوات والإعراب التطبيقي
لماذا_هو_أم_في_بابه: >
  أنفع كتب النحو التطبيقي على الإطلاق والكتاب الذي قيل في صاحبه:
  «ظهر بمصر من هو أنحى من سيبويه»؛ بناه ابن هشام بناءً مبتكرًا لم
  يسبق إليه: رتب حروف المعاني والأدوات (إنْ، ما، الواو، حتى...)
  مرتبة معجميًّا محررًا معانيها وأوجه إعرابها، ثم عقد بابه الشهير
  في قواعد الإعراب وأحوال المعرِب وأغلاط المعربين، فصار الكتاب
  عدة المفسر والمعرب والفقيه: لا يستغني عنه من يعرب آية أو يحرر
  دلالة أداة في نص شرعي، ولهذا تداولته الحواشي (الدسوقي، الأمير)
  والدرس قرونًا. فهو أم نحو النص — النحو وهو يعمل في الكلام لا في
  القاعدة المجردة — ولا نظير له في بابه.
يغني_عن:
  - كتب حروف المعاني قبله (كالجنى الداني في جملة مادته)
يُقرأ_قبله:
  - شرح ابن عقيل
أفضل_الطبعات:
  - المحقق_أو_المعتني: مازن المبارك ومحمد علي حمد الله (بمراجعة سعيد الأفغاني)
    الدار: دار الفكر، دمشق/بيروت
    السنة: 1985م (الطبعة السادسة)
    المجلدات: 1 (مجلد كبير)
    ملاحظة: الطبعة المحققة المعتمدة في الدرس
  - المحقق_أو_المعتني: عبد اللطيف محمد الخطيب
    الدار: المجلس الوطني للثقافة (التراث العربي)، الكويت
    السنة: 1421هـ/2000م
    المجلدات: 7
    ملاحظة: أوفى التحقيقات وأوسعها
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: []
الشروح_والمختصرات_والذيول:
  - حاشية الدسوقي وحاشية الأمير
  - شروح شواهده (كشرح شواهد المغني للسيوطي)
مستوى_القارئ: متوسط/متخصص
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  لابن هشام اختيارات يخالف فيها الجمهور نوقشت في الحواشي، وترتيبه
  على الأدوات لا الأبواب يجعله مرجع كشف وقراءة موضعية لا متن درس
  متسلسل.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - طبعة مازن المبارك
  - ثناء ابن خلدون عليه في المقدمة
آخر_تحديث: 2026-06-12
