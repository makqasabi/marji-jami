id: al-nahw-al-wafi
العنوان: النحو الوافي
المؤلف:
  الاسم: عباس حسن
  الوفاة_هجري: 1398
  الوفاة_ميلادي: 1978
العلم: النحو والصرف
التصنيف_الفرعي: المراجع الحديثة الجامعة
لماذا_هو_أم_في_بابه: >
  أوسع مرجع حديث جامع للنحو العربي وأكثرها اعتمادًا في الدرس
  الجامعي؛ صنفه عباس حسن — عضو مجمع اللغة العربية بالقاهرة — على
  منهج مزدوج فريد: متن ميسر بالعربية المعاصرة لعموم الدارسين،
  وهوامش «زيادة وتفصيل» تحرر الخلاف العالي ومذاهب النحاة للباحثين،
  فاستوعب في أربعة مجلدات النحو كله مع آراء المجمع وتيسيراته
  واختيارات المؤلف الجريئة في قضايا التيسير. صار منذ صدوره المرجع
  الأول لطلاب الجامعات والمعلمين والمحررين في العالم العربي: به
  يصل القارئ المعاصر إلى خلاصة التراث النحوي من غير معاناة عبارة
  القدماء، فهو أم المراجع النحوية الحديثة وجسرها المعتمد إلى
  الأمهات.
يغني_عن:
  - المراجع الجامعية الحديثة في النحو (في عمومها)
يُقرأ_قبله: []
أفضل_الطبعات:
  - المحقق_أو_المعتني: (تأليف معاصر منقح)
    الدار: دار المعارف، القاهرة
    السنة: طبعات متكررة منقحة (الطبعة الخامسة عشرة وما حولها)
    المجلدات: 4
    ملاحظة: طبعات دار المعارف المنقحة هي المعتمدة
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: [نسخ رقمية متداولة]
الشروح_والمختصرات_والذيول: []
مستوى_القارئ: مبتدئ/متوسط
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  للمؤلف اختيارات تيسيرية خالف فيها الجمهور انتقدها محافظون،
  وعرضه المطول قد يغني عن الأمهات في الظاهر فيكتفي به من حقه
  الصعود إليها؛ وهو مرجع لا متن درس متسلسل.
حالة_التوثيق: موثّق
مصادر_التوثيق:
