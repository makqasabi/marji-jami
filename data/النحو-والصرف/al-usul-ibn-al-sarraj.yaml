id: al-usul-ibn-al-sarraj
العنوان: الأصول في النحو
المؤلف:
  الاسم: أبو بكر محمد بن السري بن السراج
  الوفاة_هجري: 316
  الوفاة_ميلادي: 929
العلم: النحو والصرف
التصنيف_الفرعي: أمهات التقعيد المنظم
لماذا_هو_أم_في_بابه: >
  الكتاب الذي «عُقّل» به النحو كما قالت العبارة المشهورة: «ما زال
  النحو مجنونًا حتى عقّله ابن السراج بأصوله»؛ أعاد تلميذ المبرد
  بناء الفن كله على القسمة العقلية المنطقية: رتب الأبواب ترتيبًا
  محكمًا يجمع النظائر ويفصل الأقسام، وميز المطرد من الشاذ، فوضع
  الهيكل الذي صارت عليه كتب النحو إلى يومنا — فترتيب الألفية
  وشروحها سليل ترتيبه. وهو مع ذلك خزانة أقوال البصريين محررة
  ومذاهب شيخه ومخالفيه، فجمع بين كونه وثيقة تاريخ الفن في لحظة
  نضجه وكونه مرجعًا حيًّا في مسائله، ولا يستغني عنه دارس لتطور
  النحو ولا محقق في مسألة خلافية.
