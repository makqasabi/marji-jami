id: al-kitab-sibawayh
العنوان: الكتاب
المؤلف:
  الاسم: عمرو بن عثمان بن قنبر سيبويه
  الوفاة_هجري: 180
  الوفاة_ميلادي: 796
العلم: النحو والصرف
التصنيف_الفرعي: النص المؤسس
لماذا_هو_أم_في_بابه: >
  «قرآن النحو» كما لقبه النحاة؛ أول كتاب كامل في علم من علوم
  العربية وأعظمها أثرًا على الإطلاق: استوعب سيبويه فيه نحو العربية
  وصرفها وأصواتها استقراءً من كلام العرب الفصحاء وعن شيوخه الخليل
  ويونس وأبي عمرو، بتحليل وصفي عبقري سبق علم اللغة الحديث بألف
  سنة في مباحث كالإدغام ومخارج الحروف والعامل. لم يجرؤ أحد على
  تسميته فقيل «الكتاب» إطلاقًا، وقالوا: من أراد أن يعمل كتابًا في
  النحو بعد سيبويه فليستحِ. عليه قامت المدرستان البصرية والكوفية
  ردًّا وقبولًا، وكل نحو كُتب بعده حاشية عليه، وهو إلى اليوم
  المرجع الأعلى الذي يحتكم إليه في كل مسألة.
