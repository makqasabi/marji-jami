ملاحظات_نقدية: >
  عبارته القديمة المكثفة من أصعب نصوص التراث، لا يفتحها إلا متمرس
  بشروحها ومصطلحه الخاص؛ وما فيه من شواهد مجهولة القائل بحثها
  الدارسون قديمًا (الشواهد الخمسون) من غير قدح في مكانته.
