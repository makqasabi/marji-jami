id: al-muqtadab
العنوان: المقتضب
المؤلف:
  الاسم: أبو العباس محمد بن يزيد المبرد
  الوفاة_هجري: 285
  الوفاة_ميلادي: 898
العلم: النحو والصرف
التصنيف_الفرعي: أمهات البصريين
لماذا_هو_أم_في_بابه: >
  ثاني كتب النحو البصري بعد الكتاب وأوضحها عبارة؛ أعاد المبرد —
  شيخ البصريين في عصره — عرض نحو سيبويه بترتيب أيسر ولغة أبين،
  وخالفه في مسائل معدودة بحجج صارت من عيون الخلاف النحوي، وزاد
  تفصيلات وشواهد ليست في الكتاب. به انتقل النحو من نص سيبويه
  المغلق إلى التصنيف التعليمي المنظم، وعليه تخرجت طبقة بغداد
  (الزجاج فابن السراج فمدرسة القرن الرابع كلها)، فهو حلقة الوصل
  التي لا يفهم تاريخ النحو بدونها، ومرجع أصيل لمذهب البصريين
  بصياغة أنضج من أصله وأقرب، يقصده الباحث في كل مسألة طلب فيها
  نص البصرية محررًا.
