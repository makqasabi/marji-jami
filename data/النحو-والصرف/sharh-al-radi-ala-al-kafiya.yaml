id: sharh-al-radi-ala-al-kafiya
العنوان: شرح الرضي على الكافية (شرح كافية ابن الحاجب)
المؤلف:
  الاسم: رضي الدين محمد بن الحسن الأسترآباذي
  الوفاة_هجري: 686
  الوفاة_ميلادي: 1287
العلم: النحو والصرف
التصنيف_الفرعي: ذروة الشروح النظرية
لماذا_هو_أم_في_بابه: >
  أعمق كتب النحو النظرية عند المتأخرين بإطباق أهل الفن؛ شرح الرضي
  كافيةَ ابن الحاجب شرحًا تجاوز التعليم إلى التحقيق الحر: يحرر
  المذاهب ويناقش سيبويه نفسه ويرجح باجتهاده، بنظر فلسفي في علل
  النحو ومعانيه لم يبلغه شارح، حتى لقبه أهل الفن «نجم الأئمة»
  وقالوا: لم يؤلف على الكافية بل في النحو كله مثله جمعًا وتحقيقًا.
  عليه عوّل البغداديون في خزانة الأدب وكل من حقق مسألة دقيقة بعده،
  واعتمدته الدراسات اللسانية المعاصرة كنزًا للنحو التفسيري
  العميق. فهو ذروة النضج النظري للفن: به يختم المتخصص النحو كما
  يختم الأصولي بالمستصفى ونظائره.
يغني_عن:
  - شروح الكافية الأخرى ومطولات المتأخرين النظرية
يُقرأ_قبله:
  - شرح ابن عقيل ومغني اللبيب
أفضل_الطبعات:
  - المحقق_أو_المعتني: يوسف حسن عمر (تصحيح وتعليق)
    الدار: منشورات جامعة قاريونس، بنغازي
    السنة: 1398هـ/1978م
    المجلدات: 4
    ملاحظة: الطبعة المعتمدة في الدراسات (وعنها مصورات عالم الكتب)
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: []
الشروح_والمختصرات_والذيول:
  - حواشي عليه (كحاشية السيد الشريف الجرجاني)
مستوى_القارئ: متخصص
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  في تشيع مؤلفه كلام معروف ظهر في أمثلة يسيرة، ونظره الفلسفي
  العميق يثقل على من طلب القاعدة المجردة؛ والكتاب بحاجة إلى تحقيق
  نقدي أوفى.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - طبعة جامعة قاريونس
آخر_تحديث: 2026-06-12
