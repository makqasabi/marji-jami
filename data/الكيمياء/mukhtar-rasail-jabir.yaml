id: mukhtar-rasail-jabir
العنوان: مختار رسائل جابر بن حيان
المؤلف:
  الاسم: جابر بن حيان الكوفي
  الوفاة_هجري: 200
  الوفاة_ميلادي: 815
العلم: الكيمياء
التصنيف_الفرعي: النصوص المؤسسة (المتن الجابري)
لماذا_هو_أم_في_بابه: >
  نصوص «أبي الكيمياء» الذي بدأ به علم الصنعة تاريخه المدوّن؛
  فالمتن الجابري — مئات الرسائل المنسوبة إليه — هو أقدم وأضخم
  جسد نصي للكيمياء العربية: فيه نظرية الزئبق والكبريت في تكوّن
  الفلزات التي حكمت الكيمياء العالمية ألف سنة، ووصف العمليات
  (التقطير والتصعيد والتكليس والتبلور) والأجهزة وصفًا معمليًّا،
  ومذهب الموازين الفريد. ترجم باسمه اللاتيني (Geber) فأسس
  الكيمياء الأوروبية الوسيطة، ومختار كراوس — مع دراسته الخالدة
  عن المتن — هو المدخل النقدي المعتمد لهذه النصوص عند الدارسين
  قاطبة، فالمتن الجابري أم الكيمياء العربية بإطلاق وبه يفتتح
  تاريخها.
يغني_عن:
  - التماس رسائل المتن الجابري المتناثرة (مدخلها المنتقى المحقق)
يُقرأ_قبله:
  - دراسات تاريخ الكيمياء العربية المعاصرة
أفضل_الطبعات:
  - المحقق_أو_المعتني: بول كراوس
    الدار: مكتبة الخانجي، القاهرة
    السنة: 1354هـ/1935م
    المجلدات: 1
    ملاحظة: النشرة النقدية المعتمدة، ومعها دراسة كراوس الكبرى عن المتن (القاهرة 1942–1943) عماد الدرس الجابري
التوافر_الرقمي:
  المكتبة_الشاملة: لا
  منصات_أخرى: [نسخ رقمية في مكتبات التراث العلمي]
الشروح_والمختصرات_والذيول: []
مستوى_القارئ: متخصص
نوع_المرجعية: علمية_تراثية_حضارية
ملاحظات_نقدية: >
  يدخل لمرجعيته التاريخية الحضارية؛ وقضية المتن الجابري الكبرى
  — تأريخه ونسبته: أمن رجل واحد في القرن الثاني أم من مدرسة
  إسماعيلية في الثالث والرابع كما رجح كراوس؟ — أشهر معارك تاريخ
  العلم العربي ولم تحسم، وفي النصوص رمزية وباطنية تقرأ بحذر
  الدارس.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - نشرة كراوس ودراسته
  - الفهرست لابن النديم (حصر المتن)
آخر_تحديث: 2026-06-13
