id: kitab-al-asrar-razi
العنوان: كتاب الأسرار وسر الأسرار
المؤلف:
  الاسم: أبو بكر محمد بن زكريا الرازي
  الوفاة_هجري: 313
  الوفاة_ميلادي: 925
العلم: الكيمياء
التصنيف_الفرعي: الكيمياء التجريبية المنهجية
لماذا_هو_أم_في_بابه: >
  الكتاب الذي حوّل الكيمياء من صنعة رمزية إلى علم معملي منهجي؛
  جرّد الرازي — وهو في الكيمياء بمنزلته في الطب — الصنعةَ من
  باطنيات المتن الجابري وصاغها ثلاثية واضحة: معرفة المواد
  (بتصنيفه الشهير لها إلى ترابية ومعدنية ونباتية وحيوانية وهو
  أول تصنيف كيميائي منهجي للمواد)، ثم الأجهزة والأدوات وصفًا
  هندسيًّا دقيقًا، ثم التدابير (العمليات) وصفة وصفة كوصفات
  المختبر الحديث. به صارت الكيمياء العربية علمًا تجريبيًّا
  موصوفًا قابلًا للتكرار، وترجم للاتينية فاعتمدته أوروبا،
  وعدّه مؤرخو الكيمياء أول كتاب كيمياء عملي بالمعنى الحديث،
  فهو أم الكيمياء المعملية في التراث الإنساني.
يغني_عن:
  - مدونات الصنعة الرمزية (في مقام العلم المنهجي)
يُقرأ_قبله:
  - مختار رسائل جابر (للسياق التاريخي)
أفضل_الطبعات:
  - المحقق_أو_المعتني: محمد تقي دانش بجوه
    الدار: منشورات جامعة طهران
    السنة: 1343هـ ش/1964م
    المجلدات: 1
    ملاحظة: النشرة المعتمدة (وترجمة روسكا الألمانية 1937 قرينتها في الدراسات)
التوافر_الرقمي:
  المكتبة_الشاملة: لا
  منصات_أخرى: [نسخ رقمية في مكتبات التراث العلمي]
الشروح_والمختصرات_والذيول: []
مستوى_القارئ: متخصص
نوع_المرجعية: علمية_تراثية_حضارية
ملاحظات_نقدية: >
  يدخل لمرجعيته التاريخية الحضارية؛ وغايته التحويلية (صنعة
  الذهب) من علم عصره المتجاوز، وقيمته في منهجه وتصنيفه وعملياته،
  ونشرته بحاجة إلى تحقيق عربي حديث ميسر.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - نشرة طهران وترجمة روسكا
