id: al-jawharatayn-hamdani
العنوان: كتاب الجوهرتين العتيقتين المائعتين الصفراء والبيضاء
المؤلف:
  الاسم: أبو محمد الحسن بن أحمد الهمداني
  الوفاة_هجري: 334
  الوفاة_ميلادي: 945
العلم: الكيمياء
التصنيف_الفرعي: التعدين وكيمياء الفلزات التطبيقية
لماذا_هو_أم_في_بابه: >
  أم كتب التعدين العربية والوثيقة الفريدة لصناعة الذهب والفضة
  الحقيقية لا الصنعوية؛ كتبه الهمداني — لسان اليمن صاحب الإكليل
  وصفة جزيرة العرب — من معاينة مناجم اليمن وممارسة أهلها: مواضع
  المعادن وعلاماتها، واستخراج الخامات وتنقيتها بالطرق النارية
  والزئبقية، وسبك الجوهرين وضرب النقود وعيارها وغشها وكشفه،
  بلغة صَنعة ميدانية لا رمز فيها. فهو على النقيض المنهجي من كتب
  التحويل: كيمياء فلزات تطبيقية اقتصادية، اعتمدته دراسات تاريخ
  التعدين والنقد الإسلامي مصدرًا لا بديل عنه، ونشرة تول النقدية
  جعلته في متناول الدارسين، فهو أم بابه ووثيقته الوحيدة الكاملة.
يغني_عن:
  - أخبار التعدين المتناثرة في كتب البلدان
يُقرأ_قبله: []
أفضل_الطبعات:
  - المحقق_أو_المعتني: كريستوفر تول (بالنص والترجمة الألمانية ودراسة)
    الدار: جامعة أوبسالا، السويد
    السنة: 1968م
    المجلدات: 1
    ملاحظة: النشرة النقدية المعتمدة (وعنها طبعات عربية لاحقة باليمن)
التوافر_الرقمي:
  المكتبة_الشاملة: لا
  منصات_أخرى: [نسخ رقمية في مكتبات التراث العلمي]
الشروح_والمختصرات_والذيول: []
مستوى_القارئ: متخصص
نوع_المرجعية: علمية_تراثية_حضارية
ملاحظات_نقدية: >
  يدخل لمرجعيته التاريخية الحضارية؛ ومصطلحه اليمني المحلي يحتاج
  وسيط دراسة تول، وطرقه ما قبل الكيمياء الحديثة تقرأ تاريخَ
  صناعة.
حالة_التوثيق: موثّق
مصادر_التوثيق:
