id: tarikh-al-tabari
العنوان: تاريخ الرسل والملوك (تاريخ الطبري)
المؤلف:
  الاسم: أبو جعفر محمد بن جرير الطبري
  الوفاة_هجري: 310
  الوفاة_ميلادي: 923
العلم: التاريخ الإسلامي والعام
التصنيف_الفرعي: أمهات التاريخ المسند
لماذا_هو_أم_في_بابه: >
  أم كتب التاريخ الإسلامي بلا منازع؛ أرّخ الطبري من بدء الخلق إلى
  سنة 302هـ على السنين، ساردًا الروايات بأسانيدها إلى أصحابها —
  فحفظ مصادر مفقودة بأكملها كأخبار أبي مخنف وسيف والمدائني منسوبة
  معزوة — وترك للقارئ عهدة الإسناد كما صرح في مقدمته الشهيرة: «فما
  يكن في كتابي هذا من خبر ذكرناه عن بعض الماضين مما يستنكره قارئه...
  فليعلم أنه لم يؤت في ذلك من قبلنا وإنما أتي من قبل بعض ناقليه».
  عليه عوّل كل مؤرخ بعده من مسكويه وابن الأثير وابن كثير إلى
  الدراسات الحديثة، فهو ديوان التاريخ الأول الذي لا يقوم البحث في
  القرون الثلاثة الأولى إلا عليه.
يغني_عن:
  - أصوله المفقودة (أخبار أبي مخنف والمدائني وغيرهما)
يُقرأ_قبله:
  - البداية والنهاية (لعرض منقح أيسر)
أفضل_الطبعات:
  - المحقق_أو_المعتني: محمد أبو الفضل إبراهيم
    الدار: دار المعارف، القاهرة
    السنة: 1387هـ/1967م (الطبعة الثانية)
    المجلدات: 11 (مع الفهارس)
    ملاحظة: التحقيق المعتمد الذي عليه الإحالات
  - المحقق_أو_المعتني: مجموعة مستشرقين بإشراف دي خويه
    الدار: مطبعة بريل، ليدن
    السنة: 1879–1901م
    المجلدات: 15
    ملاحظة: النشرة النقدية الأوروبية وعليها إحالات الدراسات الغربية
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: [إسلام ويب]
الشروح_والمختصرات_والذيول:
  - صلة تاريخ الطبري لعريب القرطبي
  - المنتخب من ذيل المذيل (ملحق به)
مستوى_القارئ: متوسط/متخصص
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  فيه روايات واهية وأخبار عن إخباريين متروكين (كأبي مخنف وسيف بن
  عمر) ساقها بالإسناد على شرطه المعلن، فلا يؤخذ منه خبر — خاصة في
  الفتنة — قبل نقد إسناده؛ والدراسات النقدية للمرويات تقوم بهذا.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - طبعة دار المعارف
  - مقدمة الطبري نفسه
آخر_تحديث: 2026-06-12
