id: tarikh-khalifa
العنوان: تاريخ خليفة بن خياط
المؤلف:
  الاسم: أبو عمرو خليفة بن خياط العصفري (شباب)
  الوفاة_هجري: 240
  الوفاة_ميلادي: 854
العلم: التاريخ الإسلامي والعام
التصنيف_الفرعي: التواريخ المتقدمة الموثقة
لماذا_هو_أم_في_بابه: >
  أقدم تاريخ حولي عربي وصل إلينا كاملًا، وصاحبه محدّث من شيوخ
  البخاري؛ رتّب خليفة الحوادث على السنين من الهجرة إلى سنة 232هـ
  بعبارة موجزة موثقة بالأسانيد، معتنيًا بالتواريخ الدقيقة للولايات
  والقضاة والمواسم وهي مادة قلّ ضبطها عند غيره. ولكون مؤلفه من
  رجال الصحيح عُدّ كتابه أوثق التواريخ المتقدمة سندًا، فصار حكمًا
  في التحقيق الزمني: إذا اختلفت المصادر في سنة حادثة قُدّم ضبط
  خليفة، وعليه تعتمد الدراسات النقدية المعاصرة للتاريخ المبكر
  (ومنها مدرسة العمري التي حققت الكتاب). فهو أم التوثيق الحولي
  المبكر وميزانه، على صغر حجمه.
