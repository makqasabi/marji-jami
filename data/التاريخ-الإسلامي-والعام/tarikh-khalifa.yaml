ملاحظات_نقدية: >
  موجز جدًّا لا يسرد تفاصيل الحوادث، فهو أداة ضبط وتوثيق لا كتاب
  قراءة؛ ووصلنا برواية بقي بن مخلد ففيه مواضع سقط نبه عليها
  المحقق.
