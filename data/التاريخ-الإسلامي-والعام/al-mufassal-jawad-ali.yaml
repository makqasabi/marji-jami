id: al-mufassal-jawad-ali
العنوان: المفصل في تاريخ العرب قبل الإسلام
المؤلف:
  الاسم: جواد علي
  الوفاة_هجري: 1408
  الوفاة_ميلادي: 1987
العلم: التاريخ الإسلامي والعام
التصنيف_الفرعي: تاريخ العرب قبل الإسلام (معاصر مرجعي)
لماذا_هو_أم_في_بابه: >
  الموسوعة المرجعية الوحيدة بالعربية لتاريخ العرب قبل الإسلام،
  والمثال الذي يضرب لبلوغ المؤلَّف المعاصر مقام الأمومة؛ أفنى
  جواد علي — العلامة العراقي عضو المجمع العلمي — عقودًا في جمع
  مادته من النقوش العربية الجنوبية والشمالية والمصادر الكلاسيكية
  اليونانية واللاتينية والسريانية والعبرية إلى جانب الموروث العربي،
  فعالج السياسة والأنساب والأديان والاقتصاد واللغة والكتابة والحياة
  الاجتماعية معالجة استقصائية لم يبلغها عمل عربي قبله ولا بعده.
  فهو العمدة التي تحيل عليها البحوث الأكاديمية في كل مسألة جاهلية،
  ولا يملك المتخصص ولا المثقف الجاد بديلًا عربيًّا عنه، فاستحق
  مقام الأم في بابه بإطباق الدارسين.
يغني_عن:
  - الدراسات الجزئية العربية في تاريخ الجاهلية (في عمومها)
يُقرأ_قبله:
  - فصول الجاهلية في كتب التاريخ العام
أفضل_الطبعات:
  - المحقق_أو_المعتني: (تأليف معاصر)
    الدار: دار الساقي، بيروت
    السنة: 1422هـ/2001م (الطبعة الرابعة)
    المجلدات: 20
    ملاحظة: الطبعة الأحدث الأوفى؛ والأصل بطبعة بيروت/بغداد (دار العلم للملايين ومكتبة النهضة) 1968–1973م في 10 مجلدات
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: [نسخ رقمية متداولة]
الشروح_والمختصرات_والذيول:
  - تاريخ العرب قبل الإسلام (محاضراته المختصرة)
مستوى_القارئ: متوسط/متخصص
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  مادته النقشية وقفت عند ما نشر حتى سبعينيات القرن العشرين وقد
  تراكمت بعده اكتشافات (نقوش الفاو ونجران وغيرها) تستدرك عليه في
  مسائل، ولبعض آرائه في أخبار الموروث العربي نزعة نقدية شديدة
  ناقشه فيها باحثون؛ ويبقى الإطار الجامع الذي لم يُستبدل.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - طبعة دار الساقي الرابعة
آخر_تحديث: 2026-06-12
