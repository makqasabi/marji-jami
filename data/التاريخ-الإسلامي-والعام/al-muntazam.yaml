id: al-muntazam
العنوان: المنتظم في تاريخ الملوك والأمم
المؤلف:
  الاسم: أبو الفرج عبد الرحمن بن علي ابن الجوزي
  الوفاة_هجري: 597
  الوفاة_ميلادي: 1201
العلم: التاريخ الإسلامي والعام
التصنيف_الفرعي: التاريخ والتراجم الحولية
لماذا_هو_أم_في_بابه: >
  الكتاب الذي أسس قالب «الحوادث والوفيات» الذي صار عمود التأريخ
  الإسلامي بعده؛ رتّب ابن الجوزي كل سنة قسمين: حوادثها ثم وفيات
  أعلامها بتراجمهم، فجمع التاريخ والطبقات في نسق واحد احتذاه
  الذهبي في تاريخ الإسلام وابن كثير ومؤرخو القرون اللاحقة قاطبة.
  وانفرد بمادة بغدادية غزيرة — وهو مؤرخ بغداد وواعظها الأشهر — في
  حياتها الاجتماعية والعلمية وأخبار الخلافة العباسية المتأخرة مما
  لا يوجد عند غيره، فصار مصدرًا أولَ للقرنين الخامس والسادس
  ببغداد. فهو أم القالب الحولي الترجمي، ومرجع لا غنى عنه لحقبته
  ومِصره.
يغني_عن:
  - حوليات بغداد المفقودة لحقبته (حفظ مادتها)
يُقرأ_قبله:
  - البداية والنهاية
أفضل_الطبعات:
  - المحقق_أو_المعتني: محمد عبد القادر عطا ومصطفى عبد القادر عطا
    الدار: دار الكتب العلمية، بيروت
    السنة: 1412هـ/1992م
    المجلدات: 19 (مع الفهارس)
    ملاحظة: الطبعة الكاملة المتداولة
  - المحقق_أو_المعتني: (نشرة جزئية قديمة)
    الدار: دائرة المعارف العثمانية، حيدر آباد
    السنة: 1357هـ
    المجلدات: 6 (الأجزاء 5–10)
    ملاحظة: النشرة القديمة التي عليها إحالات الدراسات المتقدمة
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: []
الشروح_والمختصرات_والذيول:
  - مرآة الزمان لسبطه (نسج على منواله وذيل عليه)
مستوى_القارئ: متخصص
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  فيه أخبار واهية وقصص وعّاظ تساهل في سوقها على سعة روايته،
  وتراجمه تتفاوت تحريرًا؛ وطبعته المتداولة دون مستوى الكتاب ضبطًا.
حالة_التوثيق: موثّق
مصادر_التوثيق:
