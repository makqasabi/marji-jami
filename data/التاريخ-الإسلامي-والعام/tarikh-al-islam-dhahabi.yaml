id: tarikh-al-islam-dhahabi
العنوان: تاريخ الإسلام ووفيات المشاهير والأعلام
المؤلف:
  الاسم: شمس الدين محمد بن أحمد الذهبي
  الوفاة_هجري: 748
  الوفاة_ميلادي: 1348
العلم: التاريخ الإسلامي والعام
التصنيف_الفرعي: التاريخ والتراجم معًا
لماذا_هو_أم_في_بابه: >
  أضخم موسوعة جمعت التاريخ والتراجم في بناء واحد؛ قسّم الذهبي سبعة
  قرون إلى سبعين طبقة، يسوق في كل طبقة حوادث عقدها ثم وفيات
  أعلامها بتراجم محررة بقلم أعظم نقاد الرجال، فاجتمع فيه ما تفرق
  في الحوليات وكتب التراجم: الحدث في سياقه والرجل في طبقته. هو
  المعين الذي استقى منه الذهبي نفسه سيرَ أعلام النبلاء والعبر،
  وعليه عوّل مؤرخو القرنين الثامن والتاسع قاطبة، ولما حُقق كاملًا
  في العصر الحديث صار من أكثر مراجع التراجم والتاريخ إحالة في
  الدراسات، فهو خزانة القرون السبعة الأولى التي لا يستغني عنها
  باحث في تاريخ أو رجال.
يغني_عن:
  - العبر في خبر من غبر للذهبي (مختصره)
  - حوليات وفيات القرون السبعة المتفرقة
يُقرأ_قبله:
  - البداية والنهاية
