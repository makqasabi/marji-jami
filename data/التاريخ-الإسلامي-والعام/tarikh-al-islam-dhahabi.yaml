  منصات_أخرى: []
الشروح_والمختصرات_والذيول:
  - العبر في خبر من غبر (مختصره للمؤلف)
  - ذيول تاريخ الإسلام
مستوى_القارئ: متخصص
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  قسم الحوادث فيه مختصر تابع لمصادره (الطبري وابن الأثير) فقيمته
  الأصلية في التراجم؛ وله أحكام نقدية اجتهد فيها تناقش كما يناقش
  الميزان.
