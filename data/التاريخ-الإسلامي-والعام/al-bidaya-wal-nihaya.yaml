id: al-bidaya-wal-nihaya
العنوان: البداية والنهاية
المؤلف:
  الاسم: عماد الدين إسماعيل بن عمر بن كثير الدمشقي
  الوفاة_هجري: 774
  الوفاة_ميلادي: 1373
العلم: التاريخ الإسلامي والعام
التصنيف_الفرعي: التواريخ العامة بميزان المحدثين
لماذا_هو_أم_في_بابه: >
  أوثق التواريخ العامة منهجًا وأكثرها انتشارًا في الأمة؛ كتبه ابن
  كثير — المفسر الحافظ — من بدء الخلق إلى عصره بميزان المحدثين:
  يسوق الخبر ثم ينقده ويبين حال رواته ويرد الإسرائيليات والمنكرات
  التي حشيت بها التواريخ قبله، فجاء كتابه أنقى التواريخ الجامعة
  وأسلمها، مع قسم نفيس في السيرة النبوية يعد من أجود مصادرها
  المنقحة. تلقاه الناس بالقبول فصار التاريخ الأول في بيوت المسلمين
  ومكتبات طلبة العلم، تتابعت طبعاته ومختصراته وترجماته، فهو أم
  التاريخ المروي بعين النقد الحديثي، يجمع سعة الطبري وتنقيح
  المحدث في كتاب واحد.
يغني_عن:
  - التواريخ العامة الوسيطة لغير المتخصص (كمرآة الزمان والمنتظم في جملة المقاصد)
يُقرأ_قبله: []
أفضل_الطبعات:
  - المحقق_أو_المعتني: عبد الله بن عبد المحسن التركي (مع مركز هجر)
    الدار: دار هجر، القاهرة
    السنة: 1417هـ/1997م
    المجلدات: 21 (مع الفهارس)
    ملاحظة: الطبعة المحققة المعتمدة الكاملة، ومعها قسم النهاية (الفتن والملاحم)
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: [إسلام ويب, طريق الإسلام]
الشروح_والمختصرات_والذيول:
  - مختصرات معاصرة عدة
مستوى_القارئ: مبتدئ/متوسط
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  تتفاوت عنايته النقدية بين أقسامه فالقرون المتأخرة أقرب إلى
  الحوليات المجردة، وفي حوادث عصره نفَس شامي محلي؛ وهذا لا يمس
  منهجه العام.
روابط_التحميل:
