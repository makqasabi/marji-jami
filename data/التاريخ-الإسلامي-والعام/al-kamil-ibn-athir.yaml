id: al-kamil-ibn-athir
العنوان: الكامل في التاريخ
المؤلف:
  الاسم: عز الدين علي بن محمد ابن الأثير الجزري
  الوفاة_هجري: 630
  الوفاة_ميلادي: 1233
العلم: التاريخ الإسلامي والعام
التصنيف_الفرعي: التواريخ العامة الجامعة
لماذا_هو_أم_في_بابه: >
  أتم التواريخ العامة الوسيطة وأحسنها صنعة؛ بناه ابن الأثير على
  الطبري منقحًا مهذبًا محذوف الأسانيد، ثم واصل من حيث انتهى الطبري
  ثلاثة قرون أخرى إلى سنة 628هـ، فشهد بنفسه الحروب الصليبية وغزو
  المغول وكتب عنهما أوثق شهادة معاصرة في التراث — وصفُه لخروج
  التتار من أبدع وأصدق ما كُتب. امتاز بجمع روايات الحادثة في سياق
  واحد محكم بدل تقطيعها، وبتغطية المغرب والأندلس التي أغفلها
  المشارقة، فصار عمدة التاريخ الإسلامي الوسيط كله: عليه اعتمد
  المؤرخون بعده، وهو إلى اليوم المرجع الأول لتاريخ القرون من
  الرابع إلى السابع.
يغني_عن:
  - تاريخ الطبري (في مقام السرد المنقح دون الأسانيد)
  - حوليات القرون الوسيطة المتفرقة
يُقرأ_قبله:
  - مختصر معاصر للتاريخ الإسلامي
أفضل_الطبعات:
  - المحقق_أو_المعتني: عمر عبد السلام تدمري
    الدار: دار الكتاب العربي، بيروت
    السنة: 1417هـ/1997م
    المجلدات: 10
    ملاحظة: طبعة محققة متداولة
  - المحقق_أو_المعتني: (عن نشرة تورنبرغ النقدية)
    الدار: دار صادر، بيروت
    السنة: 1385هـ/1965م
    المجلدات: 13
    ملاحظة: الطبعة التي عليها إحالات الدراسات
