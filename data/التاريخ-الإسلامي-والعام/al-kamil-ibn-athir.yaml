ملاحظات_نقدية: >
  حذفه الأسانيد ودمجه الروايات يحجبان مصادر الخبر عن الباحث المدقق
  فيرجع للطبري فيما قبل 302هـ؛ وفي أخبار دولة صلاح الدين مواضع
  عتب فيها عليه ميله الزنكي.
