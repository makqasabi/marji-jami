id: muruj-al-dhahab
العنوان: مروج الذهب ومعادن الجوهر
المؤلف:
  الاسم: أبو الحسن علي بن الحسين المسعودي
  الوفاة_هجري: 346
  الوفاة_ميلادي: 957
العلم: التاريخ الإسلامي والعام
التصنيف_الفرعي: التاريخ الحضاري والموسوعي
لماذا_هو_أم_في_بابه: >
  أم التاريخ الحضاري الموسوعي عند العرب؛ لم يقف المسعودي — الرحالة
  الجغرافي الملقب بهيرودوت العرب — عند أخبار الدول، بل أرّخ لأمم
  الأرض كلها: الفرس والروم والهند والصين والصقالبة، وعاداتها
  وأديانها وعجائب بلدانها مما شاهده في رحلاته الواسعة أو استقاه من
  أهله، ثم ساق تاريخ الإسلام بمنادمات الخلفاء وأخبار المجتمع
  والثقافة التي تهملها الحوليات الرسمية. فهو نافذة التراث على
  التاريخ العالمي والاجتماعي، ومصدر فريد لتاريخ الأمم المجاورة
  وللحياة العباسية اليومية، اعتمدته الدراسات الحضارية شرقًا وغربًا
  مصدرًا أولَ لا بديل عنه في بابه.
يغني_عن:
  - أخبار الأمم غير الإسلامية المتناثرة في الحوليات
يُقرأ_قبله:
  - البداية والنهاية (للتسلسل المنضبط قبل التوسع الحضاري)
أفضل_الطبعات:
  - المحقق_أو_المعتني: محمد محيي الدين عبد الحميد
    الدار: المكتبة العصرية، صيدا/بيروت (عن الطبعة المصرية)
    السنة: 1393هـ/1973م
    المجلدات: 4
    ملاحظة: الطبعة المتداولة التي عليها الإحالات
  - المحقق_أو_المعتني: شارل بلا (نشرة نقدية)
    الدار: الجامعة اللبنانية، بيروت
    السنة: 1965–1979م
    المجلدات: 7
    ملاحظة: النشرة النقدية المعتمدة في الدراسات الأكاديمية
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: []
الشروح_والمختصرات_والذيول:
  - التنبيه والإشراف للمسعودي (مختصره المنهجي)
مستوى_القارئ: متوسط
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  يسوق الأخبار بلا أسانيد وفيه الغريب والعجائبي مما يحتاج تمحيصًا،
  وللمسعودي ميول شيعية معتزلية ظاهرة في مواضع نبه عليها أهل العلم
  (وصفه الذهبي بذلك)؛ فيقرأ مصدرًا حضاريًّا لا ديوان روايات منقحة.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - طبعة عبد الحميد ونشرة بلا
آخر_تحديث: 2026-06-12
