id: taqrib-al-tahdhib
العنوان: تقريب التهذيب
المؤلف:
  الاسم: أحمد بن علي بن حجر العسقلاني
  الوفاة_هجري: 852
  الوفاة_ميلادي: 1449
العلم: الجرح والتعديل وكتب الرجال
التصنيف_الفرعي: خلاصات الأحكام على الرواة
لماذا_هو_أم_في_بابه: >
  أكثر كتب الرجال استعمالًا في تاريخ الفن كله؛ لخّص فيه ابن حجر حكمه
  النهائي على كل راوٍ من رجال الكتب الستة في كلمة أو كلمتين — ثقة،
  صدوق، مقبول، لين الحديث — وفق مراتب اثنتي عشرة حررها في مقدمته،
  مع طبقة الراوي ووفاته ورمز من أخرج له. فصار الأداة اليومية التي
  لا يستغني عنها مشتغل بالإسناد ساعة واحدة: به يبدأ الحكم على رجال
  أي سند، وعليه مدار التخريج في الرسائل والتحقيقات قاطبة. ولأنه
  زبدة السلسلة الذهبية (الكمال فتهذيبه فتهذيب التهذيب) بقلم أنقد
  حفاظ المتأخرين، تلقاه أهل الفن بالقبول وجرت أحكامه مجرى القول
  الفصل عند عامة المعاصرين، مع بقاء باب التعقب العلمي مفتوحًا.
يغني_عن:
  - الكاشف للذهبي (في مقام الاستعمال اليومي)
يُقرأ_قبله:
  - نزهة النظر (لفهم مراتب الجرح والتعديل)
أفضل_الطبعات:
  - المحقق_أو_المعتني: محمد عوامة
    الدار: دار الرشيد، حلب
    السنة: 1406هـ/1986م
    المجلدات: 1
    ملاحظة: الطبعة المعتمدة المتداولة في البحث، قوبلت على نسخ متقنة
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: [موسوعة الحديث - رواة الحديث]
الشروح_والمختصرات_والذيول:
  - تحرير تقريب التهذيب لبشار عواد وشعيب الأرنؤوط (تعقبات على أحكامه)
مستوى_القارئ: متوسط/متخصص
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  أحكامه المختصرة اجتهاد قابل للمناقشة — وقد تعقبه «تحرير التقريب»
  في مواضع كثيرة ونوقش التحرير نفسه — ومصطلح «مقبول» عنده يعني حيث
  يُتابَع وإلا فليّن، فيغلط من يفهمه قبولًا مطلقًا.
