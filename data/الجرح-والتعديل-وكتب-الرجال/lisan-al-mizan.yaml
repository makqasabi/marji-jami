  منصات_أخرى: []
الشروح_والمختصرات_والذيول: []
مستوى_القارئ: متخصص
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  ورث عن أصله إيراد ثقات تُكُلِّم فيهم بلا حجة، وفيه تراجم لرواة كتب
  الشيعة وغيرهم نقلها من كتبهم بلا تحرير ناجز في بعضها كما نبه
  الدارسون.
