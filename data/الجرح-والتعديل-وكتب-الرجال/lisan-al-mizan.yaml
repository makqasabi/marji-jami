id: lisan-al-mizan
العنوان: لسان الميزان
المؤلف:
  الاسم: أحمد بن علي بن حجر العسقلاني
  الوفاة_هجري: 852
  الوفاة_ميلادي: 1449
العلم: الجرح والتعديل وكتب الرجال
التصنيف_الفرعي: موازين النقد الجامعة
لماذا_هو_أم_في_بابه: >
  ديوان المتكلَّم فيهم ممن ليس في الكتب الستة؛ بناه ابن حجر على ميزان
  الاعتدال للذهبي فحذف من كان في تهذيب الكمال — لاستغناء الباحث عنه
  هناك — وزاد تراجم كثيرة واستدراكات وتعقبات على أحكام الذهبي بصنعته
  المعهودة في الموازنة والإنصاف. فاكتملت بالكتابين خريطة الرواة
  المجروحين كلها: من كان من رجال الستة فمظنته التهذيب وفروعه، ومن
  عداه فمظنته اللسان، ولهذا صار قرين الميزان الذي لا ينفك عنه في
  مكتبة المحقق، وهو آخر دواوين الجرح الكبرى تأليفًا فاستوعب ثمرة
  الفن كله، ولا يُعرف بعده كتاب جمع مادته وزاد.
يغني_عن:
  - ذيول الميزان المتفرقة (استوعبها)
يُقرأ_قبله:
  - ميزان الاعتدال (وهو أصله)
أفضل_الطبعات:
  - المحقق_أو_المعتني: عبد الفتاح أبو غدة
    الدار: دار البشائر الإسلامية، بيروت (مكتب المطبوعات الإسلامية)
    السنة: 1423هـ/2002م
    المجلدات: 10
    ملاحظة: التحقيق المعتمد الذي نسخ النشرة الهندية القديمة
التوافر_الرقمي:
