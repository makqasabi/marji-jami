id: mizan-al-itidal
العنوان: ميزان الاعتدال في نقد الرجال
المؤلف:
  الاسم: شمس الدين محمد بن أحمد الذهبي
  الوفاة_هجري: 748
  الوفاة_ميلادي: 1348
العلم: الجرح والتعديل وكتب الرجال
التصنيف_الفرعي: موازين النقد الجامعة
لماذا_هو_أم_في_بابه: >
  أجمع كتاب في المجروحين والمتكلَّم فيهم وأنفذه حكمًا؛ استوعب الذهبي
  فيه من تقدمه — والكامل لابن عدي عمدته — ثم زان كل راوٍ بميزان
  الناقد الخبير الذي وصفه تلميذه ابن حجر بأنه أحد من لا نظير له في
  نقد الرجال، فيلخص الأقوال ويحكم، ويميز منكرات الراوي، وينبه على
  الثقات الذين تُكُلِّم فيهم بلا حجة. ضبط مادته على الحروف ضبطًا
  أتقن من أصوله وذيّل عليه هو نفسه ثم بنى عليه ابن حجر لسان الميزان.
  فهو ميزان الفن الذي يفزع إليه أهل الحديث أول ما يبحثون عن راوٍ
  متكلَّم فيه، وقول الذهبي فيه معدود من الأحكام التي عليها التعويل.
يغني_عن:
  - المغني في الضعفاء وديوان الضعفاء للذهبي (مختصراته هو)
يُقرأ_قبله:
  - الموقظة للذهبي (لفهم مراتبه النقدية)
أفضل_الطبعات:
  - المحقق_أو_المعتني: علي محمد البجاوي
    الدار: دار المعرفة، بيروت (عن طبعة عيسى البابي الحلبي)
    السنة: 1382هـ/1963م
    المجلدات: 4
    ملاحظة: الطبعة المعتمدة التي عليها الإحالات
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: []
الشروح_والمختصرات_والذيول:
  - ذيل ميزان الاعتدال للعراقي
  - لسان الميزان لابن حجر (بناء عليه وتوسعة)
مستوى_القارئ: متخصص
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  أدخل فيه ثقات تُكُلِّم فيهم بلا حجة منبهًا على ذلك، فمن لم يفهم
  منهجه ظن إيراد الراوي فيه جرحًا؛ وله أحكام اجتهادية ناقشه فيها ابن
  حجر في اللسان.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - طبعة البجاوي
  - مقدمة لسان الميزان
آخر_تحديث: 2026-06-12
