id: al-tarikh-al-kabir
العنوان: التاريخ الكبير
المؤلف:
  الاسم: أبو عبد الله محمد بن إسماعيل البخاري
  الوفاة_هجري: 256
  الوفاة_ميلادي: 870
العلم: الجرح والتعديل وكتب الرجال
التصنيف_الفرعي: دواوين الرواة المتقدمة
لماذا_هو_أم_في_بابه: >
  أقدم دواوين الرواة الجامعة وأصلها الذي انبنى عليه الفن؛ ترجم فيه
  البخاري لنحو أربعين ألف راوٍ من الصحابة إلى عصره، مرتبين على الحروف،
  يذكر شيوخ الراوي وتلاميذه ووفاته وما يميز حديثه بعبارة موجزة محملة
  بدقائق النقد، وقد صنفه في شبابه فبهر به أهل العلم حتى قال إسحاق بن
  راهويه لعبد الله بن طاهر: أيها الأمير، ألا أريك سحرًا؟ كل من صنف في
  الرجال بعده عيال عليه: فابن أبي حاتم بنى كتابه على ترتيبه متعقبًا،
  والمتأخرون ينقلون أحكامه المضمنة في صيغ دقيقة كقوله «فيه نظر» التي
  هي عنده من شديد الجرح. فهو حجر الأساس في علم الرجال كله.
يغني_عن:
  - التاريخ الأوسط والصغير للبخاري (في جملة المقاصد)
يُقرأ_قبله:
  - شرح علل الترمذي (لفهم اصطلاحات البخاري النقدية)
أفضل_الطبعات:
  - المحقق_أو_المعتني: لجنة دائرة المعارف وبمراقبة محمد عبد المعيد خان (وللمعلمي اليماني عناية بتصحيح أجزاء منه)
    الدار: دائرة المعارف العثمانية، حيدر آباد الدكن
    السنة: 1361هـ وما بعدها
    المجلدات: 8
    ملاحظة: النشرة الأم المعتمدة وعنها المصورات (دار الكتب العلمية وغيرها)
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: []
الشروح_والمختصرات_والذيول: []
مستوى_القارئ: متخصص
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  عبارته النقدية مقتضبة مرموزة تحتاج خبيرًا بمصطلحه، وفي النشرة
  الهندية تصحيفات استدركتها الدراسات؛ والكتاب مرشح دائم لتحقيق نقدي
  حديث.
روابط_التحميل:
  - المصدر: المكتبة الشاملة (ت المعلمي، دائرة المعارف)
    الرابط: https://shamela.ws/book/956
    النوع: حر
