نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  طبعاته المتداولة دون مستوى الكتاب ضبطًا وفيها سقط وتصحيف نبه عليه
  المتخصصون، والكتاب من أولى أمهات الفن بتحقيق نقدي شامل؛ وإيراده
  للراوي لا يلزم منه ضعفه عنده فقد يترجم لثقة تُكُلِّم فيه بلا حجة.
