id: al-kamil-ibn-adi
العنوان: الكامل في ضعفاء الرجال
المؤلف:
  الاسم: أبو أحمد عبد الله بن عدي الجرجاني
  الوفاة_هجري: 365
  الوفاة_ميلادي: 976
العلم: الجرح والتعديل وكتب الرجال
التصنيف_الفرعي: كتب الضعفاء
لماذا_هو_أم_في_بابه: >
  أم كتب الضعفاء بلا منازع؛ ترجم ابن عدي لكل من تُكُلِّم فيه — ولو
  بغير حق — فيسوق أقوال النقاد في الراوي، ثم ينفرد بمنهجه الذي ميّزه:
  سرد ما يُنكَر من حديث الراوي بأسانيده ثم الحكم عليه باجتهاده حكمَ
  ناقد سبر الحديث بنفسه ولم يقلد. قال ابن كثير: هو حاكم هذا الفن،
  وأثنى عليه الدارقطني، واعتمده الذهبي عمدته الأولى في الميزان حتى
  قال: لا أعلم في الضعفاء أكمل منه. فمن أراد حال راوٍ متكلَّم فيه
  بدليله — لا بمجرد الحكم — فليس له غيره، ولهذا بقي ألف سنة كتاب
  القضاء في تمييز ما يُحتمل من حديث الضعيف وما يُطرح.
يغني_عن:
  - كتب الضعفاء المختصرة قبله (كضعفاء النسائي والعقيلي في جملة المادة)
يُقرأ_قبله:
  - شرح علل الترمذي
  - الموقظة للذهبي
