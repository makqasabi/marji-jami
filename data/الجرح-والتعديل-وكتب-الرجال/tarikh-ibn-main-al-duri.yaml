id: tarikh-ibn-main-al-duri
العنوان: تاريخ ابن معين (رواية عباس الدوري)
المؤلف:
  الاسم: أبو زكريا يحيى بن معين البغدادي
  الوفاة_هجري: 233
  الوفاة_ميلادي: 848
العلم: الجرح والتعديل وكتب الرجال
التصنيف_الفرعي: سؤالات النقاد ونصوصهم
لماذا_هو_أم_في_بابه: >
  أوسع دواوين أقوال إمام الجرح والتعديل الأول؛ فابن معين هو الذي قال
  فيه أحمد: كل حديث لا يعرفه يحيى فليس بحديث، وأحكامه أصل الأصول التي
  عليها بناء الفن كله، ورواية تلميذه عباس الدوري أكبر مجاميع كلامه:
  سؤالات وأجوبة في الرواة والعلل تصور مجلس النقد البغدادي في أزهى
  عصوره. وقد أُدرج هذا الكتاب ممثلًا لجنس كامل هو «سؤالات النقاد»
  (سؤالات ابن الجنيد وابن محرز والدارمي وغيرها) الذي هو المادة الخام
  لكل دواوين الرجال اللاحقة، فابن أبي حاتم والمزي والذهبي إنما ينقلون
  من هذه الأصول، ومن أراد قول الناقد بنصه وسياقه فلا غنى له عنها.
يغني_عن: []
يُقرأ_قبله:
  - شرح علل الترمذي (لفهم اصطلاحات ابن معين المتفاوتة)
أفضل_الطبعات:
  - المحقق_أو_المعتني: أحمد محمد نور سيف
    الدار: مركز البحث العلمي وإحياء التراث الإسلامي بجامعة الملك عبد العزيز، مكة المكرمة
    السنة: 1399هـ/1979م
    المجلدات: 4
    ملاحظة: التحقيق المعتمد بدراسة وفهارس
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: []
الشروح_والمختصرات_والذيول:
  - روايات أخرى لكلام ابن معين (ابن محرز، الدارمي، ابن الجنيد)
مستوى_القارئ: متخصص
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  كلام ابن معين يختلف باختلاف المجالس والسائلين فيُجمع ولا يؤخذ قول
  مفرد، ولفظه في التوثيق («لا بأس به» عنده توثيق) له اصطلاح خاص حرره
  أهل الفن.
حالة_التوثيق: موثّق
مصادر_التوثيق:
