id: al-jarh-wal-tadil
العنوان: الجرح والتعديل
المؤلف:
  الاسم: أبو محمد عبد الرحمن بن أبي حاتم الرازي
  الوفاة_هجري: 327
  الوفاة_ميلادي: 938
العلم: الجرح والتعديل وكتب الرجال
التصنيف_الفرعي: دواوين النقد الجامعة
لماذا_هو_أم_في_بابه: >
  أعظم دواوين الجرح والتعديل المسندة وأوثقها؛ جمع ابن أبي حاتم فيه
  نحو ثمانية عشر ألف ترجمة لرواة الحديث، يسوق تحت كل راوٍ أقوال أئمة
  النقد فيه — وعلى رأسها أحكام أبيه أبي حاتم وأبي زرعة التي تلقاها
  مشافهة — بأسانيده إليهم، وقدّم له بمقدمة «تقدمة المعرفة» التي هي
  أنفس ما كُتب في طبقات النقاد ومناهجهم. فهو الديوان الذي حفظ أحكام
  المدرسة الرازية وأقوال ابن معين وأحمد وغيرهما منسوبة مسندة، وعليه
  بنى كل من صنف في الرجال بعده من المزي إلى الذهبي وابن حجر، فلا
  يستغني عنه باحث في حال راوٍ متقدم بحال.
يغني_عن:
  - أجزاء سؤالات الرازيين المتفرقة (جمع زبدتها)
يُقرأ_قبله:
  - شرح علل الترمذي لابن رجب (لفهم مصطلحات النقاد)
أفضل_الطبعات:
  - المحقق_أو_المعتني: عبد الرحمن بن يحيى المعلمي اليماني (تصحيح ومراقبة)
    الدار: دائرة المعارف العثمانية، حيدر آباد الدكن
    السنة: 1371–1373هـ/1952–1953م
    المجلدات: 9 (مع التقدمة)
    ملاحظة: النشرة المتقنة المعتمدة التي عليها الإحالات، وعنها المصورات
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: []
الشروح_والمختصرات_والذيول: []
مستوى_القارئ: متخصص
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  أحكام أبي حاتم تميل إلى التشدد كما نبه الذهبي، وقول ابن أبي حاتم في
  راوٍ «سألت أبي عنه» يحتاج فهمًا لاصطلاحات المدرسة الرازية المبسوطة
  في مقدمته وفي دراسات الفن.
روابط_التحميل:
