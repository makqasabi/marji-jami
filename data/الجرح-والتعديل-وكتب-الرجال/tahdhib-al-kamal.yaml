id: tahdhib-al-kamal
العنوان: تهذيب الكمال في أسماء الرجال
المؤلف:
  الاسم: جمال الدين يوسف بن عبد الرحمن المزي
  الوفاة_هجري: 742
  الوفاة_ميلادي: 1341
العلم: الجرح والتعديل وكتب الرجال
التصنيف_الفرعي: رجال الكتب الستة
لماذا_هو_أم_في_بابه: >
  ديوان رجال الكتب الستة الأعظم الذي انتهى إليه التحرير في هذا الباب؛
  هذّب فيه المزي — حافظ العصر الذي قال فيه الذهبي: ما رأيت أحفظ منه —
  كتاب «الكمال» لعبد الغني المقدسي فاستدرك وحرر وضبط، وساق لكل راوٍ
  شيوخه وتلاميذه مستقصاة على الحروف، ورموز من أخرج له، وأقوال النقاد
  فيه، ووفاته، بتحرير لم يجتمع لغيره. صار أصل كل ما صُنف بعده في رجال
  الستة: فالكاشف للذهبي اختصاره، وتهذيب التهذيب لابن حجر تهذيبه،
  والتقريب خلاصته، وإكمال مغلطاي استدراك عليه. فهو الجذع الذي تفرعت
  عنه شجرة الفن كلها، ومرجع المحققين الأول في رواة الدواوين الستة.
يغني_عن:
  - الكمال لعبد الغني المقدسي (وهو أصله المستوعَب)
يُقرأ_قبله:
  - تقريب التهذيب (للخلاصة قبل التفصيل)
أفضل_الطبعات:
  - المحقق_أو_المعتني: بشار عواد معروف
    الدار: مؤسسة الرسالة، بيروت
    السنة: 1400–1413هـ/1980–1992م
    المجلدات: 35
    ملاحظة: التحقيق المعتمد الذي لا إحالة اليوم إلا عليه
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: [موسوعة الحديث - رواة الحديث]
الشروح_والمختصرات_والذيول:
  - الكاشف للذهبي (مختصره)
  - تهذيب التهذيب وتقريب التهذيب لابن حجر
  - إكمال تهذيب الكمال لمغلطاي
مستوى_القارئ: متخصص
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  مقصور على رجال الكتب الستة وملحقاتها فلا يغني عمن خرج عنها (يكمله
  لسان الميزان)؛ واستيعابه لشيوخ الراوي وتلاميذه قد يطول حتى يشق على
  غير الباحث.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - طبعة مؤسسة الرسالة بتحقيق بشار عواد
آخر_تحديث: 2026-06-12
