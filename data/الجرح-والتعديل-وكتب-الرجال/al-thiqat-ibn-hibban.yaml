id: al-thiqat-ibn-hibban
العنوان: الثقات
المؤلف:
  الاسم: أبو حاتم محمد بن حبان البستي
  الوفاة_هجري: 354
  الوفاة_ميلادي: 965
العلم: الجرح والتعديل وكتب الرجال
التصنيف_الفرعي: كتب الثقات
لماذا_هو_أم_في_بابه: >
  أوسع دواوين الثقات على الإطلاق؛ رتبه ابن حبان على الطبقات من
  الصحابة فمن بعدهم، فضم عشرات الألوف ممن يحتج بهم أو يُحتمل حديثهم،
  وكثير منهم لا يوجد له ذكر في كتاب سواه، فصار المرجع الذي لا بد منه
  لكل باحث في توثيق راوٍ قليل الرواية أو كشف مجهول. وقيمة الكتاب
  مزدوجة: مادته التي انفرد بها، ومنهج صاحبه في توثيق المستورين الذي
  صار مبحثًا قائمًا في الفن — قاعدة «توثيق ابن حبان» التي حرر القول
  فيها المتأخرون. فلا تتم عُدة المخرِّج بدونه، وهو مع تاريخ البخاري
  والجرح والتعديل ثالوث المصادر المتقدمة لأحوال الرواة.
يغني_عن:
  - أجزاء الثقات المتفرقة قبله (كثقات العجلي في جملة المادة)
يُقرأ_قبله:
  - شرح علل الترمذي (لفهم قيمة توثيق المتساهلين)
أفضل_الطبعات:
  - المحقق_أو_المعتني: (نشرة الدائرة بمراقبة محمد عبد المعيد خان)
    الدار: دائرة المعارف العثمانية، حيدر آباد الدكن
    السنة: 1393–1403هـ/1973–1983م
    المجلدات: 9
    ملاحظة: النشرة المعتمدة وعنها المصورات
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: []
الشروح_والمختصرات_والذيول:
  - مشاهير علماء الأمصار لابن حبان (منتقى منه)
مستوى_القارئ: متخصص
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  ابن حبان متساهل في توثيق المستورين بقاعدته في حمل حال المجهول على
  العدالة، فذكرُ راوٍ فيه لا يساوي توثيق النقاد المتشددين — وهذا من
  أشهر مباحث الفن — وفي نشرته تصحيفات تحتاج مقابلة.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - نشرة حيدر آباد
  - مباحث توثيق ابن حبان في كتب المصطلح المعاصرة
آخر_تحديث: 2026-06-12
