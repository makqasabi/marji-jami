id: tahdhib-al-tahdhib
العنوان: تهذيب التهذيب
المؤلف:
  الاسم: أحمد بن علي بن حجر العسقلاني
  الوفاة_هجري: 852
  الوفاة_ميلادي: 1449
العلم: الجرح والتعديل وكتب الرجال
التصنيف_الفرعي: رجال الكتب الستة
لماذا_هو_أم_في_بابه: >
  خلاصة الفن المحررة في رجال الكتب الستة؛ هذّب ابن حجر تهذيبَ الكمال
  للمزي فحذف استيعاب الشيوخ والتلاميذ المطول، وأبقى زبدة أقوال
  النقاد وزاد عليها نقولًا نفيسة من مصادر لم يستوعبها المزي — كثير
  منها مفقود اليوم — مع تعقبات وتحريرات بصنعة أمير المؤمنين في
  الحديث. فجمع بين الاختصار النافع والزيادة المحققة حتى صار هو
  المتداول في البحث العملي: الباحث يكشف في التقريب، فإن أراد الحجة
  والتفصيل صعد إلى تهذيب التهذيب، فإن أراد الاستقصاء فالأصل. وبهذه
  السلسلة الثلاثية استقر علم رجال الستة إلى اليوم، وكتاب ابن حجر
  واسطتها التي لا غنى عنها.
يغني_عن:
  - الاستغناء الجزئي عن تهذيب الكمال في غير مقام الاستقصاء
يُقرأ_قبله:
  - تقريب التهذيب
أفضل_الطبعات:
  - المحقق_أو_المعتني: (نشرة الدائرة)
    الدار: مطبعة مجلس دائرة المعارف النظامية، حيدر آباد الدكن
    السنة: 1325–1327هـ
    المجلدات: 12
    ملاحظة: النشرة الأم المعتمدة وعنها المصورات (دار صادر وغيرها)
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: [موسوعة الحديث - رواة الحديث]
الشروح_والمختصرات_والذيول:
  - تقريب التهذيب لابن حجر (خلاصته)
مستوى_القارئ: متخصص
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  في النشرة الهندية تصحيف يسير استدركته الدراسات والطبعات اللاحقة؛
  وحذفه أسانيد النقول يحوج المحقق المدقق إلى مراجعة الأصول أحيانًا.
