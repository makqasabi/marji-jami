ملاحظات_نقدية: >
  توسعه في القسم الرابع (من ذُكر على سبيل الوهم) أدخل أسماء كثيرة
  ليست من الصحابة أصلًا وهو مقصود منهجه لكنه يربك المستعجل؛ وفي
  مادته المنقولة عن كتب مفقودة ما لا سبيل إلى مراجعة أصله.
