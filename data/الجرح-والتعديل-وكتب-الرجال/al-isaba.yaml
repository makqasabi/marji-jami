id: al-isaba
العنوان: الإصابة في تمييز الصحابة
المؤلف:
  الاسم: أحمد بن علي بن حجر العسقلاني
  الوفاة_هجري: 852
  الوفاة_ميلادي: 1449
العلم: الجرح والتعديل وكتب الرجال
التصنيف_الفرعي: معرفة الصحابة
لماذا_هو_أم_في_بابه: >
  خاتمة كتب معرفة الصحابة وأجمعها وأدقها تمييزًا؛ استوعب ابن حجر فيه
  أصول الفن قبله — الاستيعاب لابن عبد البر وأسد الغابة لابن الأثير
  ومعاجم الصحابة المسندة — وزاد عليها آلاف التراجم، وانفرد بمنهجه في
  تقسيم كل حرف إلى أقسام أربعة تميز الصحابي الثابت ممن ذُكر خطأ أو
  وهمًا، فعالج بذلك أعظم آفات كتب الفن وهي الخلط بين الصحابة وغيرهم.
  ومعرفة الصحابة أصل لعلمي الرواية والتاريخ معًا: بها يُعرف مرسل
  التابعي من متصل الصحابي. فصار الكتاب منذ تأليفه القول الفصل في
  إثبات الصحبة، لا يتقدمه شيء ولا يُحتاج معه في الغالب إلى أصوله.
يغني_عن:
  - الاستيعاب لابن عبد البر وأسد الغابة لابن الأثير (في مقام التحرير والاستيعاب)
