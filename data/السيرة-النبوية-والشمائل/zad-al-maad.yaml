id: zad-al-maad
العنوان: زاد المعاد في هدي خير العباد
المؤلف:
  الاسم: شمس الدين محمد بن أبي بكر ابن قيم الجوزية
  الوفاة_هجري: 751
  الوفاة_ميلادي: 1350
العلم: السيرة النبوية والشمائل
التصنيف_الفرعي: فقه السيرة والهدي النبوي
لماذا_هو_أم_في_بابه: >
  أعظم كتاب في فقه السيرة والهدي النبوي على الإطلاق؛ لم يسرد ابن
  القيم الأحداث سردًا بل استنبط: هديه صلى الله عليه وسلم في عبادته
  ومعاملته وحربه وسلمه وطبه وقضائه، يعرض الهدي ثم يستخرج فقهه
  وأحكامه بصنعة المجتهد تلميذِ ابن تيمية، حتى ضم الكتاب فقهًا
  كاملًا مرتبًا على السيرة بدل الأبواب، وفيه «الطب النبوي» الذي صار
  كتابًا مستقلًّا. كتبه في أسفاره من حفظه فجاء آية في الاستحضار،
  وبقي سبعة قرون عمدة من أراد تجاوز «ماذا حدث» إلى «بمَ نقتدي»،
  فهو أم فقه السيرة بلا منازع ومصدر إلهام كل ما كتب في الباب
  حديثًا.
يغني_عن:
  - كتب فقه السيرة المعاصرة (في أصل مادتها)
يُقرأ_قبله:
  - سيرة ابن هشام أو الرحيق المختوم
أفضل_الطبعات:
  - المحقق_أو_المعتني: شعيب الأرنؤوط وعبد القادر الأرنؤوط
    الدار: مؤسسة الرسالة، بيروت، ومكتبة المنار الإسلامية، الكويت
    السنة: 1415هـ/1994م (الطبعة السابعة والعشرون وما بعدها)
    المجلدات: 5 (مع جزء الفهارس 6)
    ملاحظة: التحقيق المعتمد المخرج
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: [طريق الإسلام]
الشروح_والمختصرات_والذيول:
  - مختصرات معاصرة عدة
مستوى_القارئ: متوسط
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  كتبه من حفظه فوقعت أوهام يسيرة في العزو نبه عليها المحققان،
  وقسم الطب النبوي فيه ما بناه على طب عصره (الأخلاط) مما يميَّز عن
  المرفوع الثابت.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - طبعة مؤسسة الرسالة
آخر_تحديث: 2026-06-12
