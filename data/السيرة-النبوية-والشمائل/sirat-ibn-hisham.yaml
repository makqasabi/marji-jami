id: sirat-ibn-hisham
العنوان: السيرة النبوية (سيرة ابن هشام)
المؤلف:
  الاسم: أبو محمد عبد الملك بن هشام الحميري (تهذيبًا لسيرة محمد بن إسحاق)
  الوفاة_هجري: 218
  الوفاة_ميلادي: 833
العلم: السيرة النبوية والشمائل
التصنيف_الفرعي: أمهات السيرة المسندة
لماذا_هو_أم_في_بابه: >
  أم كتب السيرة قاطبة والنص الذي قامت عليه معرفة الأمة بسيرة نبيها؛
  فابن إسحاق (ت151هـ) إمام أهل المغازي بإطباق النقاد — قال الزهري:
  من أراد المغازي فعليه بابن إسحاق — وجاء ابن هشام فهذّب سيرته
  بروايته عن البكائي: حذف ما لا يتصل بالسيرة وضبط الأنساب والأشعار
  ونبه على المواضع المنتقدة، فصار تهذيبه هو «السيرة» إذا أُطلقت،
  وعليه مدار التصنيف والشرح (كالروض الأنف للسهيلي) والاختصار
  والتدريس اثني عشر قرنًا. كل من كتب في السيرة بعده — من الطبري إلى
  المعاصرين — عيال على مادته، فلا يُتصور دارس للسيرة لا يمر به.
يغني_عن:
  - روايات سيرة ابن إسحاق الأخرى المتفرقة
يُقرأ_قبله:
  - الرحيق المختوم (لتصور مجمل الأحداث)
أفضل_الطبعات:
  - المحقق_أو_المعتني: مصطفى السقا وإبراهيم الأبياري وعبد الحفيظ شلبي
    الدار: مكتبة ومطبعة مصطفى البابي الحلبي، القاهرة
    السنة: 1375هـ/1955م (الطبعة الثانية)
    المجلدات: 2 (في 4 أجزاء)
    ملاحظة: التحقيق المعتمد الذي عليه الإحالات وعنه أكثر المصورات
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: [إسلام ويب]
الشروح_والمختصرات_والذيول:
  - الروض الأنف للسهيلي (أجل شروحها)
مستوى_القارئ: متوسط
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  فيها المرسل والمنقطع وروايات بلا إسناد على طريقة أهل المغازي
  المتساهلة في غير الأحكام، فلا تعامل معاملة كتب الصحيح؛ وموازنتها
  بالمرويات الصحيحة صنعة الدراسات النقدية المعاصرة (كسيرة العمري).
روابط_التحميل:
  - المصدر: المكتبة الشاملة (ت السقا ورفيقيه، ط الحلبي)
    الرابط: https://shamela.ws/book/23833
    النوع: حر
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - طبعة الحلبي بتحقيق السقا ورفيقيه
  - أقوال النقاد في ابن إسحاق (تهذيب التهذيب)
آخر_تحديث: 2026-06-12
