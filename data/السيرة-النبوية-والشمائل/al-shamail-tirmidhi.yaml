id: al-shamail-tirmidhi
العنوان: الشمائل المحمدية والخصائل المصطفوية
المؤلف:
  الاسم: أبو عيسى محمد بن عيسى الترمذي
  الوفاة_هجري: 279
  الوفاة_ميلادي: 892
العلم: السيرة النبوية والشمائل
التصنيف_الفرعي: الشمائل المسندة
لماذا_هو_أم_في_بابه: >
  أول كتاب أُفرد لشمائل النبي صلى الله عليه وسلم وأمّ هذا الفن إلى
  اليوم؛ جمع الترمذي — صاحب الجامع — أحاديث صفته الخَلقية وهديه في
  لباسه وطعامه ونومه وعبادته وخلقه ووفاته، في ستة وخمسين بابًا
  بأسانيده، فرسم للأمة صورة نبيها الحسية والسلوكية من النصوص
  المسندة وحدها من غير إنشاء ولا مبالغة. تلقته الأمة بالقبول فحفظ
  وشرح بالعشرات (جمع الوسائل للقاري، المواهب اللدنية شروحها تستمد
  منه) واختصره وخرّجه المعاصرون، وما من كتاب في الشمائل بعده إلا
  وهو أصله ومادته، فهو في بابه كصحيح البخاري في بابه: البداية التي
  لا يتقدمها شيء.
يغني_عن:
  - كتب الشمائل المتأخرة (كلها فروع عليه)
يُقرأ_قبله: []
