    المجلدات: 1
    ملاحظة: طبعة محققة متداولة؛ وللكتاب طبعات محققة ومخرجة أخرى متقاربة
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: [إسلام هاوس]
الشروح_والمختصرات_والذيول:
  - جمع الوسائل في شرح الشمائل لملا علي القاري
  - مختصر الشمائل للألباني (مع التخريج)
مستوى_القارئ: مبتدئ/متوسط
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  فيه أحاديث ضعيفة يسيرة على شرط الترمذي المتسع في الفضائل، ميزتها
  التخريجات المعاصرة؛ ولا يضر ذلك بمقصود الكتاب.
