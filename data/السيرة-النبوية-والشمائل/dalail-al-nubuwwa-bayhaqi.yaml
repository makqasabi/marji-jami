ملاحظات_نقدية: >
  فيه روايات ضعيفة ساقها بأسانيدها على مذهبه أن من أسند فقد أحال،
  وقد لا يصرح بالعلة في كل موضع؛ فيلزم الباحثَ النظرُ في الأسانيد
  أو الرجوع للدراسات الحاكمة عليها.
