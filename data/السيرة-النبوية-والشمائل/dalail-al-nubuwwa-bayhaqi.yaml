id: dalail-al-nubuwwa-bayhaqi
العنوان: دلائل النبوة ومعرفة أحوال صاحب الشريعة
المؤلف:
  الاسم: أبو بكر أحمد بن الحسين البيهقي
  الوفاة_هجري: 458
  الوفاة_ميلادي: 1066
العلم: السيرة النبوية والشمائل
التصنيف_الفرعي: السيرة المسندة ودلائل النبوة
لماذا_هو_أم_في_بابه: >
  أجلّ ما صُنف في السيرة بأسانيد المحدثين وأوثقه؛ ساق البيهقي —
  الحافظ الفقيه صاحب السنن الكبرى — السيرة كلها من المولد إلى
  الوفاة مع دلائل النبوة ومعجزاتها، بأسانيده هو إلى كل خبر، منبهًا
  على عللها غالبًا، فقدّم البديل المحدّثي المسند لكتب أهل المغازي
  المتساهلة. قال الذهبي: عليك به فإنه كله هدى ونور، وصار المرجع
  الذي يفزع إليه من أراد خبر السيرة بإسناد يُحكم عليه، وعليه عوّل
  ابن كثير في سيرته والمصنفون في الدلائل بعده. فهو أم هذا الباب:
  سيرة بميزان أهل الحديث، ولا يقوم غيره مقامه فيه.
يغني_عن:
  - كتب الدلائل قبله (كدلائل أبي نعيم في جملة المادة)
