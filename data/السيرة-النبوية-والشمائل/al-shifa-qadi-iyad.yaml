id: al-shifa-qadi-iyad
العنوان: الشفا بتعريف حقوق المصطفى
المؤلف:
  الاسم: القاضي عياض بن موسى اليحصبي
  الوفاة_هجري: 544
  الوفاة_ميلادي: 1149
العلم: السيرة النبوية والشمائل
التصنيف_الفرعي: الشمائل والحقوق النبوية
لماذا_هو_أم_في_بابه: >
  أشهر كتاب في حقوق النبي صلى الله عليه وسلم وشمائله ومقامه على
  الإطلاق؛ جمع القاضي عياض — عالم المغرب وإمامه — أقسامه الأربعة في
  تعظيم الله لنبيه وكمالاته الخَلقية والخُلقية، وحقوقه على الأمة،
  وما يستحيل في حقه، وأحكام منتقصه، بعبارة مشرقة ونفَس محب عالم.
  طار الكتاب في الآفاق حتى قيل: لولا الشفا لما عُرف المغرب، وتداولته
  الأمة شرحًا وحفظًا وقراءة في المساجد قرونًا، وعليه شروح كثيرة
  أشهرها نسيم الرياض للخفاجي وشرح القاري. فهو أم باب الشمائل
  والحقوق بلا منازع، ووثيقة مركزية في وجدان الأمة تجاه نبيها لا
  يعرف تاريخ هذا الباب بدونها.
