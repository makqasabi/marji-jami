id: al-sira-al-sahiha-umari
العنوان: السيرة النبوية الصحيحة — محاولة لتطبيق قواعد المحدثين في نقد روايات السيرة النبوية
المؤلف:
  الاسم: أكرم ضياء العمري
  معاصر: نعم
العلم: السيرة النبوية والشمائل
التصنيف_الفرعي: السيرة النقدية المعاصرة
لماذا_هو_أم_في_بابه: >
  رائد المدرسة النقدية الحديثية في السيرة وأمّ كتبها؛ طبق العمري —
  أستاذ السيرة بالجامعة الإسلامية بالمدينة — قواعد المحدثين في
  الجرح والتعديل ونقد الأسانيد على روايات السيرة كلها، فميز الثابت
  من المشهور الواهي في قضايا كبرى تتناقلها الكتب بلا تمحيص، مع وعي
  منهجي بخصوصية مرويات المغازي وضوابط التساهل فيها. صار الكتاب منذ
  صدوره عمدة الدرس الأكاديمي للسيرة في الجامعات، والمرجع الذي يحال
  عليه في تحرير ثبوت الحادثة قبل بناء الاستنباط عليها، وفتح بابًا
  سارت فيه دراسات المرويات بعده، فهو نقلة منهجية في فن السيرة لا
  يستغني عنها باحث جاد.
يغني_عن:
  - الدراسات الجزئية في نقد مرويات السيرة (في عمومها)
يُقرأ_قبله:
  - الرحيق المختوم (للسرد قبل النقد)
أفضل_الطبعات:
  - المحقق_أو_المعتني: (تأليف معاصر)
    الدار: مكتبة العلوم والحكم، المدينة المنورة
    السنة: 1415هـ/1994م (الطبعة السادسة) وطبعات لاحقة
    المجلدات: 2
    ملاحظة: طبعات المؤلف المنقحة هي المعتمدة
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: []
الشروح_والمختصرات_والذيول: []
مستوى_القارئ: متوسط/متخصص
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  لا يغطي تفاصيل السيرة كلها إذ يقف عند ما صح، فتبقى الحاجة لكتب
  السرد الجامعة قائمة؛ وناقش بعض الباحثين إعمال قواعد المحدثين
  الصارمة في المرويات التاريخية إطلاقًا — والمسألة منهجية مبسوطة في
  مقدمته.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - طبعة مكتبة العلوم والحكم
آخر_تحديث: 2026-06-12
