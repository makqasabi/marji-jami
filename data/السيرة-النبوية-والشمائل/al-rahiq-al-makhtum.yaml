id: al-rahiq-al-makhtum
العنوان: الرحيق المختوم
المؤلف:
  الاسم: صفي الرحمن المباركفوري
  الوفاة_هجري: 1427
  الوفاة_ميلادي: 2006
العلم: السيرة النبوية والشمائل
التصنيف_الفرعي: السيرة المعاصرة الجامعة
لماذا_هو_أم_في_بابه: >
  أوسع كتب السيرة المعاصرة انتشارًا وقبولًا في العالم الإسلامي؛
  كتبه المباركفوري — العالم الهندي صاحب شرح الترمذي حفيد مدرسته —
  لمسابقة رابطة العالم الإسلامي العالمية في السيرة فنال جائزتها
  الأولى من بين مئات البحوث، لجمعه بين تسلسل الأحداث المحكم
  والاعتماد على المصادر الأصيلة وانتقاء الراجح من الروايات بعبارة
  سهلة مشوقة في حجم وسط. صار منذ فوزه كتاب السيرة الأول للقارئ
  المسلم المعاصر: تُرجم إلى عشرات اللغات وطبع ملايين النسخ واعتمد
  في المناهج والدورات، فهو أم المداخل المعاصرة للسيرة، به يبني
  القارئ تصوره الكامل قبل الصعود إلى ابن هشام وزاد المعاد
  والدراسات النقدية.
يغني_عن:
  - المداخل المعاصرة المختصرة للسيرة
يُقرأ_قبله: []
أفضل_الطبعات:
  - المحقق_أو_المعتني: (تأليف معاصر فائز بجائزة رابطة العالم الإسلامي)
    الدار: نشرته الرابطة ثم توالت طبعاته (دار الهلال ودار ابن حزم وغيرهما)
    السنة: طبعات متكررة كثيرة منذ 1399هـ/1979م
    المجلدات: 1
    ملاحظة: الطبعات الكاملة المعتمدة متقاربة؛ لا طبعة محققة مميزة
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: [إسلام هاوس, طريق الإسلام]
الشروح_والمختصرات_والذيول: []
مستوى_القارئ: مبتدئ
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  كتاب سرد جامع لا يناقش أسانيد الروايات منهجيًّا، وفيه مواضع اعتمد
  فيها روايات المغازي المتساهلة؛ تكمله السيرة النقدية كسيرة
  العمري.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - طبعات الكتاب الواسعة وجائزة الرابطة
آخر_تحديث: 2026-06-12
