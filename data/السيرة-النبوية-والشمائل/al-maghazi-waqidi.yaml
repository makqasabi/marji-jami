id: al-maghazi-waqidi
العنوان: المغازي
المؤلف:
  الاسم: محمد بن عمر الواقدي
  الوفاة_هجري: 207
  الوفاة_ميلادي: 823
العلم: السيرة النبوية والشمائل
التصنيف_الفرعي: أمهات المغازي
لماذا_هو_أم_في_بابه: >
  أوسع ديوان متخصص في مغازي النبي صلى الله عليه وسلم وصل إلينا؛
  استقصى الواقدي الغزوات والسرايا واحدة واحدة بتواريخها الدقيقة
  وأماكنها وأسماء المشاركين وتفاصيل وقائعها استقصاءً لم يبلغه أحد،
  حتى قال فيه إمام النقد ابن المديني وغيره كلمتهم المشهورة في علمه
  بالمغازي مع تضعيفهم له في رواية الحديث. فالكتاب عمدة المؤرخين في
  الجغرافيا الحربية للسيرة وترتيبها الزمني: عليه اعتمد ابن سعد
  (كاتبه) والطبري ومن بعدهم، وبه يضبط الباحثون مسارح الأحداث إلى
  اليوم، وهو إلى جانب سيرة ابن هشام الجناح الثاني لمصادر السيرة
  المتقدمة، يكمل أحدهما الآخر ولا يغني عنه.
يغني_عن:
  - تفاصيل المغازي المتناثرة في كتب التاريخ العام
يُقرأ_قبله:
  - سيرة ابن هشام
