  منصات_أخرى: []
الشروح_والمختصرات_والذيول: []
مستوى_القارئ: متخصص
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  الواقدي متروك الحديث عند النقاد — متهم عند بعضهم — فلا يحتج
  بمروياته في الأحكام والعقائد البتة، وإنما يستأنس بمادته التاريخية
  الجغرافية حيث لا تخالف الثابت؛ وهذا التفصيل منصوص عند أئمة الجرح
  أنفسهم الذين فرقوا بين علمه بالمغازي وروايته.
