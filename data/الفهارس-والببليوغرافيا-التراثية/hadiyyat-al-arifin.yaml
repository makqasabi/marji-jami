id: hadiyyat-al-arifin
العنوان: هدية العارفين — أسماء المؤلفين وآثار المصنفين
المؤلف:
  الاسم: إسماعيل باشا بن محمد أمين البغدادي
  الوفاة_هجري: 1339
  الوفاة_ميلادي: 1920
العلم: الفهارس والببليوغرافيا التراثية
التصنيف_الفرعي: ببليوغرافيا المؤلفين
لماذا_هو_أم_في_بابه: >
  أوسع معجم تراثي للمؤلفين مرتبًا على أسمائهم لا كتبهم؛ قلب
  إسماعيل باشا ترتيب الببليوغرافيا فجمع تحت كل مؤلف — نحو تسعة
  آلاف — وفاته وقائمة مصنفاته كاملة، فأكمل بهذا العمل ثلاثية
  الكشف: الكشف وذيله للكتب، والهدية للمؤلفين، وبها يبحث المحقق
  من الجهتين. عليه عوّل بروكلمان وكحالة والزركلي — صرحوا بذلك —
  وما من تحقيق يحرر آثار مصنف إلا رجع إليه، فهو الجسر بين
  الببليوغرافيا التراثية ومعاجم المؤلفين الحديثة وأمّ هذا الترتيب
  في الفن، ولا يقوم غيره مقامه في حصر إنتاج الأعلام العثمانيين
  المتأخرين خاصة.
يغني_عن:
  - حصر آثار المصنفين من مظانّ متفرقة
يُقرأ_قبله:
  - كشف الظنون
أفضل_الطبعات:
  - المحقق_أو_المعتني: (عناية لجنة وكالة المعارف)
    الدار: وكالة المعارف، استانبول (ومصورات دار إحياء التراث العربي)
    السنة: 1370–1374هـ/1951–1955م
    المجلدات: 2
    ملاحظة: النشرة المعتمدة وعنها المصورات
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: []
الشروح_والمختصرات_والذيول: []
مستوى_القارئ: متخصص
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  ورث أوهام مؤلفه في الوفيات وضبط الأسماء (نبه عليها الزركلي
  وكحالة في مواضع)، فيقابَل عند التدقيق بمعاجم التراجم المحققة.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - نشرة استانبول
آخر_تحديث: 2026-06-12
