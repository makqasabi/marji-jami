ملاحظات_نقدية: >
  لمؤلفه نزعة صوفية طرقية ظاهرة في التراجم والتقديرات، وفي
  أحكامه على معاصريه ما تدخله الخصومة المغربية الشهيرة حوله؛
  ومادته الوثائقية فوق ذلك معتمدة.
