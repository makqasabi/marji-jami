id: fihris-al-faharis
العنوان: فهرس الفهارس والأثبات ومعجم المعاجم والمشيخات والمسلسلات
المؤلف:
  الاسم: عبد الحي بن عبد الكبير الكتاني
  الوفاة_هجري: 1382
  الوفاة_ميلادي: 1962
العلم: الفهارس والببليوغرافيا التراثية
التصنيف_الفرعي: ببليوغرافيا الأسانيد والإجازات
لماذا_هو_أم_في_بابه: >
  ديوان علم الإسناد المتأخر وأمّ بابه بلا منازع؛ جمع عبد الحي
  الكتاني — مسنِد عصره — فهارسَ العلماء وأثباتهم ومشيخاتهم (وهي
  الكتب التي يسجل فيها العالم شيوخه ومروياته وإجازاته) من المغرب
  إلى الهند في ألف ترجمة ونيف، فحفظ شجرة الرواية المتصلة في
  القرون المتأخرة التي لولاه لتقطعت أخبارها. فهو المرجع الأول
  لكل باحث في الإجازات والأسانيد المتأخرة وتاريخ المدارس
  العلمية وشبكات العلماء، اعتمدته الدراسات الأكاديمية لتاريخ
  المؤسسة العلمية الإسلامية مصدرًا لا بديل عنه، وبتحقيق إحسان
  عباس صار ميسور التناول، ولا نظير له في بابه أصلًا.
يغني_عن:
  - الأثبات والفهارس المتفرقة (في مقام الجمع والدلالة عليها)
يُقرأ_قبله:
