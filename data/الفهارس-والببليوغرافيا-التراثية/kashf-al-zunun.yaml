id: kashf-al-zunun
العنوان: كشف الظنون عن أسامي الكتب والفنون
المؤلف:
  الاسم: مصطفى بن عبد الله حاجي خليفة (كاتب جلبي)
  الوفاة_هجري: 1067
  الوفاة_ميلادي: 1657
العلم: الفهارس والببليوغرافيا التراثية
التصنيف_الفرعي: الببليوغرافيا الجامعة الكبرى
لماذا_هو_أم_في_بابه: >
  أعظم ببليوغرافيا في تاريخ التراث الإسلامي والمرجع الذي سمّى
  هذا العلمَ باسمه؛ رتب حاجي خليفة — العالم العثماني الموسوعي —
  نحو خمسة عشر ألف عنوان على الحروف، يذكر الكتاب ومؤلفه ووفاته
  وأوله وشروحه ومختصراته وذيوله وحواشيه، مع مقدمات نفيسة في
  تقسيم العلوم وتعريفها. فصار سجل المكتبة الإسلامية الأكبر: به
  تُعرف سلاسل الكتب وأنسابها (المتن وشروحه وحواشيها)، وعليه يقوم
  تحقيق العناوين ونسبتها إلى اليوم، حتى ما من محقق يقدم لكتاب
  إلا افتتح بـ«قال في كشف الظنون». بقي ثلاثة قرون ونصفًا عمدة
  الفن بلا منازع، وذيوله واستدراكاته شاهد مركزيته، فهو أم
  الببليوغرافيا الإسلامية قاطبة.
يغني_عن:
  - فهارس الكتب الوسيطة قبله (كمفتاح السعادة لطاش كبرى زاده في جملة مادته)
يُقرأ_قبله: []
أفضل_الطبعات:
  - المحقق_أو_المعتني: محمد شرف الدين يالتقايا ورفعت بيلكه الكليسي
    الدار: وكالة المعارف، استانبول (ومصورات دار إحياء التراث العربي وغيرها)
    السنة: 1360–1362هـ/1941–1943م
    المجلدات: 2
    ملاحظة: النشرة المعتمدة المتقنة وعنها كل المصورات
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: []
الشروح_والمختصرات_والذيول:
  - إيضاح المكنون للبغدادي (ذيله الأكبر)
  - ذيول أخرى (العطار وغيره)
مستوى_القارئ: متخصص
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  وقعت له أوهام في وفيات ونسبة كتب استدركها الذيول والدراسات،
  وعنايته بكتب المشرق العثماني أوفى من المغرب؛ ومعلوماته تقف
  عند منتصف القرن الحادي عشر.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - نشرة استانبول
آخر_تحديث: 2026-06-12
