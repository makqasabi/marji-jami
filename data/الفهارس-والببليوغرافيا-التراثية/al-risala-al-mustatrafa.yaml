  منصات_أخرى: [إسلام هاوس]
الشروح_والمختصرات_والذيول: []
مستوى_القارئ: متوسط
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  أوصافه موجزة لا تغني عن مقدمات الكتب نفسها، وفي بعض أحكامه على
  الكتب تسامح مغربي الذوق؛ وما اكتُشف من مصنفات بعده يستدرك من
  تاريخ التراث لسزكين.
