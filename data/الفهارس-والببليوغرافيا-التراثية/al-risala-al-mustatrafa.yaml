id: al-risala-al-mustatrafa
العنوان: الرسالة المستطرفة لبيان مشهور كتب السنة المشرفة
المؤلف:
  الاسم: محمد بن جعفر الكتاني
  الوفاة_هجري: 1345
  الوفاة_ميلادي: 1927
العلم: الفهارس والببليوغرافيا التراثية
التصنيف_الفرعي: ببليوغرافيا علوم متخصصة (الحديث)
لماذا_هو_أم_في_بابه: >
  أجمع ببليوغرافيا متخصصة لكتب السنة وأنفعها؛ حصر الكتاني —
  محدث المغرب — نحو ألف وأربعمئة مصنف حديثي مرتبة على أنواعها:
  الصحاح والسنن والمسانيد والمعاجم والأجزاء والمستخرجات
  والزوائد...، يعرّف بكل نوع ثم يسرد كتبه بأوصاف موجزة محررة،
  فقدّم خريطة المكتبة الحديثية كاملة في رسالة لطيفة. صارت منذ
  صدورها المدخل المعتمد الذي يبدأ به طالب علم الحديث معرفة
  مصادره — تقررها الجامعات وبرامج التكوين قاطبة — والمثال الأرقى
  للببليوغرافيا المتخصصة في فن بعينه، فهي أم هذا الجنس: من
  أرادها في أي علم احتذى صنيعها.
يغني_عن:
  - مداخل مصادر السنة المعاصرة (في أصل مادتها)
يُقرأ_قبله: []
أفضل_الطبعات:
