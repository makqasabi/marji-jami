id: al-fihrist-ibn-al-nadim
العنوان: الفهرست
المؤلف:
  الاسم: أبو الفرج محمد بن إسحاق ابن النديم الوراق
  الوفاة_هجري: 380
  الوفاة_ميلادي: 990
العلم: الفهارس والببليوغرافيا التراثية
التصنيف_الفرعي: النص المؤسس للببليوغرافيا
لماذا_هو_أم_في_بابه: >
  أول ببليوغرافيا شاملة في تاريخ البشرية وأثمن وثيقة عن المكتبة
  العربية في عصرها الذهبي؛ فهرس ابن النديم — الوراق البغدادي
  الخبير بسوق الكتب — كلَّ ما وقف عليه من كتب الأمم بالعربية في
  عشر مقالات: علوم القرآن والنحو والتاريخ والفقه والفلسفة
  والعلوم والمذاهب والأديان، يترجم للمؤلف ويعدد مصنفاته. ولأن
  أكثر ما ذكره فُقد، صار كتابه السجل الوحيد لآلاف الكتب الضائعة
  وخريطةَ العقل العربي في القرن الرابع: عليه تتكئ دراسات تاريخ
  العلوم والفلسفة والترجمة قاطبة (وسزكين وبروكلمان بنيا عليه)،
  فهو أم الفن بالمعنى الحرفي ووثيقة الحضارة الأولى عن نفسها.
يغني_عن:
  - مصادر تاريخ المكتبة العربية المبكرة (لا بديل عنه أصلًا)
