id: idah-al-maknun
العنوان: إيضاح المكنون في الذيل على كشف الظنون
المؤلف:
  الاسم: إسماعيل باشا بن محمد أمين البغدادي
  الوفاة_هجري: 1339
  الوفاة_ميلادي: 1920
العلم: الفهارس والببليوغرافيا التراثية
التصنيف_الفرعي: ذيول الببليوغرافيا الجامعة
لماذا_هو_أم_في_بابه: >
  أعظم ذيول كشف الظنون والمتمم الذي لا ينفك عنه؛ استدرك إسماعيل
  باشا البغدادي — أمين مكتبات الدولة العثمانية المتأخر — نحو
  تسعة عشر ألف عنوان فاتت حاجي خليفة أو أُلفت بعده في قرنين
  ونصف، على ترتيب الأصل نفسه، فغطى المرحلة العثمانية المتأخرة
  التي هي أغزر عصور التأليف كمًّا وأقلها فهرسة. فصار الأصل وذيله
  وحدة واحدة في مكتبة المحقق: من لم يجد الكتاب في الكشف طلبه في
  الإيضاح، وبهما معًا يكتمل سجل المكتبة الإسلامية إلى مطلع القرن
  الرابع عشر، ولا يستغني عن الذيل باحث في نسبة كتاب متأخر أو
  تحقيق عنوانه.
يغني_عن:
  - الذيول الجزئية الأخرى على كشف الظنون
يُقرأ_قبله:
  - كشف الظنون (أصله)
أفضل_الطبعات:
  - المحقق_أو_المعتني: محمد شرف الدين يالتقايا ورفعت بيلكه الكليسي (عناية)
    الدار: وكالة المعارف، استانبول (ومصورات دار إحياء التراث العربي)
    السنة: 1364–1366هـ/1945–1947م
    المجلدات: 2
    ملاحظة: النشرة المعتمدة وعنها المصورات
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: []
الشروح_والمختصرات_والذيول: []
مستوى_القارئ: متخصص
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  فيه أوهام في الوفيات والعناوين أكثر من أصله — جُمع من جذاذات
  المؤلف بعد وفاته — فيوثَّق ما يؤخذ منه بمصدر ثانٍ عند التدقيق.
روابط_التحميل:
