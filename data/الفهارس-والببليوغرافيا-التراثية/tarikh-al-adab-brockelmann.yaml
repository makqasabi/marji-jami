id: tarikh-al-adab-brockelmann
العنوان: تاريخ الأدب العربي
المؤلف:
  الاسم: كارل بروكلمان
  الوفاة_هجري: 1375
  الوفاة_ميلادي: 1956
العلم: الفهارس والببليوغرافيا التراثية
التصنيف_الفرعي: الببليوغرافيا الأكاديمية الحديثة
لماذا_هو_أم_في_بابه: >
  أول حصر أكاديمي شامل للتراث العربي المخطوط والمطبوع والأساس
  الذي قام عليه الدرس الاستشراقي والعربي الحديث؛ تتبع بروكلمان
  كل مؤلف عربي من الجاهلية إلى العصر الحديث: ترجمة موجزة ثم حصر
  آثاره بأماكن مخطوطاتها في مكتبات العالم وأرقامها وطبعاتها،
  في أصلٍ وذيولٍ استغرقت نصف قرن. فصار «بروكلمان» علمًا على
  المرجع الذي لا تقوم بدونه دراسة تراثية: به يعرف المحقق نسخ
  كتابه ومظانّها، وعليه بنى سزكين مشروعه مستدركًا. والترجمة
  العربية (دار المعارف) جعلته في متناول الباحث العربي، فهو أم
  الببليوغرافيا الحديثة للتراث وجسرها بين خزائن المخطوطات
  والباحثين.
يغني_عن:
  - الكشف المتفرق عن أماكن المخطوطات (في حدود معلوماته)
يُقرأ_قبله:
  - كشف الظنون (للأصل التراثي)
أفضل_الطبعات:
  - المحقق_أو_المعتني: الترجمة العربية بإشراف محمود فهمي حجازي (وقبلها أجزاء عبد الحليم النجار)
    الدار: الهيئة المصرية العامة للكتاب (وأجزاء النجار بدار المعارف)
    السنة: 1993–1999م (الترجمة الكاملة)؛ أجزاء النجار من 1959م
    المجلدات: 6 (الترجمة الكاملة)
    ملاحظة: الترجمة العربية الكاملة هي المعتمدة عربيًّا؛ والأصل الألماني بليدن (بريل) مع ملاحقه الثلاثة هو المرجع الأكاديمي
التوافر_الرقمي:
  المكتبة_الشاملة: لا
  منصات_أخرى: [نسخ رقمية متداولة في مكتبات المخطوطات]
الشروح_والمختصرات_والذيول:
  - تاريخ التراث العربي لفؤاد سزكين (الاستدراك الأكبر عليه — في علم تاريخ العلوم)
مستوى_القارئ: متخصص
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  معلوماته وقفت عند منتصف القرن العشرين فاستُدرك عليه كثير
  (سزكين للقرون الأربعة الأولى خاصة)، وفي الترجمة العربية تفاوت
  بين أجزائها، وأحكامه النقدية أحكام مستشرق تُقرأ بميزانها.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - الترجمة العربية الكاملة
آخر_تحديث: 2026-06-12
