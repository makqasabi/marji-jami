id: wafayat-al-ayan
العنوان: وفيات الأعيان وأنباء أبناء الزمان
المؤلف:
  الاسم: شمس الدين أحمد بن محمد بن خلكان
  الوفاة_هجري: 681
  الوفاة_ميلادي: 1282
العلم: التراجم والطبقات والأنساب
التصنيف_الفرعي: معاجم التراجم الأدبية المحررة
لماذا_هو_أم_في_بابه: >
  أشهر معاجم التراجم العربية وأكثرها إتقانًا في الضبط والتحرير؛
  انتقى ابن خلكان — قاضي القضاة الأديب — من أعيان كل فن: العلماء
  والملوك والوزراء والشعراء، وترجم لهم تراجم محررة تجمع دقة المؤرخ
  (ضبط الأسماء والأنساب والوفيات بالحروف) إلى متعة الأديب (الأخبار
  والنوادر والأشعار المنتقاة)، ملتزمًا ألا يكتب إلا ما حرره
  بنفسه. صار الكتاب معيار الفن: عليه ذيّل الصفدي بالوافي والكتبي
  بفوات الوفيات وقالوا «وفيات» اقتداء به، واعتمدته الدراسات مرجعًا
  أول لضبط أعلام القرون الوسيطة، فهو أم معاجم التراجم المحررة
  وأمتع كتب الفن قراءة بشهادة قرائه عبر القرون.
يغني_عن:
  - معاجم التراجم الأدبية الوسيطة قبله
يُقرأ_قبله: []
