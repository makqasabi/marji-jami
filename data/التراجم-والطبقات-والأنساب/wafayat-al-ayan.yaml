  - الوافي بالوفيات للصفدي (التوسعة الكبرى على منهجه)
مستوى_القارئ: متوسط
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  انتقائي لا يستوعب (ترك الصحابة والتابعين عمدًا واكتفى بمن له
  وفاة محققة)، وميله الأدبي قدّم الأخبار الطريفة على التدقيق
  الحديثي في مواضع.
حالة_التوثيق: موثّق
