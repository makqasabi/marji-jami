id: tabaqat-ibn-saad
العنوان: الطبقات الكبرى (طبقات ابن سعد)
المؤلف:
  الاسم: محمد بن سعد بن منيع الزهري (كاتب الواقدي)
  الوفاة_هجري: 230
  الوفاة_ميلادي: 845
العلم: التراجم والطبقات والأنساب
التصنيف_الفرعي: أمهات الطبقات المتقدمة
لماذا_هو_أم_في_بابه: >
  أقدم موسوعة تراجم إسلامية وصلت إلينا وأم فن الطبقات كله؛ ترجم
  ابن سعد للنبي صلى الله عليه وسلم — وقسم سيرته من أجود المصادر
  المبكرة — ثم للصحابة والتابعين وتابعيهم إلى عصره، مرتبين على
  الطبقات والأمصار، بأسانيده في كل خبر، فحفظ مادة ضخمة عن القرنين
  الأول والثاني: هيئات الرجال وأخبارهم وفتاواهم ووفياتهم مما لا
  يوجد عند غيره. عليه عوّل أصحاب التراجم بعده قاطبة — خليفة
  والبخاري وابن أبي حاتم فمن دونهم — وهو إلى اليوم المصدر الأول
  لتراجم الصحابة والتابعين في الدراسات شرقًا وغربًا، فلا غنى عنه
  لمؤرخ ولا محدّث ولا باحث في صدر الإسلام.
يغني_عن:
  - كتب طبقات القرنين الأولين المفقودة (حفظ مادتها)
