ملاحظات_نقدية: >
  أكثر مادته من طريق شيخه الواقدي المتروك في الرواية، فتعامل
  أخباره بمنهج التعامل مع مرويات المغازي: استئناس في التاريخ
  وتوقف في الأحكام؛ وابن سعد نفسه صدوق عند النقاد.
