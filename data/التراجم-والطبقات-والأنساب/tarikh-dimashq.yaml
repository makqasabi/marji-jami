id: tarikh-dimashq
العنوان: تاريخ مدينة دمشق
المؤلف:
  الاسم: أبو القاسم علي بن الحسن ابن عساكر
  الوفاة_هجري: 571
  الوفاة_ميلادي: 1176
العلم: التراجم والطبقات والأنساب
التصنيف_الفرعي: تواريخ المدن الرجالية
لماذا_هو_أم_في_بابه: >
  أضخم كتاب تراجم في التراث الإسلامي على الإطلاق؛ نسج ابن عساكر —
  حافظ الشام — على منوال تاريخ بغداد فجاوزه حجمًا وسعة: ترجم لكل
  من حلّ دمشق أو اجتاز بها من الأنبياء إلى عصره في ثمانين مجلدًا،
  بأسانيده العالية، فحفظ من نصوص الكتب المفقودة والروايات المسندة
  خزانة لا نظير لها — حتى صار الباحثون يستخرجون منه أجزاء وكتبًا
  كاملة فُقدت أصولها. وهو لتراجم الصحابة والشاميين ولتاريخ الشام
  المرجع الأول، ومن أعظم مصادر السيرة المسندة خارج كتب الحديث.
  قال فيه الذهبي ونظراؤه كلمات الإعظام، وبه مع تاريخ بغداد اكتمل
  جناحا أعظم جنس في التراجم: تواريخ الحواضر المسندة.
يغني_عن:
  - المصادر الشامية المتقدمة المفقودة (حفظ نصوصها)
يُقرأ_قبله: []
أفضل_الطبعات:
  - المحقق_أو_المعتني: عمرو بن غرامة العمروي
    الدار: دار الفكر، دمشق/بيروت
    السنة: 1415–1421هـ/1995–2000م
    المجلدات: 80
    ملاحظة: الطبعة الكاملة الوحيدة المتداولة (ومجمع اللغة بدمشق أصدر أجزاء محققة أتقن لم تكتمل)
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: []
الشروح_والمختصرات_والذيول:
  - مختصر تاريخ دمشق لابن منظور
  - تهذيب ابن بدران (ناقص)
مستوى_القارئ: متخصص
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  طبعة دار الفكر الكاملة دون مستوى الكتاب تحقيقًا وفيها تصحيف
  ظاهر، فمن أراد التدقيق قابل على أجزاء مجمع دمشق؛ وفيه بأسانيده
  الغث والسمين على عادة المكثرين.
حالة_التوثيق: موثّق
مصادر_التوثيق:
