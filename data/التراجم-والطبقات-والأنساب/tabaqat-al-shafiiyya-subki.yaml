id: tabaqat-al-shafiiyya-subki
العنوان: طبقات الشافعية الكبرى
المؤلف:
  الاسم: تاج الدين عبد الوهاب بن علي السبكي
  الوفاة_هجري: 771
  الوفاة_ميلادي: 1370
العلم: التراجم والطبقات والأنساب
التصنيف_الفرعي: طبقات المذاهب (نموذجها الأعلى)
لماذا_هو_أم_في_بابه: >
  أعظم كتب طبقات المذاهب الفقهية وأغناها مادة، وقد أُدرج نموذجًا
  أعلى لجنسه كله؛ ترجم السبكي لفقهاء الشافعية من الإمام إلى عصره
  تراجم تتجاوز السرد إلى تحرير المسائل: يسوق فوائد الفقيه
  واختياراته ومناظراته ونصوصًا من كتبه المفقودة، حتى صار الكتاب
  خزانة فقه وأصول وتاريخ علمي لا مجرد تراجم، وضمّنه قواعد نفيسة في
  أدب المؤرخ والجرح («يُقبل قول العالم في أقرانه بشرط...») صارت
  عمدة في نقد التراجم. فهو المرجع الأول لتاريخ المدرسة الشافعية —
  أوسع المدارس انتشارًا — وقالبٌ احتذاه مصنفو طبقات الحنفية
  والمالكية والحنابلة، فمن فهمه ملك مفتاح هذا الجنس كله.
يغني_عن:
  - طبقات الشافعية للإسنوي وابن قاضي شهبة (في جملة المادة)
