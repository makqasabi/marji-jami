ملاحظات_نقدية: >
  للسبكي تعصب ظاهر لمدرسته الأشعرية وحملات على المخالفين (وفي
  ترجمته لابن تيمية وأهل الحديث مواضع مشهورة عوتب عليها حتى من
  شيوخه كالذهبي)؛ فتقرأ أحكامه المذهبية بميزان، ومادته العلمية
  فوق ذلك جليلة.
