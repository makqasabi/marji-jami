id: jamharat-ansab-al-arab
العنوان: جمهرة أنساب العرب
المؤلف:
  الاسم: أبو محمد علي بن أحمد بن حزم الأندلسي
  الوفاة_هجري: 456
  الوفاة_ميلادي: 1064
العلم: التراجم والطبقات والأنساب
التصنيف_الفرعي: علم الأنساب
لماذا_هو_أم_في_بابه: >
  أجمع كتب أنساب العرب الواصلة إلينا وأحكمها تصنيفًا؛ حصر ابن حزم
  — بعقله التنظيمي الفذ — قبائل العرب كلها من عدنان وقحطان، يسوق
  عمود النسب ثم بطون كل قبيلة وأفخاذها ومشاهير رجالها ومنازلها،
  بترتيب شجري محكم جعل الكشف فيه ميسورًا، وضم إليه أنساب البيوتات
  الحاكمة في الإسلام إلى عصره مع فوائد تاريخية لا توجد في غيره.
  استوعب جمهرة ابن الكلبي وأصول الفن قبله فأغنى عنها، وبقي ألف
  سنة العمدة التي يفزع إليها المحققون في ضبط نسب أو تمييز قبيلة،
  واعتمدته الدراسات القبلية والتاريخية مرجعًا أول، فهو أم علم
  الأنساب المدوَّن بلا منازع.
يغني_عن:
  - جمهرة النسب لابن الكلبي وكتب النسابين المتقدمة (في جملة مادتها)
