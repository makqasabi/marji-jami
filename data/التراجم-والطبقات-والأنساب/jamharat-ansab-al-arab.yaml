ملاحظات_نقدية: >
  لابن حزم أحكام حادة في أنساب بعض البيوتات (نفى أنسابًا ادعتها
  دول قائمة في عصره) جرّت عليه خصومات، يوازنها الباحث بمصادر
  الفن الأخرى؛ ومادة القبائل الأندلسية أوفى من المشرقية المتأخرة.
