    المجلدات: 17 (مع الفهارس)
    ملاحظة: التحقيق المعتمد (نسخ طبعة الخانجي القديمة 1349هـ)
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: []
الشروح_والمختصرات_والذيول:
  - ذيول ابن النجار وابن الدبيثي وغيرهما
مستوى_القارئ: متخصص
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  أُخذت عليه مواضع من التحامل في تراجم بعض من خالفهم (كترجمة أبي
  حنيفة التي رد عليها الحنفية بمصنفات)، والمسألة مبسوطة من
  الجانبين؛ وفي أخباره الواهي بأسانيده على طريقة المحدثين.
حالة_التوثيق: موثّق
مصادر_التوثيق:
