id: tarikh-baghdad
العنوان: تاريخ بغداد (تاريخ مدينة السلام)
المؤلف:
  الاسم: أبو بكر أحمد بن علي الخطيب البغدادي
  الوفاة_هجري: 463
  الوفاة_ميلادي: 1071
العلم: التراجم والطبقات والأنساب
التصنيف_الفرعي: تواريخ المدن الرجالية
لماذا_هو_أم_في_بابه: >
  أم تواريخ المدن الرجالية وإمام هذا الجنس كله؛ ترجم الخطيب لنحو
  سبعة آلاف وثمانمائة ممن سكن بغداد أو وردها من العلماء والرواة،
  بأسانيده إلى أخبارهم وأقوال النقاد فيهم، مفتتحًا بوصف طوبوغرافي
  لبغداد هو أوثق ما كتب عن عمران مدينة السلام. جمع بين كونه ديوان
  جرح وتعديل — والخطيب من أئمة النقد — وكونه سجل الحياة العلمية
  لعاصمة الدنيا خمسة قرون، فصار النموذج الذي احتذاه ابن عساكر في
  دمشق وكل من أرّخ لمدينة بعده، والمرجع الذي لا يستغني عنه محدّث
  في رواة بغداد ولا مؤرخ في حياتها، وذيوله المتتابعة شاهد
  مركزيته.
يغني_عن:
  - أجزاء تواريخ البغداديين المتقدمة المفقودة
يُقرأ_قبله: []
