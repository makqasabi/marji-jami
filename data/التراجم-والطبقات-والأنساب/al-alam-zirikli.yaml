id: al-alam-zirikli
العنوان: الأعلام — قاموس تراجم لأشهر الرجال والنساء من العرب والمستعربين والمستشرقين
المؤلف:
  الاسم: خير الدين بن محمود الزركلي
  الوفاة_هجري: 1396
  الوفاة_ميلادي: 1976
العلم: التراجم والطبقات والأنساب
التصنيف_الفرعي: معاجم التراجم المعاصرة
لماذا_هو_أم_في_بابه: >
  أشهر معجم تراجم عربي حديث وأكثر كتب المكتبة العربية المعاصرة
  استعمالًا بإطلاق؛ أفنى الزركلي ستين سنة في تحرير نحو أربعة عشر
  ألف ترجمة موجزة محررة لأعلام العربية من الجاهلية إلى عصره،
  بمنهج صارم أعلنه والتزمه: لا يثبت إلا ما حققه بالوثيقة والمصدر،
  مع ضبط الأسماء وتاريخ الوفاة بالهجري والميلادي وذكر المصادر
  وصور خطوط الأعلام النادرة. صار مذ صدر «عمدة الباحثين العرب»:
  أول ما يفتح لضبط أي عَلَم، وتقدمه دور النشر والجامعات مرجعًا
  معياريًّا، حتى قيل بحق: ما من مكتبة عربية جادة تخلو منه، فهو أم
  معاجم التراجم الحديثة ومثال الإتقان الفردي في التأليف المعاصر.
يغني_عن:
  - معاجم التراجم الحديثة المختصرة (كمعجم المؤلفين لكحالة في مقام الكشف الأول)
يُقرأ_قبله: []
أفضل_الطبعات:
  - المحقق_أو_المعتني: (تأليف المؤلف وتنقيحه)
    الدار: دار العلم للملايين، بيروت
    السنة: 2002م (الطبعة الخامسة عشرة) وما بعدها
    المجلدات: 8
    ملاحظة: طبعات دار العلم للملايين عن نسخة المؤلف الأخيرة هي المعتمدة
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: [نسخ رقمية متداولة]
الشروح_والمختصرات_والذيول:
  - ذيول واستدراكات معاصرة (إتمام الأعلام ونحوه)
مستوى_القارئ: مبتدئ/متوسط/متخصص
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  تراجمه موجزة بطبيعة منهجه فلا تغني عن المطولات، ووقعت له أوهام
  معدودة استدركتها الذيول، ووقف عند أعلام توفوا قبل وفاته فيحتاج
  من بعدهم إلى الذيول المعاصرة.
