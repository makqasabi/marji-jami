id: siyar-alam-al-nubala
العنوان: سير أعلام النبلاء
المؤلف:
  الاسم: شمس الدين محمد بن أحمد الذهبي
  الوفاة_هجري: 748
  الوفاة_ميلادي: 1348
العلم: التراجم والطبقات والأنساب
التصنيف_الفرعي: موسوعات التراجم الجامعة
لماذا_هو_أم_في_بابه: >
  أعظم كتب التراجم في الحضارة الإسلامية بإطباق الدارسين؛ ترجم
  الذهبي لأعلام الأمة كلهم — خلفاء وعلماء وقراء وزهاد وملوك وأدباء
  — على الطبقات من الصحابة إلى عصره، بقلم الناقد الحافظ الذي يحرر
  الخبر ويزن الرجل ويعلق بأحكام صارت أمثالًا، وبعبارة أدبية مشرقة
  جعلت الكتاب متعة قراءة كما هو مرجع تحقيق. هو ديوان معرفة رجال
  الأمة الأول: عليه المعوّل في تحرير سير الأئمة ومواقفهم وأقوالهم،
  ومنه تستمد الكتب والخطب والدراسات، وقلّ أن تجد بحثًا في عَلَم من
  الأعلام لا يحيل عليه، فهو أم فن التراجم وغرة كتب الذهبي التي قال
  فيها الدارسون: لو لم يكن له غيره لكفاه.
يغني_عن:
  - تذكرة الحفاظ والعبر للذهبي (في عموم مقاصدهما)
  - المجاميع الوسيطة للتراجم العامة
يُقرأ_قبله: []
أفضل_الطبعات:
  - المحقق_أو_المعتني: مجموعة من المحققين بإشراف شعيب الأرنؤوط
    الدار: مؤسسة الرسالة، بيروت
    السنة: 1401–1409هـ/1981–1988م
    المجلدات: 25 (مع الفهارس)
    ملاحظة: التحقيق المعتمد الذي عليه الإحالات كلها
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: [إسلام ويب, طريق الإسلام]
الشروح_والمختصرات_والذيول:
  - مختصرات معاصرة عدة
مستوى_القارئ: متوسط
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  أحكامه على بعض الأعلام والفرق اجتهاد ناقد قد يُناقش، وفي تراجم
  الصوفية والمتكلمين مواضع عتب عليه فيها الفريقان من وجهتين
  متقابلتين — وذلك من توازنه؛ وأصل الكتاب مستلٌّ من تاريخ الإسلام
  فيكمل أحدهما الآخر.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - طبعة مؤسسة الرسالة
آخر_تحديث: 2026-06-12
