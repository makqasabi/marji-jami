id: al-mawsua-al-arabiya-dimashq
العنوان: الموسوعة العربية (موسوعة دمشق)
المؤلف:
  الاسم: هيئة الموسوعة العربية، رئاسة الجمهورية، دمشق
  هيئة: نعم
العلم: الموسوعات العربية المعاصرة
التصنيف_الفرعي: الموسوعات العامة التأليفية
لماذا_هو_أم_في_بابه: >
  أكبر موسوعة عامة مؤلفة بالعربية أصالة — لا تعريبًا لموسوعة
  أجنبية؛ أنشئت هيئتها العلمية بدمشق سنة 1981 هيئةً عامة دائمة
  للعمل الموسوعي، فحررت بأقلام مئات الأكاديميين العرب أربعة
  وعشرين مجلدًا كبيرًا صدرت تباعًا (من 1998م) في سائر العلوم
  والفنون، بمواد معمقة تتجاوز التعريف الموسوعي السريع إلى
  المعالجة شبه البحثية بمراجعها — وهو ما يميزها منهجيًّا عن
  العالمية الرياضية الميسرة — ثم أتاحتها مجانًا على موقعها
  الإلكتروني سنة 2016. فهي أم العمل الموسوعي التأليفي العربي
  وأطول مؤسساته نفَسًا، ومرجع الباحث الجامعي حيث يطلب مادة
  عربية محررة بعمق.
يغني_عن:
  - المداخل الجامعية العامة في موضوعات موادها
يُقرأ_قبله: []
أفضل_الطبعات:
  - المحقق_أو_المعتني: هيئة الموسوعة العربية (لجان تخصصية)
    الدار: هيئة الموسوعة العربية، دمشق
    السنة: 1998–2008م (صدرت المجلدات تباعًا)
    المجلدات: 24
    ملاحظة: الطبعة الورقية الأم؛ والنسخة الإلكترونية المجانية (arab-ency.com.sy) منذ 2016م (تحقق ويب 2026-06-13)
التوافر_الرقمي:
  المكتبة_الشاملة: لا
  منصات_أخرى: [الموقع الرسمي المجاني, نسخ أرشيفية رقمية]
الشروح_والمختصرات_والذيول:
  - الموسوعة الطبية المتخصصة والموسوعة القانونية المتخصصة (مشاريع الهيئة الشقيقة)
مستوى_القارئ: متوسط
نوع_المرجعية: معاصرة
ملاحظات_نقدية: >
  تتفاوت موادها عمقًا بتعدد محرريها، وظروف سوريا أبطأت تحديثها
  فمحتواها بحدود عقدها الأول؛ وفي موادها السياسية والتاريخية
  المعاصرة نَفَس رسمي سوري ينتبه له القارئ.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - موقع الهيئة وبياناتها (تحقق ويب 2026-06-13)
آخر_تحديث: 2026-06-13
