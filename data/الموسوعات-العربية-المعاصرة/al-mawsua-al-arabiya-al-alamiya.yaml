id: al-mawsua-al-arabiya-al-alamiya
العنوان: الموسوعة العربية العالمية
المؤلف:
  الاسم: مؤسسة أعمال الموسوعة للنشر والتوزيع، الرياض (أكثر من ألف عالم ومحرر ومراجع)
  هيئة: نعم
العلم: الموسوعات العربية المعاصرة
التصنيف_الفرعي: الموسوعات العامة الشاملة
لماذا_هو_أم_في_بابه: >
  أضخم موسوعة عامة صدرت بالعربية وأوسعها انتشارًا واعتمادًا؛
  أنجزتها مؤسسة أعمال الموسوعة بالرياض على أساس الموسوعة
  العالمية (وورلد بوك) تعريبًا وتأصيلًا: عرّبت موادها العالمية
  بمراجعة علمية ولغوية صارمة، وأضافت آلاف المواد العربية
  والإسلامية المؤلفة أصالة حتى صارت عربية المحتوى لا مترجمة
  فحسب، في ثلاثين مجلدًا مرتبة هجائيًّا بالصور والخرائط الملونة.
  صارت منذ صدورها (ط1 1416هـ/1996م، ط2 منقحة 1419هـ/1999م)
  الموسوعة المنزلية والمدرسية والمكتبية الأولى في العالم العربي،
  ومرجع الإحالة العامة المعتمد في التعليم والإعلام، فهي أم
  الموسوعات العربية العامة بلا منازع.
يغني_عن:
  - الموسوعات العامة المترجمة الأصغر
يُقرأ_قبله: []
أفضل_الطبعات:
  - المحقق_أو_المعتني: هيئة تحرير المؤسسة (مئات المتخصصين)
    الدار: مؤسسة أعمال الموسوعة للنشر والتوزيع، الرياض
    السنة: 1419هـ/1999م (الطبعة الثانية المنقحة المزيدة؛ الأولى 1416هـ/1996م)
    المجلدات: 30
    ملاحظة: الطبعة الثانية هي المعتمدة الأخيرة (تحقق ويب 2026-06-13)
التوافر_الرقمي:
  المكتبة_الشاملة: لا
  منصات_أخرى: [نسخ رقمية متداولة (أرشيف وغيره), إصدارات قرص مدمج قديمة]
الشروح_والمختصرات_والذيول: []
مستوى_القارئ: مبتدئ/متوسط
نوع_المرجعية: معاصرة
ملاحظات_نقدية: >
  لم تصدر طبعة ثالثة منذ 1999م فمحتواها العلمي والسياسي متقادم
  في المواد المتغيرة (الدول والتقنية والإحصاءات)، وتبقى مرجعًا
  معتمدًا في المواد الثابتة؛ وأصلها الترجمي ظاهر في بعض المواد
  رغم التأصيل.
حالة_التوثيق: موثّق
