id: al-mawsua-al-muyassara
العنوان: الموسوعة العربية الميسرة
المؤلف:
  الاسم: لجنة من العلماء بإشراف محمد شفيق غربال (دار الشعب ومؤسسة فرانكلين)
  هيئة: نعم
العلم: الموسوعات العربية المعاصرة
التصنيف_الفرعي: الموسوعات الموجزة الرائدة
لماذا_هو_أم_في_بابه: >
  أول موسوعة عربية حديثة مكتملة والرائدة التي فتحت الباب لكل ما
  بعدها؛ أنجزها فريق من أعلام مصر الأكاديميين بإشراف المؤرخ
  محمد شفيق غربال (دار الشعب بالتعاون مع مؤسسة فرانكلين، 1965م)
  في مجلد ضخم ثم طبعات موسعة: مداخل موجزة محررة بالهجائية تغطي
  المعارف العامة والأعلام مع عناية خاصة بالمواد العربية
  والإسلامية المؤلفة أصالة. ظلت عقودًا الموسوعة العربية الوحيدة
  المتاحة فتربّت عليها أجيال المثقفين، وصارت مدخل «الموسوعية»
  إلى لغة الضاد ونموذجَ التحرير الموجز الذي احتذته اللواحق،
  فمكانتها مكانة الريادة التأسيسية في بابها وإن تجاوزتها
  اللاحقات حجمًا.
يغني_عن:
  - معاجم الأعلام والمعارف الموجزة القديمة
يُقرأ_قبله: []
أفضل_الطبعات:
  - المحقق_أو_المعتني: إشراف محمد شفيق غربال
    الدار: دار الشعب بالتعاون مع مؤسسة فرانكلين، القاهرة
    السنة: 1965م (وطبعة موسعة في مجلدين 1972م، ثم طبعات لاحقة بدور أخرى)
    المجلدات: 1 (ثم 2 في الموسعة)
    ملاحظة: الطبعة الأم؛ والطبعات اللاحقة (كطبعة الشروق 2009م المحدثة) متداولة
التوافر_الرقمي:
  المكتبة_الشاملة: لا
  منصات_أخرى: [نسخ رقمية متداولة]
الشروح_والمختصرات_والذيول: []
مستوى_القارئ: مبتدئ
نوع_المرجعية: معاصرة
ملاحظات_نقدية: >
  إيجازها الشديد يجعلها للتعريف الأول لا للبحث، ومحتواها الأصلي
  بحدود الستينيات (والمحدثات اللاحقة جزئية)؛ وقيمتها اليوم
  تاريخية ريادية أكثر منها مرجعية أولى.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - طبعة دار الشعب وفرانكلين
آخر_تحديث: 2026-06-13
