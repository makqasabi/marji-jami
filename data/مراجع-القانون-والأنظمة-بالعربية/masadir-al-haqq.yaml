id: masadir-al-haqq
العنوان: مصادر الحق في الفقه الإسلامي — دراسة مقارنة بالفقه الغربي
المؤلف:
  الاسم: عبد الرزاق أحمد السنهوري
  الوفاة_هجري: 1391
  الوفاة_ميلادي: 1971
العلم: مراجع القانون والأنظمة بالعربية
التصنيف_الفرعي: الفقه القانوني المقارن (الإسلامي-المدني)
لماذا_هو_أم_في_بابه: >
  أعظم عمل في تأصيل نظرية الالتزام مقارنةً بين الفقه الإسلامي
  والقانون الغربي، والجسر الذي أراد به السنهوري بناءَ قانون
  مدني عربي يستمد من الشريعة؛ تتبع فيه مصادر الالتزام (العقد
  والإرادة المنفردة والعمل غير المشروع والإثراء بلا سبب
  والقانون) في الفقه الإسلامي بمذاهبه، ووازنها بنظائرها في
  الفقه الغربي بمنهجٍ أصّل لعلم «الفقه القانوني المقارن».
  حقق به مشروعه المعلن في إحياء الفقه الإسلامي وصياغته صياغة
  قانونية حديثة، فصار المرجع الأول لكل باحث في تقنين الشريعة
  والموازنة بين النظامين، وعمدةَ المجامع الفقهية والكليات
  القانونية في هذا الباب، وهو القسيم التأصيلي للوسيط: ذاك في
  القانون الوضعي وهذا في أصله الشرعي المقارن.
يغني_عن:
  - الدراسات المقارنة الجزئية بين الالتزام في الفقهين
يُقرأ_قبله:
  - الوسيط (للبناء القانوني) أو متن أصولي
أفضل_الطبعات:
  - المحقق_أو_المعتني: عبد الرزاق السنهوري (تأليف)
    الدار: معهد الدراسات العربية العالية (جامعة الدول العربية)، القاهرة (وأُعيد بمنشورات الحلبي الحقوقية، بيروت)
    السنة: 1954–1959م (صدرت أجزاؤه تباعًا)
    المجلدات: 6 أجزاء
    ملاحظة: نشرة معهد الدراسات العربية الأصل، وعنها طبعات الحلبي الحقوقية المتداولة (تحقق ويب 2026-06-13)
التوافر_الرقمي:
  المكتبة_الشاملة: لا
  منصات_أخرى: [نسخ رقمية قانونية متداولة]
الشروح_والمختصرات_والذيول: []
مستوى_القارئ: متخصص
نوع_المرجعية: معاصرة
ملاحظات_نقدية: >
  مشروع السنهوري في تطعيم القانون المدني بالفقه الإسلامي نوقش
  بين مؤيد يراه إحياءً ومتحفظ يرى الغلبة فيه للبناء الغربي
  والفقهُ الإسلامي مادةً تُسقَط عليه؛ والمسألة محل بحث في
  دراسات الفكر القانوني العربي، ولا تنقص من مرجعية الكتاب
  التأصيلية.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - بيانات معهد الدراسات العربية ومنشورات الحلبي (تحقق ويب 2026-06-13)
آخر_تحديث: 2026-06-13
