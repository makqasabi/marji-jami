id: al-wasit-sanhuri
العنوان: الوسيط في شرح القانون المدني الجديد
المؤلف:
  الاسم: عبد الرزاق أحمد السنهوري
  الوفاة_هجري: 1391
  الوفاة_ميلادي: 1971
العلم: مراجع القانون والأنظمة بالعربية
التصنيف_الفرعي: شروح القانون المدني
لماذا_هو_أم_في_بابه: >
  أعظم مرجع في القانون المدني العربي بإجماع رجال القانون،
  ومرجعية لا تُنازَع في الفقه المدني العربي كله؛ شرح فيه
  السنهوري — واضع القانون المدني المصري وملهم أكثر القوانين
  المدنية العربية — نظريةَ الالتزام والعقود المسماة شرحًا
  استوعب النصوص والأعمال التحضيرية والقضاء والفقه المقارن
  (الفرنسي خاصة) والفقه الإسلامي، بعمق تأصيلي وبناء منهجي جعل
  الكتاب فقهًا قانونيًّا قائمًا لا مجرد شرح مواد. تستند إليه
  المحاكم والمحامون والباحثون في العالم العربي كله — لأن أكثر
  قوانينه المدنية من صنع السنهوري أو على منواله — ولا تكاد
  مذكرة قانونية مدنية تخلو من الإحالة عليه، فهو أم القانون
  المدني العربي ووثيقته الكبرى.
يغني_عن:
  - الوجيز للسنهوري (مختصره) وشروح القانون المدني الأصغر
يُقرأ_قبله:
  - الوجيز أو مدخل قانوني جامعي
أفضل_الطبعات:
  - المحقق_أو_المعتني: عبد الرزاق السنهوري (تأليف)
    الدار: دار إحياء التراث العربي، بيروت (ومنشورات الحلبي الحقوقية لاحقًا)
    السنة: 1952–1970م (صدرت أجزاؤه تباعًا)
    المجلدات: 10 (في اثني عشر مجلدًا بطبعات لاحقة)
    ملاحظة: طبعة دار إحياء التراث العربي هي الأصل المعتمد؛ ولاحقتها طبعات منقحة بتعليقات (تحقق ويب 2026-06-13)
التوافر_الرقمي:
  المكتبة_الشاملة: لا
  منصات_أخرى: [نسخ رقمية قانونية متداولة]
الشروح_والمختصرات_والذيول:
  - الوجيز في شرح القانون المدني للسنهوري (مختصره)
مستوى_القارئ: متخصص
نوع_المرجعية: معاصرة
ملاحظات_نقدية: >
  مبني على القانون المدني المصري ونظيره العربي، فيلزم التحقق
  من مطابقة نصوصه لقانون كل قطر عند التطبيق؛ ومرجعيته الفقهية
  المقارنة باقية وإن تغيّرت بعض التشريعات والأحكام القضائية
  التي علّق عليها.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - بيانات دار إحياء التراث العربي والطبعات (تحقق ويب 2026-06-13)
آخر_تحديث: 2026-06-13
