id: al-risala-shafii
العنوان: الرسالة
المؤلف:
  الاسم: محمد بن إدريس الشافعي
  الوفاة_هجري: 204
  الوفاة_ميلادي: 820
العلم: أصول الفقه ومقاصد الشريعة
التصنيف_الفرعي: النصوص المؤسسة
لماذا_هو_أم_في_بابه: >
  أول كتاب دُوِّن في أصول الفقه وبه صار الفن علمًا مستقلًّا؛ وضع
  الشافعي فيه قواعد الاستدلال بالكتاب والسنة، وحرر مباحث البيان
  والعام والخاص والناسخ والمنسوخ وخبر الواحد والإجماع والقياس،
  وأقام الحجة لمكانة السنة من الكتاب إقامة حسمت معارك عصره. قال
  المزني: قرأتها خمسمائة مرة ما من مرة إلا واستفدت منها فائدة جديدة،
  وعدّه العلماء لأصول الفقه كأرسطو للمنطق واضعًا أولَ لا يُتصور
  الفن قبله. فكل كتب الأصول بعده شرح وبناء على ما أسس، ولا يستغني
  عن قراءتها دارس للتشريع الإسلامي أراد رؤية العلم لحظة ميلاده
  بلسان عربي مبين.
يغني_عن: []
يُقرأ_قبله:
  - مذكرة في أصول الفقه للشنقيطي (لتصور مسائل الفن أولًا)
