  منصات_أخرى: [إسلام هاوس]
الشروح_والمختصرات_والذيول:
  - شروح ودراسات معاصرة كثيرة
مستوى_القارئ: متوسط
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  ترتيبها على طريقة العرض الجدلي المتقدم لا على أبواب الأصول
  المستقرة، فلا تُقرأ بوصفها متنًا مدرسيًّا؛ ومصطلحات الشافعي فيها
  (كالبيان) أوسع من اصطلاح المتأخرين.
حالة_التوثيق: موثّق
