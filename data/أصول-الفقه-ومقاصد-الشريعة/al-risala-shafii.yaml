    الدار: مطبعة مصطفى البابي الحلبي، القاهرة
    السنة: 1358هـ/1940م
    المجلدات: 1
    ملاحظة: التحقيق الذهبي المعتمد عن أصل الربيع بن سليمان، وعنه كل المصورات
التوافر_الرقمي:
