    الدار: دار ابن الجوزي، الدمام
    السنة: 1423هـ
    المجلدات: 7 (مع الفهارس)
    ملاحظة: الطبعة المحققة المعتمدة على النسخ الخطية
  - المحقق_أو_المعتني: محمد محيي الدين عبد الحميد
    الدار: المكتبة العصرية وغيرها (عن طبعات مصرية)
    السنة: 1374هـ/1955م
    المجلدات: 4
    ملاحظة: الطبعة المتداولة قديمًا وعليها إحالات كثيرة
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: [طريق الإسلام]
الشروح_والمختصرات_والذيول: []
مستوى_القارئ: متوسط/متخصص
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  فيه استطرادات طويلة على عادة ابن القيم، وحملاته على التقليد
  والحيل فيها شدة عاتبها عليه المنتسبون للمذاهب؛ ومباحثه في تغير
  الفتوى يساء توظيفها أحيانًا خارج ضوابطها.
حالة_التوثيق: موثّق
مصادر_التوثيق:
