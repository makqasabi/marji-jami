id: ilam-al-muwaqqiin
العنوان: إعلام الموقعين عن رب العالمين
المؤلف:
  الاسم: شمس الدين محمد بن أبي بكر ابن قيم الجوزية
  الوفاة_هجري: 751
  الوفاة_ميلادي: 1350
العلم: أصول الفقه ومقاصد الشريعة
التصنيف_الفرعي: أصول الاستدلال والفتوى
لماذا_هو_أم_في_بابه: >
  أعظم كتاب في فقه الاستدلال وأصول الفتوى وروح التشريع؛ حرر فيه ابن
  القيم مباحث لا تجدها مجموعة في كتب الأصول الصناعية: حجية أقوال
  الصحابة وفتاويهم، وإبطال الحيل، وتغير الفتوى بتغير الأزمنة
  والأمكنة والأحوال، وقاعدة أن الشريعة عدل كلها ورحمة كلها مصالح
  كلها، وشروط المفتي وآدابه، كل ذلك بتطبيقات فقهية حية تملأ الكتاب.
  فهو جسر بين الأصول النظرية والفقه الحي، اعتمدته حركات الإصلاح
  الفقهي الحديثة كلها وأفادت منه القوانين والمجامع في نظرية تغير
  الفتوى، ولا يُعرف في التراث كتاب جمع فلسفة التشريع وأدب الإفتاء
  وفروسية الاستدلال مثله.
يغني_عن:
  - الرسائل المفردة في الحيل وتغير الفتوى وآداب المفتي
يُقرأ_قبله:
  - روضة الناظر
