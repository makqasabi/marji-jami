id: rawdat-al-nazir
العنوان: روضة الناظر وجنة المناظر
المؤلف:
  الاسم: موفق الدين عبد الله بن أحمد بن قدامة المقدسي
  الوفاة_هجري: 620
  الوفاة_ميلادي: 1223
العلم: أصول الفقه ومقاصد الشريعة
التصنيف_الفرعي: أصول الحنابلة
لماذا_هو_أم_في_بابه: >
  عمدة الحنابلة في أصول الفقه ومتنهم المعتمد في الدرس منذ ثمانية
  قرون؛ هذّب ابن قدامة — صاحب المغني — كتاب المستصفى للغزالي على
  أصول أحمد ومذهب أهل الأثر، فحذف ما لا يوافق طريقتهم وأضاف تقريرات
  الحنابلة وأمثلتهم، فجاء كتابًا وسطًا جمع إحكام الصنعة الأصولية إلى
  سلامة المنزع، ولهذا اعتمدته المعاهد والجامعات (وعلى رأسها كليات
  الشريعة السعودية) متنًا أصوليًّا أول، وكثرت عليه الشروح قديمًا —
  وأشهرها شرح ابن بدران ومختصره — وحديثًا حتى صار أكثر كتب الأصول
  تدريسًا في عصرنا. فمن أراد أصول الفقه على طريقة محررة سالمة مأمونة
  فبابه الروضة، ومنها يصعد إلى المطولات الكلامية على بصيرة.
يغني_عن:
  - مختصر التحرير وأمثاله من متون الحنابلة (في مقام الدرس الأول)
يُقرأ_قبله:
  - مذكرة في أصول الفقه للشنقيطي (وهي على ترتيب الروضة)
أفضل_الطبعات:
  - المحقق_أو_المعتني: عبد الكريم بن علي النملة
    الدار: مكتبة الرشد، الرياض
    السنة: 1414هـ وما بعدها (طبعات متكررة)
    المجلدات: 3 (مع شرحه إتحاف ذوي البصائر)
    ملاحظة: طبعة الدرس الجامعي المتداولة
  - المحقق_أو_المعتني: عبد العزيز بن عبد الرحمن السعيد
    الدار: جامعة الإمام محمد بن سعود الإسلامية، الرياض
    السنة: 1399هـ
    المجلدات: 2
    ملاحظة: طبعة محققة معتمدة
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: [إسلام هاوس]
الشروح_والمختصرات_والذيول:
  - نزهة الخاطر العاطر لابن بدران
  - مذكرة الشنقيطي (على ترتيبها)
مستوى_القارئ: متوسط
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  ورثت عن أصلها الغزالي مقدمته المنطقية وبعض تقريرات المتكلمين مما
  نبه عليه شراحها الحنابلة أنفسهم؛ وهي متن درس لا كتاب ترجيح
  واستدلال موسع.
روابط_التحميل:
  - المصدر: المكتبة الشاملة (ت شعبان؛ غير طبعة النملة)
    الرابط: https://shamela.ws/book/12010
    النوع: حر
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - طبعة جامعة الإمام
آخر_تحديث: 2026-06-12
