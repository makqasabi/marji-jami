id: al-mustasfa
العنوان: المستصفى من علم الأصول
المؤلف:
  الاسم: أبو حامد محمد بن محمد الغزالي
  الوفاة_هجري: 505
  الوفاة_ميلادي: 1111
العلم: أصول الفقه ومقاصد الشريعة
التصنيف_الفرعي: أمهات طريقة المتكلمين
لماذا_هو_أم_في_بابه: >
  أحد الأركان الأربعة التي قام عليها علم الأصول عند المتأخرين — مع
  البرهان للجويني والعهد والعمد للقاضيين — وأكثرها أثرًا؛ صنفه
  الغزالي آخر حياته فاستوى فيه نَفَسُه الأصولي على أكمله: قدّم له
  بمقدمة منطقية شهيرة قال فيها «من لا يحيط بالمنطق فلا ثقة بعلومه
  أصلًا» فأدخل المنطق بنية العلم، ورتب الفن على الأقطاب الأربعة
  (الأحكام، الأدلة، طرق الاستثمار، المجتهد) ترتيبًا ابتكاريًّا، وحرر
  مبحث المصلحة والمناسبة تحريرًا جعله أصل النظر المقاصدي قبل
  الشاطبي. فالمحصول والإحكام ومختصراتهما التي دار عليها التدريس
  قرونًا إنما لخصت الأركان الأربعة وهذا أبقاها وأنضجها، فهو أم
  الطريقة الكلامية الواصلة إلينا كاملة بقلم حجة الإسلام.
يغني_عن:
  - البرهان للجويني (في مقام التحصيل؛ فالمستصفى أنضج عرضًا)
يُقرأ_قبله:
  - روضة الناظر (وهي مهذبة منه على مذهب الحنابلة)
أفضل_الطبعات:
  - المحقق_أو_المعتني: (طبعة الأصل)
    الدار: المطبعة الأميرية، بولاق
    السنة: 1322–1324هـ
    المجلدات: 2 (وبهامشه فواتح الرحموت شرح مسلم الثبوت)
    ملاحظة: الطبعة الأم المعتمدة التي عليها الإحالات
  - المحقق_أو_المعتني: محمد عبد السلام عبد الشافي
    الدار: دار الكتب العلمية، بيروت
    السنة: 1413هـ/1993م
    المجلدات: 1
    ملاحظة: طبعة متداولة ميسرة الإحالة
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: []
الشروح_والمختصرات_والذيول:
  - روضة الناظر لابن قدامة (تهذيب له على أصول الحنابلة)
مستوى_القارئ: متخصص
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  مقدمته المنطقية ودعواه فيها أنكرها جمهور أهل الأثر وردّ عليها ابن
  تيمية ردًّا مبسوطًا؛ وفي مباحثه الكلامية ما هو محل الخلاف المعروف
  بين المدارس.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - طبعة بولاق
آخر_تحديث: 2026-06-12
