id: al-mahsul-razi
العنوان: المحصول في علم أصول الفقه
المؤلف:
  الاسم: فخر الدين محمد بن عمر الرازي
  الوفاة_هجري: 606
  الوفاة_ميلادي: 1210
العلم: أصول الفقه ومقاصد الشريعة
التصنيف_الفرعي: أمهات طريقة المتكلمين
لماذا_هو_أم_في_بابه: >
  الكتاب الذي استوعب الطريقة الكلامية كلها وصار محور الفن بعده؛ جمع
  الرازي فيه الأركان الأربعة — البرهان والمستصفى والعهد والعمد —
  بمنهجه التقسيمي الحاصر، فحرر المسائل وأدلتها واعتراضاتها وأجوبتها
  تحريرًا صار النموذج الذي احتذاه المصنفون: فالحاصل والتحصيل
  اختصراه، ومنهاج البيضاوي زبدته، وعليه دارت شروح الأصفهاني
  والإسنوي التي بها تعلم الفن قرونًا، حتى قيل إن أصول المتأخرين
  كلها تدور في فلك المحصول ونظيره الإحكام للآمدي. ولأهميته كان من
  أوائل ما حُقق في الرسائل الجامعية المعاصرة تحقيقًا علميًّا، فهو
  مفتاح المكتبة الأصولية الوسيطة بأسرها لمن أراد فهم سلسلتها.
يغني_عن:
  - الإحكام للآمدي (يقاربه؛ ومن حصّل أحدهما فهم الطريقة)
  - مختصراته (الحاصل والتحصيل ومنهاج البيضاوي بشروحه)
يُقرأ_قبله:
  - المستصفى أو روضة الناظر
أفضل_الطبعات:
  - المحقق_أو_المعتني: طه جابر فياض العلواني
    الدار: مؤسسة الرسالة، بيروت
    السنة: 1418هـ/1997م (الطبعة الثالثة؛ الأصل رسالة جامعية بالأزهر ثم طبعة جامعة الإمام 1399هـ)
    المجلدات: 6
    ملاحظة: التحقيق المعتمد بدراسة وافية
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: []
الشروح_والمختصرات_والذيول:
  - الكاشف عن المحصول للأصفهاني
  - نفائس الأصول للقرافي (شرح)
مستوى_القارئ: متخصص
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  غلبت عليه الصنعة الكلامية والافتراضات العقلية حتى بَعُد عن ثمرة
  الفقه في مواضع — وهو مأخذ أهل الأثر على الطريقة كلها — وتقسيماته
  قد ترهق غير المتمرس.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - طبعة مؤسسة الرسالة بتحقيق العلواني
آخر_تحديث: 2026-06-12
