id: maqasid-ibn-ashur
العنوان: مقاصد الشريعة الإسلامية
المؤلف:
  الاسم: محمد الطاهر بن عاشور التونسي
  الوفاة_هجري: 1393
  الوفاة_ميلادي: 1973
العلم: أصول الفقه ومقاصد الشريعة
التصنيف_الفرعي: مقاصد الشريعة
لماذا_هو_أم_في_بابه: >
  الكتاب الذي بعث علم المقاصد في العصر الحديث ودعا إلى استقلاله؛
  بنى ابن عاشور على الشاطبي ثم تجاوزه: دعا صراحة إلى جعل المقاصد
  علمًا مستقلًّا عن أصول الفقه يضبط به الاجتهاد، وحرر طرق إثبات
  المقصد، وأضاف مقاصد عامة جديدة كالحرية والمساواة والسماحة
  والفطرة، وفصّل مقاصد المعاملات والأحكام الخاصة تفصيلًا لم يُسبق
  إليه. صار منذ صدوره (1366هـ/1946م) النص المؤسس الثاني للمقاصد
  بعد الموافقات، وعليه قامت الدراسات المقاصدية المعاصرة بأسرها
  ومراكزها العلمية، فلا يذكر هذا العلم إلا والشاطبي وابن عاشور
  ركناه، وهو أيسر مدخلًا من الموافقات وأقرب إلى قضايا العصر.
يغني_عن:
  - المداخل المقاصدية المعاصرة المبنية عليه
يُقرأ_قبله:
  - متن أصولي محرر (كروضة الناظر)
أفضل_الطبعات:
  - المحقق_أو_المعتني: محمد الحبيب ابن الخوجة (تحقيق ودراسة)
    الدار: وزارة الأوقاف والشؤون الإسلامية، قطر
    السنة: 1425هـ/2004م
    المجلدات: 3 (الكتاب مع دراسة موسعة)
    ملاحظة: أوفى الطبعات المحققة
  - المحقق_أو_المعتني: محمد الطاهر الميساوي
    الدار: دار النفائس، عمّان
    السنة: 1421هـ/2001م (الطبعة الثانية)
    المجلدات: 1
    ملاحظة: طبعة محققة متداولة بمقدمة وافية
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: []
الشروح_والمختصرات_والذيول:
  - دراسات معاصرة كثيرة (نظرية المقاصد عند ابن عاشور للحسني وغيرها)
مستوى_القارئ: متوسط
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  بعض تطبيقاته واجتهاداته المقاصدية نوقشت، ودعوته لاستقلال المقاصد
  عن الأصول لم يقبلها كثير من الأصوليين؛ ويُحذر سوءُ توظيف الكتاب
  لإهدار النصوص باسم المقصد وهو بريء من ذلك.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - طبعة الأوقاف القطرية بتحقيق ابن الخوجة
آخر_تحديث: 2026-06-12
