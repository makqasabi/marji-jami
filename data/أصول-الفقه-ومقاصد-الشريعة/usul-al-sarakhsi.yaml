id: usul-al-sarakhsi
العنوان: أصول السرخسي (تمهيد الفصول في الأصول)
المؤلف:
  الاسم: شمس الأئمة محمد بن أحمد السرخسي
  الوفاة_هجري: 483
  الوفاة_ميلادي: 1090
العلم: أصول الفقه ومقاصد الشريعة
التصنيف_الفرعي: أصول الحنفية (طريقة الفقهاء)
لماذا_هو_أم_في_بابه: >
  أم كتب الأصول على طريقة الفقهاء الحنفية المتداولة؛ أملاه شمس
  الأئمة السرخسي — صاحب المبسوط — وهو محبوس في الجب، فقرر فيه أصول
  المذهب كما تُستخرج من فروع أئمته استخراجًا، على المنهج الذي يميز
  مدرسة الحنفية: الأصل يخدم الفرع الموروث لا العكس. امتاز بعبارة
  أبين وأقرب من أصول البزدوي المعاصر له، فصار المرجع التعليمي الأول
  لطريقة الفقهاء، به يفهم الدارس مباحثهم الخاصة كالعزيمة والرخصة
  وأقسام الوضوح والخفاء التي لا توجد عند المتكلمين بترتيبهم. فلا
  يستقيم لدارس الأصول تصور المدرستين — وهما قسيما الفن كله — إلا
  بكتاب من هذا الطراز، وهذا أمّ بابه.
يغني_عن:
  - المتون الحنفية المختصرة (كالمنار في مقام الفهم لا الحفظ)
يُقرأ_قبله:
  - مذكرة الشنقيطي أو متن مدرسي ميسر
أفضل_الطبعات:
  - المحقق_أو_المعتني: أبو الوفاء الأفغاني
    الدار: لجنة إحياء المعارف النعمانية، حيدر آباد (ومصورة دار المعرفة، بيروت)
    السنة: 1372هـ/1953م
    المجلدات: 2
    ملاحظة: النشرة المعتمدة وعنها المصورات المتداولة
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: []
الشروح_والمختصرات_والذيول: []
مستوى_القارئ: متخصص
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  مقرر على مذهب واحد فلا يعرض أدلة المخالفين بإنصاف المتكلمين،
  وفيه مباحث كلامية ماتريدية المنزع في مسائل الحسن والقبح؛ والنشرة
  المتداولة بحاجة إلى تحقيق أوفى.
روابط_التحميل:
