id: mudhakkira-shinqiti
العنوان: مذكرة في أصول الفقه
المؤلف:
  الاسم: محمد الأمين بن محمد المختار الجكني الشنقيطي
  الوفاة_هجري: 1393
  الوفاة_ميلادي: 1973
العلم: أصول الفقه ومقاصد الشريعة
التصنيف_الفرعي: المداخل والمقررات الحديثة
لماذا_هو_أم_في_بابه: >
  أنفع مدخل معاصر محرر إلى أصول الفقه؛ أملاها الشنقيطي على طلاب
  الجامعة الإسلامية بالمدينة على ترتيب روضة الناظر، فجمعت ميزتين
  قلّ اجتماعهما: إيجاز المذكرة الدراسية، وتحقيق المجتهد الذي يصحح
  للمتون أوهامها ويبين ما خالف فيه الأصوليون مذهبَ السلف في مباحث
  الكلام، مع أمثلة قرآنية حية من معين صاحب أضواء البيان. فهي ليست
  تلخيصًا مدرسيًّا فحسب بل نقد محرر للفن بعبارة ميسرة، اعتمدتها
  الجامعات والحلقات العلمية مدخلًا أول للأصول جيلًا بعد جيل، وبها
  يدخل الطالب إلى الروضة فالمطولات على بصيرة بمواضع النظر، فهي أم
  المداخل المعاصرة في بابها.
يغني_عن:
  - المداخل الجامعية المختصرة (كالأصول من علم الأصول)
يُقرأ_قبله: []
أفضل_الطبعات:
  - المحقق_أو_المعتني: (إملاء المؤلف؛ طبعات معتنى بها)
    الدار: مكتبة العلوم والحكم، المدينة المنورة
    السنة: 1422هـ/2001م (الطبعة الخامسة) وطبعات أخرى
    المجلدات: 1
    ملاحظة: طبعة متداولة؛ وضمن آثار الشنقيطي بدار عالم الفوائد طبعة محررة
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: [إسلام هاوس]
الشروح_والمختصرات_والذيول:
  - شروح صوتية ومكتوبة معاصرة كثيرة
مستوى_القارئ: مبتدئ/متوسط
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  مذكرة موجزة لا تستوعب أدلة المسائل وخلافها العالي، وترتيبها تابع
  للروضة فلا تقرأ مستقلة عنها لمن أراد التوسع.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - طبعة مكتبة العلوم والحكم
آخر_تحديث: 2026-06-12
