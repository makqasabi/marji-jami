id: al-bahr-al-muhit-zarkashi
العنوان: البحر المحيط في أصول الفقه
المؤلف:
  الاسم: بدر الدين محمد بن عبد الله الزركشي
  الوفاة_هجري: 794
  الوفاة_ميلادي: 1392
العلم: أصول الفقه ومقاصد الشريعة
التصنيف_الفرعي: الموسوعات الأصولية الجامعة
لماذا_هو_أم_في_بابه: >
  موسوعة الأصول الكبرى وأوسع كتب الفن مادة على الإطلاق؛ جمع الزركشي
  فيه أقوال المدرستين — المتكلمين والفقهاء — ومذاهب الأئمة الأربعة
  وغيرهم في كل مسألة أصولية، بعزو دقيق إلى مئات المصنفات منها ما
  فُقد فلم يبق إلا في نقله، فصار لعلم الأصول بمنزلة المغني للفقه:
  خزانة يفزع إليها الباحث ليجد الأقوال مجموعة منسوبة موثقة. لا
  يُغني عنه كتاب في مقام الاستقصاء، وهو عمدة الرسائل الجامعية
  والمعاجم الأصولية المعاصرة كلها، وبه يختم الدارس مكتبة الأصول إذ
  يجد فيه ثمرة ما قبله مجموعًا في صعيد واحد بقلم محرر منصف قلّ أن
  يرجح بتعصب.
يغني_عن:
  - الرجوع المتفرق إلى عشرات المطولات الأصولية في مقام جمع الأقوال
يُقرأ_قبله:
  - المستصفى والمحصول (فهو مبني على استيعاب طبقتهما)
أفضل_الطبعات:
  - المحقق_أو_المعتني: لجنة من علماء الأزهر (تحرير عبد القادر العاني وعمر الأشقر)
    الدار: وزارة الأوقاف والشؤون الإسلامية، الكويت
    السنة: 1413هـ/1992م (الطبعة الثانية)
    المجلدات: 6
    ملاحظة: الطبعة المحققة الأولى المعتمدة
  - المحقق_أو_المعتني: (طبعة موسعة الضبط)
    الدار: دار الكتبي، القاهرة
    السنة: 1414هـ/1994م
    المجلدات: 8
    ملاحظة: طبعة متداولة عليها إحالات كثيرة
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: []
الشروح_والمختصرات_والذيول: []
مستوى_القارئ: متخصص
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  كتاب جمع لا بناء نظري مبتكر، وقد يسوق الأقوال من غير ترجيح؛
  وضخامته تجعله مرجع كشف لا كتاب قراءة متصلة.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - طبعة الأوقاف الكويتية
آخر_تحديث: 2026-06-12
