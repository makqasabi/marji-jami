id: al-muwafaqat
العنوان: الموافقات
المؤلف:
  الاسم: أبو إسحاق إبراهيم بن موسى الشاطبي
  الوفاة_هجري: 790
  الوفاة_ميلادي: 1388
العلم: أصول الفقه ومقاصد الشريعة
التصنيف_الفرعي: مقاصد الشريعة
لماذا_هو_أم_في_بابه: >
  الكتاب الذي أسس علم المقاصد وجعله علمًا مستقلًّا؛ نقل الشاطبي
  النظر الأصولي من تتبع الأدلة الجزئية إلى استقراء كليات الشريعة
  ومقاصدها — حفظ الدين والنفس والعقل والنسل والمال بمراتبها
  الضرورية والحاجية والتحسينية — وقرر أن الشريعة إنما وضعت لمصالح
  العباد عاجلًا وآجلًا، بمنهج استقرائي وصفه الدارسون بأنه أعظم
  إنجاز منهجي في الفكر الأصولي بعد الرسالة. ظل الكتاب شبه مهجور
  قرونًا ثم بُعث في النهضة الحديثة فصار محور التجديد الأصولي كله:
  عليه بنى ابن عاشور وعلال الفاسي ومدارس المقاصد المعاصرة قاطبة،
  فلا يُكتب اليوم في مقاصد الشريعة سطر إلا وهو في ذمته.
يغني_عن:
  - الاعتصام للشاطبي (قسيمه؛ يكمل نظريته في البدعة والمقاصد)
يُقرأ_قبله:
  - روضة الناظر أو متن أصولي محرر
  - مقاصد الشريعة لابن عاشور (أيسر مدخلًا للمقاصد)
أفضل_الطبعات:
  - المحقق_أو_المعتني: مشهور بن حسن آل سلمان
    الدار: دار ابن عفان، الخبر
    السنة: 1417هـ/1997م
    المجلدات: 7 (مع الفهارس)
    ملاحظة: الطبعة المحققة المعتمدة اليوم
  - المحقق_أو_المعتني: عبد الله دراز (شرح وتعليق)
    الدار: المكتبة التجارية الكبرى، القاهرة (ومصوراتها بدار المعرفة)
    السنة: 1395هـ وما قبلها
    المجلدات: 4
    ملاحظة: الطبعة الشهيرة بتعليقات دراز النفيسة التي بها انتشر الكتاب حديثًا
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: []
الشروح_والمختصرات_والذيول:
  - تعليقات دراز
  - دراسات معاصرة كثيرة (الريسوني وغيره)
مستوى_القارئ: متخصص
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  نُوقش توسعه في الاستقراء وبعض تطبيقاته على البدعة والعوائد،
  وحذّر بعض المعاصرين من توظيف مقاصدِه لتمييع النصوص — وهو سوء
  استعمال لا يلزم الكتاب — ولغته الاستدلالية المتينة تحتاج تمكنًا.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - طبعة دار ابن عفان
