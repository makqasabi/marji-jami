مستوى_القارئ: متوسط/متخصص
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  بعض الوجوه المعدودة فيه متداخلة يرجع إلى أصل دلالي واحد، وقد نبهت
  الدراسات الدلالية الحديثة على أن كثيرًا من «الوجوه» استعمالات سياقية
  لمعنى جامع — وهو ما يعالجه المنهج الاشتقاقي عند جبل.
