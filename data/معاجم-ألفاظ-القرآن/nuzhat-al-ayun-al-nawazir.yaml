id: nuzhat-al-ayun-al-nawazir
العنوان: نزهة الأعين النواظر في علم الوجوه والنظائر
المؤلف:
  الاسم: أبو الفرج عبد الرحمن بن علي ابن الجوزي
  الوفاة_هجري: 597
  الوفاة_ميلادي: 1201
العلم: معاجم ألفاظ القرآن
التصنيف_الفرعي: الوجوه والنظائر
لماذا_هو_أم_في_بابه: >
  أنضج كتب الوجوه والنظائر التراثية وأكثرها تحريرًا؛ جمع ابن الجوزي
  فيه الألفاظ القرآنية التي يتعدد معناها بتعدد المواضع، فيذكر اللفظة
  ووجوهها معدودة ثم شواهد كل وجه من الآي، بعد مقدمة نقد فيها من تساهل
  من المصنفين قبله في تكثير الوجوه بلا ضابط. استوعب كتب الفن قبله —
  من مقاتل والدامغاني وغيرهما — ونقّحها بميزان أهل الحديث واللغة،
  فصار العمدة المتداولة في هذا النوع من أنواع علوم القرآن، وبه يضبط
  المفسر دلالة اللفظ في كل سياق بعينه، وهو علم لا يقوم غيرُ كتب
  الوجوه مقامه في حسم تعدد الدلالة القرآنية.
يغني_عن:
  - الوجوه والنظائر للدامغاني
  - الأشباه والنظائر لمقاتل بن سليمان (في مقام الاعتماد لا التاريخ)
يُقرأ_قبله:
  - المفردات للراغب الأصفهاني
