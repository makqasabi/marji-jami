id: gharib-al-quran-ibn-qutayba
العنوان: غريب القرآن (تفسير غريب القرآن)
المؤلف:
  الاسم: أبو محمد عبد الله بن مسلم بن قتيبة الدينوري
  الوفاة_هجري: 276
  الوفاة_ميلادي: 889
العلم: معاجم ألفاظ القرآن
التصنيف_الفرعي: كتب غريب القرآن المتقدمة
لماذا_هو_أم_في_بابه: >
  أمّ كتب غريب القرآن المتقدمة الواصلة إلينا كاملة محررة؛ صنفه ابن
  قتيبة — إمام أهل اللغة والأدب في عصره — فجمع شرح الألفاظ المشكلة على
  ترتيب السور بعد مقدمة نفيسة في أسماء الله وألفاظ دالّة متكررة، معتمدًا
  الشاهد العربي وكلام المتقدمين بعبارة موجزة دقيقة صارت قدوة لمن صنف
  بعده. هو حلقة التأسيس بين تفاسير غريب القرآن الأولى المفقودة وبين
  معاجم الدلالة المتأخرة كالمفردات، وإليه يرجع المحققون في توثيق
  المعنى اللغوي الأول للفظة كما فهمه علماء القرن الثالث، ولأخيه
  «تأويل مشكل القرآن» مقام مكمل له في دفع توهم الاختلاف.
يغني_عن:
  - كتب الغريب المختصرة قبله (كغريب اليزيدي)
يُقرأ_قبله: []
أفضل_الطبعات:
  - المحقق_أو_المعتني: السيد أحمد صقر
    الدار: دار الكتب العلمية، بيروت (عن طبعة دار إحياء الكتب العربية، القاهرة)
    السنة: 1398هـ/1978م (والأصل 1378هـ/1958م)
    المجلدات: 1
    ملاحظة: التحقيق المعتمد الذي عليه الإحالات
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: [قرآن بيديا]
الشروح_والمختصرات_والذيول:
  - تأويل مشكل القرآن لابن قتيبة (قسيمه ومكمله)
مستوى_القارئ: متوسط
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  موجز لا يستقصي كل الغريب، وتفسيراته لغوية محضة لا تعرض الخلاف
  التفسيري؛ وأُخذت على ابن قتيبة مواضع يسيرة في الصفات نوقشت في
  الدراسات عنه.
