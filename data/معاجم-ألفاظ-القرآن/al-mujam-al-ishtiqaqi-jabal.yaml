ملاحظات_نقدية: >
  نظرية التأصيل الثنائي التي بنى عليها معجمه محل أخذ ورد بين اللغويين،
  وبعض تأويلاته المحورية اجتهادية يخالف فيها جمهور المعجميين؛ وهذا من
  طبيعة عمل تأسيسي مجتهد، ولا ينقص من مرجعيته.
