id: al-mujam-al-ishtiqaqi-jabal
العنوان: المعجم الاشتقاقي المؤصل لألفاظ القرآن الكريم
المؤلف:
  الاسم: محمد حسن حسن جبل
  الوفاة_هجري: 1436
  الوفاة_ميلادي: 2015
العلم: معاجم ألفاظ القرآن
التصنيف_الفرعي: المعاجم الاشتقاقية المعاصرة
لماذا_هو_أم_في_بابه: >
  أعظم عمل اشتقاقي أُنجز لألفاظ القرآن في العصر الحديث؛ بناه محمد حسن
  جبل — عميد كلية القرآن الكريم بطنطا وعضو مجمع اللغة العربية — على
  نظرية التأصيل الثنائي للدلالة: يستخرج المعنى المحوري لكل مادة من
  استقراء استعمالاتها وما يجمع تراكيبها الصوتية، ثم يفسر به كل ورودات
  اللفظ القرآنية، مع مناقشة المعجميين المتقدمين والراغب نفسه. عمل فردي
  موسوعي استغرق عقودًا، وصفه المتخصصون بأنه نقلة في الدرس الدلالي
  القرآني، وقد ذكر مؤلفه أنه «مؤصَّل» أي مردود فيه كل فرع إلى أصله
  الدلالي بالدليل، فصار مرجعًا لا نظير له لمن أراد سر اختيار اللفظة
  القرآنية ومعناها الدقيق.
