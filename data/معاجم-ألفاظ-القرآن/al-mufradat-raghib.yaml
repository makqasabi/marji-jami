id: al-mufradat-raghib
العنوان: المفردات في غريب القرآن (مفردات ألفاظ القرآن)
المؤلف:
  الاسم: أبو القاسم الحسين بن محمد الراغب الأصفهاني
  الوفاة_هجري: 502
  الوفاة_ميلادي: 1108
العلم: معاجم ألفاظ القرآن
التصنيف_الفرعي: معاجم المفردات القرآنية الدلالية
لماذا_هو_أم_في_بابه: >
  أم معاجم ألفاظ القرآن قاطبة؛ لم يكتف الراغب بشرح الغريب كمن قبله، بل
  أسس لكل مادة أصلًا دلاليًّا جامعًا ثم فرّع عليه استعمالات اللفظ في
  القرآن كله، ففرّق بين الدلالات المتقاربة وكشف عن دقائق الفروق
  (كالخوف والخشية، والبخل والشح) بطريقة جعلت كتابه علمًا قائمًا
  بنفسه. اعتمده المفسرون قاطبة من بعده، وقال عنه الزركشي في البرهان
  إنه أكثر الكتب نفعًا في تحقيق لفظ القرآن، ولا يزال إلى اليوم الكتاب
  الأول الذي يفتحه الباحث في دلالة أي لفظة قرآنية، وهو الأساس الذي بنى
  عليه السمين الحلبي عمدة الحفاظ ومحمد حسن جبل معجمه الاشتقاقي.
يغني_عن:
  - كتب غريب القرآن المختصرة قبله (كغريب ابن قتيبة في مقام الدلالة)
يُقرأ_قبله:
  - كلمات القرآن لحسنين مخلوف
أفضل_الطبعات:
  - المحقق_أو_المعتني: صفوان عدنان داوودي
    الدار: دار القلم، دمشق، والدار الشامية، بيروت
    السنة: 1412هـ/1992م
    المجلدات: 1
    ملاحظة: الطبعة المحققة المعتمدة التي عليها الإحالات
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: [قرآن بيديا, الباحث القرآني]
الشروح_والمختصرات_والذيول:
  - عمدة الحفاظ للسمين الحلبي (توسعة على منواله)
مستوى_القارئ: متوسط
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  في مواضع من تفسيره للصفات نزعة كلامية تأويلية نبه عليها أهل العلم؛
  وبعض تأصيلاته الدلالية ناقشه فيها المتأخرون كمحمد حسن جبل في معجمه.
روابط_التحميل:
  - المصدر: المكتبة الشاملة (ت صفوان داوودي)
    الرابط: https://shamela.ws/book/23636
    النوع: حر
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - طبعة دار القلم بتحقيق داوودي
  - البرهان للزركشي (ثناؤه عليه)
آخر_تحديث: 2026-06-12
