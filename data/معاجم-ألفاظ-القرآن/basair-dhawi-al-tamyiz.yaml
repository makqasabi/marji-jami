id: basair-dhawi-al-tamyiz
العنوان: بصائر ذوي التمييز في لطائف الكتاب العزيز
المؤلف:
  الاسم: مجد الدين محمد بن يعقوب الفيروزآبادي
  الوفاة_هجري: 817
  الوفاة_ميلادي: 1415
العلم: معاجم ألفاظ القرآن
التصنيف_الفرعي: معاجم المفردات والوجوه والنظائر
لماذا_هو_أم_في_بابه: >
  أجمع كتاب تراثي يضم معجم الألفاظ القرآنية إلى علم الوجوه والنظائر؛
  صنفه الفيروزآبادي صاحب القاموس المحيط، فقدّم بين يديه مقدمات في علوم
  القرآن وبصائر لكل سورة تبين مقصودها، ثم رتب الألفاظ على الحروف
  يذكر للكلمة معناها الأصلي ثم وجوه استعمالها في التنزيل بشواهدها،
  فاجتمعت فيه ثمرة معاجم الغريب وكتب الوجوه معًا بقلم أعظم معجميي
  عصره. يفزع إليه الباحث ليرى استعمالات اللفظة القرآنية مصنفة وجوهًا
  محصورة، وهو في ذلك أوفى من كتب الوجوه المفردة قبله، فصار من أمهات
  المكتبة القرآنية المعجمية التي لا يستغني عنها محقق.
يغني_عن:
  - كتب الوجوه والنظائر المفردة (كوجوه الدامغاني ونزهة ابن الجوزي في أكثر مادتها)
يُقرأ_قبله:
  - المفردات للراغب الأصفهاني
أفضل_الطبعات:
  - المحقق_أو_المعتني: محمد علي النجار
    الدار: المجلس الأعلى للشؤون الإسلامية — لجنة إحياء التراث، القاهرة
    السنة: صدر تباعًا من 1383هـ/1963م
    المجلدات: 6
    ملاحظة: التحقيق المعتمد، وصُوِّر مرارًا
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: []
الشروح_والمختصرات_والذيول: []
مستوى_القارئ: متخصص
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  في نسبته خلاف يسير حسمه المحققون بإثباته للفيروزآبادي؛ وفي بصائر
  السور استطرادات صوفية المنزع في مواضع، ومادته المعجمية عيال في
  أصلها على الراغب مع إعادة تنظيم وزيادة الوجوه.
