    المجلدات: 4
    ملاحظة: الطبعة الكاملة المتداولة
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: []
الشروح_والمختصرات_والذيول: []
مستوى_القارئ: متخصص
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  طبعته المتداولة دون مستوى الكتاب تحقيقًا، ونبه باحثون على حاجته إلى
  تحقيق نقدي أوفى؛ وفي مباحث الصفات يجري على طريقة الراغب الكلامية في
  مواضع.
