id: umdat-al-huffaz
العنوان: عمدة الحفاظ في تفسير أشرف الألفاظ
المؤلف:
  الاسم: شهاب الدين أحمد بن يوسف السمين الحلبي
  الوفاة_هجري: 756
  الوفاة_ميلادي: 1355
العلم: معاجم ألفاظ القرآن
التصنيف_الفرعي: معاجم المفردات القرآنية الموسعة
لماذا_هو_أم_في_بابه: >
  أوسع معاجم ألفاظ القرآن التراثية؛ بناه السمين الحلبي — النحوي المفسر
  صاحب الدر المصون — على مفردات الراغب فاستوعبها وزاد عليها زيادات
  كثيرة من اللغة والقراءات وأقوال المفسرين، ورتبه على حروف المعجم
  ترتيبًا كاملًا فسهل الكشف فيه. جمع بين تحقيق الدلالة على طريقة
  الراغب وبين صنعة النحوي المدقق، فصار المرجع التراثي الأوفى لمن أراد
  استقصاء كلام العلماء في لفظة قرآنية، وهو المتمم الطبيعي للمفردات: من
  جمعهما ملك خلاصة الدرس الدلالي القرآني عند المتقدمين، ولذا اعتمدته
  الدراسات المعجمية القرآنية الحديثة أصلًا ثانيًا بعد المفردات.
يغني_عن:
  - المفردات للراغب (لمن أراد التوسع؛ فهو مستوعب له)
يُقرأ_قبله:
  - المفردات للراغب الأصفهاني
