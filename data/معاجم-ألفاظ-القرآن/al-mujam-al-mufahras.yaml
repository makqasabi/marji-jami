id: al-mujam-al-mufahras
العنوان: المعجم المفهرس لألفاظ القرآن الكريم
المؤلف:
  الاسم: محمد فؤاد عبد الباقي
  الوفاة_هجري: 1388
  الوفاة_ميلادي: 1968
العلم: معاجم ألفاظ القرآن
التصنيف_الفرعي: الكشافات والفهارس اللفظية
لماذا_هو_أم_في_بابه: >
  الكشاف اللفظي الذي غيّر طريقة العمل في الدراسات القرآنية كلها؛ رتب
  فيه محمد فؤاد عبد الباقي كل ألفاظ القرآن على جذورها، يسوق تحت كل
  لفظة مواضعها جميعًا بنص الآية ورقمها وسورتها، بانيًا على فهرس
  المستشرق فلوغل ومصححًا له ومخرجًا العمل على رسم المصحف وترقيمه
  المصري. به صار استقصاء ورودات أي لفظة قرآنية عمل دقائق بعد أن كان
  يحتاج حفظًا نادرًا، فلا توجد دراسة قرآنية جادة منذ صدوره إلا وهو في
  عدتها، وبقي — حتى بعد ظهور البحث الحاسوبي — المرجع الورقي المعتمد
  الذي تضبط به النتائج، وهو أساس كل المعاجم المفهرسة التي تلته.
يغني_عن:
  - نجوم الفرقان لفلوغل (وقد صححه وتجاوزه)
يُقرأ_قبله: []
أفضل_الطبعات:
  - المحقق_أو_المعتني: (عمل المؤلف نفسه)
    الدار: دار الكتب المصرية، القاهرة
    السنة: 1364هـ/1945م (الطبعة الأولى)
    المجلدات: 1
    ملاحظة: الأصل؛ وأعادت طبعه دار الحديث بالقاهرة ودور أخرى مرارًا
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: [الباحث القرآني وبدائل حاسوبية تؤدي وظيفته]
الشروح_والمختصرات_والذيول:
  - المعجم المفهرس لألفاظ الحديث النبوي (عمله النظير في الحديث، بالاشتراك)
مستوى_القارئ: مبتدئ/متوسط/متخصص
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  أداة كشف لا معجم دلالة: لا يشرح المعاني أصلًا؛ ورصدت الدراسات مواضع
  سهو يسيرة جدًّا في الإحالات استدركتها الطبعات والبدائل الحاسوبية.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - طبعة دار الكتب المصرية 1364هـ
آخر_تحديث: 2026-06-12
