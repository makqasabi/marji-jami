id: kalimat-al-quran-makhluf
العنوان: كلمات القرآن تفسير وبيان
المؤلف:
  الاسم: حسنين محمد مخلوف
  الوفاة_هجري: 1410
  الوفاة_ميلادي: 1990
العلم: معاجم ألفاظ القرآن
التصنيف_الفرعي: المداخل الميسرة لغريب القرآن
لماذا_هو_أم_في_بابه: >
  أنفع مدخل ميسر إلى غريب القرآن في العصر الحديث وأوسعه انتشارًا؛
  صنفه حسنين مخلوف — مفتي الديار المصرية — فشرح الكلمات المشكلة على
  ترتيب السور والآيات بكلمات معدودة محررة منتقاة من أمهات التفسير
  واللغة، في حجم يصحب المصحف. طبع مئات الطبعات وأُلحق بهوامش مصاحف
  كثيرة، وصار أول ما يوصى به العامي والطالب المبتدئ ليفهم ما يتلو،
  وهو في بابه — باب التيسير الأمين الموثوق — أمٌّ لا يعرف له نظير في
  القبول، إذ جمع بين دقة العالم المفتي وخفة المختصر، ومنه يرتقي
  القارئ إلى الراغب وما فوقه.
يغني_عن:
  - المختصرات المدرسية في غريب القرآن
يُقرأ_قبله: []
أفضل_الطبعات:
  - المحقق_أو_المعتني: (كتاب مؤلف معاصر)
    الدار: دار ابن حزم، بيروت، ودور عدة (الأصل بمطابع مصرية)
    السنة: طبعات متكررة كثيرة منذ منتصف القرن العشرين
    المجلدات: 1
    ملاحظة: لا طبعة محققة مميزة؛ الطبعات الكاملة المضبوطة متقاربة
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: [تطبيقات المصحف, إسلام هاوس]
الشروح_والمختصرات_والذيول: []
مستوى_القارئ: مبتدئ
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  مختصر شديد الإيجاز يكتفي بمعنى واحد للفظة بحسب سياقها ولا يعرض
  الخلاف ولا الاشتقاق، فلا يصلح للبحث العلمي وإنما للتلاوة الواعية.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - طبعات الكتاب الواسعة الانتشار وإلحاقه بالمصاحف
آخر_تحديث: 2026-06-12
