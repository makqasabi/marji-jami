    الدار: المطبعة الكبرى الأميرية، بولاق
    السنة: 1294هـ/1877م
    المجلدات: 2
    ملاحظة: الطبعة المعتمدة وعنها المصورات (ونشرات معهد تاريخ الطب العربي جزئية)
التوافر_الرقمي:
  المكتبة_الشاملة: لا
  منصات_أخرى: [نسخ رقمية متداولة في مكتبات التراث العلمي]
الشروح_والمختصرات_والذيول: []
مستوى_القارئ: متخصص
نوع_المرجعية: علمية_تراثية_حضارية
ملاحظات_نقدية: >
  يدخل لمرجعيته التاريخية الحضارية لا التطبيقية؛ وطبعته القديمة
  بحاجة إلى تحقيق نقدي حديث، وهو على نظرية الأخلاط كسائر طب
  عصره.
حالة_التوثيق: موثّق
