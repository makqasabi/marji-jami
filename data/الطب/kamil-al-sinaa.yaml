id: kamil-al-sinaa
العنوان: كامل الصناعة الطبية (الكتاب الملكي)
المؤلف:
  الاسم: علي بن العباس المجوسي الأهوازي
  الوفاة_هجري: 384
  الوفاة_ميلادي: 994
العلم: الطب
التصنيف_الفرعي: الموسوعات الطبية المنهجية
لماذا_هو_أم_في_بابه: >
  أحكم الموسوعات الطبية ترتيبًا قبل القانون والجسر بين الرازي
  وابن سينا؛ صنفه المجوسي للملك عضد الدولة فقسمه قسمين متناظرين
  — النظري والعملي، كل في عشر مقالات — بمنهج تعليمي صارم افتتحه
  بأول نقد منهجي لمصادر الطب قبله، فجمع وضوح البناء وسعة المادة
  حتى ظل المقرر الأول في البيمارستانات إلى أن غلبه القانون.
  وترجم للاتينية مرتين مبكرًا (ترجمة قسطنطين الأفريقي المتصرفة
  ثم ترجمة إصطفن الأنطاكي) فكان أول موسوعة طبية عربية تعلّم
  أوروبا. فهو أم الطب التعليمي المنهجي، وفصوله في الجراحة
  والتوليد من أنفس ما في التراث.
يغني_عن:
  - المقررات الطبية الوسيطة قبل القانون
يُقرأ_قبله: []
أفضل_الطبعات:
