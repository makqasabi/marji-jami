id: al-tasrif-zahrawi
العنوان: التصريف لمن عجز عن التأليف
المؤلف:
  الاسم: أبو القاسم خلف بن عباس الزهراوي
  الوفاة_هجري: 404
  الوفاة_ميلادي: 1013
العلم: الطب
التصنيف_الفرعي: الجراحة
لماذا_هو_أم_في_بابه: >
  أم كتب الجراحة في التراث الإنساني وصاحبه «أبو الجراحة الحديثة»
  بشهادة مؤرخي الطب؛ ختم الزهراوي — طبيب قرطبة الزهراء —
  موسوعته الثلاثينية بمقالته الشهيرة في الجراحة: أول معالجة
  منهجية مستقلة للعمل الجراحي، بثلاثة أبواب في الكي والشق
  والجبر، ومعها رسوم نحو مئتي آلة جراحية ابتكر كثيرًا منها —
  وهي أول تصوير للأدوات الجراحية في التاريخ — مع وصف عملياته
  وتجاربه. ترجمت المقالة للاتينية فظلت عمدة الجراحة الأوروبية
  خمسة قرون تطبع مع كتب غي دي شولياك، وما من تاريخ للجراحة
  عالميًّا إلا والزهراوي فاتحته، فالكتاب أم بابه بإجماع
  الدارسين.
يغني_عن:
  - مباحث الجراحة المتناثرة في الموسوعات قبله
يُقرأ_قبله: []
أفضل_الطبعات:
  - المحقق_أو_المعتني: مارتن سبينك وجيفري لويس (المقالة الثلاثون بالنص والترجمة الإنجليزية)
    الدار: معهد ويلكم لتاريخ الطب، لندن
    السنة: 1973م
    المجلدات: 1
    ملاحظة: النشرة النقدية المعتمدة لمقالة الجراحة برسوم الآلات
  - المحقق_أو_المعتني: (نشرات وتحقيقات جزئية لبقية المقالات)
    الدار: معاهد تاريخ الطب والتراث العلمي (حلب وفرانكفورت وغيرهما)
    السنة: متفرقة
    ملاحظة: الكتاب الكامل لم يطبع محققًا في نشرة واحدة بعد
التوافر_الرقمي:
  المكتبة_الشاملة: لا
  منصات_أخرى: [مصورات مخطوطاته متاحة رقميًّا]
الشروح_والمختصرات_والذيول: []
مستوى_القارئ: متخصص
نوع_المرجعية: علمية_تراثية_حضارية
ملاحظات_نقدية: >
  يدخل لمرجعيته التاريخية الحضارية لا التطبيقية؛ وعدم وجود نشرة
  كاملة محققة لمقالاته الثلاثين كلها من أكبر فجوات تحقيق التراث
  العلمي.
