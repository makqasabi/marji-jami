id: al-qanun-fil-tibb
العنوان: القانون في الطب
المؤلف:
  الاسم: أبو علي الحسين بن عبد الله ابن سينا (الشيخ الرئيس)
  الوفاة_هجري: 428
  الوفاة_ميلادي: 1037
العلم: الطب
التصنيف_الفرعي: الموسوعات الطبية الجامعة
لماذا_هو_أم_في_بابه: >
  أشهر كتاب طبي في تاريخ البشرية وأبعده أثرًا؛ نظّم ابن سينا
  الطب كله في خمسة كتب: الكليات، والأدوية المفردة، والأمراض
  الجزئية من الرأس إلى القدم، والأمراض العامة، والأدوية المركبة،
  بمنهج قانوني صارم جمع تراث جالينوس وأبقراط والرازي إلى تجاربه،
  فاستحق اسمه: قانونًا يُحتكم إليه. تُرجم للاتينية في القرن
  السادس الهجري فحكم كليات الطب الأوروبية ستة قرون — ظل مقررًا
  في مونبلييه ولوفان إلى القرن الحادي عشر الهجري — وطبع من أوائل
  الكتب طباعة، وما من تاريخ للطب في الأرض إلا وهو ركنه، فهو أم
  الكتب الطبية في الحضارتين الإسلامية والغربية معًا.
يغني_عن:
  - الموسوعات الطبية الوسيطة قبله (استوعبها ونظمها)
يُقرأ_قبله:
  - دراسات تاريخ الطب الإسلامي المعاصرة (للسياق)
أفضل_الطبعات:
  - المحقق_أو_المعتني: (الطبعة الأم)
    الدار: المطبعة الكبرى الأميرية، بولاق
    السنة: 1294هـ/1877م
    المجلدات: 3
    ملاحظة: الطبعة الشرقية المعتمدة التي عليها الإحالات وعنها المصورات
  - المحقق_أو_المعتني: محمد أمين الضناوي (ضبط وتصحيح)
    الدار: دار الكتب العلمية، بيروت
    السنة: 1420هـ/1999م
    المجلدات: 3
    ملاحظة: طبعة متداولة حديثة؛ والكتاب ما يزال بحاجة إلى تحقيق نقدي كامل
التوافر_الرقمي:
  المكتبة_الشاملة: لا
  منصات_أخرى: [نسخ رقمية متداولة في مكتبات التراث العلمي]
الشروح_والمختصرات_والذيول:
  - شرح ابن النفيس (موجز القانون وشرح التشريح)
  - شروح وحواشٍ كثيرة (القرشي والجغميني وغيرهما)
مستوى_القارئ: متخصص
نوع_المرجعية: علمية_تراثية_حضارية
ملاحظات_نقدية: >
  يدخل لمرجعيته التاريخية الحضارية بوصفه قمة الطب القديم، لا
  بوصفه مرجعًا طبيًّا تطبيقيًّا معاصرًا — فطبه قائم على نظرية
  الأخلاط المتجاوزة علميًّا؛ والدراسات الحديثة عنه واسعة
  (ترجمات أقسام منه ودراسات تاريخ الطب) وهي مدخله الصحيح اليوم.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - طبعة بولاق
  - دراسات تاريخ الطب الإسلامي (أولمان وسزكين)
آخر_تحديث: 2026-06-12
