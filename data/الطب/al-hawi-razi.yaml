id: al-hawi-razi
العنوان: الحاوي في الطب
المؤلف:
  الاسم: أبو بكر محمد بن زكريا الرازي
  الوفاة_هجري: 313
  الوفاة_ميلادي: 925
العلم: الطب
التصنيف_الفرعي: الموسوعات السريرية
لماذا_هو_أم_في_بابه: >
  أضخم موسوعة طبية في التراث وأغناها مادة سريرية؛ جُمع من أوراق
  الرازي — أعظم أطباء الإسلام إكلينيكيًّا — بعد وفاته: ملاحظاته
  على كل مرض من تجاربه في بيمارستانات الري وبغداد مع نقوله عن
  اليونان والهند مسماةً بأصحابها، وفيه تقارير حالات مرضية تعد
  أول سجلات سريرية منهجية في التاريخ، ومنهجه التجريبي النقدي —
  وهو صاحب «الشكوك على جالينوس» — جعله أقرب القدماء لروح الطب
  الحديث. ترجم للاتينية فكان من أوسع المراجع تأثيرًا في أوروبا،
  وكتابه في الجدري والحصبة أول وصف تشخيصي تفريقي للمرضين بقي
  معتمدًا قرونًا، فهو أم الطب السريري التجريبي في التراث
  الإنساني.
يغني_عن:
  - مدونات الطب السريري المتقدمة (لا نظير له أصلًا)
يُقرأ_قبله:
  - دراسات الرازي الطبية المعاصرة
أفضل_الطبعات:
  - المحقق_أو_المعتني: (لجنة دائرة المعارف)
    الدار: دائرة المعارف العثمانية، حيدر آباد الدكن
    السنة: 1374–1390هـ/1955–1970م
    المجلدات: 23 جزءًا
    ملاحظة: النشرة الكاملة الوحيدة المعتمدة وعنها المصورات
التوافر_الرقمي:
  المكتبة_الشاملة: لا
  منصات_أخرى: [نسخ رقمية متداولة في مكتبات التراث العلمي]
الشروح_والمختصرات_والذيول:
  - المنصوري في الطب للرازي (مختصره المنهجي)
مستوى_القارئ: متخصص
نوع_المرجعية: علمية_تراثية_حضارية
ملاحظات_نقدية: >
  يدخل لمرجعيته التاريخية الحضارية لا التطبيقية؛ وهو مسودات
  جُمعت بعد موت صاحبها فترتيبه مضطرب وفيه تكرار، ونشرته الهندية
  بحاجة إلى تحقيق نقدي حديث (صدرت دراسات وتحقيقات جزئية معاصرة).
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - نشرة حيدر آباد
  - عيون الأنباء (خبر جمعه)
آخر_تحديث: 2026-06-12
