ملاحظات_نقدية: >
  في أخباره وتراجمه ما يساق للطرافة من غير تثبت، وعنايته
  بالمشارقة والشاميين أوفى من المغاربة؛ وصدرت له حديثًا نشرة
  نقدية مشروحة بالإنجليزية (مشروع أكسفورد/بريل) ترفع مستوى
  توثيقه.
