id: uyun-al-anba
العنوان: عيون الأنباء في طبقات الأطباء
المؤلف:
  الاسم: موفق الدين أحمد بن القاسم ابن أبي أصيبعة
  الوفاة_هجري: 668
  الوفاة_ميلادي: 1270
العلم: الطب
التصنيف_الفرعي: تاريخ الطب وتراجم الأطباء
لماذا_هو_أم_في_بابه: >
  أم تاريخ الطب العربي والوثيقة الكبرى لتراجم أطبائه؛ ترجم ابن
  أبي أصيبعة — وهو طبيب بيمارستاني عملي — لنحو أربعمئة طبيب من
  اليونان والإسلام إلى عصره: سيرهم ونوادرهم وشيوخهم ومصنفاتهم
  محصاة، فحفظ تاريخ المهنة كله وعناوين مئات الكتب الطبية
  المفقودة وأخبار البيمارستانات والتعليم الطبي. فهو لتاريخ الطب
  ما الفهرست لتاريخ المكتبة: المصدر الأول الذي عليه بنى مؤرخو
  الطب شرقًا وغربًا (أولمان وسزكين وليكليرك)، ولا تُكتب سيرة
  طبيب عربي ولا تاريخ مستشفى إسلامي إلا منه، فهو أم بابه بلا
  منازع ومتعة قراءة فوق ذلك.
يغني_عن:
  - طبقات الأطباء لابن جلجل وتاريخ الحكماء للقفطي (في جملة مادتهما)
