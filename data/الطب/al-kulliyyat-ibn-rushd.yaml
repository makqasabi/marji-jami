id: al-kulliyyat-ibn-rushd
العنوان: الكليات في الطب
المؤلف:
  الاسم: أبو الوليد محمد بن أحمد بن رشد الحفيد
  الوفاة_هجري: 595
  الوفاة_ميلادي: 1198
العلم: الطب
التصنيف_الفرعي: أصول الطب النظرية
لماذا_هو_أم_في_بابه: >
  أم كتب أصول الطب في الغرب الإسلامي وممثل الطب الفلسفي
  النقدي؛ صنفه ابن رشد — وكان طبيب الموحدين قبل قضائه — في
  كليات الصناعة السبع: التشريح والصحة والمرض والعلامات والأدوية
  والأغذية وحفظ الصحة والمداواة، معالجًا الطب بعقل الفيلسوف
  المنطقي الذي يطلب العلل لا الوصفات، وناقدًا جالينوس وابنَ سينا
  في مواضع بجرأته المعهودة، وأحال في الجزئيات على تيسير ابن زهر
  صديقه فتكامل الكتابان عمدةَ الطب الأندلسي. ترجم للاتينية
  (Colliget) فدُرّس في جامعات أوروبا قرونًا قرينًا للقانون، فهو
  الجناح المغربي لأمهات الطب ونموذج تنظيره النقدي.
يغني_عن:
  - مدونات أصول الطب المغربية الوسيطة
يُقرأ_قبله: []
أفضل_الطبعات:
  - المحقق_أو_المعتني: سعيد شيبان وعمار الطالبي
    الدار: المجلس الأعلى للثقافة، القاهرة (ضمن أعمال مئوية ابن رشد)
    السنة: 1989م
    المجلدات: 1
    ملاحظة: التحقيق العربي المعتمد (وقبله نشرات إسبانية مصورة)
التوافر_الرقمي:
  المكتبة_الشاملة: لا
  منصات_أخرى: [نسخ رقمية في مكتبات التراث العلمي]
الشروح_والمختصرات_والذيول:
  - التيسير في المداواة والتدبير لابن زهر (قسيمه العملي)
مستوى_القارئ: متخصص
نوع_المرجعية: علمية_تراثية_حضارية
ملاحظات_نقدية: >
  يدخل لمرجعيته التاريخية الحضارية؛ وهو كتاب كليات نظرية لا
  جزئيات علاجية بتصريح مؤلفه، وطبه على أصول عصره الأخلاطية.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - نشرة المجلس الأعلى للثقافة
آخر_تحديث: 2026-06-12
