id: sharh-tashrih-al-qanun
العنوان: شرح تشريح القانون
المؤلف:
  الاسم: علاء الدين علي بن أبي الحزم القرشي ابن النفيس
  الوفاة_هجري: 687
  الوفاة_ميلادي: 1288
العلم: الطب
التصنيف_الفرعي: التشريح ووظائف الأعضاء
لماذا_هو_أم_في_بابه: >
  الكتاب الذي سُجل فيه أعظم اكتشاف علمي عربي: الدورة الدموية
  الصغرى (الرئوية)؛ شرح ابن النفيس — رئيس أطباء مصر — مواضعَ
  التشريح من قانون ابن سينا، فخالف جالينوس وابنَ سينا معًا
  بجرأة منهجية معلنة وقرر أن الدم لا ينفذ من البطين الأيمن إلى
  الأيسر عبر مسامّ في الحجاب بل يمر عبر الرئة — قبل سرفيتوس
  وهارفي بثلاثة قرون ونصف، وقد أثبت الدارسون اطلاع أوروبا على
  نصه. فالكتاب وثيقة أولوية علمية كبرى ونموذج المنهج النقدي
  التجريبي في ذروته، أعاد كتابة فصل كامل من تاريخ العلم
  العالمي حين اكتُشف نصه سنة 1924م، فهو أم بابه وفخر الطب
  العربي.
يغني_عن: []
يُقرأ_قبله:
  - القانون (موضع شرحه)
