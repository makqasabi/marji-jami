    ملاحظة: التحقيق المعتمد
التوافر_الرقمي:
  المكتبة_الشاملة: لا
  منصات_أخرى: [نسخ رقمية في مكتبات التراث العلمي]
الشروح_والمختصرات_والذيول:
  - دراسات الأولوية العلمية (منذ التتوي 1924م)
مستوى_القارئ: متخصص
نوع_المرجعية: علمية_تراثية_حضارية
ملاحظات_نقدية: >
  يدخل لمرجعيته التاريخية الحضارية؛ واكتشافه قرره ابن النفيس
  استدلالًا نظريًّا لا تشريحًا عمليًّا موثقًا — وهو ما يناقشه
  مؤرخو العلم — وسائر تشريحه على علم عصره.
