id: al-kashshaf
العنوان: الكشاف عن حقائق غوامض التنزيل
المؤلف:
  الاسم: جار الله محمود بن عمر الزمخشري
  الوفاة_هجري: 538
  الوفاة_ميلادي: 1144
العلم: التفسير
التصنيف_الفرعي: التفسير البياني اللغوي
لماذا_هو_أم_في_بابه: >
  أم التفسير البياني؛ كشف الزمخشري — وهو إمام العربية في عصره — عن وجوه
  الإعجاز ولطائف النظم القرآني بطريقة الاستفهام والجواب، وفتح من أسرار
  المعاني والبيان في الآي ما لم يُسبق إليه، حتى صار قول المنصفين: من
  أراد البلاغة القرآنية فلا غنى له عن الكشاف مع الاحتراز من اعتزالياته.
  أطبق المفسرون بعده على الإفادة منه: فالبيضاوي والنسفي وأبو السعود
  بنوا عليه، وحواشيه وما كُتب حوله يعد بالمئات، ورد ابن المنير عليه في
  «الانتصاف» ملازم لطبعاته. فهو الأصل الذي تفرعت عنه مدرسة كاملة في
  التفسير، ولا يزال عمدة الدرس البلاغي للقرآن.
يغني_عن:
  - أنوار التنزيل للبيضاوي ومدارك التنزيل للنسفي (في المادة البيانية؛ فهما عيال عليه)
يُقرأ_قبله:
  - تفسير ابن كثير (لتقديم المأثور)
  - مقدمات في البلاغة (كدلائل الإعجاز)
أفضل_الطبعات:
  - المحقق_أو_المعتني: (ومعه حاشية الانتصاف لابن المنير وتخريج أحاديثه للزيلعي مختصرًا)
    الدار: دار الكتاب العربي، بيروت
    السنة: 1407هـ
    المجلدات: 4
    ملاحظة: الطبعة المتداولة التي عليها الإحالات، ومعها ردود ابن المنير
  - المحقق_أو_المعتني: عادل أحمد عبد الموجود وعلي محمد معوض
    الدار: مكتبة العبيكان، الرياض
    السنة: 1418هـ/1998م
    المجلدات: 6
    ملاحظة: طبعة محققة موسعة بالحواشي
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: [قرآن بيديا]
الشروح_والمختصرات_والذيول:
  - الانتصاف من الكشاف لابن المنير
  - حاشية الطِّيبي (فتوح الغيب) وحاشية الجرجاني وغيرهما
مستوى_القارئ: متخصص
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  تفسير معتزلي صريح يدس مذهبه في «الكشف البياني» دسًّا لطيفًا حذّر منه
  أهل العلم، حتى قيل: يُؤخذ بيانه وتُتقى اعتزالياته؛ ولا يقرؤه إلا
  متمكن من العقيدة، ومع ابن المنير تتم الفائدة. وفيه أحاديث واهية في
  فضائل السور نبّه المخرجون عليها.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - طبعة دار الكتاب العربي ومعها الانتصاف
  - التفسير والمفسرون للذهبي (دراسته له)
آخر_تحديث: 2026-06-12
