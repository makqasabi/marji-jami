id: al-muharrar-al-wajiz
العنوان: المحرر الوجيز في تفسير الكتاب العزيز
المؤلف:
  الاسم: أبو محمد عبد الحق بن غالب بن عطية الأندلسي
  الوفاة_هجري: 542
  الوفاة_ميلادي: 1147
العلم: التفسير
التصنيف_الفرعي: التفسير المحرر الجامع بين الأثر واللغة
لماذا_هو_أم_في_بابه: >
  أحكم تفاسير التحرير والانتقاء؛ جمع ابن عطية خلاصة من قبله — وعلى
  رأسهم الطبري — ثم حرر الأقوال ونقدها بميزان اللغة والأثر بعبارة وجيزة
  محكمة. شهد له شيخ الإسلام ابن تيمية بأنه «أتبع للسنة وأسلم من
  البدعة» من الكشاف وأنه من أجود التفاسير، وقدّمه أبو حيان على غيره
  وقال: هو أنقى التفاسير وأصفاها. عليه عمدة المغاربة والأندلسيين في
  التفسير، ومنه استمد القرطبي وأبو حيان وكثير ممن بعده، فهو أم مدرسة
  التحرير الوسطى بين بسط الطبري وصنعة المتأخرين، ولا يزال إلى اليوم
  عمدة من طلب الأقوال محررة منقودة في أوجز عبارة.
يغني_عن:
  - البحر المحيط لأبي حيان (في غير مباحث النحو التوسعية)
  - تفاسير الانتقاء الأندلسية قبله
يُقرأ_قبله:
  - تفسير ابن كثير
أفضل_الطبعات:
  - المحقق_أو_المعتني: عبد السلام عبد الشافي محمد
    الدار: دار الكتب العلمية، بيروت
    السنة: 1422هـ/2001م
    المجلدات: 6
    ملاحظة: الطبعة الكاملة المتداولة التي عليها الإحالات
  - المحقق_أو_المعتني: لجنة من العلماء بالمجلس العلمي بفاس
    الدار: وزارة الأوقاف والشؤون الإسلامية، المغرب
    السنة: صدر تباعًا في أجزاء ابتداء من 1395هـ
    ملاحظة: الطبعة المغربية الأولى المحققة؛ بياناتها التفصيلية (عدد الأجزاء وسنوات التمام) تُضبط عند التثبت
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: [قرآن بيديا]
الشروح_والمختصرات_والذيول: []
مستوى_القارئ: متوسط/متخصص
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  فيه مواضع وافق فيها الأشاعرة في الصفات وتأول، نبه عليها أهل العلم مع
  الشهادة له بقرب المأخذ من السنة؛ وإيجازه قد يحوج المبتدئ إلى شرح
  عبارته.
روابط_التحميل:
