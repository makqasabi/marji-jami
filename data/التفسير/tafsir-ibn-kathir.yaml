id: tafsir-ibn-kathir
العنوان: تفسير القرآن العظيم (تفسير ابن كثير)
المؤلف:
  الاسم: عماد الدين إسماعيل بن عمر بن كثير الدمشقي
  الوفاة_هجري: 774
  الوفاة_ميلادي: 1373
العلم: التفسير
التصنيف_الفرعي: التفسير بالمأثور
لماذا_هو_أم_في_بابه: >
  أشهر تفاسير المأثور بعد الطبري وأكثرها انتشارًا في الأمة قاطبة؛ بناه
  ابن كثير على تفسير القرآن بالقرآن ثم بالسنة ثم بأقوال السلف، مع نقد
  حديثي ظاهر ورثه عن شيخه المزي وملازمته لابن تيمية، فتميز عمن قبله
  بالحكم على الروايات والتنبيه على الإسرائيليات. قال فيه السيوطي: «لم
  يؤلف على نمطه مثله»، وأثنى عليه الشوكاني بأنه من أحسن التفاسير إن لم
  يكن أحسنها. توسطت سعتُه بين بسط الطبري واختصار غيره، فصار عمدة عامة
  طلبة العلم في التفسير بالمأثور، وعنه تفرعت مختصرات لا تحصى.
يغني_عن:
  - تفسير البغوي (في جملة مقاصده، والبغوي أوجز)
  - المختصرات المبنية عليه
يُقرأ_قبله:
  - تفسير السعدي
  - مقدمة في أصول التفسير لابن تيمية
أفضل_الطبعات:
  - المحقق_أو_المعتني: سامي بن محمد السلامة
    الدار: دار طيبة، الرياض
    السنة: 1420هـ/1999م (الطبعة الثانية)
    المجلدات: 8
    ملاحظة: الطبعة المعتمدة المتداولة، قوبلت على نسخ خطية
  - المحقق_أو_المعتني: مصطفى السيد محمد وآخرون
    الدار: مؤسسة قرطبة ومكتبة أولاد الشيخ للتراث، الجيزة
    السنة: 1421هـ/2000م
    المجلدات: 15
    ملاحظة: طبعة محققة موسعة التخريج
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: [قرآن بيديا, طريق الإسلام]
الشروح_والمختصرات_والذيول:
  - عمدة التفسير لأحمد شاكر (تهذيب)
  - المصباح المنير في تهذيب تفسير ابن كثير (فريق صالح الشيخ)
مستوى_القارئ: متوسط
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  مع عنايته بنقد المرويات بقيت فيه روايات إسرائيلية وضعيفة ساقها
  محذرًا أو ساكتًا أحيانًا؛ وهو في الأحكام الفقهية أوجز من القرطبي وفي
  اللغة أوجز من ابن عطية.
روابط_التحميل:
  - المصدر: المكتبة الشاملة
    الرابط: https://shamela.ws/book/8473
    النوع: حر
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - مقدمة طبعة دار طيبة
  - ثناء السيوطي في ذيل تذكرة الحفاظ
آخر_تحديث: 2026-06-12
