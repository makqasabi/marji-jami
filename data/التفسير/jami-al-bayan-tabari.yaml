id: jami-al-bayan-tabari
العنوان: جامع البيان عن تأويل آي القرآن (تفسير الطبري)
المؤلف:
  الاسم: أبو جعفر محمد بن جرير الطبري
  الوفاة_هجري: 310
  الوفاة_ميلادي: 923
العلم: التفسير
التصنيف_الفرعي: التفسير بالمأثور
لماذا_هو_أم_في_بابه: >
  أم كتب التفسير على الإطلاق؛ جمع الطبري فيه أقوال الصحابة والتابعين
  وتابعيهم بالأسانيد، ثم يوجهها ويرجح بينها بميزان اللغة والإجماع وظاهر
  التنزيل، فجمع بين الرواية والدراية في عمل لم يُسبق إليه ولم يُلحق
  فيه. قال فيه ابن خزيمة: «ما أعلم على أديم الأرض أعلم من ابن جرير»،
  وقال النووي: «أجمعت الأمة على أنه لم يُصنف مثل تفسير الطبري»، وقال
  شيخ الإسلام ابن تيمية إنه من أجلّ التفاسير وأعظمها قيمة. هو ديوان
  التفسير المأثور الذي حفظ تفاسير السلف المفقودة أصولها، وعليه عيال كل
  من فسّر بعده.
يغني_عن:
  - تفاسير السلف المسندة المفقودة (تفسير ابن أبي حاتم وعبد الرزاق في جملة مادتهما)
  - تفسير ابن أبي حاتم
يُقرأ_قبله:
  - مقدمة في أصول التفسير لابن تيمية
  - تفسير السعدي
أفضل_الطبعات:
  - المحقق_أو_المعتني: عبد الله بن عبد المحسن التركي (بالتعاون مع مركز البحوث بدار هجر)
    الدار: دار هجر، القاهرة
    السنة: 1422هـ/2001م
    المجلدات: 26 (منها مجلدا فهارس)
    ملاحظة: أوفى الطبعات الكاملة المحققة وأجودها إخراجًا
  - المحقق_أو_المعتني: محمود محمد شاكر (تخريج أحمد محمد شاكر)
    الدار: دار المعارف، القاهرة
    السنة: ابتداء من 1374هـ/1955م
    المجلدات: 16 (غير مكتملة؛ وقفت عند سورة إبراهيم)
    ملاحظة: أتقن تحقيق علميًّا لما صدر منه، وهو غير تام
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: [قرآن بيديا, جامع الكتب الإسلامية]
الشروح_والمختصرات_والذيول:
  - مختصرات معاصرة عدة (كالمصفى من جامع البيان)
مستوى_القارئ: متوسط/متخصص
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  يسوق الروايات بأسانيدها ومنها الضعيف والإسرائيليات على طريقة من أسند
  فقد أحال، فيحتاج قارئه إلى تمييز؛ ولغته وطول نفسه قد يشقان على غير
  المتمرس.
روابط_التحميل:
  - المصدر: المكتبة الشاملة
    الرابط: https://shamela.ws/book/7798
    النوع: حر
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - مقدمة طبعة دار هجر
  - ثناء الأئمة المنقول في ترجمته بسير أعلام النبلاء
آخر_تحديث: 2026-06-12
