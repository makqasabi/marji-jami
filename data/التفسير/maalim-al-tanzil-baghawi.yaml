id: maalim-al-tanzil-baghawi
العنوان: معالم التنزيل (تفسير البغوي)
المؤلف:
  الاسم: أبو محمد الحسين بن مسعود البغوي
  الوفاة_هجري: 516
  الوفاة_ميلادي: 1122
العلم: التفسير
التصنيف_الفرعي: التفسير بالمأثور الموجز
لماذا_هو_أم_في_بابه: >
  أوثق التفاسير الوسيطة المختصرة وأسلمها منهجًا عند جمهور أهل العلم؛
  هذّب فيه البغوي — محيي السنة — تفسير الثعلبي فنقّاه من كثير من
  الموضوعات، وجمع خلاصة أقوال السلف بعبارة سهلة وجيزة مع عناية بالحديث
  تليق بإمامته فيه. وصفه شيخ الإسلام ابن تيمية بأنه أسلم التفاسير
  المتداولة من البدعة والأحاديث الموضوعة حين وازنه بالواحدي والزمخشري
  والقرطبي. فهو الكتاب الذي يؤمَن جانبه للمتوسط قبل الغوص في المطولات،
  وقد بقي قرونًا عمدة التدريس في المدارس السنية، وهو إلى اليوم من أكثر
  التفاسير اعتمادًا في برامج طلب العلم.
يغني_عن:
  - تفسير الثعلبي (وهو أصله بعد التهذيب)
  - الوجيز والوسيط للواحدي
يُقرأ_قبله:
  - تفسير السعدي
أفضل_الطبعات:
  - المحقق_أو_المعتني: محمد عبد الله النمر وعثمان جمعة ضميرية وسليمان مسلم الحرش
    الدار: دار طيبة، الرياض
    السنة: 1409هـ وما بعدها
    المجلدات: 8
    ملاحظة: الطبعة المحققة المعتمدة المخرجة الأحاديث
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: [قرآن بيديا]
الشروح_والمختصرات_والذيول: []
مستوى_القارئ: مبتدئ/متوسط
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  بقيت فيه بعد التهذيب روايات إسرائيلية وأحاديث ضعيفة ورثها عن أصله
  الثعلبي، عالج كثيرًا منها تخريج طبعة دار طيبة؛ وكلمة ابن تيمية فيه
  موازنة نسبية لا تزكية مطلقة.
روابط_التحميل:
  - المصدر: المكتبة الشاملة
    الرابط: https://shamela.ws/book/12217
    النوع: حر
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - مقدمة طبعة دار طيبة
  - مجموع فتاوى ابن تيمية (موازنته بين التفاسير)
آخر_تحديث: 2026-06-12
