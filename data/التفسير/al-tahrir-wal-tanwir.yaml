id: al-tahrir-wal-tanwir
العنوان: تحرير المعنى السديد وتنوير العقل الجديد من تفسير الكتاب المجيد (التحرير والتنوير)
المؤلف:
  الاسم: محمد الطاهر بن عاشور التونسي
  الوفاة_هجري: 1393
  الوفاة_ميلادي: 1973
العلم: التفسير
التصنيف_الفرعي: التفسير البياني المقاصدي الحديث
لماذا_هو_أم_في_بابه: >
  أعظم تفسير أُلف في العصر الحديث باتفاق المنصفين؛ صنّفه ابن عاشور —
  شيخ جامع الزيتونة وإمام المقاصد — في نحو أربعين سنة، والتزم فيه ألا
  يذكر إلا ما لم يُسبق إليه أو ما فيه تحرير زائد، فجدّد الدرس البلاغي
  للقرآن على أصول عبد القاهر والسكاكي وتجاوزهما، وأبرز وجوه الإعجاز
  ودقائق النظم والمناسبات، وضم إليه نظرات مقاصدية واجتماعية بديعة.
  صار عمدة الدارسين في بلاغة القرآن وتفسيره الأدبي قاطبة، تعقد لمسائله
  الرسائل الجامعية، ويُعد بحق خاتمة التفاسير البيانية الكبرى وامتدادًا
  معاصرًا لمدرسة الكشاف بعد تصفيتها من الاعتزال.
يغني_عن:
  - حواشي البيضاوي المتأخرة في الدرس البلاغي (حرر زبدتها وزاد عليها)
يُقرأ_قبله:
  - تفسير ابن كثير
  - الكشاف (لمعرفة المدرسة التي يبني عليها ويناقشها)
أفضل_الطبعات:
  - المحقق_أو_المعتني: (طبعة الدار الأصلية)
    الدار: الدار التونسية للنشر، تونس
    السنة: 1984م
    المجلدات: 30 جزءًا
    ملاحظة: الطبعة المعتمدة التي عليها الإحالات الأكاديمية، وصورتها دور عدة
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: [قرآن بيديا, جامع الكتب الإسلامية]
الشروح_والمختصرات_والذيول: []
مستوى_القارئ: متوسط/متخصص
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  للمؤلف اجتهادات وآراء انفرد بها في مسائل علمية وفقهية ناقشه فيها أهل
  العلم، وهو في مباحث العقيدة على طريقة الأشاعرة المتأخرين في مواضع؛
  وذلك كله لا ينزل به عن مقام الإمامة في بابه.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - طبعة الدار التونسية للنشر
  - مقدمات المؤلف العشر للتفسير
آخر_تحديث: 2026-06-12
