id: adwa-al-bayan
العنوان: أضواء البيان في إيضاح القرآن بالقرآن
المؤلف:
  الاسم: محمد الأمين بن محمد المختار الجكني الشنقيطي
  الوفاة_هجري: 1393
  الوفاة_ميلادي: 1973
العلم: التفسير
التصنيف_الفرعي: تفسير القرآن بالقرآن
لماذا_هو_أم_في_بابه: >
  أعظم ما صُنف في تفسير القرآن بالقرآن قاطبة؛ جعل الشنقيطي هذا النوع —
  وهو أشرف أنواع التفسير — أصلَ كتابه ومداره، فيبيّن المجمل بنظائره
  ويقيد المطلق ويخصص العام بآيات الكتاب نفسه، مع تحقيقات أصولية وفقهية
  ولغوية تشهد بإمامته في فنون المعقول والمنقول، ومناقشات للمذاهب
  بأدلتها على طريقة أهل السنة. أكمله تلميذه عطية محمد سالم بعد وفاته.
  صار منذ صدوره عمدة المتخصصين في هذا الباب، ومقررًا في الدراسات
  العليا، ولا يُعرف كتاب يقوم مقامه في استقصاء بيان القرآن بالقرآن مع
  هذا التحرير.
يغني_عن:
  - المصنفات المفردة في تفسير القرآن بالقرآن قبله (لم يبلغ شيء منها مبلغه)
يُقرأ_قبله:
  - تفسير السعدي
  - مذكرة أصول الفقه للشنقيطي (لفهم آلته الأصولية)
أفضل_الطبعات:
  - المحقق_أو_المعتني: إشراف بكر بن عبد الله أبو زيد
    الدار: دار عالم الفوائد، مكة (ضمن آثار الشنقيطي)
    السنة: 1426هـ
    المجلدات: 9 مع التتمة
    ملاحظة: أجود الطبعات ضبطًا وإخراجًا (مشروع آثار الإمام الشنقيطي)
  - المحقق_أو_المعتني: (طبعة مصححة)
    الدار: دار الفكر للطباعة والنشر، بيروت
    السنة: 1415هـ/1995م
    المجلدات: 9
    ملاحظة: الطبعة المتداولة قبل طبعة عالم الفوائد
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: [قرآن بيديا, طريق الإسلام]
الشروح_والمختصرات_والذيول:
  - تتمة أضواء البيان لعطية محمد سالم
مستوى_القارئ: متخصص
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  لم يتمه المؤلف (انتهى عند سورة المجادلة وأكمله تلميذه على منهجه)؛
  واستطراداته الأصولية واللغوية الطويلة قد تشق على غير المتخصص.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - طبعة دار عالم الفوائد ضمن آثار الشنقيطي
  - ترجمة الشنقيطي لتلميذه عطية سالم
آخر_تحديث: 2026-06-12
