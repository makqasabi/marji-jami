id: taysir-al-karim-al-rahman
العنوان: تيسير الكريم الرحمن في تفسير كلام المنان (تفسير السعدي)
المؤلف:
  الاسم: عبد الرحمن بن ناصر السعدي
  الوفاة_هجري: 1376
  الوفاة_ميلادي: 1957
العلم: التفسير
التصنيف_الفرعي: التفاسير الميسرة المعاصرة
لماذا_هو_أم_في_بابه: >
  أنفع التفاسير الميسرة المعاصرة وأوسعها قبولًا؛ كتبه السعدي بعبارة
  سهلة مشرقة تبين المعنى الإجمالي مباشرة من غير حشو الأقوال والأسانيد،
  مع استنباطات بديعة للهدايات والفوائد ولطف ظاهر في تنزيل الآيات على
  واقع القلب والسلوك، على عقيدة سلفية صافية. أوصى به العلماء المعاصرون
  مدخلًا أول لكل مبتدئ في التفسير، واعتُمد في برامج طلب العلم
  والترجمات الدعوية حول العالم، فهو أم طبقة التفاسير الميسرة: به يفتح
  الطالب الباب قبل ابن كثير والطبري، وبه ينتفع العامي انتفاعًا لا
  يجده في المطولات، ولهذا تتابعت طبعاته وترجماته حتى صار أوسع التفاسير
  المعاصرة انتشارًا.
يغني_عن:
  - عامة التفاسير الميسرة والمختصرات المدرسية
يُقرأ_قبله: []
أفضل_الطبعات:
  - المحقق_أو_المعتني: عبد الرحمن بن معلا اللويحق
    الدار: مؤسسة الرسالة، بيروت
    السنة: 1420هـ/2000م
    المجلدات: 1
    ملاحظة: الطبعة المحققة المعتمدة في مجلد واحد، قوبلت على نسخ المؤلف
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: [قرآن بيديا, طريق الإسلام, تطبيقات المصحف المتداولة]
الشروح_والمختصرات_والذيول: []
مستوى_القارئ: مبتدئ
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  تفسير إجمالي تربوي لا يعرض الخلاف ولا أوجه القراءات والإعراب، فلا
  يغني طالب التخصص عن الأمهات؛ وهذا من طبيعة بابه لا من عيبه.
روابط_التحميل:
  - المصدر: مكتبة جرير (شراء)
    الرابط: https://www.jarir.com/arabic-books-200557.html
    النوع: شراء
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - طبعة مؤسسة الرسالة بتحقيق اللويحق
