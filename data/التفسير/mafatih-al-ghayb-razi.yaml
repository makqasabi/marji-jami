id: mafatih-al-ghayb-razi
العنوان: مفاتيح الغيب (التفسير الكبير)
المؤلف:
  الاسم: فخر الدين محمد بن عمر الرازي
  الوفاة_هجري: 606
  الوفاة_ميلادي: 1210
العلم: التفسير
التصنيف_الفرعي: التفسير بالرأي والتفسير الكلامي
لماذا_هو_أم_في_بابه: >
  أضخم تفاسير الرأي وأوسعها عقلًا وجدلًا؛ بناه الرازي على استخراج
  المناسبات بين الآيات والسور وتقسيم المسائل والاحتمالات تقسيمًا
  منطقيًّا، وأودعه علوم الكلام والفلسفة والطبيعيات حتى قيل: «فيه كل شيء
  إلا التفسير» — وهي كلمة فيها تحامل، فإن فيه تحقيقات بيانية ومعنوية لا
  توجد عند غيره، وقد أنصفه المحققون بأنه لا يستغني عنه من يعالج
  التفسير العقلي والرد على الشبهات. هو ذروة مدرسة التفسير الكلامي
  وأمّها التي تفرعت عنها حواشي المتأخرين وتفاسيرهم، كالبيضاوي الذي هو
  مختصر له في جوهره، فلا يُدرس تاريخ التفسير العقلي ولا تُفهم حواشي
  المتأخرين إلا به.
يغني_عن:
  - أنوار التنزيل للبيضاوي (الذي لخّص مادته العقلية، فالأصل يغني عن الفرع للمتخصص)
يُقرأ_قبله:
  - تفسير ابن كثير
  - الكشاف للزمخشري (لإدراك ما يحاوره الرازي)
أفضل_الطبعات:
  - المحقق_أو_المعتني: (بلا تحقيق نقدي؛ طبعات تجارية مصححة)
    الدار: دار إحياء التراث العربي، بيروت
    السنة: 1420هـ (الطبعة الثالثة)
    المجلدات: 32 جزءًا
    ملاحظة: أشهر المتداول؛ والكتاب لم يحظ بعدُ بتحقيق نقدي كامل وهو من أكبر فجوات التحقيق في التفسير
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: [قرآن بيديا]
الشروح_والمختصرات_والذيول: []
مستوى_القارئ: متخصص
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  تفسير أشعري كلامي صريح، يورد شبه المخالفين بقوة ثم يجيب وقد يقصر
  الجواب عن العرض في مواضع نبّه عليها العلماء؛ واختُلف في القدر الذي
  أتمه الرازي بنفسه وما أكمله تلامذته (كنجم الدين القمولي وغيره) من
  مواضع متأخرة، والمسألة مبسوطة في الدراسات عنه.
روابط_التحميل:
  - المصدر: المكتبة الشاملة
    الرابط: https://shamela.ws/book/23635
    النوع: حر
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - طبعة دار إحياء التراث العربي
  - التفسير والمفسرون لمحمد حسين الذهبي (دراسته له)
آخر_تحديث: 2026-06-12
