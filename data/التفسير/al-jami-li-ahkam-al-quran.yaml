id: al-jami-li-ahkam-al-quran
العنوان: الجامع لأحكام القرآن (تفسير القرطبي)
المؤلف:
  الاسم: أبو عبد الله محمد بن أحمد القرطبي
  الوفاة_هجري: 671
  الوفاة_ميلادي: 1273
العلم: التفسير
التصنيف_الفرعي: تفاسير آيات الأحكام
لماذا_هو_أم_في_بابه: >
  أم تفاسير الأحكام؛ استوعب القرطبي فيه ما قبله من كتب أحكام القرآن —
  كأحكام ابن العربي والجصاص وإلكيا الهراسي — وزاد عليها أنه فسّر القرآن
  كله لا آيات الأحكام وحدها، فجمع القراءات وأسباب النزول واللغة
  والإعراب ثم مذاهب الفقهاء بأدلتها مع إنصاف ظاهر في العرض رغم
  مالكيته. قال ابن فرحون: «هو من أجلّ التفاسير وأعظمها نفعًا». بقي منذ
  تأليفه المرجع الأول لمن طلب فقه الآية ومذاهب العلماء فيها، يستوي في
  الإفادة منه الفقيه والمفسر، ولا يقوم غيره مقامه في بابه إلى اليوم.
يغني_عن:
  - أحكام القرآن لابن العربي (في جملة مادته)
  - أحكام القرآن للجصاص (في مقام الجمع لا في تحرير مذهب الحنفية)
  - أحكام القرآن لإلكيا الهراسي
يُقرأ_قبله:
  - تفسير ابن كثير
أفضل_الطبعات:
  - المحقق_أو_المعتني: عبد الله بن عبد المحسن التركي مع مركز البحوث بمؤسسة الرسالة
    الدار: مؤسسة الرسالة، بيروت
    السنة: 1427هـ/2006م
    المجلدات: 24
    ملاحظة: أوفى الطبعات المحققة وأجودها
  - المحقق_أو_المعتني: أحمد البردوني وإبراهيم أطفيش
    الدار: دار الكتب المصرية، القاهرة
    السنة: 1384هـ/1964م (الطبعة الثانية)
    المجلدات: 20 جزءًا
    ملاحظة: الطبعة القديمة التي عليها إحالات الدراسات
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: [قرآن بيديا]
الشروح_والمختصرات_والذيول:
  - مختصر تفسير القرطبي (مختصرات معاصرة عدة)
مستوى_القارئ: متوسط/متخصص
نوع_المرجعية: شرعية_لغوية
ملاحظات_نقدية: >
  فيه أحاديث ضعيفة وحكايات لم تثبت ينقلها بلا تعقيب أحيانًا، وفي مباحث
  الصفات يجري على طريقة التأويل الأشعرية في مواضع؛ نبه على ذلك من اعتنى
  به من أهل العلم مع إطباقهم على جلالة الكتاب.
روابط_التحميل:
  - المصدر: المكتبة الشاملة
    الرابط: https://shamela.ws/book/20855
    النوع: حر
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - مقدمة طبعة مؤسسة الرسالة
  - الديباج المذهب لابن فرحون (ترجمته)
