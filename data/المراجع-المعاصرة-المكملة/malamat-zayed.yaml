id: malamat-zayed
العنوان: معلمة زايد للقواعد الفقهية والأصولية
المؤلف:
  الاسم: مؤسسة زايد بن سلطان آل نهيان بالتعاون مع منظمة التعاون الإسلامي ومجمع الفقه الإسلامي الدولي
  هيئة: نعم
العلم: المراجع المعاصرة المكملة
التصنيف_الفرعي: موسوعات القواعد المؤسسية
لماذا_هو_أم_في_بابه: >
  أضخم عمل في تاريخ التقعيد الفقهي قاطبة؛ جمعت لجانها — في خمسة
  عشر عامًا وبمشاركة مئات العلماء — نحو مئة ألف قاعدة من تراث
  المذاهب الثمانية ثم حررتها وهذبتها إلى آلاف القواعد المعتمدة:
  المقاصدية ثم الفقهية ثم الضوابط ثم القواعد الأصولية، كل قاعدة
  بمعناها وأدلتها وتطبيقاتها ومستثنياتها معزوة لمصادرها، في 41
  مجلدًا وأكثر من 25 ألف صفحة بفهارس علمية ثمانية مجلدات. فصارت
  منذ صدورها (1434هـ/2013م) المرجع الجامع الذي أغنى عن تتبع كتب
  القواعد المتناثرة، واعتمدتها الدراسات والمجامع خزانةَ التقعيد
  الأولى، فهي أم بابها ومفخرة العمل الموسوعي المؤسسي الحديث.
يغني_عن:
  - تتبع مجاميع القواعد المذهبية المتفرقة في مقام الاستقصاء
يُقرأ_قبله:
  - شرح القواعد الفقهية للزرقا (مدخل الفن)
أفضل_الطبعات:
  - المحقق_أو_المعتني: لجان المعلمة بإشراف مجمع الفقه الإسلامي الدولي
    الدار: مؤسسة زايد بن سلطان آل نهيان، أبوظبي
    السنة: 1434هـ/2013م
    المجلدات: 41
    ملاحظة: الطبعة الأولى الرسمية (تحقق ويب 2026-06-12)
التوافر_الرقمي:
  المكتبة_الشاملة: لا
  منصات_أخرى: [نسخ رقمية متداولة في المكتبات البحثية]
الشروح_والمختصرات_والذيول: []
مستوى_القارئ: متخصص
نوع_المرجعية: معاصرة
ملاحظات_نقدية: >
  ضخامتها تجعلها مرجع مؤسسات ومكتبات أكثر منها كتاب اقتناء فردي،
  وتفاوتت جودة التحرير بين موادها بتعدد كتّابها كما هو شأن
  الأعمال الجماعية؛ ومحتواها العلمي حديث الصدور محرر.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - بيانات الإصدار الرسمية (تحقق ويب 2026-06-12)
آخر_تحديث: 2026-06-12
