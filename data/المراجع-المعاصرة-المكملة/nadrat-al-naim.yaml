id: nadrat-al-naim
العنوان: نضرة النعيم في مكارم أخلاق الرسول الكريم صلى الله عليه وسلم
المؤلف:
  الاسم: مجموعة من المختصين بإشراف صالح بن عبد الله بن حميد وعبد الرحمن بن محمد بن ملوح
  هيئة: نعم
العلم: المراجع المعاصرة المكملة
التصنيف_الفرعي: موسوعات الأخلاق المؤسسية
لماذا_هو_أم_في_بابه: >
  أوسع موسوعة منهجية للأخلاق الإسلامية في تاريخ التأليف؛ حصرت —
  بعمل فريق علمي سنوات بإشراف إمام الحرم ابن حميد — الأخلاقَ
  المحمودة والمذمومة في مئات الموضوعات المرتبة، تعالج كل خلق
  بمنهج موحد: معناه لغة واصطلاحًا، ثم آياته مصنفة، ثم أحاديثه
  الصحيحة، ثم الآثار وأقوال العلماء والشعر، ثم فوائده أو مضاره.
  فجمعت ما تفرق في كتب الرقائق والآداب كلها في بناء موسوعي محرر
  المصادر، وصارت منذ صدورها عدة الخطباء والدعاة والباحثين في أي
  موضوع أخلاقي — تجد المادة جاهزة موثقة في موضعها — فهي أم
  المعالجة الموسوعية للأخلاق ولا نظير لها في بابها.
يغني_عن:
  - جمع مادة الخلق الواحد من كتب الرقائق المتفرقة
يُقرأ_قبله: []
أفضل_الطبعات:
  - المحقق_أو_المعتني: فريق الموسوعة بإشراف ابن حميد وابن ملوح
    الدار: دار الوسيلة للنشر والتوزيع، جدة
    السنة: طبعات متكررة (الرابعة وما بعدها متداولة)
    المجلدات: 12
    ملاحظة: طبعات دار الوسيلة هي الأصل المعتمد
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: [الدرر السنية (موسوعة الأخلاق مستفيدة منها)]
الشروح_والمختصرات_والذيول: []
مستوى_القارئ: مبتدئ/متوسط
نوع_المرجعية: معاصرة
ملاحظات_نقدية: >
  عمل جمع وترتيب لا تحقيق وترجيح، وتتفاوت موادها عمقًا بتعدد
  محرريها، وفي بعض شواهدها الشعرية والأثرية ما هو دون شرط الصحة
  المعلن في الأحاديث.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - طبعة دار الوسيلة
آخر_تحديث: 2026-06-12
