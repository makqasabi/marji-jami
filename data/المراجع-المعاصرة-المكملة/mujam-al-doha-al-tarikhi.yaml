id: mujam-al-doha-al-tarikhi
العنوان: معجم الدوحة التاريخي للغة العربية
المؤلف:
  الاسم: المركز العربي للأبحاث ودراسة السياسات، الدوحة (مجلس علمي وهيئة تنفيذية ومئات الباحثين)
  هيئة: نعم
العلم: المراجع المعاصرة المكملة
التصنيف_الفرعي: المعاجم التاريخية المؤسسية
لماذا_هو_أم_في_بابه: >
  أول معجم تاريخي للعربية يرى النور بعد قرن من الأحلام المجمعية
  المتعثرة (مشروع فيشر فالمجامع)؛ يؤرخ لكل لفظة عربية: متى ظهرت
  أول مرة، وفي أي نص موثق، وكيف تطورت دلالاتها قرنًا بعد قرن من
  النقوش السابقة للإسلام إلى اليوم، بمنهجية حاسوبية ومدونة نصية
  ضخمة وتحرير علمي محكّم. أُطلقت مراحله تباعًا منذ 2018 على منصة
  رقمية مجانية حتى أُعلن اكتماله، فقدّم للعربية ما قدمه معجم
  أكسفورد التاريخي للإنجليزية، وفتح للدراسات اللغوية والشرعية
  بابًا غير مسبوق: تأريخ المصطلح وتطور الدلالة بالدليل الموثق،
  فهو أم المعجمية التاريخية العربية ومنجزها الذي طال انتظاره.
يغني_عن:
  - التتبع اليدوي لتواريخ الألفاظ في النصوص
يُقرأ_قبله:
  - مدخل في المعجمية التاريخية (أدبيات المشروع المنشورة)
أفضل_الطبعات:
  - المحقق_أو_المعتني: المجلس العلمي للمعجم
    الدار: المركز العربي للأبحاث ودراسة السياسات، الدوحة — منصة رقمية (dohadictionary.org)
    السنة: أُطلق 2018م وأُعلن اكتماله 2025م
    المجلدات: منصة رقمية (غير ورقي)
    ملاحظة: الإتاحة الرسمية رقمية مجانية؛ وللمشروع نظير ورقي مستقل هو «المعجم التاريخي للغة العربية» الصادر عن اتحاد المجامع برعاية الشارقة (127 مجلدًا، اكتمل 2024) — وهما مشروعان متمايزان (تحقق ويب 2026-06-12)
التوافر_الرقمي:
  المكتبة_الشاملة: لا
  منصات_أخرى: [منصة المعجم الرسمية, تطبيق جوال رسمي]
الشروح_والمختصرات_والذيول: []
مستوى_القارئ: متوسط/متخصص
نوع_المرجعية: معاصرة
ملاحظات_نقدية: >
  ناقش باحثون اكتمال مدونته النصية وتمثيلها لكل العصور واللهجات
  الوسيطة، وكونه رقميًّا خالصًا يجعل الإحالة الأكاديمية عليه
  متجددة الصيغة؛ ومحتواه محدث باستمرار وهو من مزاياه.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - منصة المعجم الرسمية وأخبار الاكتمال (تحقق ويب 2026-06-12)
آخر_تحديث: 2026-06-12
