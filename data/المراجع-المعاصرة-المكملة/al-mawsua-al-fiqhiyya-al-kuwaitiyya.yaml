id: al-mawsua-al-fiqhiyya-al-kuwaitiyya
العنوان: الموسوعة الفقهية الكويتية
المؤلف:
  الاسم: وزارة الأوقاف والشؤون الإسلامية بدولة الكويت (لجان من علماء العالم الإسلامي)
  هيئة: نعم
العلم: المراجع المعاصرة المكملة
التصنيف_الفرعي: الموسوعات الفقهية المؤسسية
لماذا_هو_أم_في_بابه: >
  أكبر موسوعة فقهية في العصر الحديث وأنجح مشروع علمي مؤسسي عربي
  على الإطلاق؛ صاغت لجانها — على مدى أربعة عقود — تراث الفقه
  الإسلامي بمذاهبه المعتبرة في ثلاثة آلاف مصطلح مرتبة هجائيًّا،
  تحت كل مصطلح تحرير المسألة بأقوال المذاهب وأدلتها معزوة إلى
  أمهاتها بعبارة عصرية محايدة. صارت منذ اكتمالها المرجعَ الأول
  الذي يفتحه الباحث والقاضي والمفتي والطالب قبل الغوص في كتب
  المذاهب: تعتمدها المحاكم والمجامع والجامعات قاطبة، وقلّ بحث
  فقهي معاصر يخلو من الإحالة عليها، فهي أم المراجع الفقهية
  المعاصرة بلا منازع والنموذج الذي تقاس عليه الموسوعات المؤسسية.
يغني_عن:
  - الوصول الأول المتفرق إلى كتب المذاهب في كل مسألة
يُقرأ_قبله: []
أفضل_الطبعات:
  - المحقق_أو_المعتني: لجان الموسوعة بوزارة الأوقاف الكويتية
    الدار: وزارة الأوقاف والشؤون الإسلامية، الكويت (دار السلاسل للأجزاء 1–23 ط2، ودار الصفوة بمصر للأجزاء 24–38، والوزارة للأجزاء 39–45)
    السنة: 1404–1427هـ/1983–2006م
    المجلدات: 45
    ملاحظة: الطبعة الرسمية الكاملة (تحقق ويب 2026-06-12)
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: [جامع الكتب الإسلامية, أرشيف, تطبيقات رسمية]
الشروح_والمختصرات_والذيول: []
مستوى_القارئ: مبتدئ/متوسط/متخصص
نوع_المرجعية: معاصرة
ملاحظات_نقدية: >
  وقفت مادتها عند تراث القرن الثالث عشر الهجري فلا تغطي النوازل
  المعاصرة (تكملها قرارات المجامع)، وترتيبها المصطلحي يشتت
  المسألة الواحدة أحيانًا على أكثر من موضع؛ ومحتواها العلمي محرر
  باق لا يتقادم لطبيعته التراثية.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - الطبعة الرسمية وبيانات الوزارة (تحقق ويب 2026-06-12)
آخر_تحديث: 2026-06-12
