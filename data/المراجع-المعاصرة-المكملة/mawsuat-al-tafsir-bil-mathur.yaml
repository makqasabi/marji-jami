id: mawsuat-al-tafsir-bil-mathur
العنوان: موسوعة التفسير بالمأثور
المؤلف:
  الاسم: مركز الدراسات والمعلومات القرآنية بمعهد الإمام الشاطبي (فريق علمي بإشراف مساعد الطيار وعبد الرحمن الشهري وآخرين)
  هيئة: نعم
العلم: المراجع المعاصرة المكملة
التصنيف_الفرعي: الموسوعات القرآنية المؤسسية
لماذا_هو_أم_في_بابه: >
  أضخم جمع محرر للتفسير المأثور بعد الطبري وأول استدراك مؤسسي
  لمشروع السيوطي الضائع؛ جمع فريقها — في أكثر من عقد — مرويات
  التفسير عن النبي صلى الله عليه وسلم والصحابة والتابعين
  وأتباعهم من مئات المصادر المسندة المطبوعة والمخطوطة، مرتبة على
  الآيات، محذوفة المكرر، محکومًا على مروياتها، مع عزو استقصائي،
  فحققت عمليًّا ما أراده السيوطي في «ترجمان القرآن» وفُقد أكثره.
  صارت منذ صدورها (1439هـ/2017م) عمدة الباحثين في التفسير
  المأثور: تغني عن تتبع عشرات المصادر، وتعتمدها الدراسات القرآنية
  والرسائل قاطبة، فهي أم الجمع المأثور المعاصر ومفخرة العمل
  القرآني المؤسسي.
يغني_عن:
  - الدر المنثور للسيوطي (في مقام الجمع المستقصى المحرر)
يُقرأ_قبله:
  - تفسير ابن كثير (للمنهج قبل الاستقصاء)
أفضل_الطبعات:
  - المحقق_أو_المعتني: فريق مركز الدراسات القرآنية بمعهد الإمام الشاطبي
    الدار: دار ابن حزم، بيروت، بالتعاون مع المعهد (جدة)
    السنة: 1439هـ/2017م (الطبعة الأولى)
    المجلدات: 24
    ملاحظة: الطبعة الأولى الرسمية المعتمدة
التوافر_الرقمي:
  المكتبة_الشاملة: نعم
  منصات_أخرى: [منصات المعهد ومكتبات رقمية بحثية]
الشروح_والمختصرات_والذيول: []
مستوى_القارئ: متخصص
نوع_المرجعية: معاصرة
ملاحظات_نقدية: >
  اقتصرت على المأثور دون أقوال المفسرين الاجتهادية فلا تغني عن
  التفاسير المحررة، وأحكامها على الأسانيد اجتهاد فريقها يناقَش
  كما يناقش غيره.
حالة_التوثيق: موثّق
مصادر_التوثيق:
  - طبعة دار ابن حزم ومعهد الإمام الشاطبي
آخر_تحديث: 2026-06-12
